name: DE Eval (manual only — ANTHROPIC_API_KEY policy)

# Auto-trigger DISABLED per repo policy: Anthropic API usage opt-out.
# Workflow preserved as reference + manual trigger via workflow_dispatch.
# To re-enable auto-trigger: revert this commit + register ANTHROPIC_API_KEY secret.

on:
  workflow_dispatch:
    inputs:
      inputs:
        description: 'Specific frozen inputs to run (comma-separated). Empty = all.'
        required: false
        default: ''

jobs:
  de-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        working-directory: sprint-orchestrator/evals
      - run: cd sprint-gallery && pnpm install --frozen-lockfile && pnpm puppeteer browsers install chromium

      - name: Cooldown check
        run: |
          today_runs=$(gh run list --workflow=de-eval.yml --created="$(date -I)" --json conclusion --jq 'length')
          if [ "$today_runs" -ge 3 ]; then
            echo "Cooldown reached (3 runs/day) — skipping"
            exit 0
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run DE eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm de-eval --output-json=/tmp/eval-result.json

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/eval-result.json', 'utf8'));
            const body = `## DE Eval Result: ${result.overall_status.toUpperCase()}\n\n${result.summary}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail on regression
        if: failure()
        run: exit 1
