id: "correctness-002"
title: "JS getter가 JSON 직렬화에서 누락"
category: "correctness"
severity: "critical"
source_sprint: "ugc-profile-nav-001"
source_group: "group-001"
discovered_at: "2026-04-06T00:00:00+09:00"
frequency: 1
last_seen: "ugc-profile-nav-001"

description: |
  DTO 클래스에서 get 키워드로 정의된 getter 프로퍼티는
  JSON.stringify() / class-transformer의 직렬화에서 누락된다.
  API 응답에 해당 필드가 포함되지 않아 FE에서 undefined를 받는다.

detection: |
  - DTO 클래스에서 get 키워드를 사용하는 프로퍼티가 있는지 검색
  - 해당 getter가 API 응답에 포함되어야 하는 필드인지 확인
  - JSON.stringify(new DtoInstance())로 해당 필드가 출력되는지 테스트

prevention: |
  - DTO에서 getter 사용을 금지하고, 모든 응답 필드는 일반 property로 선언
  - @ApiProperty() 데코레이터를 반드시 부착
  - class-transformer의 @Expose()를 명시적으로 사용

contract_clause: |
  DTO의 모든 API 응답 필드는 일반 property + @ApiProperty()로 선언한다.
  get 키워드를 사용한 getter는 API 응답 DTO에서 사용하지 않는다.

example:
  bad: |
    class UserProfileDto {
      @ApiProperty()
      get displayName(): string {
        return `${this.firstName} ${this.lastName}`;
      }
      // JSON.stringify에서 누락됨
    }
  good: |
    class UserProfileDto {
      @ApiProperty()
      displayName: string;

      static from(entity: UserProfile): UserProfileDto {
        const dto = new UserProfileDto();
        dto.displayName = `${entity.firstName} ${entity.lastName}`;
        return dto;
      }
    }
