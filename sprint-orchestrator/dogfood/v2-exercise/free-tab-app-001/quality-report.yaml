pass6_audit:
  status: "passed"
  checks:
    - id: 1
      name: "hex-not-in-tokens (#[0-9A-Fa-f]{6} outside tokens.css)"
      result: "pass"
      evidence: |
        comm -23 proto-hex tokens-hex returns: #1a1a2e, #2a2a3e, #e0e0e0, #f0f0f0
        All 4 are in .control-panel* or body{} — explicitly excluded from Pass 6 scope.
        All screen-content hexes are defined in tokens.css (sprint-level alias --ft-* added
        for teal/baby/pet/studio gradient colors).
    - id: 2
      name: "emoji-in-interactive (button/tab/nav)"
      result: "pass"
      evidence: |
        All interactive icons use lucide-style inline SVG (bell, home, search, profile, refresh).
        No Unicode emoji in <button>.
    - id: 3
      name: "border-left card slop (Material/Tailwind pattern)"
      result: "pass"
      evidence: "grep 'border-left.*solid' returns 0 matches"
    - id: 4
      name: "font-family non-Pretendard in .screen"
      result: "pass"
      evidence: |
        Only ui-monospace appears, all in .control-panel* selectors (excluded).
        Screen content uses var(--wds-font-family-primary) inherited from body.
    - id: 5
      name: "brand purple gradient in background"
      result: "pass"
      evidence: |
        --banner-purple uses purple-500 → purple-600 gradient.
        Justified by PRD US-5 ('보라/틸 배너 전환') + DESIGN.md gradient allowed for
        explicit campaign banners. Tokenized as --banner-purple.
    - id: 6
      name: "placeholder-image in main content slot"
      result: "pass"
      evidence: |
        FreeRosterCard .free-card__thumb is gradient-token (per assets layer).
        context-engine.yaml assets.feed_thumbnails.kind: gradient-token + needs_real_content: false.
        Avatars (16px) also gradient-token. No <div class='placeholder-image'> in screen.
    - id: 7
      name: "interaction binding count vs spec"
      result: "pass"
      evidence: |
        Spec interactions: 6 (tab × 2, card-tap, empty-refresh, swipe-down, bottom-nav).
        DOM bindings: tab × 2 (onclick), 10 cards (onclick), refresh (onclick),
        bell + 3 nav (onclick), 5 state-toggle (control panel, excluded from spec count),
        plus touch handlers on body-scroll (pull-to-refresh).
        All spec interactions have corresponding handlers.
    - id: 8
      name: "alert/confirm/prompt in onclick"
      result: "pass"
      evidence: |
        grep 'onclick=[^>]*\b(alert|confirm|prompt)\(' returns 0 matches.
        Refresh + navigate-swipefeed use console.log + showToast (visual feedback).
    - id: 9
      name: "archetype persona forced rules (feed.md)"
      result: "pass (4/4)"
      evidence: |
        Rule 1 (skeleton loading): grid-skeleton with 6 SkeletonCard, animation defined ✓
        Rule 2 (empty state): empty-view with title/desc/refresh-cta defined ✓
        Rule 3 (6+ items in first viewport): 10 cards in 2-col grid, aspect 4/5,
                first viewport (390x844 minus header 92px minus banner ~70px minus nav 64px
                ≈ 618px body) shows ~3 rows × 2 = 6 cards ✓
        Rule 4 (refresh interaction): empty-refresh button (tap) + body-scroll
                pull-to-refresh (touch) ✓

