# ─────────────────────────────
# Pass 6 Anti-Slop Audit (10 checks; #10 exemplar drift = N/A 첫 onboarding exemplar)
# ─────────────────────────────
pass6_audit:
  status: "passed"
  result: "9/9"
  checks:
    - id: 1
      name: "hex-not-in-tokens (#[0-9A-Fa-f]{3,6} outside tokens.css)"
      result: "pass"
      evidence: |
        proto-hex 외부 영역 (.screen 후손 아닌 selector):
          #f0f0f0 (body BG), #1a1a2e/#2a2a3e/#444/#bbb/#888/#666/#999/#e0e0e0
          (.control-panel*), #fff/#ddd (.control-panel state-btn.active / .device-frame border).
        모두 Pass 6 protocol §C.2.1 명시 제외 영역 (control-panel + device chrome + body).
        .screen 후손 (.onb-header, .step-indicator, .onb-body, .hero-illust, .onb-cta,
        .success-overlay, .toast) 콘텐츠는 모두 var(--wds-* / --component-*) 토큰 경유.
        radial-gradient 도 var(--wds-color-purple-100/-50) 토큰 변수 — raw hex 0건.
    - id: 2
      name: "emoji-in-interactive (button/tab/nav)"
      result: "pass"
      evidence: |
        모든 interactive (back-btn, skip-btn, primary-cta) 는 lucide inline SVG 또는 텍스트 한글 카피.
        Unicode emoji 0건 (.screen 후손).
        '건너뛰기'/'다음'/'시작하기' 한글 텍스트는 emoji 가 아님.
    - id: 3
      name: "border-left card slop (Material/Tailwind pattern)"
      result: "pass"
      evidence: "grep 'border-left' returns 0 matches in entire prototype."
    - id: 4
      name: "font-family non-Pretendard in .screen"
      result: "pass"
      evidence: |
        .screen 후손 폰트는 모두 body 의 var(--wds-font-family-primary) 상속 (Pretendard).
        ui-monospace/monospace 는 .control-panel* 한정 (제외 영역).
        font-family: inherit 는 button 들이 body 상속 — Pretendard 보장.
    - id: 5
      name: "brand purple gradient in background"
      result: "pass"
      evidence: |
        radial-gradient 사용처: --component-hero-fill 1건 (hero-illust BG).
        구성: purple-100 (#EBE1FF) → purple-50 (#F5F0FF) → purple-50 — light tones 만 사용.
        DESIGN.md §4 '그라디언트는 명시된 경우에만' 가이드 준수.
        hero card 는 onboarding 권장 룰 #1 (illustration card) 충족 위한 의도적 사용.
        brand-strong (purple-500/600) gradient 미사용. linear gradient 0건.
    - id: 6
      name: "placeholder-image in main content slot"
      result: "pass"
      evidence: |
        .hero-illust 가 일러스트 자리이지만 lucide SVG (80px) + brand-weak gradient 카드 조합.
        context-engine.yaml assets.hero_illustrations.kind: gradient-token + needs_real_content: false.
        success-overlay__icon 도 lucide check-circle (kind: illustration).
        'placeholder-image' class 미사용. <img> 0건.
    - id: 7
      name: "interaction binding count vs spec"
      result: "pass"
      evidence: |
        Spec interactions: 3 (next, back, skip — primary-cta/back-btn/skip-btn).
        DOM bindings: onclick=onNext (1) + onclick=onBack (1) + onclick=onSkip (1) = 3 핸들러,
        plus 4 control-panel state-toggle (excluded from spec count — control-panel scope).
        모든 spec interaction 에 대응 핸들러 존재. 추가 toast 는 visual feedback only.
    - id: 8
      name: "alert/confirm/prompt in onclick"
      result: "pass"
      evidence: |
        grep 'alert\\(|confirm\\(|prompt\\(' returns 0 matches.
        모든 인터랙션 피드백은 setState() + showToast() + console.log() — 차단 dialog 부재.
        success state 자동 dismiss 1.6s 도 setTimeout 사용 (alert 부재).
    - id: 9
      name: "archetype persona forced rules (onboarding.md)"
      result: "pass (4/4)"
      evidence: |
        Rule 1 (Step indicator): 3 dots #step-indicator (active=24x6 pill / inactive=6x6 circle).
                role="progressbar" + aria-valuenow 1-3 ✓
        Rule 2 (Primary CTA 56px+): --component-button-primary-height: 56px;
                .onb-cta height: var(--component-button-primary-height) — 56px 강제 ✓
        Rule 3 (Skip 1-way): #skip-btn '건너뛰기' 우상단 (3 step 모두 visible),
                onSkip() → success state 직진. text 카피 (icon-only 회피, 발견성) ✓
        Rule 4 (마지막 step → success state): step-3 CTA '시작하기' (label swap),
                onNext() in last step → setState('success'),
                #success-overlay (체크 아이콘 + '준비됐어요!' + '잠시 후 홈으로 이동해요') ✓
        4/4 forced rules met.
    - id: 10
      name: "exemplar drift (≥80% layout match warning)"
      result: "n/a"
      evidence: |
        본 task 는 첫 onboarding archetype exemplar — 비교 대상 exemplar 부재.
        Bootstrap 후 향후 onboarding 화면이 본 exemplar 와 ≥80% 일치 시 drift warning 적용.

# ─────────────────────────────
# Onboarding Archetype Persona (forced + recommended)
# ─────────────────────────────
onboarding_persona:
  archetype: "onboarding"
  forced_rules:
    - id: 1
      rule: "Step indicator 또는 progress bar 가 화면 상단에 가시"
      result: "met"
      evidence: |
        #step-indicator: 3 dots, currentStep dot 활성 (pill 24x6, brand-primary).
        screen-spec.yaml states.step-{1,2,3}.indicator_active_dot 명시.
        DOM: role="progressbar" aria-valuemin=1 aria-valuemax=3 aria-valuenow={1-3}.
    - id: 2
      rule: "Primary CTA 1개, 56px height 이상"
      result: "met"
      evidence: |
        --component-button-primary-height: 56px (token).
        .onb-cta height: var(--component-button-primary-height) 강제.
        font-size: 16px (lg) + font-weight: 600 (semibold) 시각 강조 충족.
    - id: 3
      rule: "Skip / dismiss 1-way 명시"
      result: "met"
      evidence: |
        #skip-btn '건너뛰기' 우상단 (모든 step visible, success 만 hidden).
        onSkip() → setState('success') + toast '튜토리얼을 건너뛰었어요'.
        Korean text 카피 (icon-only 회피 — 발견성).
    - id: 4
      rule: "마지막 step 완료 시 명확한 다음 화면 또는 success state"
      result: "met"
      evidence: |
        step-3 PrimaryCTA label='시작하기' (다음과 시각적으로 구분되는 카피).
        onNext() at step-3 → setState('success').
        #success-overlay: 96px brand-weak 원 + check-circle icon + '준비됐어요!' + '잠시 후 홈으로 이동해요'.
        1.6s 후 자동 reset (prototype 데모 cycle — 프로덕션에서는 홈 navigation).

  recommended_rules:
    - id: 1
      rule: "Illustration 또는 hero icon 이미지 (160-240px)"
      result: "met"
      evidence: |
        --component-hero-size: 200px (160-240 범위 내).
        .hero-illust 200x200 brand-weak radial-gradient 카드 + 80px lucide SVG 중앙.
        step 별 icon: sparkles (1) / image-plus (2) / heart-handshake (3).
    - id: 2
      rule: "본문은 1 headline + 1-2 sentence"
      result: "met"
      evidence: |
        .onb-headline (h1, 24px bold) + .onb-body-copy (p, 14px regular).
        모든 step body 1 sentence (Korean ~30 chars) — 권장 룰 준수.
    - id: 3
      rule: "이전 step 으로 돌아가기 (←) 좌상단"
      result: "met"
      evidence: |
        #back-btn '←' (lucide arrow-left) 좌상단.
        screen-spec states: step-1 hidden / step-2,3 visible / success hidden.
        onBack() → 이전 step 복귀 (정정 기회 제공).

