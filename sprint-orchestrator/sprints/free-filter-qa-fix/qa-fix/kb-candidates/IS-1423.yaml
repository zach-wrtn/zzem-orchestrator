ticket: "IS-1423"
priority: "P1"

candidate_type: "pattern_gap"
related_existing_pattern: "completeness-010"  # cross-component 전수 — 같은 정신, scope 외부 진입점

proposed_pattern:
  category: "completeness"
  severity: "major"
  title: "Cross-tab parity 명시 — 새 enrichment 도입 시 같은 도메인의 모든 list/single endpoint 에 적용"
  source_sprint: "free-filter-qa-fix"
  source_group: "group-5"
  description: |
    같은 도메인 (예: filter) 의 응답을 만드는 endpoint 가 다양 (일반 탭 list, 무료 탭
    list, 단건 조회, 추천 탭 list, admin) 이고 enrichment 가 분산되어 있을 때, 새
    enrichment (rosterContext, freeUsedToday, isFreeFilter 같은 cross-cutting 정보) 를
    도입하면 일부 endpoint 만 적용하고 다른 endpoint 는 누락하는 경우가 흔함. 사용자가
    "한 탭에선 무료, 다른 탭에선 유료" 같은 cross-tab 불일치를 보면 root cause 추적이
    어려움 (각 endpoint 의 enrichment 호출처를 일일이 비교해야).
  detection: |
    - grep: 같은 도메인의 enrichment helper 가 여러 개 (예: enrichFilters,
      enrichRecommendedFilters) 있는지 확인
    - 같은 cross-cutting field (isFreeFilter, hasGeneratedToday) 가 모든 helper 에서
      동일 source (rosterContext) 를 참조하는지 grep
    - "isFreeFilter: false" / "isFreeFilter: true" 같은 하드코딩 검색 — rosterContext
      도입 후 잔존하면 의심 후보
    - Cross-tab QA: 같은 entity 의 응답을 모든 진입 path 에서 비교 (list endpoint 별
      curl + diff)
  prevention: |
    - 단일 enrichment helper 패턴 권장: 도메인별로 1개의 enrich function 을 두고 모든
      endpoint 가 호출. 다른 enrichment 가 필요하면 그 helper 의 옵션으로 처리.
    - 분리해야 한다면 (성능 등 이유) Contract 의 Cross-task Integration 섹션에 모든
      enrichment helper 를 enumerate + 새 cross-cutting field 도입 시 모든 helper 에
      적용 의무 명시.
    - lint rule: 같은 cross-cutting field 가 도메인 내 어느 helper 에서 하드코딩된 값으로
      response build 에 들어가면 경고
  contract_clause: |
    Cross-cutting enrichment (rosterContext / freeUsedToday / isFreeFilter 등) 도입 시
    Contract Scope 섹션에 도메인의 모든 list/single endpoint enumerate + 각 endpoint
    의 enrichment 호출처가 새 source 를 참조하는지 확인. 분산 enrichment helper 가
    있으면 모두 동시 수정 의무.
  example:
    bad: |
      // ❌ 일부만 적용
      function enrichFilters(filters, ctx, { rosterContext }) {
        return filters.map(f => ({ ...f, isFreeFilter: !!rosterContext.todayActiveSlots.get(f.id) }));
      }
      function enrichRecommendedFilters(filters, ctx) {
        return filters.map(f => ({ ...f, isFreeFilter: false }));  // ← 누락
      }
    good: |
      // ✓ 단일 helper 또는 모든 helper 가 같은 source
      function enrichRecommendedFilters(filters, ctx, { rosterContext }) {
        return filters.map(f => ({
          ...f,
          isFreeFilter: !!rosterContext?.todayActiveSlots.get(f.id),  // ← 동일 source
        }));
      }

hypothesis: |
  free-tab-diversification 스프린트가 enrichFilters 에 rosterContext 도입했지만
  enrichRecommendedFilters 는 같은 도메인이라 인지 못 하고 누락. Contract 의 Scope 가
  "filter list endpoints" 같은 포괄 표현이어서 추천 탭의 별도 enrichment helper 가
  enumerate 안 됨 (completeness-010 의 직접 confirmation — 다만 그건 entity/DTO 확장
  케이스라 본 케이스의 cross-cutting enrichment 와 정확히 align 하지 않음 → 별도 pattern
  또는 completeness-010 의 확장).
fix_pr: "https://github.wrtn.club/wrtn-tech/wrtn-backend/pull/866"

status: "approved"
review_notes: "Approved 2026-04-27. Merged into KB as completeness-014 (KB HEAD 84237ce). completeness-010 (entity/DTO 확장 path 전수) 와 별개 — 본 패턴은 cross-cutting enrichment scope. completeness-014 description 에 그 차이 명시."
