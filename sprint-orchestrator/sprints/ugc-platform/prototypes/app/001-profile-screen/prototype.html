<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP-001 Profile Screen Prototype</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens === */
    :root {
      --color-brand-primary: #8752FA;
      --color-brand-primary-light: #F0EAFF;
      --color-bg-normal: #FFFFFF;
      --color-bg-page: #F7F7F7;
      --color-label-normal: #212228;
      --color-label-alternative: #6B6E76;
      --color-label-assistive: #8E9199;
      --color-label-disable: #AEB0B6;
      --color-line-normal: #E4E5E9;
      --color-line-alternative: #F0F1F3;
      --color-fill-neutral: #F0F1F3;
      --color-fill-strong: #E4E5E9;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .control-panel__row { display: flex; align-items: center; gap: 8px; }
    .control-panel__label { color: #888; font-size: 11px; min-width: 48px; }
    .control-panel select {
      background: #2a2a3e; color: #e0e0e0; border: 1px solid #444;
      border-radius: 6px; padding: 4px 8px; font-size: 12px; flex: 1;
    }
    .control-panel__states { display: flex; gap: 4px; flex-wrap: wrap; }
    .control-panel__state-btn {
      background: #2a2a3e; color: #888; border: 1px solid #444;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .control-panel__state-btn.active {
      background: var(--color-brand-primary); color: #fff; border-color: var(--color-brand-primary);
    }
    .control-panel__breadcrumb { color: #666; font-size: 11px; font-family: monospace; }

    /* === Device Frame === */
    .device-frame {
      width: 390px; height: 844px; background: var(--color-bg-normal);
      overflow: hidden; position: relative; border: 1px solid #ddd; border-radius: 0 0 12px 12px;
    }

    /* === Screen === */
    .screen {
      display: none; flex-direction: column; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .screen.active { display: flex; }

    /* === Transitions === */
    @keyframes slideLeftIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideRightIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .transition-slide-left { animation: slideLeftIn 0.3s ease-out; }
    .transition-slide-right { animation: slideRightIn 0.3s ease-out; }
    .transition-fade { animation: fadeIn 0.2s ease-out; }

    /* === State Visibility === */
    [data-state] { display: none; }
    [data-state].state-active { display: flex; }

    /* === Skeleton === */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite; border-radius: var(--radius-sm);
    }
    @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* === Common === */
    .header-bar {
      height: 48px; display: flex; align-items: center; padding: 0 16px;
      border-bottom: 1px solid var(--color-line-normal); flex-shrink: 0;
      background: var(--color-bg-normal); z-index: 10;
    }
    .header-bar__title {
      flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: var(--color-label-normal);
    }
    .header-bar__icon {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-label-normal); font-size: 20px; background: none; border: none;
    }
    .header-bar__spacer { width: 24px; }

    /* === Bottom Nav === */
    .bottom-nav {
      height: 56px; display: flex; border-top: 1px solid var(--color-line-normal);
      background: var(--color-bg-normal); flex-shrink: 0;
    }
    .bottom-nav__item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; font-size: 10px; color: var(--color-label-assistive); cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .bottom-nav__item.active { color: var(--color-brand-primary); }
    .bottom-nav__item svg { width: 24px; height: 24px; }

    /* === Profile Header === */
    .profile-header { padding: 20px 16px 16px; flex-shrink: 0; }
    .profile-header__top { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%; background: var(--color-fill-neutral);
      display: flex; align-items: center; justify-content: center; color: var(--color-label-assistive);
      font-size: 28px; flex-shrink: 0; overflow: hidden;
    }
    .profile-info { flex: 1; }
    .profile-nickname {
      font-size: 18px; font-weight: 700; color: var(--color-label-normal); margin-bottom: 8px;
    }
    .profile-stats { display: flex; gap: 20px; }
    .profile-stat {
      display: flex; flex-direction: column; align-items: center; cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .profile-stat__count { font-size: 16px; font-weight: 700; color: var(--color-label-normal); }
    .profile-stat__label { font-size: 12px; color: var(--color-label-alternative); margin-top: 2px; }
    .profile-actions { display: flex; gap: 8px; }
    .profile-actions__btn {
      flex: 1; height: 34px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px;
      font-family: inherit; border: 1px solid var(--color-line-normal);
      background: var(--color-bg-normal); color: var(--color-label-normal);
    }

    /* === Tabs === */
    .tabs {
      display: flex; border-bottom: 1px solid var(--color-line-normal); flex-shrink: 0;
      background: var(--color-bg-normal);
    }
    .tab {
      flex: 1; height: 44px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500; color: var(--color-label-assistive);
      cursor: pointer; border: none; background: none; position: relative; font-family: inherit;
    }
    .tab.active { color: var(--color-label-normal); font-weight: 600; }
    .tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--color-label-normal);
    }

    /* === Content Grid === */
    .content-scroll { flex: 1; overflow-y: auto; }
    .content-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px;
    }
    .grid-item {
      aspect-ratio: 1; background: var(--color-fill-neutral); display: flex;
      align-items: center; justify-content: center; color: var(--color-label-assistive);
      font-size: 11px; cursor: pointer; position: relative;
    }
    .grid-item__lock {
      position: absolute; top: 6px; right: 6px; font-size: 12px;
    }

    /* === Empty State === */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 40px;
    }
    .empty-state__icon { font-size: 48px; color: var(--color-label-disable); }
    .empty-state__text { font-size: 14px; color: var(--color-label-assistive); text-align: center; }

    /* === Profile Edit === */
    .edit-scroll { flex: 1; overflow-y: auto; padding: 24px 16px; }
    .edit-avatar-section { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 32px; }
    .edit-avatar {
      width: 88px; height: 88px; border-radius: 50%; background: var(--color-fill-neutral);
      display: flex; align-items: center; justify-content: center; font-size: 32px;
      color: var(--color-label-assistive); position: relative; cursor: pointer;
    }
    .edit-avatar__badge {
      position: absolute; bottom: 0; right: 0; width: 28px; height: 28px;
      border-radius: 50%; background: var(--color-brand-primary); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      border: 2px solid #fff;
    }
    .edit-field { margin-bottom: 24px; }
    .edit-field__label {
      font-size: 13px; font-weight: 600; color: var(--color-label-normal); margin-bottom: 8px;
    }
    .edit-field__input-row { display: flex; gap: 8px; }
    .edit-field__input {
      flex: 1; height: 44px; border: 1px solid var(--color-line-normal); border-radius: var(--radius-sm);
      padding: 0 12px; font-size: 15px; font-family: inherit; color: var(--color-label-normal);
      outline: none; transition: border-color 0.15s;
    }
    .edit-field__input:focus { border-color: var(--color-brand-primary); }
    .edit-field__random-btn {
      height: 44px; padding: 0 14px; border: 1px solid var(--color-line-normal);
      border-radius: var(--radius-sm); background: var(--color-bg-normal);
      color: var(--color-label-normal); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; font-family: inherit;
      display: flex; align-items: center; gap: 4px;
    }
    .save-btn {
      width: 100%; height: 48px; border-radius: var(--radius-md); border: none;
      background: var(--color-brand-primary); color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 16px;
    }

    /* === Follow List === */
    .follow-list { flex: 1; overflow-y: auto; }
    .follow-item {
      display: flex; align-items: center; padding: 12px 16px; gap: 12px;
      cursor: pointer;
    }
    .follow-item + .follow-item { border-top: 1px solid var(--color-line-alternative); }
    .follow-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: var(--color-fill-neutral);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      color: var(--color-label-assistive); flex-shrink: 0;
    }
    .follow-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--color-label-normal); }
    .follow-btn {
      height: 34px; padding: 0 16px; border-radius: var(--radius-sm); font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all 0.15s; border: none;
    }
    .follow-btn--none {
      background: var(--color-brand-primary); color: #fff;
    }
    .follow-btn--following {
      background: var(--color-fill-neutral); color: var(--color-label-normal);
      border: 1px solid var(--color-line-normal);
    }
    .follow-btn--mutual {
      background: var(--color-brand-primary-light); color: var(--color-brand-primary);
      border: 1px solid var(--color-brand-primary);
    }

    /* === Loading Skeleton Layouts === */
    .skeleton-profile-header { padding: 20px 16px 16px; }
    .skeleton-profile-header .skel-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .skeleton-profile-header .skel-avatar { width: 72px; height: 72px; border-radius: 50%; }
    .skeleton-profile-header .skel-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-profile-header .skel-name { width: 80px; height: 18px; }
    .skeleton-profile-header .skel-stats { width: 180px; height: 14px; }
    .skeleton-profile-header .skel-actions { display: flex; gap: 8px; }
    .skeleton-profile-header .skel-btn { flex: 1; height: 34px; border-radius: var(--radius-sm); }
    .skeleton-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--color-line-normal); padding: 0 16px; height: 44px; align-items: center; }
    .skeleton-tabs .skel-tab { flex: 1; height: 16px; margin: 0 12px; border-radius: 4px; }
    .skeleton-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
    .skeleton-grid .skel-cell { aspect-ratio: 1; }

    .skeleton-follow-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px; }
    .skeleton-follow-item .skel-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-follow-item .skel-name { width: 100px; height: 16px; flex: 1; }
    .skeleton-follow-item .skel-btn { width: 72px; height: 34px; border-radius: var(--radius-sm); }

    /* Tab content panels */
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }
  </style>
</head>
<body>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-panel__row">
      <span class="control-panel__label">Screen</span>
      <select id="screen-select" onchange="navigateBySelect(this.value)">

        <option value="profile-edit-screen">ProfileEditScreen</option>
        <option value="follower-list-screen">FollowerListScreen</option>
        <option value="following-list-screen">FollowingListScreen</option>

    <div class="control-panel__row">
      <span class="control-panel__label">State</span>
      <div class="control-panel__states" id="state-toggles">

        <button class="control-panel__state-btn" data-state="empty" onclick="toggleState('empty')">Empty</button>
        <button class="control-panel__state-btn" data-state="loading" onclick="toggleState('loading')">Loading</button>

    </div>
    <div class="control-panel__row">
      <span class="control-panel__breadcrumb" id="breadcrumb">profile-screen</span>

  </div>

  <script>
    // === State ===
    let currentScreen = null;
    let currentState = 'default';
    const navHistory = [];

    // === Navigation ===
    function navigate(screenId, transition = 'slide-left') {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        navHistory.push(currentScreen.id);
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active');
      if (transition !== 'none') {
        target.classList.add('transition-' + transition);
        target.addEventListener('animationend', function handler() {
          target.classList.remove('transition-' + transition);
          target.removeEventListener('animationend', handler);
        });
      }

      currentScreen = target;
      currentState = 'default';
      applyState(screenId, 'default');
      updateControlPanel();
    }

    function goBack() {
      if (navHistory.length === 0) return;
      const prevId = navHistory.pop();
      const target = document.getElementById(prevId);
      if (!target) return;

      if (currentScreen) {
        currentScreen.classList.remove('active');
      }

      target.classList.add('active', 'transition-slide-right');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-slide-right');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      currentState = 'default';
      applyState(prevId, 'default');
      updateControlPanel();
    }

    function navigateBySelect(screenId) {
      navHistory.length = 0;
      const allScreens = document.querySelectorAll('.screen');
      allScreens.forEach(s => s.classList.remove('active'));
      navigate(screenId, 'fade');
    }

    // === State Toggle ===
    function applyState(screenId, stateName) {
      const screen = document.getElementById(screenId);
      if (!screen) return;

      screen.querySelectorAll('[data-state]').forEach(el => {
        el.classList.toggle('state-active', el.dataset.state === stateName);
      });

      currentState = stateName;
      updateStateButtons();
    }

    function toggleState(stateName) {
      if (!currentScreen) return;
      applyState(currentScreen.id, stateName);
    }

    // === Control Panel ===
    function updateControlPanel() {
      if (!currentScreen) return;
      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) {
        const path = [...navHistory, currentScreen.id].join(' > ');
        breadcrumb.textContent = path;
      }

      updateStateButtons();
    }

    function updateStateButtons() {
      document.querySelectorAll('.control-panel__state-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === currentState);
      });
    }

    // === Tab Switching ===
    function switchTab(tabName) {
      document.querySelectorAll('#profile-tabs .tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tabName);
      });
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'panel-' + tabName);
      });
    }

    // === Follow Button Toggle ===
    const followStates = ['none', 'following', 'mutual'];
    const followLabels = { none: '팔로우', following: '팔로잉', mutual: '맞팔로우' };

    function toggleFollow(btn) {
      const current = btn.dataset.followState;
      let next;
      if (current === 'none') next = 'following';
      else if (current === 'following') next = 'none';
      else next = 'none'; // mutual -> none

      btn.dataset.followState = next;
      btn.textContent = followLabels[next];
      btn.className = 'follow-btn follow-btn--' + next;
    }

    // === Random Nickname ===
    const nicknames = ['용감한사자42', '빛나는별77', '달리는토끼99', '즐거운펭귄55', '신나는돌고래33', '하늘나는독수리11', '귀여운판다88', '멋진호랑이66'];
    function randomNickname() {
      const input = document.getElementById('nickname-input');
      if (input) {
        input.value = nicknames[Math.floor(Math.random() * nicknames.length)];
        input.style.borderColor = 'var(--color-brand-primary)';
        setTimeout(() => { input.style.borderColor = ''; }, 600);
      }
    }

    // === Populate Grids ===
    function populateGrids() {
      const postsGrid = document.getElementById('grid-posts');
      const privateGrid = document.getElementById('grid-private');
      const likesGrid = document.getElementById('grid-likes');

      // 12 public posts
      for (let i = 0; i < 12; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        const hue = (i * 30 + 200) % 360;
        item.style.background = `hsl(${hue}, 15%, ${85 + (i % 3) * 3}%)`;
        item.textContent = (i + 1);
        postsGrid.appendChild(item);
      }

      // 6 private posts
      for (let i = 0; i < 6; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        const hue = (i * 45 + 100) % 360;
        item.style.background = `hsl(${hue}, 15%, ${85 + (i % 3) * 3}%)`;
        item.innerHTML = `<span class="grid-item__lock">🔒</span>${i + 1}`;
        privateGrid.appendChild(item);
      }

      // 9 liked posts
      for (let i = 0; i < 9; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        const hue = (i * 35 + 0) % 360;
        item.style.background = `hsl(${hue}, 15%, ${85 + (i % 3) * 3}%)`;
        item.textContent = (i + 1);
        likesGrid.appendChild(item);
      }
    }

    // === Populate Follower List (8 users, 가나다순) ===
    function populateFollowers() {
      const list = document.getElementById('follower-list');
      const followers = [
        { name: '귀여운판다88', state: 'mutual' },
        { name: '달리는토끼99', state: 'following' },
        { name: '멋진호랑이66', state: 'none' },
        { name: '빛나는별77', state: 'mutual' },
        { name: '신나는돌고래33', state: 'none' },
        { name: '용감한사자42', state: 'following' },
        { name: '즐거운펭귄55', state: 'none' },
        { name: '하늘나는독수리11', state: 'mutual' },
      ];

      followers.forEach(f => {
        const item = document.createElement('div');
        item.className = 'follow-item';
        item.innerHTML = `
          <div class="follow-avatar">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="8" r="4"/><path d="M2 18c0-4.418 3.582-8 8-8s8 3.582 8 8"/></svg>
          </div>
          <span class="follow-name">${f.name}</span>
          <button class="follow-btn follow-btn--${f.state}" data-follow-state="${f.state}" onclick="toggleFollow(this)">${followLabels[f.state]}</button>
        `;
        list.appendChild(item);
      });
    }

    // === Populate Following List (6 users, 가나다순) ===
    function populateFollowing() {
      const list = document.getElementById('following-list');
      const following = [
        { name: '귀여운판다88', state: 'mutual' },
        { name: '달리는토끼99', state: 'following' },
        { name: '빛나는별77', state: 'mutual' },
        { name: '용감한사자42', state: 'following' },
        { name: '즐거운펭귄55', state: 'following' },
        { name: '하늘나는독수리11', state: 'mutual' },
      ];

      following.forEach(f => {
        const item = document.createElement('div');
        item.className = 'follow-item';
        item.innerHTML = `
          <div class="follow-avatar">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="8" r="4"/><path d="M2 18c0-4.418 3.582-8 8-8s8 3.582 8 8"/></svg>
          </div>
          <span class="follow-name">${f.name}</span>
          <button class="follow-btn follow-btn--${f.state}" data-follow-state="${f.state}" onclick="toggleFollow(this)">${followLabels[f.state]}</button>
        `;
        list.appendChild(item);
      });
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      populateGrids();
      populateFollowers();
      populateFollowing();

      const firstScreen = document.querySelector('.screen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        applyState(firstScreen.id, 'default');
        updateControlPanel();
      }
    });
  </script>

</body>
</html>
