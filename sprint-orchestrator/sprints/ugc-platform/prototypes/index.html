<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGC Platform — Prototype Viewer</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === Top Bar === */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .top-bar__title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-bar__badge {
      font-size: 11px;
      font-weight: 600;
      background: #8752FA;
      color: #fff;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .top-bar__meta {
      font-size: 12px;
      color: #666;
    }

    /* === Tab Bar === */
    .tab-bar {
      display: flex;
      gap: 0;
      background: #16162a;
      border-bottom: 2px solid #2a2a4a;
      padding: 0 24px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border: none;
      background: none;
      white-space: nowrap;
      position: relative;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab:hover { color: #aaa; }

    .tab.active {
      color: #fff;
      font-weight: 600;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #8752FA;
      border-radius: 2px 2px 0 0;
    }

    .tab__id {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #2a2a4a;
      color: #888;
    }

    .tab.active .tab__id {
      background: rgba(135, 82, 250, 0.2);
      color: #8752FA;
    }

    /* === Content === */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .tab-panel {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      padding: 24px;
    }

    .tab-panel.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-panel iframe {
      border: none;
      width: 430px;
      height: calc(100vh - 110px);
      border-radius: 16px;
      background: #f0f0f0;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    /* === Keyboard Hint === */
    .keyboard-hint {
      position: fixed;
      bottom: 16px;
      right: 24px;
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: #555;
    }

    .keyboard-hint kbd {
      background: #2a2a4a;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: inherit;
      color: #888;
      border: 1px solid #3a3a5a;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar__title">
      UGC Platform Sprint
      <span class="top-bar__badge">4 Prototypes</span>
    </div>
    <div class="top-bar__meta">ugc-platform / prototypes / app</div>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button class="tab active" data-tab="0">
      <span class="tab__id">001</span>
      Profile Screen
    </button>
    <button class="tab" data-tab="1">
      <span class="tab__id">002</span>
      Feed & Publish UI
    </button>
    <button class="tab" data-tab="2">
      <span class="tab__id">006</span>
      Block & Report UI
    </button>
    <button class="tab" data-tab="3">
      <span class="tab__id">007</span>
      Notification UI
    </button>
  </div>

  <div class="content" id="content">
    <div class="tab-panel active" data-panel="0">
      <iframe src="app/001-profile-screen/prototype.html" loading="lazy"></iframe>
    </div>
    <div class="tab-panel" data-panel="1">
      <iframe src="app/002-feed-publish-ui/prototype.html" loading="lazy"></iframe>
    </div>
    <div class="tab-panel" data-panel="2">
      <iframe src="app/006-block-report-ui/prototype.html" loading="lazy"></iframe>
    </div>
    <div class="tab-panel" data-panel="3">
      <iframe src="app/007-notification-ui/prototype.html" loading="lazy"></iframe>
    </div>
  </div>

  <div class="keyboard-hint">
    <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> Navigate</span>
    <span><kbd>1</kbd>-<kbd>4</kbd> Jump to tab</span>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.tab-panel');
    let activeIndex = 0;

    function switchTab(index) {
      if (index < 0 || index >= tabs.length) return;
      tabs[activeIndex].classList.remove('active');
      panels[activeIndex].classList.remove('active');
      activeIndex = index;
      tabs[activeIndex].classList.add('active');
      panels[activeIndex].classList.add('active');
      tabs[activeIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    tabs.forEach((tab, i) => {
      tab.addEventListener('click', () => switchTab(i));
    });

    document.addEventListener('keydown', (e) => {
      // Skip if user is typing in an input/select inside an iframe or the page
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'ArrowRight') switchTab(activeIndex + 1);
      else if (e.key === 'ArrowLeft') switchTab(activeIndex - 1);
      else if (e.key >= '1' && e.key <= '4') switchTab(parseInt(e.key) - 1);
    });
  </script>

</body>
</html>
