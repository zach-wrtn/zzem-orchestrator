openapi: "3.0.3"
info:
  title: UGC Platform API
  version: "1.0.0"
  description: ZZEM UGC Platform API Contract

servers:
  - url: /meme/api/v1

security:
  - WrtnUserAuth: []

components:
  securitySchemes:
    WrtnUserAuth:
      type: apiKey
      in: header
      name: x-wrtn-user-id
      description: Authenticated user ID from auth gateway

  parameters:
    CursorParam:
      name: cursor
      in: query
      schema:
        type: string
      description: Cursor for pagination (opaque string, pass from previous response)
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 50
      description: Number of items per page
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: Target user ID
    ContentIdParam:
      name: contentId
      in: path
      required: true
      schema:
        type: string
      description: Content ID
    TargetUserIdParam:
      name: targetUserId
      in: path
      required: true
      schema:
        type: string
      description: Target user ID for follow/block operations

  schemas:
    CursorMeta:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
        hasNext:
          type: boolean

    Profile:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        followerCount:
          type: integer
        followingCount:
          type: integer
        regeneratedCount:
          type: integer
        isPersona:
          type: boolean

    ProfileMe:
      allOf:
        - $ref: "#/components/schemas/Profile"
        - type: object
          properties:
            email:
              type: string

    ProfileUpdate:
      type: object
      properties:
        nickname:
          type: string
          maxLength: 20
        profileImageUrl:
          type: string
          nullable: true

    ContentItem:
      type: object
      properties:
        contentId:
          type: string
        userId:
          type: string
        mediaUrl:
          type: string
        thumbnailUrl:
          type: string
        visibility:
          type: string
          enum: [public, private]
        promptType:
          type: string
          enum: [filter, custom]
        filterId:
          type: string
        likeCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ContentVisibilityUpdate:
      type: object
      required:
        - visibility
      properties:
        visibility:
          type: string
          enum: [public, private]

    CtaResponse:
      type: object
      properties:
        ctaType:
          type: string
          enum: [use_template, regenerate]
        filterId:
          type: string
        contentId:
          type: string

    PaybackInfo:
      type: object
      properties:
        paybackRate:
          type: number
          description: "Current payback rate (e.g. 0.01 = 1%)"
        hasSeen:
          type: boolean
          description: "Whether user has seen the payback info modal"

    LikeToggleRequest:
      type: object
      required:
        - contentId
      properties:
        contentId:
          type: string

    LikeToggleResponse:
      type: object
      properties:
        isLiked:
          type: boolean
        likeCount:
          type: integer

    FollowRequest:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string

    FollowUser:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        followStatus:
          type: string
          enum: [none, following, mutual]

    PaybackProcessRequest:
      type: object
      required:
        - contentId
        - regeneratorUserId
        - generationCost
      properties:
        contentId:
          type: string
        regeneratorUserId:
          type: string
        generationCost:
          type: number

    PaybackProcessResponse:
      type: object
      properties:
        paybackAmount:
          type: number
        creditType:
          type: string
          enum: [promotion]
        processed:
          type: boolean
        reason:
          type: string
          nullable: true
          description: "Reason if not processed (e.g. margin_check_failed, persona_account)"

    NotificationItem:
      type: object
      properties:
        notificationId:
          type: string
        category:
          type: string
          enum: [like, credit, news, follow]
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        contentId:
          type: string
          nullable: true
        fromUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    NotificationSettings:
      type: object
      properties:
        like:
          type: boolean
        credit:
          type: boolean
        news:
          type: boolean
        follow:
          type: boolean

    BlockRequest:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string

    BlockItem:
      type: object
      properties:
        targetUserId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        blockedAt:
          type: string
          format: date-time

    ReportRequest:
      type: object
      required:
        - targetUserId
        - reason
        - description
      properties:
        targetUserId:
          type: string
        contentId:
          type: string
          nullable: true
        reason:
          type: string
          enum: [spam, inappropriate, harassment, other]
        description:
          type: string
          maxLength: 100

    OpinionRequest:
      type: object
      required:
        - targetUserId
        - content
      properties:
        targetUserId:
          type: string
        contentId:
          type: string
          nullable: true
        content:
          type: string
          maxLength: 300

    ShareResponse:
      type: object
      properties:
        shareUrl:
          type: string
          description: Deep link URL for profile sharing

    NicknameGenerateResponse:
      type: object
      properties:
        nickname:
          type: string

paths:
  # ── Profile (US2) ──
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [Profile]
      summary: Get my profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileMe"
    patch:
      operationId: updateMyProfile
      tags: [Profile]
      summary: Update my profile (nickname, image)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileMe"

  /profiles/me/nickname/generate:
    post:
      operationId: generateNickname
      tags: [Profile]
      summary: Generate a random nickname
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NicknameGenerateResponse"

  /profiles/me/share:
    post:
      operationId: shareMyProfile
      tags: [Profile]
      summary: Generate profile share deep link
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResponse"

  /profiles/{userId}:
    get:
      operationId: getUserProfile
      tags: [Profile]
      summary: Get other user's profile
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Profile"
                  - type: object
                    properties:
                      followStatus:
                        type: string
                        enum: [none, following, mutual]
                      isBlocked:
                        type: boolean

  # ── Content Publishing (US1) ──
  /contents/{contentId}/visibility:
    patch:
      operationId: updateContentVisibility
      tags: [Content]
      summary: Toggle content public/private
      parameters:
        - $ref: "#/components/parameters/ContentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentVisibilityUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"

  /profiles/me/contents:
    get:
      operationId: getMyContents
      tags: [Content]
      summary: Get my contents (public/private tab)
      parameters:
        - name: visibility
          in: query
          schema:
            type: string
            enum: [public, private]
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentItem"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  /profiles/{userId}/contents:
    get:
      operationId: getUserContents
      tags: [Content]
      summary: Get other user's public contents
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentItem"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  /contents/{contentId}/cta:
    get:
      operationId: getContentCta
      tags: [Content]
      summary: Get CTA button type for content (use_template vs regenerate)
      parameters:
        - $ref: "#/components/parameters/ContentIdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtaResponse"

  /payback/info:
    get:
      operationId: getPaybackInfo
      tags: [Content]
      summary: Get payback info (rate, seen status)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaybackInfo"

  /payback/info/seen:
    post:
      operationId: markPaybackInfoSeen
      tags: [Content]
      summary: Mark payback info modal as seen (one-time)
      responses:
        "204":
          description: No Content

  # ── Like (US3) ──
  /favorites/content/toggle:
    post:
      operationId: toggleLike
      tags: [Like]
      summary: Toggle like on content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeToggleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeToggleResponse"

  /profiles/me/favorites:
    get:
      operationId: getMyLikedContents
      tags: [Like]
      summary: Get my liked contents (like tab)
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentItem"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  # ── Follow (US6) ──
  /follows:
    post:
      operationId: followUser
      tags: [Follow]
      summary: Follow a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowRequest"
      responses:
        "201":
          description: Created

  /follows/{targetUserId}:
    delete:
      operationId: unfollowUser
      tags: [Follow]
      summary: Unfollow a user
      parameters:
        - $ref: "#/components/parameters/TargetUserIdParam"
      responses:
        "204":
          description: No Content

  /follows/me/followers:
    get:
      operationId: getMyFollowers
      tags: [Follow]
      summary: Get my followers list (sorted by Korean alphabetical order)
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FollowUser"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  /follows/me/following:
    get:
      operationId: getMyFollowing
      tags: [Follow]
      summary: Get my following list (sorted by Korean alphabetical order)
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FollowUser"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  # ── Credit Payback (US4) ──
  /payback/process:
    post:
      operationId: processPayback
      tags: [CreditPayback]
      summary: Process credit payback on content regeneration (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaybackProcessRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaybackProcessResponse"

  # ── Notification (US5) ──
  /notifications:
    get:
      operationId: getNotifications
      tags: [Notification]
      summary: Get notification list
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [like, credit, news, follow]
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationItem"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [Notification]
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationIds:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: No Content

  /notifications/unread-count:
    get:
      operationId: getUnreadCount
      tags: [Notification]
      summary: Get unread notification count
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/settings:
    get:
      operationId: getNotificationSettings
      tags: [Notification]
      summary: Get notification settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    patch:
      operationId: updateNotificationSettings
      tags: [Notification]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettings"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  # ── Block (US7) ──
  /blocks:
    post:
      operationId: blockUser
      tags: [Block]
      summary: Block a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockRequest"
      responses:
        "201":
          description: Created
    get:
      operationId: getBlockedUsers
      tags: [Block]
      summary: Get blocked users list
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/BlockItem"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"

  /blocks/{targetUserId}:
    delete:
      operationId: unblockUser
      tags: [Block]
      summary: Unblock a user
      parameters:
        - $ref: "#/components/parameters/TargetUserIdParam"
      responses:
        "204":
          description: No Content

  # ── Report (US7) ──
  /reports:
    post:
      operationId: reportUser
      tags: [Report]
      summary: Report a user/content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Created

  # ── Opinion (US7) ──
  /opinions:
    post:
      operationId: submitOpinion
      tags: [Opinion]
      summary: Submit opinion/feedback about a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpinionRequest"
      responses:
        "201":
          description: Created
