<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>app-003 — PreviewLoadingScreen</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens (inlined — derived from docs/designs/foundations + components) === */
    :root {
      /* Color — Brand */
      --color-brand-primary: #8752FA;
      --color-brand-primary-soft: #EFE8FE;

      /* Color — Background / Surface */
      --color-bg-normal: #FFFFFF;
      --color-bg-elevated: #FFFFFF;

      /* Color — Label */
      --color-label-normal: #262626;
      --color-label-alternative: #6B6E76;
      --color-label-assistive: #8E9199;

      /* Color — Line / Fill */
      --color-line-normal: #E4E5E9;
      --color-fill-neutral: #F1F1F1;
      --color-fill-spinner-track: #EFE8FE;

      /* Semantic — Destructive */
      --color-destructive: #D92800;
      --color-destructive-hover: #B82200;

      /* Component — Button */
      --component-button-primary-fill: #262626;
      --component-button-primary-label: #FFFFFF;
      --component-button-secondary-fill: #F1F1F1;
      --component-button-secondary-fill-hover: #E8E8E8;
      --component-button-secondary-label: #262626;
      --component-button-destructive-fill: #D92800;
      --component-button-destructive-fill-hover: #B82200;
      --component-button-destructive-label: #FFFFFF;

      /* Typography */
      --font-family-default: 'Pretendard', 'Pretendard Variable', -apple-system, 'SF Pro', sans-serif;
      --font-size-body1: 16px;
      --font-size-body2: 14px;
      --font-size-subtitle: 16px;
      --font-size-title3: 18px;
      --font-weight-bold: 700;
      --font-weight-semibold: 600;
      --font-weight-medium: 500;
      --font-weight-regular: 400;
      --line-height-body1: 24px;
      --line-height-subtitle: 22px;

      /* Spacing (4·8·12·16·24·32 base) */
      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-8: 32px;
      --spacing-10: 40px;

      /* Radius */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-frame: 22px;
      --radius-full: 9999px;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family-default);
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: var(--color-label-normal);
    }

    /* === Control Panel (reviewer-only, outside device frame) === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }

    .control-panel__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-panel__label {
      color: #888;
      font-size: 11px;
      min-width: 48px;
    }

    .control-panel select {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }

    .control-panel__states {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .control-panel__state-btn {
      background: #2a2a3e;
      color: #888;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease-out;
    }

    .control-panel__state-btn.active {
      background: var(--color-brand-primary);
      color: #fff;
      border-color: var(--color-brand-primary);
    }

    .control-panel__breadcrumb {
      color: #666;
      font-size: 11px;
    }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--color-bg-normal);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    /* === Screen === */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* === Status Bar === */
    .status-bar {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-5);
      font-size: 14px;
      font-weight: var(--font-weight-semibold);
      color: var(--color-label-normal);
    }

    .status-bar__time {
      font-variant-numeric: tabular-nums;
    }

    .status-bar__icons {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: var(--color-label-normal);
    }

    /* === Preview Loading Screen === */
    .preview-loading {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--color-bg-normal);
    }

    .close-btn {
      position: absolute;
      top: 52px;
      left: 12px;
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--color-label-normal);
      transition: background 140ms ease-out;
      z-index: 5;
    }

    .close-btn:hover {
      background: var(--color-fill-neutral);
    }

    .close-btn:active {
      background: var(--color-fill-neutral);
      transform: scale(0.96);
    }

    .close-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .loading-hero {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-6);
      pointer-events: none;
    }

    /* === Spinner — ZzemLoading style === */
    .spinner {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .spinner__ring {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-full);
      border: 6px solid var(--color-fill-spinner-track);
      border-top-color: var(--color-brand-primary);
      border-right-color: var(--color-brand-primary);
      animation: spinner-rotate 1.1s linear infinite;
    }

    .spinner__dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      margin: -5px 0 0 -5px;
      border-radius: var(--radius-full);
      background: var(--color-brand-primary);
      animation: spinner-pulse 1.4s ease-in-out infinite;
    }

    @keyframes spinner-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinner-pulse {
      0%, 100% { transform: scale(0.7); opacity: 0.6; }
      50% { transform: scale(1); opacity: 1; }
    }

    .loading-label {
      font-size: var(--font-size-subtitle);
      line-height: var(--line-height-subtitle);
      font-weight: var(--font-weight-semibold);
      color: var(--color-label-normal);
      letter-spacing: -0.2px;
      text-align: center;
      word-break: keep-all;
    }

    .loading-label__caption {
      display: block;
      margin-top: 6px;
      font-size: var(--font-size-body2);
      font-weight: var(--font-weight-regular);
      color: var(--color-label-alternative);
      letter-spacing: -0.1px;
    }

    /* === Cancel Dialog === */
    .cancel-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 var(--spacing-5);
      z-index: 100;
    }

    .cancel-overlay.is-open {
      display: flex;
      animation: dialog-fade-in 200ms ease-out;
    }

    .cancel-overlay__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
    }

    .cancel-dialog {
      position: relative;
      width: 100%;
      max-width: 320px;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-lg);
      padding: var(--spacing-6) var(--spacing-5) var(--spacing-4);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-5);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.08);
      animation: dialog-pop-in 320ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cancel-dialog__title {
      font-size: 15px;
      line-height: 22px;
      font-weight: var(--font-weight-semibold);
      color: var(--color-label-normal);
      letter-spacing: -0.2px;
      word-break: keep-all;
      text-wrap: balance;
    }

    .cancel-dialog__actions {
      display: flex;
      gap: var(--spacing-2);
    }

    .btn {
      flex: 1;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family-default);
      font-size: var(--font-size-body1);
      font-weight: var(--font-weight-semibold);
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background 140ms ease-out, transform 140ms ease-out;
      padding: 14px 16px;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn--secondary {
      background: var(--component-button-secondary-fill);
      color: var(--component-button-secondary-label);
    }

    .btn--secondary:hover {
      background: var(--component-button-secondary-fill-hover);
    }

    .btn--destructive {
      background: var(--component-button-destructive-fill);
      color: var(--component-button-destructive-label);
    }

    .btn--destructive:hover {
      background: var(--component-button-destructive-fill-hover);
    }

    @keyframes dialog-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes dialog-pop-in {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner__ring { animation-duration: 2.4s; }
      .spinner__dot { animation: none; }
      .cancel-dialog { animation-duration: 100ms; }
    }

    /* Mobile fullscreen */
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; min-height: 100dvh; }
      .control-panel { display: none; }
      .device-frame {
        width: 100dvw;
        height: 100dvh;
        border: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-panel__row">
      <span class="control-panel__label">Screen</span>
      <select id="screen-select" onchange="navigateBySelect(this.value)">
        <option value="PreviewLoadingScreen">PreviewLoadingScreen</option>
      </select>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">State</span>
      <div class="control-panel__states" id="state-toggles">
        <button class="control-panel__state-btn active" data-state="default" onclick="toggleState('default')">default</button>
        <button class="control-panel__state-btn" data-state="cancel-dialog-open" onclick="toggleState('cancel-dialog-open')">cancel-dialog-open</button>
      </div>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">Path</span>
      <span class="control-panel__breadcrumb" id="breadcrumb">PreviewLoadingScreen</span>
    </div>
  </div>

  <!-- Device Frame -->
  <div class="device-frame" id="device-frame">

    <section class="screen" id="PreviewLoadingScreen" data-archetype="detail" data-detail-state="unavailable">
      <div class="preview-loading">

        <!-- Status Bar -->
        <div class="status-bar" id="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__icons">
            <span aria-hidden="true">●●●●</span>
            <span aria-hidden="true">▸</span>
            <span aria-hidden="true">▮▮</span>
          </span>
        </div>

        <!-- Close Button (top-left) -->
        <button
          class="close-btn"
          id="close-button"
          type="button"
          aria-label="닫기"
          data-testid="meme.previewLoading.closeButton"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="6" y1="6" x2="18" y2="18"></line>
            <line x1="18" y1="6" x2="6" y2="18"></line>
          </svg>
        </button>

        <!-- Loading Hero (centered spinner + label) -->
        <div class="loading-hero" id="loading-hero">
          <div
            class="spinner"
            id="loading-spinner"
            role="progressbar"
            aria-label="미리보기 생성 중"
            data-testid="meme.previewLoading.spinner"
          >
            <div class="spinner__ring" aria-hidden="true"></div>
            <div class="spinner__dot" aria-hidden="true"></div>
          </div>
          <p class="loading-label" id="loading-label" data-testid="meme.previewLoading.label">
            미리보기 만드는중...
            <span class="loading-label__caption">잠시만 기다려 주세요</span>
          </p>
        </div>

        <!-- Cancel Dialog Overlay -->
        <div
          class="cancel-overlay"
          id="cancel-dialog-overlay"
          role="dialog"
          aria-modal="true"
          aria-labelledby="cancel-dialog-title"
          data-testid="meme.previewLoading.cancelDialog"
        >
          <div class="cancel-overlay__backdrop" id="cancel-dialog-backdrop"></div>
          <div class="cancel-dialog" id="cancel-dialog">
            <p class="cancel-dialog__title" id="cancel-dialog-title">
              지금 나가면 작업이 취소되고, 사용한 크레딧은 환불되지 않아요. 정말 나가시겠어요?
            </p>
            <div class="cancel-dialog__actions">
              <button
                class="btn btn--secondary"
                id="cancel-dialog-cancel"
                type="button"
                data-testid="meme.previewLoading.cancelDialogCancel"
              >취소</button>
              <button
                class="btn btn--destructive"
                id="cancel-dialog-confirm"
                type="button"
                data-testid="meme.previewLoading.cancelDialogConfirm"
              >나가기</button>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>

  <script>
    // === State ===
    let currentScreen = null;
    let currentState = 'default';

    // === State Toggle ===
    function applyState(stateName) {
      currentState = stateName;
      const overlay = document.getElementById('cancel-dialog-overlay');
      if (!overlay) return;
      if (stateName === 'cancel-dialog-open') {
        overlay.classList.add('is-open');
      } else {
        overlay.classList.remove('is-open');
      }
      updateStateButtons();
      updateBreadcrumb();
    }

    function toggleState(stateName) {
      applyState(stateName);
    }

    function updateStateButtons() {
      document.querySelectorAll('.control-panel__state-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === currentState);
      });
    }

    function updateBreadcrumb() {
      const breadcrumb = document.getElementById('breadcrumb');
      if (!breadcrumb || !currentScreen) return;
      const suffix = currentState !== 'default' ? ' → ' + currentState : '';
      breadcrumb.textContent = currentScreen.id + suffix;
    }

    function navigateBySelect(screenId) {
      // single-screen prototype — no-op except breadcrumb refresh
      updateBreadcrumb();
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      const firstScreen = document.querySelector('.screen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        applyState('default');
      }

      // Event bindings
      const closeBtn = document.getElementById('close-button');
      const dialogCancel = document.getElementById('cancel-dialog-cancel');
      const dialogConfirm = document.getElementById('cancel-dialog-confirm');
      const dialogBackdrop = document.getElementById('cancel-dialog-backdrop');

      if (closeBtn) {
        closeBtn.addEventListener('click', () => toggleState('cancel-dialog-open'));
      }
      if (dialogCancel) {
        dialogCancel.addEventListener('click', () => toggleState('default'));
      }
      if (dialogBackdrop) {
        dialogBackdrop.addEventListener('click', () => toggleState('default'));
      }
      if (dialogConfirm) {
        dialogConfirm.addEventListener('click', () => {
          // Demo only — would POST /preview-contents/:id/cancel + navigate to FilterPreview
          console.log('[demo] cancel preview → navigate to FilterPreview (replace)');
          toggleState('default');
          // visual hint that exit was confirmed
          const label = document.getElementById('loading-label');
          if (label) {
            label.firstChild.textContent = '나가는 중...';
          }
        });
      }
    });
  </script>

</body>
</html>
