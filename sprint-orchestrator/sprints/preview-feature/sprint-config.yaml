# Sprint Configuration — preview-feature
# Canonical PRD: ~/.zzem/kb/products/preview-feature/prd.md (KB mirror)
# Goal: workflow filter i2i preview → user-decided i2v conversion (~10% → ~20% 목표).

sprint_id: "preview-feature"
branch_prefix: "sprint"

repositories:
  backend:
    source: ~/dev/work/wrtn-backend
    base: "apple"
    mode: worktree
  app:
    source: ~/dev/work/app-core-packages
    base: "main"
    mode: worktree
  tokens:
    source: ~/dev/work/wds-tokens
    base: "main"
    mode: symlink

defaults:
  base: "main"

team:
  teammates:
    - be-engineer
    - fe-engineer
    - design-engineer
    - evaluator
  settings:
    eval_retry_limit: 2
    max_parallel_tasks: 4

display:
  title: "Workflow Filter Preview — i2i 결과 확인 후 i2v 결정"
  startDate: "2026-04-26"
  endDate: "2026-04-26"
  status: "prototype-only"   # Phase 1~3 완료. Phase 4(Build)~6(Retro) 미실행 — 사용자 결정.
  tags:
    - preview-feature
    - workflow-filter
    - i2i
    - i2v
    - conversion
    - prototype-only
  summary: |
    workflow 필터(i2i+i2v)의 i2i 결과 이미지를 먼저 보여주어 유저가
    결과물을 확인한 뒤 비디오 생성(i2v)을 결정할 수 있게 한다. 프리뷰
    진입 대비 비디오 생성 전환율 2배(~10% → ~20%) 목표.
    이번 sprint는 spec + prototype까지만 산출 (5 화면 HTML, 평균 8.5/10).
    Build/PR/Retro는 의도적으로 미실행.
