openapi: "3.0.3"
info:
  title: ZZEM Home Screen API Contract
  version: "1.0.0"
  description: |
    zzem-home-001 스프린트 API 계약서.
    모든 엔드포인트는 기존 구현을 참조함 (신규 엔드포인트 없음).
    App 태스크는 이 계약서의 엔드포인트를 SSOT로 사용.

servers:
  - url: /meme/v1
    description: Meme API v1

paths:
  /home/layout:
    get:
      operationId: getHomeLayout
      summary: 홈 화면 레이아웃 조회
      description: |
        메인 메뉴(퀵 액션), 상단/하단 큐레이션 섹션을 반환.
        - 기존 구현: controller/home/home.controller.ts
        - 사용처: APP-001 (퀵 액션 메뉴, 큐레이션 섹션)
      tags: [Home]
      security: []
      parameters:
        - name: app-version
          in: header
          schema:
            type: string
      responses:
        "200":
          description: 홈 레이아웃 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeLayoutResponse"

  /feeds/grid:
    get:
      operationId: getGridFeed
      summary: 그리드 피드 조회 (랭킹 기반)
      description: |
        BigQuery 기반 추천/랭킹 피드. 크리에이터 프로필, 좋아요 정보 포함.
        - 기존 구현: controller/feed/feed.controller.ts
        - 사용처: APP-002 (콘텐츠 그리드)
      tags: [Feed]
      security:
        - optionalUserAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: base64
          description: "커서 필드: [rankOrder, kstDate, kstHour, id]"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 피드 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GridFeedResponse"

  /filters:
    get:
      operationId: getFilters
      summary: 필터(템플릿) 목록 조회
      description: |
        카테고리/태그 기반 필터 목록. 커서 페이지네이션.
        - 기존 구현: controller/filter/filter.controller.ts
        - 사용처: APP-001 (신규 템플릿, 큐레이션 섹션)
      tags: [Filter]
      security:
        - optionalUserAuth: []
      parameters:
        - name: chip
          in: query
          schema:
            type: string
            enum: [new, hot, trending, free, mixed, image, video]
        - name: tag
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
            format: base64
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 필터 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterListResponse"

  /filters/chips:
    get:
      operationId: getFilterChips
      summary: 필터 카테고리 칩 목록
      description: |
        홈 화면 필터 칩 데이터. displayOrder 순 정렬.
        - 기존 구현: controller/filter/filter.controller.ts
        - 사용처: APP-001 (카테고리 필터 칩)
      tags: [Filter]
      security: []
      responses:
        "200":
          description: 칩 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterChipListResponse"

  /likes:
    put:
      operationId: toggleLike
      summary: 좋아요 토글
      description: |
        콘텐츠/필터 좋아요 토글. 낙관적 UI 권장.
        - 기존 구현: controller/like/like.controller.ts
        - 사용처: APP-002 (콘텐츠 그리드 좋아요)
      tags: [Like]
      security:
        - userAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetId, targetType]
              properties:
                targetId:
                  type: string
                targetType:
                  type: string
                  enum: [FILTER, CONTENT]
      responses:
        "200":
          description: 토글 결과

  /unread-badge:
    get:
      operationId: getUnreadBadge
      summary: 읽지 않은 항목 뱃지
      description: |
        알림/미확인 콘텐츠 뱃지 상태.
        - 사용처: APP-001 (헤더 알림 뱃지), APP-003 (My 탭 뱃지)
      tags: [Badge]
      security:
        - userAuth: []
      responses:
        "200":
          description: 뱃지 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadBadgeResponse"

components:
  securitySchemes:
    userAuth:
      type: apiKey
      in: header
      name: wrtn-user-id
    optionalUserAuth:
      type: apiKey
      in: header
      name: wrtn-user-id

  schemas:
    HomeLayoutResponse:
      type: object
      properties:
        mainMenus:
          type: array
          items:
            $ref: "#/components/schemas/MainMenu"
        topSections:
          type: array
          items:
            $ref: "#/components/schemas/HomeSection"
        bottomSections:
          type: array
          items:
            $ref: "#/components/schemas/HomeSection"

    MainMenu:
      type: object
      properties:
        menuId:
          type: string
        order:
          type: integer
        title:
          type: string
        iconUrl:
          type: string
        type:
          type: string
        resultType:
          type: string
          description: "character-swap → Beta 배지 표시"

    HomeSection:
      type: object
      properties:
        sectionId:
          type: string
        sectionGroup:
          type: string
          enum: [TOP_CURATION, BOTTOM_CURATION]
        displayType:
          type: string
          enum: [GRID, HORIZONTAL]
        order:
          type: integer
        title:
          type: string
        tag:
          type: string
        limit:
          type: integer
        hasButton:
          type: boolean

    GridFeedResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        nextCursor:
          type: string
          nullable: true

    FeedItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [FILTER, CONTENT]
        filterTitle:
          type: string
          nullable: true
        filterType:
          type: string
          enum: [image, video, mixed-image-to-video, mixed-image-to-image]
        resultFileUrl:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
        hasAudio:
          type: boolean
        isFavorited:
          type: boolean
        favoriteCount:
          type: integer
        rankOrder:
          type: integer
        requiredCredit:
          type: integer
        userProfile:
          $ref: "#/components/schemas/UserProfile"
        filterTypeIcon:
          type: string

    UserProfile:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true

    FilterListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/FilterItem"
        nextCursor:
          type: string
          nullable: true

    FilterItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        thumbnail:
          type: string
        exampleSource:
          type: string
        tags:
          type: array
          items:
            type: string
        count:
          type: integer
        requiredCredit:
          type: integer

    FilterChipListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/FilterChip"

    FilterChip:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        iconUrl:
          type: string
          nullable: true

    UnreadBadgeResponse:
      type: object
      properties:
        hasUnread:
          type: boolean
