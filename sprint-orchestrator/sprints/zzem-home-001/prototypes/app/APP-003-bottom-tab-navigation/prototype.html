<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP-003 Bottom Tab Navigation Prototype</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens === */
    :root {
      --color-brand-primary: #8752FA;
      --color-bg-normal: #FFFFFF;
      --color-bg-page: #F7F7F8;
      --color-label-normal: #212228;
      --color-label-secondary: #8E9199;
      --color-label-assistive: #B0B4BC;
      --color-tab-active: #8752FA;
      --color-tab-inactive: #B0B4BC;
      --color-border: #F0F1F3;
      --color-notification: #FF3B30;
      --color-fill-neutral: #F0F1F3;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .control-panel__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-panel__label {
      color: #888;
      font-size: 11px;
      min-width: 48px;
    }

    .control-panel select {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }

    .control-panel__states {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .control-panel__state-btn {
      background: #2a2a3e;
      color: #888;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .control-panel__state-btn.active {
      background: var(--color-brand-primary);
      color: #fff;
      border-color: var(--color-brand-primary);
    }

    .control-panel__breadcrumb {
      color: #666;
      font-size: 11px;
      font-family: monospace;
    }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--color-bg-normal);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    /* === Screen === */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* === Transitions === */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .transition-fade { animation: fadeIn 0.2s ease-out; }

    /* === Bottom Tab Bar === */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px; /* 56px tab + 34px safe area */
      background: var(--color-bg-normal);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: flex-start;
      padding-top: 0;
      z-index: 50;
    }

    .tab-bar__item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 56px;
      gap: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: none;
      border: none;
      font-family: inherit;
      position: relative;
      transition: transform 0.1s ease;
    }

    .tab-bar__item:active {
      transform: scale(0.92);
    }

    .tab-bar__icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .tab-bar__icon svg {
      width: 24px;
      height: 24px;
    }

    .tab-bar__label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .tab-bar__item--active .tab-bar__icon svg {
      color: var(--color-tab-active);
    }

    .tab-bar__item--active .tab-bar__label {
      color: var(--color-tab-active);
      font-weight: 600;
    }

    .tab-bar__item--inactive .tab-bar__icon svg {
      color: var(--color-tab-inactive);
    }

    .tab-bar__item--inactive .tab-bar__label {
      color: var(--color-tab-inactive);
    }

    /* Notification dot */
    .tab-bar__badge {
      display: none;
      position: absolute;
      top: -2px;
      right: -4px;
      width: 8px;
      height: 8px;
      background: var(--color-notification);
      border-radius: 50%;
      border: 1.5px solid var(--color-bg-normal);
    }

    .tab-bar__badge.visible {
      display: block;
    }

    /* === Screen Content Area === */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 90px; /* tab bar height */
    }

    /* === Home Screen === */
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      height: 52px;
    }

    .home-header__logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--color-brand-primary);
      letter-spacing: -0.5px;
    }

    .home-header__actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .home-header__action-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-normal);
      cursor: pointer;
    }

    .home-header__action-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Quick Actions */
    .quick-actions {
      display: flex;
      justify-content: space-around;
      padding: 16px 20px 20px;
    }

    .quick-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .quick-action__circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F3EEFF 0%, #E8DFFE 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.15s ease;
    }

    .quick-action:active .quick-action__circle {
      transform: scale(0.93);
    }

    .quick-action__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-label-normal);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    /* Section Header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
    }

    .section-header__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-label-normal);
      letter-spacing: -0.03em;
    }

    .section-header__more {
      font-size: 13px;
      color: var(--color-label-assistive);
      cursor: pointer;
    }

    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 20px 20px;
    }

    .content-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--color-bg-normal);
      border: 1px solid var(--color-border);
    }

    .content-card__thumb {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #F0F1F3 0%, #E4E5E9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-assistive);
      font-size: 32px;
      position: relative;
      overflow: hidden;
    }

    .content-card__thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.03) 100%);
    }

    .content-card__info {
      padding: 10px 12px;
    }

    .content-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-label-normal);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content-card__meta {
      font-size: 11px;
      color: var(--color-label-assistive);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* === Placeholder Screen === */
    .placeholder-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 90px;
    }

    .placeholder-screen__icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-assistive);
      margin-bottom: 16px;
    }

    .placeholder-screen__icon svg {
      width: 64px;
      height: 64px;
    }

    .placeholder-screen__title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-label-normal);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .placeholder-screen__subtitle {
      font-size: 14px;
      color: var(--color-label-secondary);
      letter-spacing: -0.01em;
    }

    /* State Visibility */
    [data-state] {
      display: none;
    }

    [data-state].state-active {
      display: flex;
    }
  </style>
</head>

            </svg>
          </div>
          <span class="tab-bar__label">검색</span>
        </button>
        <button class="tab-bar__item tab-bar__item--active" onclick="switchTab('screen-my')">
          <div class="tab-bar__icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span class="tab-bar__badge my-badge-dot"></span>
          </div>
          <span class="tab-bar__label">My</span>
        </button>
      </div>
    </div>

  </div>

  <script>
    // === State ===
    let currentScreen = null;
    let currentState = 'default';
    let globalState = 'default';
    const navHistory = [];

    // === Tab Switching ===
    function switchTab(screenId) {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active', 'transition-fade');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-fade');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      updateControlPanel();
      applyBadgeState(globalState);
    }

    // === Navigation (for control panel select) ===
    function navigate(screenId, transition) {
      switchTab(screenId);
    }

    function navigateBySelect(screenId) {
      switchTab(screenId);
    }

    // === Global State (badge visibility) ===
    function setGlobalState(stateName) {
      globalState = stateName;
      currentState = stateName;
      applyBadgeState(stateName);
      updateStateButtons();
    }

    function applyBadgeState(stateName) {
      const dots = document.querySelectorAll('.my-badge-dot');
      dots.forEach(dot => {
        if (stateName === 'my-badge') {
          dot.classList.add('visible');
        } else {
          dot.classList.remove('visible');
        }
      });
    }

    // === Control Panel ===
    function updateControlPanel() {
      if (!currentScreen) return;

      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) breadcrumb.textContent = currentScreen.id;

      updateStateButtons();
    }

    function updateStateButtons() {
      document.querySelectorAll('.control-panel__state-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === globalState);
      });
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      const firstScreen = document.querySelector('.screen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        updateControlPanel();
        applyBadgeState('default');
      }
    });
  </script>

</body>
</html>
