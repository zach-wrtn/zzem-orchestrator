# =====================================================================
# Layer 3: HOW (Orchestration Rules)
# =====================================================================
how:
  composition_rules:
    - rule: "프로필 이미지 원형 100x100, 중앙 정렬"
      applies_to: [MyProfileScreen, OtherProfileScreen]
    - rule: "카운트 3열 균등 분할, 구분선 없음, 숫자-라벨 세로 2줄"
      applies_to: [MyProfileScreen]
    - rule: "듀얼 버튼 회색 배경(#F1F1F1), radius 12, 2열 gap 8, 라벨 label1 semibold"
      applies_to: [MyProfileScreen]
    - rule: "탭바는 아이콘만 60px 고정 폭, active 하단 2px 밑줄 #262626"
      applies_to: [MyProfileScreen]
    - rule: "피드 그리드는 2열 1px gap, 1:1과 4:5 비율 교차"
      applies_to: [MyProfileScreen, OtherProfileScreen, FeedScreen]

  conditional_rendering:
    - condition: "counts.public > 0"
      variant_a: "activeTab = public, 그리드 렌더"
      variant_b: null
    - condition: "counts.public === 0 && counts.private > 0"
      variant_a: "activeTab = private, 그리드 렌더"
      variant_b: null
    - condition: "counts.public === 0 && counts.private === 0"
      variant_a: "activeTab = public, empty state"
      variant_b: null
    - condition: "route.landingTab === 'public'"
      variant_a: "필터 생성 완료 직후 진입 → 공개 탭 pre-select"
      variant_b: null
    - condition: "route.landingTab === 'private'"
      variant_a: "커스텀 프롬프트 생성 완료 직후 진입 → 비공개 탭 pre-select"
      variant_b: null
    - condition: "activeTab === 'liked'"
      variant_a: "Phase 1 고정 empty state"
      variant_b: null

  constraints:
    - "탭바는 sticky 아래, 바텀 네비게이션 위. 카운트 버튼 영역은 scroll 안에 포함"
    - "빈 상태는 에러/로딩과 시각적으로 구분되어야 함 (아이콘 + 주/부 텍스트)"
    - "카운트 값은 반드시 formatKoreanCount 유틸 경유 (0도 포맷팅 통과)"
    - "Phase 1 liked 탭은 실제 fetch 호출 금지 — 고정 empty"
    - "설정 진입 아이콘은 헤더 우상단 고정, 44x44 터치 영역"
    - "프로필 편집/공유 버튼은 본 태스크에서 배치만, 클릭 시 placeholder 네비게이션"

  priority_order:
    - ProfileHeader (카운트 + 듀얼 버튼)
    - IconOnlyTabBar
    - FeedGrid2Col (활성 탭 콘텐츠)
    - 설정 진입 아이콘 (헤더)
    - Empty/Loading/Error 상태

# =====================================================================
# APP-005 — Profile Edit (이미지 + 닉네임)
# Source: sprints/ugc-platform-001/tasks/app/005-profile-edit.md + §5
# Extends the shared why/what/how above with task-specific additions.
# =====================================================================
app_005_profile_edit:
  screens:
    - ProfileEditScreen
    - ImageSourceSheet
    - CropScreen
    - AlbumPickerScreen
    - ExitConfirmSheet

  why:
    user_stories:
      - id: US-APP-005-1
        as_a: "MY 프로필 소유자"
        i_want: "프로필 이미지를 카메라 또는 앨범에서 교체하고 크롭할 수 있다"
        so_that: "자기 정체성을 최신 상태로 표현한다"
      - id: US-APP-005-2
        as_a: "MY 프로필 소유자"
        i_want: "닉네임을 2~20자 범위에서 자유롭게 수정할 수 있다"
        so_that: "원하는 이름으로 계정을 식별시킨다"
      - id: US-APP-005-3
        as_a: "MY 프로필 소유자"
        i_want: "dirty 상태가 아니면 저장 버튼이 비활성화되어 실수 저장을 방지한다"
        so_that: "의도치 않은 변경을 피한다"

    acceptance_criteria:
      - id: AC-APP-005-1
        given: "MY 프로필 화면"
        when: "'프로필 편집' 버튼 탭 또는 zzem://profile/edit 딥링크"
        then: "ProfileEditScreen 오픈"
        ui_impact: "ProfileEditScreen 라우트 + 헤더"
      - id: AC-APP-005-2
        given: "ProfileEditScreen"
        when: "프로필 이미지 영역 또는 카메라 배지 탭"
        then: "ImageSourceSheet open (카메라/앨범/사진 삭제)"
        ui_impact: "바텀시트 트리거 + destructive 항목"
      - id: AC-APP-005-3
        given: "ImageSourceSheet"
        when: "'앨범' 탭"
        then: "AlbumPickerScreen open (3-col grid)"
        ui_impact: "앨범 드롭다운 헤더 + 그리드 + 선택 체크박스"
      - id: AC-APP-005-4
        given: "이미지 선택 후"
        when: "크롭 흐름 진입"
        then: "CropScreen open (4 corner handles + dark bottom bar)"
        ui_impact: "크롭 overlay + 완료 버튼"
      - id: AC-APP-005-5
        given: "닉네임 인풋"
        when: "1자 또는 21자 이상"
        then: "저장 비활성 + 인라인 에러 (2자 미만일 때)"
        ui_impact: "저장 버튼 disabled style + 카운터 n/20"
      - id: AC-APP-005-6
        given: "닉네임 2~20자 + dirty"
        when: "저장 탭"
        then: "PATCH /v2/me/profile + 토스트 '프로필이 업데이트 되었어요' + back"
        ui_impact: "저장 버튼 활성(#262626) → 업로딩 → success 토스트"
      - id: AC-APP-005-7
        given: "dirty 상태"
        when: "뒤로가기 탭"
        then: "ExitConfirmSheet open"
        ui_impact: "듀얼 버튼 시트 (취소 / 확인 #262626)"

  what:
    tokens_added:
      - pe-input-fill (#F7F7F7)
      - pe-input-border (#F1F1F1)
      - pe-save-disabled (#F1F1F1)
      - pe-save-active (#262626)
      - pe-camera-badge-fill (#E2E2E2)
      - pe-sheet-handle (#A7A7A7)
      - pe-destructive-text (#D92800)
    components_added:
      - { name: AvatarWithCameraBadge, category: content, source: "§5" }
      - { name: FilledInputField, category: input, source: "§5" }
      - { name: CharacterCounter, category: feedback }
      - { name: PrimarySaveButton, category: input, source: "§5" }
      - { name: BottomSheet, category: layout, source: "§5" }
      - { name: BottomSheetItem, category: content, source: "§5" }
      - { name: CropHandleOverlay, category: feedback, source: "§5" }
      - { name: AlbumGridCell, category: content, source: "§5" }
      - { name: AlbumDropdown, category: navigation, source: "§5" }
      - { name: CheckboxFilled, category: input, source: "§5" }
      - { name: Toast, category: feedback }
    patterns_added:
      - { name: FilledRoundedInput, description: "fill + radius만 사용. 아웃라인 없음" }
      - { name: DirtyStateCta, description: "변경 감지 후에만 primary CTA 활성" }
      - { name: BottomSheetWithHandle, description: "40x4 핸들 + top radius 20 + slide-up" }
      - { name: ThreeColumnAlbumGrid, description: "3-col 120px row 2px gap, 카메라 첫 셀, 선택 시 purple border" }
      - { name: ImageCropCornerHandles, description: "4 corner L-shape handles + dimmed overlay" }

  how:
    composition_rules:
      - rule: "헤더 h-48, 타이틀 SemiBold 18px 중앙, 좌측 back"
        applies_to: [ProfileEditScreen]
      - rule: "닉네임 filled rounded box (#F7F7F7 bg, 1px #F1F1F1, radius 16, padding 16x12)"
        applies_to: [ProfileEditScreen]
      - rule: "저장 버튼 하단 고정 h-56, radius 16, 비활성 #F1F1F1 / 활성 #262626 + white"
