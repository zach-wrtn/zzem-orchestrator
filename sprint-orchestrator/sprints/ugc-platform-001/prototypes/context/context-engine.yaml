# =====================================================================
# Layer 1: WHY (Business Intent)
# Extracted from: docs/prds/ugc-platform-{1,2,3}.md (MY 프로필 + UGC 소비/노출)
# =====================================================================
why:
  product_intent: >-
    사용자가 생성한 밈 콘텐츠(UGC)를 플랫폼 내에서 공개/비공개로 관리하고,
    타 유저의 콘텐츠를 탐색·팔로우·재생성하며 소비 경험을 형성한다.
  target_user: "10~30대 밈 소비/생성 사용자"
  success_metric:
    - "프로필 진입 후 공개 탭 활성 비율"
    - "재생성(remix) 행위 전환율"
    - "설정 진입점 톱니바퀴 노출률"

  user_stories:
    - id: US-APP-003-1
      as_a: "콘텐츠를 만든 사용자"
      i_want: "내가 만든 밈을 공개/비공개/좋아요 탭으로 구분해서 보고 싶다"
      so_that: "나의 창작물을 관리하고 공개 여부를 결정할 수 있다"
    - id: US-APP-003-2
      as_a: "프로필에 진입하는 사용자"
      i_want: "내 콘텐츠 보유 상황에 맞는 탭이 기본으로 활성화되길 바란다"
      so_that: "불필요한 빈 상태를 거치지 않고 바로 내 콘텐츠를 확인한다"
    - id: US-APP-003-3
      as_a: "앱을 사용하는 사용자"
      i_want: "프로필에서 설정 화면으로 빠르게 진입하고 싶다"
      so_that: "계정/알림/약관 등 설정을 필요할 때 즉시 조정한다"

  acceptance_criteria:
    - id: AC-2.1
      given: "프로필 탭에 진입한 로그인 사용자"
      when: "카운트 조회가 완료된 시점"
      then: "public > 0 → 공개 탭, public=0 && private > 0 → 비공개 탭, 둘 다 0 → 공개 탭(빈 상태)로 랜딩"
      ui_impact: "탭 초기 활성 index가 분기. 빈 상태 컴포넌트 렌더 조건."
    - id: AC-2.7
      given: "필터/커스텀 프롬프트 기반 생성 완료"
      when: "사용자가 생성 완료 흐름에서 돌아올 때"
      then: "필터 생성 → 공개 탭, 커스텀 프롬프트 생성 → 비공개 탭으로 직진"
      ui_impact: "landingTab route param 기반 탭 pre-select."
    - id: AC-2.profile-header
      given: "프로필 탭 진입"
      when: "초기 렌더"
      then: "프로필 이미지 + 닉네임 + 팔로워/팔로잉/재생성된 3열 카운트 + 편집/공유 듀얼 버튼이 표시"
      ui_impact: "ProfileHeader 컴포넌트 배치."
    - id: AC-2.liked-phase1
      given: "좋아요 탭 진입 (Phase 1)"
      when: "탭 전환"
      then: "빈 상태 안내 문구만 고정 표시 (실데이터 fetch 없음)"
      ui_impact: "liked 탭 컨텐츠는 empty state 컴포넌트 고정."
    - id: AC-2.settings-entry
      given: "프로필 헤더 우상단"
      when: "톱니바퀴 아이콘 탭"
      then: "Settings 라우트로 네비게이션"
      ui_impact: "헤더 우상단 IconButton + navigate action."
    - id: AC-2.count-format
      given: "카운트 숫자 렌더"
      when: "8,600 / 10,000 / 12,345 / 0 등 모든 값"
      then: "한국어 축약 포맷 통과 (8.6천 / 1만 / 1.2만 / 0)"
      ui_impact: "CountTile value 렌더 시 유틸 경유."

