      - rule: "바텀시트 핸들 40x4 #A7A7A7 + top radius 20"
        applies_to: [ImageSourceSheet, ExitConfirmSheet]
      - rule: "이미지 소스 시트 아이콘 인라인(서클 래퍼 없음) + 텍스트 gap-12"
        applies_to: [ImageSourceSheet]
      - rule: "나가기 확인 시트 듀얼 버튼 (취소 #F1F1F1 / 확인 #262626)"
        applies_to: [ExitConfirmSheet]
      - rule: "크롭 화면 dark bottom bar + 완료 버튼 + 4 corner 27x27 handles"
        applies_to: [CropScreen]
      - rule: "앨범 그리드 3-col 120px row 2px gap, 첫 셀 카메라, 선택 시 #8752FA border + filled checkbox"
        applies_to: [AlbumPickerScreen]

    conditional_rendering:
      - condition: "닉네임 길이 2~20 AND (닉네임 OR 이미지 dirty)"
        variant_a: "저장 버튼 활성 (#262626)"
        variant_b: "저장 버튼 비활성 (#F1F1F1)"
      - condition: "이미지 업로드 진행 중"
        variant_a: "저장 버튼 spinner + disabled"
        variant_b: "일반 저장 버튼"
      - condition: "dirty 상태에서 back 탭"
        variant_a: "ExitConfirmSheet open"
        variant_b: "바로 navigate back"
      - condition: "닉네임 길이 < 2 AND 사용자가 입력함"
        variant_a: "인라인 에러 '닉네임은 2자 이상이어야 해요'"
        variant_b: "에러 없이 카운터만"

    constraints:
      - "닉네임 max length 20자"
      - "바텀시트 콘텐츠 높이 (이미지 소스 ~240, 나가기 확인 ~200)"
      - "저장 버튼 safe area 위에 bottom 24 고정"
      - "앨범 그리드 세로 스크롤 + 상단 sticky 드롭다운"
      - "크롭 overlay 전체 dimmed + 중앙 크롭 박스"
