<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZZEM · MY 프로필 (app-003)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
/* ============================================================
 * Inlined tokens.css (ugc-platform-001)
 * Source: tokens/primitive/*.json + tokens/semantic/light.json + component-patterns.md aliases
 * ============================================================ */
:root {
  --wds-color-purple-50: #F5F0FF;
  --wds-color-purple-100: #EBE1FF;
  --wds-color-purple-500: #8752FA;
  --wds-color-purple-600: #7040E0;

  --wds-color-neutral-0: #FFFFFF;
  --wds-color-neutral-50: #F7F8F9;
  --wds-color-neutral-100: #F0F1F3;
  --wds-color-neutral-200: #E4E5E9;
  --wds-color-neutral-300: #D1D3D8;
  --wds-color-neutral-400: #B5B8BF;
  --wds-color-neutral-500: #8E9199;
  --wds-color-neutral-600: #6B6E76;
  --wds-color-neutral-700: #4D5058;
  --wds-color-neutral-800: #35373E;
  --wds-color-neutral-900: #212228;
  --wds-color-neutral-1000: #000000;

  --wds-color-red-500: #FF3B30;

  --wds-background-normal: var(--wds-color-neutral-0);
  --wds-background-dimmed: rgba(0, 0, 0, 0.40);

  --wds-surface-primary: var(--wds-color-neutral-0);
  --wds-surface-secondary: var(--wds-color-neutral-50);
  --wds-surface-tertiary: var(--wds-color-neutral-100);
  --wds-surface-button: #F1F1F1;

  --wds-fill-brand-primary: var(--wds-color-purple-500);
  --wds-fill-disabled: var(--wds-color-neutral-200);

  --wds-label-normal: var(--wds-color-neutral-900);
  --wds-label-alternative: var(--wds-color-neutral-600);
  --wds-label-assistive: var(--wds-color-neutral-500);
  --wds-label-inverse: var(--wds-color-neutral-0);
  --wds-label-brand: var(--wds-color-purple-500);
  --wds-text-primary: #262626;

  --wds-line-normal: var(--wds-color-neutral-200);
  --wds-line-alternative: var(--wds-color-neutral-100);

  --wds-status-error: var(--wds-color-red-500);

  --wds-radius-xs: 4px;
  --wds-radius-sm: 8px;
  --wds-radius-md: 12px;
  --wds-radius-lg: 16px;
  --wds-radius-xl: 20px;
  --wds-radius-2xl: 24px;
  --wds-radius-28: 28px;
  --wds-radius-full: 9999px;

  --wds-font-family-primary: 'Pretendard', -apple-system, 'SF Pro Display', 'Apple SD Gothic Neo', sans-serif;
  --wds-font-weight-regular: 400;
  --wds-font-weight-medium: 500;
  --wds-font-weight-semibold: 600;
  --wds-font-weight-bold: 700;
}

/* ============================================================
 * Page frame
 * ============================================================ */
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #E7E8EB;
  font-family: var(--wds-font-family-primary);
  color: var(--wds-label-normal);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 64px;
  gap: 16px;
}

/* ============================================================
 * Control Panel
 * ============================================================ */
.control-panel {
  width: 100%;
  max-width: 760px;
  background: #fff;
  border: 1px solid var(--wds-line-normal);
  border-radius: var(--wds-radius-lg);
  padding: 14px 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 13px;
}
.control-panel .row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.control-panel .label {
  font-weight: 600;
  color: var(--wds-label-normal);
  min-width: 64px;
}
.control-panel select, .control-panel button {
  font-family: inherit;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--wds-line-normal);
  background: #fff;
  cursor: pointer;
  color: var(--wds-label-normal);
}
.control-panel button.active {
  background: var(--wds-text-primary);
  color: #fff;
  border-color: var(--wds-text-primary);
}
.control-panel .breadcrumb {
  color: var(--wds-label-alternative);
  font-size: 12px;
}
.control-panel .breadcrumb code {
  background: var(--wds-surface-tertiary);
  padding: 1px 6px;
  border-radius: 6px;
}

/* ============================================================
 * Device Frame
 * ============================================================ */
.device-frame {
  width: 390px;
  height: 844px;
  background: var(--wds-background-normal);
  border-radius: 44px;
  border: 10px solid #111;
  box-shadow: 0 12px 48px rgba(0,0,0,0.18);
  overflow: hidden;
  position: relative;
}
.device-frame .notch {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 26px;
  background: #111;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
  z-index: 50;
}

/* ============================================================
 * Screen
 * ============================================================ */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--wds-background-normal);
  overflow: hidden;
}

/* Header */
.header-bar {
  flex: 0 0 auto;
  height: 56px;
  padding: 0 8px 0 16px;
  padding-top: 8px; /* breathing room under notch */
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--wds-background-normal);
  border-bottom: 1px solid var(--wds-line-alternative);
  position: relative;
  z-index: 10;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--wds-label-normal);
  margin: 0;
  letter-spacing: -0.2px;
}
.icon-btn {
  background: transparent;
  border: 0;
  width: 44px; height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--wds-label-normal);
  padding: 0;
  border-radius: var(--wds-radius-full);
}
.icon-btn:active { background: rgba(0,0,0,0.05); }

/* Scroll area below header, above bottom nav */
.scroll-area {
  flex: 1 1 auto;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 64px; /* bottom nav height */
}
.scroll-area::-webkit-scrollbar { width: 0; display: none; }

/* Profile Header (§3) */
.profile-header {
  padding: 24px 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.avatar-100 {
  width: 100px; height: 100px;
  border-radius: var(--wds-radius-full);
  background: linear-gradient(135deg, #F5F0FF, #EBE1FF);
  border: 1px solid var(--wds-line-alternative);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  color: var(--wds-label-brand);
  font-weight: 700;
  overflow: hidden;
}
.nickname {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--wds-label-normal);
  text-align: center;
  margin: 0;
  letter-spacing: -0.3px;
}
.count-row {
  list-style: none;
  margin: 4px 0 0;
  padding: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.count-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-height: 48px;
}
.count-value {
  font-size: 18px;
  font-weight: 600;
  color: var(--wds-label-normal);
  line-height: 1.4;
  letter-spacing: -0.2px;
}
.count-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--wds-label-alternative);
  line-height: 1.4;
}
.dual-btn {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 4px;
}
.btn-gray {
  height: 44px;
  background: var(--wds-surface-button);
  color: var(--wds-label-normal);
  border: 0;
  border-radius: var(--wds-radius-md);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  cursor: pointer;
}
.btn-gray:active { background: var(--wds-color-neutral-200); }

/* Tab Bar (§3 Icon-only) */
.tab-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 0;
  border-bottom: 1px solid var(--wds-line-alternative);
  background: var(--wds-background-normal);
  position: sticky;
  top: 0;
  z-index: 5;
}
.tab-item {
  flex: 0 0 auto;
  width: 60px;
  height: 44px;
  border: 0;
  background: transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  color: var(--wds-label-assistive);
  position: relative;
}
.tab-item svg { width: 22px; height: 22px; }
.tab-item[aria-selected="true"] { color: var(--wds-text-primary); }
.tab-item[aria-selected="true"]::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--wds-text-primary);
}

/* Tab Content Slot */
.tab-content-slot { padding: 0; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Feed Grid (§1) */
.feed-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--wds-background-normal);
}
.feed-cell {
  position: relative;
  background: var(--wds-surface-secondary);
  border-radius: var(--wds-radius-xs);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
}
.feed-cell.ratio-11 { aspect-ratio: 1 / 1; }
.feed-cell.ratio-45 { aspect-ratio: 4 / 5; }
.feed-cell .thumb {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background-size: cover;
  background-position: center;
}
.regen-pill {
  position: absolute;
  right: 8px; bottom: 8px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--wds-radius-full);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  letter-spacing: -0.2px;
}
.regen-pill svg { width: 10px; height: 10px; }

/* Empty States */
.empty-state {
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  gap: 12px;
}
.empty-icon {
  width: 64px; height: 64px;
  border-radius: var(--wds-radius-full);
  background: var(--wds-surface-tertiary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--wds-label-assistive);
  margin-bottom: 4px;
}
.empty-icon svg { width: 28px; height: 28px; }
.empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--wds-label-normal);
  margin: 0;
}
.empty-sub {
  font-size: 13px;
  font-weight: 400;
  color: var(--wds-label-alternative);
  margin: 0;
  line-height: 1.5;
  max-width: 280px;
}

/* Loading Overlay */
.state-overlay {
  position: absolute;
  top: 56px; /* below header */
  left: 0; right: 0; bottom: 64px;
  background: var(--wds-background-normal);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 20px;
  z-index: 20;
}
.state-overlay.active { display: flex; }
.skeleton-avatar {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: linear-gradient(90deg, #F0F1F3 25%, #F7F8F9 50%, #F0F1F3 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  margin-bottom: 16px;
}
.skeleton-line {
  height: 14px;
  border-radius: 4px;
  background: linear-gradient(90deg, #F0F1F3 25%, #F7F8F9 50%, #F0F1F3 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  margin-bottom: 8px;
}
.skeleton-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  margin-top: 24px;
}
.skeleton-cell {
  aspect-ratio: 1 / 1;
  background: linear-gradient(90deg, #F0F1F3 25%, #F7F8F9 50%, #F0F1F3 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: var(--wds-radius-xs);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Error Overlay */
.error-icon {
  width: 64px; height: 64px;
  border-radius: var(--wds-radius-full);
  background: rgba(255, 59, 48, 0.08);
  color: var(--wds-status-error);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.error-icon svg { width: 28px; height: 28px; }
.btn-retry {
  margin-top: 8px;
  height: 44px;
  padding: 0 24px;
  background: var(--wds-text-primary);
  color: #fff;
  border: 0;
  border-radius: var(--wds-radius-md);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Bottom Nav */
.bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--wds-background-normal);
  border-top: 1px solid var(--wds-line-alternative);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 15;
  padding-bottom: env(safe-area-inset-bottom);
}
.bn-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-size: 10px;
  color: var(--wds-label-assistive);
  background: transparent;
  border: 0;
  cursor: pointer;
  padding: 6px 0;
}
.bn-item.active { color: var(--wds-text-primary); }
.bn-item svg { width: 22px; height: 22px; }

/* Toast */
.toast {
  position: absolute;
  left: 50%; bottom: 88px;
  transform: translate(-50%, 20px);
  background: rgba(33, 34, 40, 0.92);
  color: #fff;
  font-size: 13px;
  padding: 10px 16px;
  border-radius: var(--wds-radius-md);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease, transform .2s ease;
  z-index: 60;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }

/* State-driven visibility */
.screen[data-state="loading"] .profile-header,
.screen[data-state="loading"] .tab-bar,
.screen[data-state="loading"] .tab-content-slot { visibility: hidden; }
.screen[data-state="loading"] #loading-overlay { display: flex; }

.screen[data-state="error"] .profile-header,
.screen[data-state="error"] .tab-bar,
.screen[data-state="error"] .tab-content-slot { visibility: hidden; }
.screen[data-state="error"] #error-overlay { display: flex; }

/* Small helper */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<!-- ============================================================
     Control Panel
     ============================================================ -->
<section class="control-panel" aria-label="Prototype Control Panel">
  <div class="row">
    <span class="label">Screen</span>
    <select id="screen-select" disabled>
      <option value="MyProfileScreen">MyProfileScreen (app-003)</option>
    </select>
    <span class="breadcrumb">Route: <code>Main/Profile</code></span>
  </div>
  <div class="row">
    <span class="label">State</span>
    <button class="state-btn active" data-state="public-tab-default">public-tab-default</button>
    <button class="state-btn" data-state="public-tab-empty">public-tab-empty</button>
    <button class="state-btn" data-state="private-tab">private-tab</button>
    <button class="state-btn" data-state="liked-tab-empty">liked-tab-empty</button>
    <button class="state-btn" data-state="loading">loading</button>
    <button class="state-btn" data-state="error">error</button>
  </div>
  <div class="row breadcrumb" id="breadcrumb-row">
    <span class="label">Flow</span>
    <span id="breadcrumb">MyProfileScreen</span>
  </div>
</section>

<!-- ============================================================
     Device Frame
     ============================================================ -->
<div class="device-frame" aria-label="iPhone 14 Pro preview">
  <div class="notch" aria-hidden="true"></div>

  <!-- MyProfileScreen -->
  <section class="screen" id="MyProfileScreen" data-state="public-tab-default" role="region" aria-label="MY 프로필 화면">

    <!-- Header -->
    <header class="header-bar">
      <h1 class="header-title" id="header-nickname">밈덕후99</h1>
      <button class="icon-btn" id="nav-settings" aria-label="설정" title="설정">
        <!-- gear svg -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Scroll Area (contains profile header + sticky tab bar + content) -->
    <div class="scroll-area">

      <!-- Profile Header §3 -->
      <section class="profile-header" aria-label="프로필 정보">
        <div class="avatar-100" role="img" aria-label="내 프로필 이미지">밈</div>
        <h2 class="nickname" id="profile-nickname">밈덕후99</h2>

        <ul class="count-row" aria-label="팔로워 팔로잉 재생성된 카운트">
          <li class="count-tile">
            <span class="count-value" id="count-followers">0</span>
            <span class="count-label">팔로워</span>
          </li>
          <li class="count-tile">
            <span class="count-value" id="count-following">0</span>
            <span class="count-label">팔로잉</span>
          </li>
          <li class="count-tile">
            <span class="count-value" id="count-regenerated">1.2만</span>
            <span class="count-label">재생성된</span>
          </li>
        </ul>

        <div class="dual-btn">
          <button class="btn-gray" id="btn-edit-profile" aria-label="프로필 편집">프로필 편집</button>
          <button class="btn-gray" id="btn-share-profile" aria-label="프로필 공유">프로필 공유</button>
        </div>
      </section>

      <!-- Icon-only 3-Tab Bar §3 -->
      <nav class="tab-bar" role="tablist" aria-label="프로필 콘텐츠 탭">
        <button class="tab-item" role="tab" data-tab="public" aria-selected="true" aria-label="공개 게시물">
          <!-- grid icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="tab-item" role="tab" data-tab="private" aria-selected="false" aria-label="비공개 게시물">
          <!-- lock icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="11" width="16" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </button>
        <button class="tab-item" role="tab" data-tab="liked" aria-selected="false" aria-label="좋아요 게시물">
          <!-- heart icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/>
          </svg>
        </button>
      </nav>

      <!-- Tab Content Slot -->
      <div class="tab-content-slot">

<script>
/* ============================================================
 * Prototype State Controller
 * ============================================================ */
(function(){
  const screen = document.getElementById('MyProfileScreen');
  const stateBtns = document.querySelectorAll('.state-btn');
  const tabItems = document.querySelectorAll('.tab-item');
  const tabPanels = document.querySelectorAll('.tab-panel');
  const breadcrumb = document.getElementById('breadcrumb');
  const toast = document.getElementById('toast');

  const STATE_TO_TAB = {
    'public-tab-default': 'public',
    'public-tab-empty':   'public',
    'private-tab':        'private',
    'liked-tab-empty':    'liked',
    'loading':            null,
    'error':              null,
  };

  // Breadcrumb history
  let trail = ['MyProfileScreen'];
  function pushTrail(node) {
    trail.push(node);
    breadcrumb.textContent = trail.join(' → ');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  function setTab(tabKey) {
    tabItems.forEach(b => b.setAttribute('aria-selected', String(b.dataset.tab === tabKey)));
    tabPanels.forEach(p => p.classList.toggle('active', p.dataset.tabPanel === tabKey));
  }

  function applyPublicVariant(state) {
    const populated = screen.querySelector('[data-feed="public-populated"]');
    const empty     = screen.querySelector('[data-feed="public-empty"]');
    if (state === 'public-tab-empty') {
      populated.hidden = true;
      empty.hidden = false;
      // Also zero out counts visually to reflect "both 0" scenario
      document.getElementById('count-regenerated').textContent = '0';
    } else {
      populated.hidden = false;
      empty.hidden = true;
      document.getElementById('count-regenerated').textContent = '1.2만';
    }
  }

  function setState(state) {
    screen.setAttribute('data-state', state);
    stateBtns.forEach(b => b.classList.toggle('active', b.dataset.state === state));
    const tab = STATE_TO_TAB[state];
    if (tab) setTab(tab);
    applyPublicVariant(state);
  }

  stateBtns.forEach(b => {
    b.addEventListener('click', () => {
      setState(b.dataset.state);
      pushTrail('state:' + b.dataset.state);
    });
  });

  tabItems.forEach(b => {
    b.addEventListener('click', () => {
      const t = b.dataset.tab;
      if (t === 'public') {
        // default variant, counts-populated
        setState('public-tab-default');
      } else if (t === 'private') {
        setState('private-tab');
      } else if (t === 'liked') {
        setState('liked-tab-empty');
      }
      pushTrail('tab:' + t);
    });
  });

  // Navigation entry points
  document.getElementById('nav-settings').addEventListener('click', () => {
    showToast('→ Settings 라우트 (app-004)');
    pushTrail('SettingsScreen');
  });
  document.getElementById('btn-edit-profile').addEventListener('click', () => {
    showToast('→ 프로필 편집 (app-005)');
    pushTrail('EditProfileScreen');
  });
  document.getElementById('btn-share-profile').addEventListener('click', () => {
    showToast('→ 프로필 공유 (app-007)');
    pushTrail('ShareProfileSheet');
  });
  document.getElementById('btn-retry').addEventListener('click', () => {
    setState('loading');
    pushTrail('retry→loading');
    setTimeout(() => setState('public-tab-default'), 900);
  });

  // Init
  setState('public-tab-default');
})();
</script>
