<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>app-004 · 설정 화면 Prototype</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens (inlined from prototypes/context/tokens.css) === */
    :root {
      /* Primitive */
      --wds-color-neutral-0: #FFFFFF;
      --wds-color-neutral-50: #F7F8F9;
      --wds-color-neutral-100: #F0F1F3;
      --wds-color-neutral-200: #E4E5E9;
      --wds-color-neutral-500: #8E9199;
      --wds-color-neutral-600: #6B6E76;
      --wds-color-neutral-900: #212228;
      --wds-color-purple-500: #8752FA;

      /* Semantic */
      --wds-background-normal: var(--wds-color-neutral-0);
      --wds-surface-secondary: var(--wds-color-neutral-50);
      --wds-surface-button: #F1F1F1;
      --wds-label-normal: var(--wds-color-neutral-900);
      --wds-label-alternative: var(--wds-color-neutral-600);
      --wds-label-assistive: var(--wds-color-neutral-500);
      --wds-line-normal: var(--wds-color-neutral-200);
      --wds-line-alternative: var(--wds-color-neutral-100);
      --wds-fill-brand-primary: var(--wds-color-purple-500);

      /* Figma aliases (component-patterns.md §4 Settings + §공통 토큰) */
      --wds-text-primary: #262626;
      --wds-text-secondary: #656565;
      --wds-text-tertiary: #8A8A8A;
      --wds-section-divider: #F7F7F7;
      --wds-outline-primary: #F1F1F1;

      /* Typography */
      --wds-font-family-primary: 'Pretendard', -apple-system, 'SF Pro Display', 'Apple SD Gothic Neo', sans-serif;
      --wds-font-weight-medium: 500;
      --wds-font-weight-semibold: 600;

      /* Radius + Spacing */
      --wds-radius-lg: 16px;
      --wds-radius-full: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--wds-font-family-primary);
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: var(--wds-label-normal);
    }

    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .control-panel__row { display: flex; align-items: center; gap: 8px; }
    .control-panel__label { color: #888; font-size: 11px; min-width: 48px; }
    .control-panel select {
      background: #2a2a3e; color: #e0e0e0; border: 1px solid #444;
      border-radius: 6px; padding: 4px 8px; font-size: 12px; flex: 1;
    }
    .control-panel__states { display: flex; gap: 4px; flex-wrap: wrap; }
    .control-panel__state-btn {
      background: #2a2a3e; color: #888; border: 1px solid #444;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
      transition: all 0.15s;
    }
    .control-panel__state-btn.active {
      background: var(--wds-fill-brand-primary); color: #fff;
      border-color: var(--wds-fill-brand-primary);
    }
    .control-panel__breadcrumb { color: #888; font-size: 11px; font-family: monospace; }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--wds-background-normal);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--wds-background-normal);
    }
    .screen.active { display: flex; }

    /* === Transitions === */
    @keyframes slideLeftIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideRightIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideUpIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .transition-slide-left { animation: slideLeftIn 0.3s ease-out; }
    .transition-slide-right { animation: slideRightIn 0.3s ease-out; }
    .transition-slide-up { animation: slideUpIn 0.3s ease-out; }
    .transition-fade { animation: fadeIn 0.2s ease-out; }

    /* === State Containers === */
    [data-state] { display: none; }
    [data-state].state-active { display: flex; }

    /* =====================================================================
     * Screen: Status Bar
     * ===================================================================*/
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 14px;
      font-weight: var(--wds-font-weight-semibold);
      color: var(--wds-text-primary);
      flex-shrink: 0;
    }
    .status-bar__icons { display: flex; gap: 6px; font-size: 12px; letter-spacing: 1px; }

    /* =====================================================================
     * Screen Header (shared)
     * ===================================================================*/
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      background: var(--wds-background-normal);
      border-bottom: 1px solid var(--wds-line-alternative);
      flex-shrink: 0;
      position: relative;
    }
    .header__back {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--wds-text-primary);
    }
    .header__title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: var(--wds-font-weight-semibold);
      color: var(--wds-text-primary);
      letter-spacing: -0.2px;
    }

    /* =====================================================================
     * Settings Body (§4 Settings Screen)
     * ===================================================================*/
    .settings-body {
      flex: 1;
      overflow-y: auto;
      background: var(--wds-background-normal);
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      background: var(--wds-background-normal);
    }

    .settings-row {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 12px 20px;
      background: var(--wds-background-normal);
      border: 0;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.12s;
    }
    .settings-row:active { background: rgba(0,0,0,0.04); }

    .settings-row__label {
      font-size: 16px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--wds-text-primary);
      line-height: 1.5;
    }

    .settings-row__chevron {
      font-size: 16px;
      color: var(--wds-label-assistive);
      font-weight: 300;
      line-height: 1;
    }

    .settings-row__value {
      font-size: 14px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--wds-text-tertiary);
      line-height: 1.4;
    }

    /* Section divider: 12px 높이 #F7F7F7 배경 블록 (§4) */
    .section-divider {
      height: 12px;
      background: var(--wds-section-divider);
      flex-shrink: 0;
    }

    /* =====================================================================
     * Logout bottom-fixed button (§4)
     * ===================================================================*/
    .bottom-action {
      padding: 16px 20px 34px;
      background: var(--wds-background-normal);
      flex-shrink: 0;
    }
    .btn-logout {
      width: 100%;
      height: 56px;
      border-radius: var(--wds-radius-lg);
      background: var(--wds-surface-button);
      color: var(--wds-text-secondary);
      font-size: 18px;
      font-weight: var(--wds-font-weight-semibold);
      font-family: inherit;
      border: 0;
      cursor: pointer;
      transition: background-color 0.12s;
    }
    .btn-logout:active { background: #E8E8E8; }

    /* =====================================================================
     * Coming Soon placeholder (단순 '준비 중' — 임의 문구 금지)
     * ===================================================================*/
    .coming-soon-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--wds-background-normal);
    }
    .coming-soon-notice {
      font-size: 16px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--wds-text-tertiary);
      line-height: 1.5;
    }

    /* === Responsive: collapse panel on small viewport === */
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; min-height: 100dvh; }
      .control-panel { display: none; }
      .device-frame {
        width: 100dvw;
        height: 100dvh;
        border: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-panel__row">
      <span class="control-panel__label">Screen</span>
      <select id="screen-select" onchange="navigateBySelect(this.value)">
        <option value="SettingsScreen">SettingsScreen</option>
        <option value="NotificationSettingsPlaceholder">NotificationSettingsPlaceholder</option>
        <option value="BlockManagementPlaceholder">BlockManagementPlaceholder</option>
      </select>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">State</span>
      <div class="control-panel__states" id="state-toggles">
        <!-- populated by JS based on active screen -->
      </div>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">Path</span>
      <span class="control-panel__breadcrumb" id="breadcrumb">SettingsScreen</span>
    </div>
  </div>

  <!-- Device Frame -->
  <div class="device-frame" id="device-frame">

    <!-- =================================================================
         Screen: SettingsScreen
         ================================================================= -->
    <section class="screen" id="SettingsScreen" data-screen-states='["default"]'>
      <div class="status-bar">
        <span>9:41</span>
        <span class="status-bar__icons">●●●● 􀙇 􀛨</span>
      </div>
      <header class="header">
        <button class="header__back" id="settings-back-button" aria-label="뒤로">←</button>
        <h1 class="header__title">설정</h1>
      </header>

      <main class="settings-body" id="settings-body">
        <!-- Section 1: 계정 / 비밀번호 -->
        <section class="settings-section" id="sec-account">
          <button class="settings-row" id="row-account" aria-label="계정">
            <span class="settings-row__label">계정</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
          <button class="settings-row" id="row-password" aria-label="비밀번호">
            <span class="settings-row__label">비밀번호</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
        </section>

        <div class="section-divider" id="divider-1" aria-hidden="true"></div>

        <!-- Section 2: 이용약관 / 개인정보 -->
        <section class="settings-section" id="sec-info">
          <button class="settings-row" id="row-terms" aria-label="서비스 이용 약관">
            <span class="settings-row__label">서비스 이용 약관</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
          <button class="settings-row" id="row-privacy" aria-label="개인정보 처리방침">
            <span class="settings-row__label">개인정보 처리방침</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
        </section>

        <div class="section-divider" id="divider-2" aria-hidden="true"></div>

        <!-- Section 3: 알림 설정 / 차단 관리 (Phase 3 placeholder 진입점) -->
        <section class="settings-section" id="sec-prefs">
          <button class="settings-row" id="row-notification" aria-label="알림 설정">
            <span class="settings-row__label">알림 설정</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
          <button class="settings-row" id="row-block" aria-label="차단 관리">
            <span class="settings-row__label">차단 관리</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
        </section>

        <div class="section-divider" id="divider-3" aria-hidden="true"></div>

        <!-- Section 4: 탈퇴하기 / 앱버전 -->
        <section class="settings-section" id="sec-account-mgmt">
          <button class="settings-row" id="row-withdraw" aria-label="탈퇴하기">
            <span class="settings-row__label">탈퇴하기</span>
            <span class="settings-row__chevron" aria-hidden="true">›</span>
          </button>
          <div class="settings-row" id="row-version" role="text" aria-label="앱버전 1.42.0" style="cursor:default;">
            <span class="settings-row__label">앱버전</span>
            <span class="settings-row__value">1.42.0</span>
          </div>
        </section>
      </main>

      <div class="bottom-action">
        <button class="btn-logout" id="btn-logout" aria-label="로그아웃">로그아웃</button>
      </div>
    </section>

    <!-- =================================================================
         Screen: NotificationSettingsPlaceholder (ComingSoonScreen variant)
         ================================================================= -->
    <section class="screen" id="NotificationSettingsPlaceholder" data-screen-states='["coming-soon-notification"]'>
      <div class="status-bar">
        <span>9:41</span>
        <span class="status-bar__icons">●●●● 􀙇 􀛨</span>
      </div>
      <header class="header">
        <button class="header__back" id="notif-back-button" aria-label="뒤로">←</button>
        <h1 class="header__title">알림 설정</h1>
      </header>
      <main class="coming-soon-body">
        <p class="coming-soon-notice">준비 중</p>
      </main>
    </section>

    <!-- =================================================================
         Screen: BlockManagementPlaceholder (ComingSoonScreen variant)
         ================================================================= -->
    <section class="screen" id="BlockManagementPlaceholder" data-screen-states='["coming-soon-block"]'>
      <div class="status-bar">
        <span>9:41</span>
        <span class="status-bar__icons">●●●● 􀙇 􀛨</span>
      </div>
      <header class="header">
        <button class="header__back" id="block-back-button" aria-label="뒤로">←</button>
        <h1 class="header__title">차단 관리</h1>
      </header>
      <main class="coming-soon-body">
        <p class="coming-soon-notice">준비 중</p>
      </main>
    </section>

  </div>

  <script>
    // =====================================================================
    // State
    // =====================================================================
    let currentScreen = null;
    let currentState = 'default';
    const navHistory = [];

    const SCREEN_STATES = {
      SettingsScreen: ['default'],
      NotificationSettingsPlaceholder: ['coming-soon-notification'],
      BlockManagementPlaceholder: ['coming-soon-block'],
    };

    // =====================================================================
    // Navigation
    // =====================================================================
    function navigate(screenId, transition = 'slide-left') {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        navHistory.push(currentScreen.id);
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active');
      if (transition && transition !== 'none') {
        target.classList.add('transition-' + transition);
        target.addEventListener('animationend', function handler() {
          target.classList.remove('transition-' + transition);
          target.removeEventListener('animationend', handler);
        });
      }

      currentScreen = target;
      const defaultState = (SCREEN_STATES[screenId] || ['default'])[0];
      currentState = defaultState;
      updateControlPanel();
    }

    function goBack() {
      if (navHistory.length === 0) {
        // No history — return to SettingsScreen if already there, else do nothing
        return;
      }
      const prevId = navHistory.pop();
      const target = document.getElementById(prevId);
      if (!target) return;

      if (currentScreen) currentScreen.classList.remove('active');

      target.classList.add('active', 'transition-slide-right');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-slide-right');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      currentState = (SCREEN_STATES[prevId] || ['default'])[0];
      updateControlPanel();
    }

    function navigateBySelect(screenId) {
      navHistory.length = 0;
      if (currentScreen) currentScreen.classList.remove('active');
      navigate(screenId, 'fade');
    }

    // =====================================================================
    // Control Panel
    // =====================================================================
    function updateControlPanel() {
      if (!currentScreen) return;
      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) {
        const path = [...navHistory, currentScreen.id].join(' → ');
        breadcrumb.textContent = path;
      }

      renderStateButtons();
    }

    function renderStateButtons() {
      const container = document.getElementById('state-toggles');
      if (!container || !currentScreen) return;
      const states = SCREEN_STATES[currentScreen.id] || ['default'];
      container.innerHTML = '';
      states.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'control-panel__state-btn' + (s === currentState ? ' active' : '');
        btn.dataset.state = s;
        btn.textContent = s;
        btn.addEventListener('click', () => {
          currentState = s;
          renderStateButtons();
        });
        container.appendChild(btn);
      });
    }

    // =====================================================================
    // Init + Event Bindings (from Screen Spec interactions)
    // =====================================================================
    document.addEventListener('DOMContentLoaded', () => {
      // Boot first screen
      const firstScreen = document.getElementById('SettingsScreen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        currentState = 'default';
        updateControlPanel();
      }

      // --- SettingsScreen interactions ---
      document.getElementById('settings-back-button')
        .addEventListener('click', () => goBack());

      document.getElementById('row-account')
        .addEventListener('click', () => alert('계정 화면은 기존 auth 플로우 재사용 (prototype scope 외)'));
      document.getElementById('row-password')
        .addEventListener('click', () => alert('비밀번호 화면은 기존 auth 플로우 재사용 (prototype scope 외)'));
      document.getElementById('row-terms')
        .addEventListener('click', () => alert('서비스 이용 약관 — 기존 webview-routes 재사용'));
      document.getElementById('row-privacy')
        .addEventListener('click', () => alert('개인정보 처리방침 — 기존 webview-routes 재사용'));
      document.getElementById('row-notification')
        .addEventListener('click', () => navigate('NotificationSettingsPlaceholder', 'slide-left'));
      document.getElementById('row-block')
        .addEventListener('click', () => navigate('BlockManagementPlaceholder', 'slide-left'));
      document.getElementById('row-withdraw')
        .addEventListener('click', () => alert('탈퇴하기 — 기존 WithdrawConfirmSheet 재사용'));

      document.getElementById('btn-logout')
        .addEventListener('click', () => alert('로그아웃 — 기존 로그아웃 확인 플로우 재사용'));

      // --- ComingSoon placeholders ---
      document.getElementById('notif-back-button')
        .addEventListener('click', () => goBack());
      document.getElementById('block-back-button')
        .addEventListener('click', () => goBack());
    });
  </script>

</body>
</html>
