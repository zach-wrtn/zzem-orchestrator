<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>app-004 · 설정 화면 Prototype (Figma-aligned)</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens (inlined from prototypes/context/tokens.css) === */
    :root {
      /* Primitive */
      --wds-color-neutral-0: #FFFFFF;
      --wds-color-neutral-50: #F7F8F9;
      --wds-color-neutral-100: #F0F1F3;
      --wds-color-neutral-200: #E4E5E9;
      --wds-color-neutral-500: #8E9199;
      --wds-color-neutral-600: #6B6E76;
      --wds-color-neutral-900: #212228;
      --wds-color-purple-500: #8752FA;

      /* Semantic (existing) */
      --wds-background-normal: var(--wds-color-neutral-0);
      --wds-surface-secondary: var(--wds-color-neutral-50);
      --wds-surface-button: #F1F1F1;
      --wds-label-normal: var(--wds-color-neutral-900);
      --wds-label-alternative: var(--wds-color-neutral-600);
      --wds-label-assistive: var(--wds-color-neutral-500);
      --wds-line-normal: var(--wds-color-neutral-200);
      --wds-line-alternative: var(--wds-color-neutral-100);
      --wds-fill-brand-primary: var(--wds-color-purple-500);

      /* Figma-verified aliases (Settings frame 375×812) */
      --background_primary: #FFFFFF;
      --surface_white: #FFFFFF;
      --surface_button: #F1F1F1;
      --surface_secondary: #F7F7F7;   /* section divider grey block */
      --outline_primary: #F1F1F1;     /* Google badge border */
      --text_primary: #262626;
      --text_secondary: #656565;      /* logout label */
      --text_tertiary: #8A8A8A;       /* email, app-version value, "준비 중" */

      /* Typography */
      --wds-font-family-primary: 'Pretendard', -apple-system, 'SF Pro Display', 'Apple SD Gothic Neo', sans-serif;
      --wds-font-weight-medium: 500;
      --wds-font-weight-semibold: 600;

      /* Radius */
      --wds-radius-lg: 16px;
      --wds-radius-full: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--wds-font-family-primary);
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: var(--text_primary);
    }

    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .control-panel__row { display: flex; align-items: center; gap: 8px; }
    .control-panel__label { color: #888; font-size: 11px; min-width: 48px; }
    .control-panel select {
      background: #2a2a3e; color: #e0e0e0; border: 1px solid #444;
      border-radius: 6px; padding: 4px 8px; font-size: 12px; flex: 1;
    }
    .control-panel__states { display: flex; gap: 4px; flex-wrap: wrap; }
    .control-panel__state-btn {
      background: #2a2a3e; color: #888; border: 1px solid #444;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
      transition: all 0.15s;
    }
    .control-panel__state-btn.active {
      background: var(--wds-fill-brand-primary); color: #fff;
      border-color: var(--wds-fill-brand-primary);
    }
    .control-panel__breadcrumb { color: #888; font-size: 11px; font-family: monospace; }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--background_primary);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--background_primary);
    }
    .screen.active { display: flex; }

    /* === Transitions === */
    @keyframes slideLeftIn  { from { transform: translateX(100%); }  to { transform: translateX(0); } }
    @keyframes slideRightIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideUpIn    { from { transform: translateY(100%); }  to { transform: translateY(0); } }
    @keyframes fadeIn       { from { opacity: 0; } to { opacity: 1; } }
    .transition-slide-left  { animation: slideLeftIn  0.3s ease-out; }
    .transition-slide-right { animation: slideRightIn 0.3s ease-out; }
    .transition-slide-up    { animation: slideUpIn    0.3s ease-out; }
    .transition-fade        { animation: fadeIn       0.2s ease-out; }

    /* =====================================================================
     * Status Bar
     * ===================================================================*/
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 14px;
      font-weight: var(--wds-font-weight-semibold);
      color: var(--text_primary);
      flex-shrink: 0;
    }
    .status-bar__icons { display: flex; gap: 6px; font-size: 12px; letter-spacing: 1px; }

    /* =====================================================================
     * HeaderBar (Figma: h-48, pl-12 pr-44 py-4, no right icon; pr reserves balance)
     * ===================================================================*/
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 44px 4px 12px;
      background: var(--background_primary);
      flex-shrink: 0;
    }
    .header__back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text_primary);
      flex-shrink: 0;
    }
    .header__back svg { display: block; }
    .header__title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: var(--wds-font-weight-semibold);
      color: var(--text_primary);
      letter-spacing: -0.2px;
      line-height: 1.4;
      /* Compensate for the 44px right padding so title sits visually centered
         relative to the 40px back button width (12 + 40 = 52 vs 44 → ~8px) */
      margin-right: -8px;
    }

    /* =====================================================================
     * Settings Body
     * ===================================================================*/
    .settings-body {
      flex: 1;
      overflow-y: auto;
      background: var(--background_primary);
      display: flex;
      flex-direction: column;
      padding-top: 20px;  /* Figma pt-20 */
      gap: 0;             /* groups separated by 12px divider, not flex gap */
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      background: var(--background_primary);
    }

    /* Default row: pl-20, pr-16, py-12 */
    .settings-row {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 12px 20px;
      background: var(--surface_white);
      border: 0;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.12s;
    }
    .settings-row--value {
      /* 앱 버전 + 계정 row: pr-24 (right padding 24px) */
      padding-right: 24px;
      cursor: default;
    }
    .settings-row:active:not(.settings-row--value) { background: rgba(0,0,0,0.04); }

    .settings-row__label {
      font-size: 16px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--text_primary);
      line-height: 1.5;
    }

    .settings-row__right {
      display: flex;
      align-items: center;
      gap: 4px;  /* Figma: badge-to-email gap 4px */
    }

    .settings-row__chevron {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text_tertiary);
      flex-shrink: 0;
    }

    .settings-row__email {
      font-size: 16px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--text_tertiary);
      line-height: 1.5;
    }

    .settings-row__version {
      font-size: 14px;
      font-weight: var(--wds-font-weight-semibold);
      color: var(--text_tertiary);
      line-height: 1.4;
    }

    /* Google badge: 20×20 circle, white bg, 0.833px outline_primary border, 10×10 G */
    .google-badge {
      width: 20px;
      height: 20px;
      border-radius: var(--wds-radius-full);
      background: var(--surface_white);
      border: 0.833px solid var(--outline_primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .google-badge svg { display: block; }

    /* Thick divider: 12px × 100%, #F7F7F7 */
    .section-divider {
      height: 12px;
      width: 100%;
      background: var(--surface_secondary);
      flex-shrink: 0;
    }

    /* Put 16px spacing between first group and first divider? Figma uses gap-16
       between inner section blocks. Apply as margin-top on dividers 2+/etc. by
       inserting explicit blocks — we keep structure flat to match Figma. */

    /* =====================================================================
     * Bottom logout button (Figma: pb-32 pt-16 px-16)
     * ===================================================================*/
    .bottom-action {
      padding: 16px 16px 32px;
      background: var(--background_primary);
      flex-shrink: 0;
    }
    .btn-logout {
      width: 100%;
      height: 56px;
      border-radius: var(--wds-radius-lg);
      background: var(--surface_button);
      color: var(--text_secondary);
      font-size: 18px;
      font-weight: var(--wds-font-weight-semibold);
      font-family: inherit;
      border: 0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.12s;
    }
    .btn-logout:active { background: #E8E8E8; }

    /* =====================================================================
     * Coming Soon placeholder
     * ===================================================================*/
    .coming-soon-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--background_primary);
    }
    .coming-soon-notice {
      font-size: 16px;
      font-weight: var(--wds-font-weight-medium);
      color: var(--text_tertiary);
      line-height: 1.5;
    }

    /* === Responsive === */
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; min-height: 100dvh; }
      .control-panel { display: none; }
      .device-frame {
        width: 100dvw;
        height: 100dvh;
        border: none;
        border-radius: 0;
      }
    }
  </style>
</head>

  <script>
    // =====================================================================
    // State
    // =====================================================================
    let currentScreen = null;
    let currentState = 'default';
    const navHistory = [];

    const SCREEN_STATES = {
      SettingsScreen: ['default'],
      NotificationPlaceholder: ['coming-soon'],
      BlockPlaceholder: ['coming-soon'],
      CustomerServicePlaceholder: ['coming-soon'],
    };

    // =====================================================================
    // Navigation
    // =====================================================================
    function navigate(screenId, transition = 'slide-left') {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        navHistory.push(currentScreen.id);
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active');
      if (transition && transition !== 'none') {
        target.classList.add('transition-' + transition);
        target.addEventListener('animationend', function handler() {
          target.classList.remove('transition-' + transition);
          target.removeEventListener('animationend', handler);
        });
      }

      currentScreen = target;
      currentState = (SCREEN_STATES[screenId] || ['default'])[0];
      updateControlPanel();
    }

    function goBack() {
      if (navHistory.length === 0) return;
      const prevId = navHistory.pop();
      const target = document.getElementById(prevId);
      if (!target) return;

      if (currentScreen) currentScreen.classList.remove('active');
      target.classList.add('active', 'transition-slide-right');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-slide-right');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      currentState = (SCREEN_STATES[prevId] || ['default'])[0];
      updateControlPanel();
    }

    function navigateBySelect(screenId) {
      navHistory.length = 0;
      if (currentScreen) currentScreen.classList.remove('active');
      navigate(screenId, 'fade');
    }

    // =====================================================================
    // Control Panel
    // =====================================================================
    function updateControlPanel() {
      if (!currentScreen) return;
      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) breadcrumb.textContent = [...navHistory, currentScreen.id].join(' → ');

      renderStateButtons();
    }

    function renderStateButtons() {
      const container = document.getElementById('state-toggles');
      if (!container || !currentScreen) return;
      const states = SCREEN_STATES[currentScreen.id] || ['default'];
      container.innerHTML = '';
      states.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'control-panel__state-btn' + (s === currentState ? ' active' : '');
        btn.dataset.state = s;
        btn.textContent = s;
        btn.addEventListener('click', () => { currentState = s; renderStateButtons(); });
        container.appendChild(btn);
      });
    }

    // =====================================================================
    // Init + Event Bindings
    // =====================================================================
    document.addEventListener('DOMContentLoaded', () => {
      const firstScreen = document.getElementById('SettingsScreen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        currentState = 'default';
        updateControlPanel();
      }

      // Back buttons (Settings root + placeholders)
      document.getElementById('btn-back').addEventListener('click', () => goBack());
      document.querySelectorAll('[data-back]').forEach(el => el.addEventListener('click', () => goBack()));

      // Menu routing (keyed by data-menu)
      const MENU_ROUTES = {
        account:            () => alert('계정 화면은 기존 auth 플로우 재사용 (prototype scope 외)'),
        password:           () => alert('비밀번호 화면은 기존 auth 플로우 재사용 (prototype scope 외)'),
        notifications:      () => navigate('NotificationPlaceholder', 'slide-left'),
        block:              () => navigate('BlockPlaceholder', 'slide-left'),
        'customer-service': () => navigate('CustomerServicePlaceholder', 'slide-left'),
        terms:              () => alert('서비스 이용약관 — 기존 webview-routes 재사용'),
        privacy:            () => alert('개인정보 처리방침 — 기존 webview-routes 재사용'),
        withdraw:           () => alert('탈퇴하기 — 기존 WithdrawConfirmSheet 재사용'),
      };

      document.querySelectorAll('[data-menu]').forEach(el => {
        const key = el.getAttribute('data-menu');
        if (key === 'account') return; // 계정 row is display-only per Figma (no chevron, shows email)
        const handler = MENU_ROUTES[key];
        if (handler) el.addEventListener('click', handler);
      });

      document.getElementById('btn-logout')
        .addEventListener('click', () => alert('로그아웃 — 기존 로그아웃 확인 플로우 재사용'));
    });
  </script>

</body>
</html>
