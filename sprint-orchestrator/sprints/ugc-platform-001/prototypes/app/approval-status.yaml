# ─────────────────────────────────────────────────────────────────────────
# PRD Drift Discoveries (Phase 3.4 Amendment 대상)
# ─────────────────────────────────────────────────────────────────────────
prd_drift:
  - id: DRIFT-01
    source: figma 37174:21780 (Settings)
    finding: "'고객센터' 메뉴 행이 Figma Settings에 존재. PRD §4 Settings 7메뉴 목록에는 없음."
    impact: "Settings 메뉴 8개로 증가. ComingSoon placeholder로 라우팅 예정."
    resolution: "Phase 3.4 PRD Amendment에서 §4 목록에 추가. destination/라우팅 정책 사용자 확인 필요."
  - id: DRIFT-02
    source: figma 37160:78423 (Other User Profile)
    finding: "카운트 라벨이 '팔로워/팔로잉/재생성된' (MY 프로필과 동일). baseline v1에는 '게시물/팔로워/팔로잉'으로 오기재."
    impact: "MY·Other 두 화면이 동일 count row 패턴. PRD §6 Other User Profile 명세 텍스트 정합성 필요."
    resolution: "Phase 3.4 PRD Amendment에서 PRD §6 카운트 항목 명시."
  - id: DRIFT-03
    source: figma 37160:79939 (Profile Edit - disabled state)
    finding: "Save 버튼 disabled 상태 텍스트 컬러 #C5C5C5. Baseline은 #262626이라 활성처럼 보였음."
    impact: "Dirty-state CTA 시각 구분 명확화."
    resolution: "이미 revision에서 반영. PRD 변경 불필요, token 추가(--text_placeholder_disable)로 관리."
