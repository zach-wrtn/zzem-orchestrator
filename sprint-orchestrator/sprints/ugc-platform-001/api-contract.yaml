openapi: "3.0.3"
info:
  title: "UGC Platform API Contract"
  version: "1.0.0"
  description: |
    Sprint: ugc-platform-001
    PRD: PRD-001-ugc-platform.md
    SSOT for BE/FE implementation.

servers:
  - url: /meme/v1

paths:
  # ─── Group 001: Profile ───────────────────────────────
  /profiles/me:
    get:
      operationId: getMyProfile
      summary: 내 프로필 조회
      tags: [Profile]
      security: [{ userAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

    patch:
      operationId: updateMyProfile
      summary: 프로필 편집 (닉네임, 프로필 이미지)
      tags: [Profile]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: "닉네임 유효성 실패 (빈 문자열, 20자 초과)"

  /profiles/{userId}:
    get:
      operationId: getUserProfile
      summary: 타 유저 프로필 조회
      tags: [Profile]
      security: [{ optionalAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileResponse"
        "404":
          description: 유저 없음

  /profiles/me/share-url:
    get:
      operationId: getProfileShareUrl
      summary: 프로필 공유 딥링크 URL 생성
      tags: [Profile]
      security: [{ userAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareUrl:
                    type: string
                    example: "https://zzem.app/profile/abc123"

  # ─── Group 002: Feed Publish ──────────────────────────
  /contents/{contentId}/visibility:
    patch:
      operationId: toggleContentVisibility
      summary: 콘텐츠 공개/비공개 전환
      tags: [FeedPublish]
      security: [{ userAuth: [] }]
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [isPublished]
              properties:
                isPublished:
                  type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVisibilityResponse"
        "400":
          description: "커스텀 프롬프트 콘텐츠 공개 불가"
        "403":
          description: "본인 콘텐츠가 아님"

  /contents/me:
    get:
      operationId: getMyContents
      summary: 내 콘텐츠 목록 조회 (탭별)
      tags: [FeedPublish]
      security: [{ userAuth: [] }]
      parameters:
        - name: tab
          in: query
          required: true
          schema:
            type: string
            enum: [published, private, liked]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /contents/{userId}/published:
    get:
      operationId: getUserPublishedContents
      summary: 타 유저 공개 콘텐츠 목록
      tags: [FeedPublish]
      security: [{ optionalAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  # ─── Group 003: Likes ─────────────────────────────────
  /likes:
    put:
      operationId: toggleLike
      summary: 좋아요 토글
      tags: [Like]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [contentId]
              properties:
                contentId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToggleLikeResponse"

  /likes/me:
    get:
      operationId: getMyLikedContents
      summary: 내가 좋아요한 콘텐츠 목록 (좋아요 시점 최신순)
      tags: [Like]
      security: [{ userAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  # ─── Group 004: Follow ────────────────────────────────
  /follows:
    post:
      operationId: followUser
      summary: 유저 팔로우
      tags: [Follow]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"
        "400":
          description: "자기 자신 팔로우 불가"

    delete:
      operationId: unfollowUser
      summary: 유저 언팔로우
      tags: [Follow]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"

  /follows/me/followers:
    get:
      operationId: getMyFollowers
      summary: 내 팔로워 목록 (가나다순)
      tags: [Follow]
      security: [{ userAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowListResponse"

  /follows/me/followings:
    get:
      operationId: getMyFollowings
      summary: 내 팔로잉 목록 (가나다순)
      tags: [Follow]
      security: [{ userAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowListResponse"

  /follows/status/{targetUserId}:
    get:
      operationId: getFollowStatus
      summary: 특정 유저와의 팔로우 상태 조회
      tags: [Follow]
      security: [{ userAuth: [] }]
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"

  # ─── Group 005: Credit Payback ────────────────────────
  /payback/config:
    get:
      operationId: getPaybackConfig
      summary: 페이백 설정 조회 (비율 등)
      tags: [CreditPayback]
      security: [{ userAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  paybackRate:
                    type: number
                    example: 0.01
                  minPaybackRate:
                    type: number
                    example: 0.001

  # Payback trigger는 기존 meme generation flow 내부에서 처리 (별도 endpoint 불필요)
  # Credit history는 기존 /credit/history endpoint 활용

  # ─── Group 006: Block & Report & Social ───────────────
  /blocks:
    post:
      operationId: blockUser
      summary: 유저 차단
      tags: [Social]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocked:
                    type: boolean
                    example: true

    delete:
      operationId: unblockUser
      summary: 차단 해제
      tags: [Social]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocked:
                    type: boolean
                    example: false

  /blocks/me:
    get:
      operationId: getBlockedUsers
      summary: 내가 차단한 유저 목록
      tags: [Social]
      security: [{ userAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedUserListResponse"

  /reports:
    post:
      operationId: reportUser
      summary: 유저/콘텐츠 신고
      tags: [Social]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Created

  /feedbacks:
    post:
      operationId: sendFeedback
      summary: 의견 보내기
      tags: [Social]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId, message]
              properties:
                targetUserId:
                  type: string
                contentId:
                  type: string
                message:
                  type: string
                  maxLength: 300
      responses:
        "201":
          description: Created

  # ─── Group 007: Notifications ─────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      summary: 알림 목록 조회
      tags: [Notification]
      security: [{ userAuth: [] }]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      summary: 알림 읽음 처리
      tags: [Notification]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      summary: 미확인 알림 수
      tags: [Notification]
      security: [{ userAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notification-settings:
    get:
      operationId: getNotificationSettings
      summary: 알림 카테고리별 설정 조회
      tags: [Notification]
      security: [{ userAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"

    patch:
      operationId: updateNotificationSettings
      summary: 알림 카테고리별 ON/OFF 설정
      tags: [Notification]
      security: [{ userAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsRequest"
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    userAuth:
      type: apiKey
      in: header
      name: wrtn-user-id
      description: "Required auth (LibUserGuard)"
    optionalAuth:
      type: apiKey
      in: header
      name: wrtn-user-id
      description: "Optional auth (OptionalUserGuard)"

  schemas:
    # ─── Profile ────────────────────────────────────────
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        followerCount:
          type: integer
        followingCount:
          type: integer
        regeneratedCount:
          type: integer
          description: "내 공개 콘텐츠가 타유저에 의해 재생성된 횟수"
        isPersona:
          type: boolean

    PublicProfileResponse:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        followerCount:
          type: integer
        followingCount:
          type: integer
        regeneratedCount:
          type: integer
        isPersona:
          type: boolean
        followStatus:
          $ref: "#/components/schemas/FollowStatusEnum"
        isBlocked:
          type: boolean

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 20
        profileImageUrl:
          type: string
          nullable: true

    # ─── Content ────────────────────────────────────────
    ContentVisibilityResponse:
      type: object
      properties:
        contentId:
          type: string
        isPublished:
          type: boolean
        paybackInfo:
          type: object
          nullable: true
          description: "최초 공개 시에만 반환"
          properties:
            paybackRate:
              type: number
            message:
              type: string

    ContentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ContentItem:
      type: object
      properties:
        contentId:
          type: string
        thumbnailUrl:
          type: string
        resultFileUrl:
          type: string
        filterTitle:
          type: string
        filterType:
          type: string
          enum: [image, video]
        isPublished:
          type: boolean
        isCustomPrompt:
          type: boolean
        likeCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        owner:
          $ref: "#/components/schemas/ContentOwner"

    ContentOwner:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        isPersona:
          type: boolean

    # ─── Like ───────────────────────────────────────────
    ToggleLikeResponse:
      type: object
      properties:
        isLiked:
          type: boolean
        likeCount:
          type: integer

    # ─── Follow ─────────────────────────────────────────
    FollowStatusEnum:
      type: string
      enum: [none, following, follower, mutual]

    FollowStatusResponse:
      type: object
      properties:
        targetUserId:
          type: string
        followStatus:
          $ref: "#/components/schemas/FollowStatusEnum"
        followerCount:
          type: integer
        followingCount:
          type: integer

    FollowListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FollowUserItem"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    FollowUserItem:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        followStatus:
          $ref: "#/components/schemas/FollowStatusEnum"

    # ─── Block & Report ─────────────────────────────────
    BlockedUserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              nickname:
                type: string
              profileImageUrl:
                type: string
                nullable: true
              blockedAt:
                type: string
                format: date-time
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ReportRequest:
      type: object
      required: [targetUserId, reason, description]
      properties:
        targetUserId:
          type: string
        contentId:
          type: string
          description: "콘텐츠 신고 시 포함"
        reason:
          type: string
          enum: [HARMFUL, SPAM, INAPPROPRIATE, OTHER]
        description:
          type: string
          maxLength: 100

    # ─── Notification ───────────────────────────────────
    NotificationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    NotificationItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          enum: [like, follow, credit, news]
        title:
          type: string
        body:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        deepLink:
          type: string
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationSettingsResponse:
      type: object
      properties:
        like:
          type: boolean
        follow:
          type: boolean
        credit:
          type: boolean
        news:
          type: boolean

    UpdateNotificationSettingsRequest:
      type: object
      properties:
        like:
          type: boolean
        follow:
          type: boolean
        credit:
          type: boolean
        news:
          type: boolean
