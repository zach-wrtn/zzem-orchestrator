# Sprint Configuration — ugc-platform-001 (Phase 1: 프로필 & 네비게이션)

sprint_id: "ugc-platform-001"
branch_prefix: "sprint"

repositories:
  backend:
    source: ~/dev/work/wrtn-backend
    base: "apple"
    mode: worktree
  app:
    source: ~/dev/work/app-core-packages
    base: "epic/ugc-platform-final"
    mode: worktree
  tokens:
    source: ~/dev/work/wds-tokens
