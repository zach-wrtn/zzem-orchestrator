openapi: 3.0.3
info:
  title: ZZEM UGC Platform API
  description: PRD-001 UGC Platform Sprint 1 API Contract
  version: 1.0.0

servers:
  - url: /meme/v1
    description: meme-api base path

tags:
  - name: content-publish
    description: 콘텐츠 공개/비공개 관리
  - name: profile
    description: 프로필 조회/편집
  - name: follow
    description: 팔로우/언팔로우
  - name: credit-payback
    description: 크레딧 페이백
  - name: notification
    description: 알림센터
  - name: block
    description: 차단
  - name: report
    description: 신고
  - name: opinion
    description: 의견 보내기

paths:
  # ── US1: 피드 공개 ──
  /contents/{contentId}/publish:
    put:
      tags: [content-publish]
      operationId: toggleContentPublish
      summary: 콘텐츠 공개/비공개 전환
      description: |
        공개 ↔ 비공개 토글. 커스텀 프롬프트 콘텐츠는 공개 불가 (400).
        비공개 전환 시 클라이언트에서 확인 바텀시트 노출 후 호출.
      parameters:
        - $ref: "#/components/parameters/ContentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isPublished]
              properties:
                isPublished:
                  type: boolean
                  description: "true=공개, false=비공개"
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPublishResponse"
        "400":
          description: 커스텀 프롬프트 콘텐츠는 공개 불가

  # ── US2: 프로필 ──
  /profiles/me:
    get:
      tags: [profile]
      operationId: getMyProfile
      summary: 내 프로필 조회
      description: 프로필 이미지, 닉네임, 팔로워/팔로잉/재생성된 카운트 포함
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /profiles/{userId}:
    get:
      tags: [profile]
      operationId: getUserProfile
      summary: 타 유저 프로필 조회
      description: 게시물 탭만 노출. 비공개/좋아요 탭 미노출.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /profiles/me/edit:
    put:
      tags: [profile]
      operationId: updateMyProfile
      summary: 프로필 편집 (닉네임, 프로필 이미지)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 20
                profileImage:
                  type: string
                  format: binary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /profiles/{userId}/contents:
    get:
      tags: [profile]
      operationId: getUserContents
      summary: 유저 프로필 콘텐츠 목록 (탭별)
      parameters:
        - $ref: "#/components/parameters/UserId"
        - name: tab
          in: query
          required: true
          schema:
            type: string
            enum: [published, private, liked]
          description: "published=게시물, private=비공개(본인만), liked=좋아요"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /profiles/me/share-url:
    get:
      tags: [profile]
      operationId: getProfileShareUrl
      summary: 프로필 공유 딥링크 URL 생성
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareUrl:
                    type: string
                    format: uri

  # ── US3: 좋아요 (기존 favorite 확장) ──
  # 기존 favorite toggle API 유지, 좋아요 목록은 profiles/{userId}/contents?tab=liked로 제공

  # ── US4: 크레딧 페이백 ──
  /credit/payback/config:
    get:
      tags: [credit-payback]
      operationId: getPaybackConfig
      summary: 페이백 설정 조회 (비율 등)
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaybackConfigResponse"

  /credit/payback/trigger:
    post:
      tags: [credit-payback]
      operationId: triggerPayback
      summary: 재생성 시 페이백 트리거 (내부 호출)
      description: |
        콘텐츠 재생성 시 내부적으로 호출. 마진 체크 후 원작자에게 페이백.
        페르소나 계정 콘텐츠는 스킵.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [originalContentId, regeneratedByUserId, generationCost]
              properties:
                originalContentId:
                  type: string
                regeneratedByUserId:
                  type: string
                generationCost:
                  type: number
                  description: 재생성 비용 (크레딧)
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaybackResultResponse"

  # ── US5: 알림 ──
  /notifications:
    get:
      tags: [notification]
      operationId: getNotifications
      summary: 알림 목록 조회
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{notificationId}/read:
    put:
      tags: [notification]
      operationId: markNotificationRead
      summary: 알림 읽음 처리
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 성공

  /notifications/unread-count:
    get:
      tags: [notification]
      operationId: getUnreadNotificationCount
      summary: 미확인 알림 수
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/settings:
    get:
      tags: [notification]
      operationId: getNotificationSettings
      summary: 알림 카테고리별 설정 조회
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
    put:
      tags: [notification]
      operationId: updateNotificationSettings
      summary: 알림 카테고리별 ON/OFF 설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"

  # ── US6: 팔로우 ──
  /follows/{targetUserId}:
    post:
      tags: [follow]
      operationId: followUser
      summary: 유저 팔로우
      parameters:
        - $ref: "#/components/parameters/TargetUserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"
    delete:
      tags: [follow]
      operationId: unfollowUser
      summary: 유저 언팔로우
      parameters:
        - $ref: "#/components/parameters/TargetUserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatusResponse"

  /profiles/{userId}/followers:
    get:
      tags: [follow]
      operationId: getFollowers
      summary: 팔로워 목록 (본인만 조회 가능)
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowListResponse"
        "403":
          description: 본인 프로필이 아닌 경우

  /profiles/{userId}/followings:
    get:
      tags: [follow]
      operationId: getFollowings
      summary: 팔로잉 목록 (본인만 조회 가능)
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowListResponse"
        "403":
          description: 본인 프로필이 아닌 경우

  # ── US7: 차단/신고/의견 ──
  /blocks/{targetUserId}:
    post:
      tags: [block]
      operationId: blockUser
      summary: 유저 차단
      description: |
        차단 시 A→B 팔로우만 해제. B→A 유지.
        차단 사실 미통지. 좋아요 DB 유지, 노출만 차단.
      parameters:
        - $ref: "#/components/parameters/TargetUserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockStatusResponse"
    delete:
      tags: [block]
      operationId: unblockUser
      summary: 유저 차단 해제
      parameters:
        - $ref: "#/components/parameters/TargetUserId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockStatusResponse"

  /reports:
    post:
      tags: [report]
      operationId: reportContent
      summary: 콘텐츠/유저 신고
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: 신고 접수 완료

  /opinions:
    post:
      tags: [opinion]
      operationId: sendOpinion
      summary: 의견 보내기
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId, message]
              properties:
                targetUserId:
                  type: string
                contentId:
                  type: string
                  description: 자동 첨부되는 콘텐츠 ID (optional)
                message:
                  type: string
                  maxLength: 300
      responses:
        "201":
          description: 의견 접수 완료

components:
  parameters:
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    TargetUserId:
      name: targetUserId
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        format: base64
      description: 커서 기반 페이지네이션
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    ContentPublishResponse:
      type: object
      properties:
        contentId:
          type: string
        isPublished:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true

    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          format: uri
        followerCount:
          type: integer
        followingCount:
          type: integer
        regeneratedCount:
          type: integer
          description: 내 공개 콘텐츠가 타 유저에 의해 재생성된 횟수
        isFollowing:
          type: boolean
          description: 현재 유저가 이 프로필을 팔로우하고 있는지
        followStatus:
          type: string
          enum: [none, following, mutual]
          description: "none=미팔로우, following=팔로잉, mutual=맞팔로우"
        isBlocked:
          type: boolean
          description: 현재 유저가 이 프로필을 차단했는지
        isPersona:
          type: boolean
          description: 페르소나 계정 여부

    ContentListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        nextCursor:
          type: string
          nullable: true

    ContentItem:
      type: object
      properties:
        id:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        mediaUrl:
          type: string
          format: uri
        mediaType:
          type: string
          enum: [image, video]
        isPublished:
          type: boolean
        favoriteCount:
          type: integer
        isFavorited:
          type: boolean
        createdAt:
          type: string
          format: date-time
        userProfile:
          $ref: "#/components/schemas/ProfileSummary"
        filter:
          $ref: "#/components/schemas/FilterSummary"
        generationType:
          type: string
          enum: [filter, custom-prompt]

    ProfileSummary:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          format: uri

    FilterSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        typeIcon:
          type: string
          format: uri

    PaybackConfigResponse:
      type: object
      properties:
        paybackRate:
          type: number
          description: 페이백 비율 (0.01 = 1%)
        minPaybackRate:
          type: number
          description: 마진 압박 시 최저 비율
        creditType:
          type: string
          enum: [promotion]

    PaybackResultResponse:
      type: object
      properties:
        success:
          type: boolean
        paybackAmount:
          type: number
          nullable: true
          description: 지급된 페이백 크레딧 (올림 처리)
        reason:
          type: string
          nullable: true
          description: 실패 시 사유 (margin_insufficient, persona_content 등)

    NotificationListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
        nextCursor:
          type: string
          nullable: true

    NotificationItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          enum: [like, credit, news, follow]
        title:
          type: string
        body:
          type: string
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        deepLink:
          type: string
          nullable: true

    NotificationSettingsResponse:
      type: object
      properties:
        like:
          type: boolean
        credit:
          type: boolean
        news:
          type: boolean
        follow:
          type: boolean

    NotificationSettingsRequest:
      type: object
      properties:
        like:
          type: boolean
        credit:
          type: boolean
        news:
          type: boolean
        follow:
          type: boolean

    FollowStatusResponse:
      type: object
      properties:
        targetUserId:
          type: string
        status:
          type: string
          enum: [following, mutual, none]
        followerCount:
          type: integer
        followingCount:
          type: integer

    FollowListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/FollowUserItem"
        nextCursor:
          type: string
          nullable: true

    FollowUserItem:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        profileImageUrl:
          type: string
          format: uri
        followStatus:
          type: string
          enum: [none, following, mutual]

    BlockStatusResponse:
      type: object
      properties:
        targetUserId:
          type: string
        isBlocked:
          type: boolean

    ReportRequest:
      type: object
      required: [targetType, targetId, reason, description]
      properties:
        targetType:
          type: string
          enum: [content, user]
        targetId:
          type: string
        reason:
          type: string
          enum: [spam, inappropriate, copyright, other]
        description:
          type: string
          maxLength: 100
