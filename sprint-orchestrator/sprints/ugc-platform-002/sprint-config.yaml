# Sprint Configuration — ugc-platform-002 (Phase 2: 피드 인터랙션 & 페이백)

sprint_id: "ugc-platform-002"
branch_prefix: "sprint"

repositories:
  backend:
    source: ~/dev/work/wrtn-backend
    base: "apple"
    mode: worktree
  app:
    source: ~/dev/work/app-core-packages
    base: "epic/ugc-platform-final"
    mode: worktree
  tokens:
    source: ~/dev/work/wds-tokens
    base: "main"
    mode: symlink

defaults:
