team:
  teammates:
    - be-engineer
    - fe-engineer
    - design-engineer
    - evaluator
  settings:
    eval_retry_limit: 2
    max_parallel_tasks: 4

display:
  title: "UGC Platform 002 — 피드 인터랙션 & 페이백"
  startDate: "2026-04-22"
  endDate: ""
  status: "in-progress"
  tags:
    - ugc-platform
    - phase-2
    - feed-interaction
    - payback
  summary: "세로 스와이프 피드의 모든 인터랙션(공개/비공개, CTA 분기, 좋아요, 재생성) + 크레딧 페이백(1%) 시스템 구축. Phase 1 프로필/네비게이션 위에 피드 상세를 채운다."

follow_up:
  previous_sprint: "ugc-platform-001"
  inherited:
    api_contract: true
    deferred_items: 7  # 2 PRD AC (medium) + 4 Minor (low~med) + 1 이관(large, scope 외)
    patterns: 5
