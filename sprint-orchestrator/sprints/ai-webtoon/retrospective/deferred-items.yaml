deferred:
  - ac_id: "AC-2.3.3"
    original_task: "be-002"
    group: "group-002"
    status: "partially_fulfilled"
    reason: "Concurrency 5-cap enforced, but webtoon uses DB-sum (countAllInProgressByUser + countInFlightByUser) while meme path uses atomic Redis slot (reserveGenerationSlotOrThrow). Under concurrent submits, two requests can pass DB precheck simultaneously; meme-side Redis counter drifts (DECR without matching INCR) — self-healed by <0 guard but leaves a transient cap-breach window."
    root_cause: "integration — two pipelines share a cap but not the counter source"
    prior_attempts: 1
    evaluator_notes: "evaluations/group-002.md#major-issues-m1"
    suggested_approach: "Call reserveGenerationSlotOrThrow on webtoon submit. Existing release listener already handles webtoon status-change events; incrementing on submit closes the drift symmetrically."
    priority: "medium"
    estimated_complexity: "small"

  - ac_id: "AC-2.3.3"
    original_task: "be-002"
    group: "group-002"
    status: "partially_fulfilled"
    reason: "appendEpisode does $inc series counter then inserts episode row in two steps. If insert fails (duplicate generationId, DB hiccup), counter is advanced but no row exists → episodeNumber gap. Unique (seriesId, episodeNumber) index still prevents duplicates, so contract-safe, but spec expectation of 'no gap' is weakly violated."
    root_cause: "edge_case — 2-step atomic sequence with a failure window between $inc and insert"
    prior_attempts: 1
    evaluator_notes: "evaluations/group-002.md#major-issues-m2"
    suggested_approach: "Wrap insert in try/catch → on failure, issue compensating $dec of series.lastEpisodeNumber. OR: document 'episodeNumber is a label, gaps permitted' in schema + Contract."
    priority: "medium"
    estimated_complexity: "small"

  - ac_id: "AC-2.5.2"
    original_task: "app-003"
    group: "group-003"
    status: "partially_fulfilled"
    reason: "Retry CTA (webtoon-series-detail.screen.tsx:168-172) hardcodes continuationType=AUTO. MANUAL failure retry silently becomes AUTO, losing user's story beat intent. Agent's inline comment acknowledges this is an out-of-AC simplification."
    root_cause: "scope_creep — agent simplification inline-acknowledged but not deferred to task spec review"
    prior_attempts: 1
    evaluator_notes: "evaluations/group-003.md#major-issues-1"
    suggested_approach: "Persist originType(AUTO|MANUAL) on episode (BE) or on a retry-context ref (FE-only). Retry handler branches on originType; MANUAL retry navigates to ManualContinueInputScreen (optionally prefilled with last beat)."
    priority: "medium"
    estimated_complexity: "small"

  - ac_id: "AC-2.6.2"
    original_task: "be-003"
    group: "group-003"
    status: "partially_fulfilled"
    reason: "incrementLastEpisode repository method sets hasUnseenEpisode=true on PENDING insert alongside $inc, creating a 2nd write path to the unseen flag (violates 'single domain helper' Contract Hint). Side effect: PENDING → FAILED leaves a false-positive N-badge on MY list."
    root_cause: "code_quality — state-transition side-effect placed on repository write instead of domain service helper"
    prior_attempts: 1
    evaluator_notes: "evaluations/group-003.md#major-issues-2"
    suggested_approach: "Drop hasUnseenEpisode:true from incrementLastEpisode $set. Rely solely on completeEpisode → markHasUnseenTrue (COMPLETED-path) for N-badge flip."
    priority: "medium"
    estimated_complexity: "small"

