patterns:
  - pattern: "커서 페이지네이션 DTO 이중 래핑"
    category: "correctness"
    frequency: 1
    groups: ["group-001"]
    severity: "critical"
    systemic_fix: "컨트롤러에서 CursorResponseDto를 재래핑하지 않도록 패턴 가이드 강화. app service가 최종 DTO를 반환하는 패턴 표준화."

  - pattern: "JS getter가 JSON 직렬화에서 누락"
    category: "correctness"
    frequency: 1
    groups: ["group-001"]
    severity: "critical"
    systemic_fix: "DTO에서 getter 사용 금지. 모든 응답 필드는 일반 property + @ApiProperty()로 정의."

  - pattern: "BE/FE 간 응답 필드명 불일치"
    category: "integration"
    frequency: 1
    groups: ["group-001"]
    severity: "critical"
    systemic_fix: "API contract(api-contract.yaml)의 필드명을 BE DTO와 FE model에서 동일하게 사용하도록 Contract 리뷰 강화."

  - pattern: "Clean Architecture 위반 (domain에서 react-query import)"
    category: "code_quality"
    frequency: 1
    groups: ["group-001"]
    severity: "medium"
    systemic_fix: "FE Engineer 태스크 spec에 'useQuery/useMutation은 presentation/hooks/에만 배치' 명시. ESLint boundaries 플러그인으로 자동 감지."

  - pattern: "네비게이션 진입점 누락"
    category: "completeness"
    frequency: 1
    groups: ["group-002"]
    severity: "critical"
    systemic_fix: "Sprint Contract에 '진입점' 체크리스트 항목 추가. 화면 A → 화면 B 이동 경로를 명시적으로 기재."

  - pattern: "훅 생성 후 호출부 미구현"
    category: "completeness"
    frequency: 1
    groups: ["group-002"]
    severity: "medium"
    systemic_fix: "Engineer가 훅/유틸 생성 시 반드시 호출부를 함께 구현하도록 태스크 spec에 체크리스트 추가."

