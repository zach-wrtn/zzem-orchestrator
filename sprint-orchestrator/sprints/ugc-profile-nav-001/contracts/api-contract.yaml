openapi: 3.0.3
info:
  title: UGC Profile & Navigation API
  version: 1.0.0
  description: Sprint ugc-profile-nav-001 API Contract

paths:
  /api/v1/user-profile/me:
    get:
      operationId: getMyProfile
      summary: 내 프로필 조회
      tags: [UserProfile]
      security:
        - LibUserAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"

    patch:
      operationId: updateMyProfile
      summary: 프로필 편집 (닉네임, 프로필 이미지)
      tags: [UserProfile]
      security:
        - LibUserAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"

  /api/v1/user-profile/{profileId}:
    get:
      operationId: getUserProfile
      summary: 타 유저 프로필 조회
      tags: [UserProfile]
      security:
        - LibUserAuth: []
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "404":
          description: 프로필 미존재

  /api/v1/user-profile/share/{profileId}:
    get:
      operationId: getProfileShareLink
      summary: 프로필 공유 딥링크 생성
      tags: [UserProfile]
      security:
        - LibUserAuth: []
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileShareLinkResponse"

  /api/v1/content/user/{profileId}:
    get:
      operationId: getUserContents
      summary: 유저 콘텐츠 목록 조회 (게시물/비공개 탭)
      tags: [Content]
      security:
        - LibUserAuth: []
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - name: visibility
          in: query
          required: true
          schema:
            type: string
            enum: [public, private]
          description: "public=게시물(공개) 탭, private=비공개 탭. 본인만 private 조회 가능"
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 커서 기반 페이지네이션
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /api/v1/content/{contentId}/publish:
    patch:
      operationId: publishContent
      summary: 콘텐츠 공개/비공개 전환
      tags: [Content]
      security:
        - LibUserAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - isPublished
              properties:
                isPublished:
                  type: boolean
      responses:
        "200":
          description: OK

  /api/v1/nickname/generate:
    get:
      operationId: generateNickname
      summary: 랜덤 닉네임 자동 생성
      tags: [Nickname]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedNicknameResponse"

components:
  securitySchemes:
    LibUserAuth:
      type: apiKey
      in: header
      name: Authorization

  schemas:
    MyProfileResponse:
      type: object
      required:
        - id
        - name
        - profileImageUrl
        - followerCount
        - followingCount
        - regeneratedCount
        - isPersona
        - hasPublicContent
        - hasPrivateContent
      properties:
        id:
          type: string
        name:
          type: string
          description: 닉네임
        profileImageUrl:
          type: string
          description: 프로필 이미지 URL. 미설정 시 빈 문자열
        followerCount:
          type: integer
          description: "PRD 1 단계에서는 항상 0"
        followingCount:
          type: integer
          description: "PRD 1 단계에서는 항상 0"
        regeneratedCount:
          type: integer
          description: 내 공개 콘텐츠가 타 유저에 의해 재생성된 총 횟수
        isPersona:
          type: boolean
          description: 페르소나(콘텐츠 팩토리) 계정 여부
        hasPublicContent:
          type: boolean
          description: 공개 콘텐츠 존재 여부 (디폴트 탭 결정용)
        hasPrivateContent:
          type: boolean
          description: 비공개 콘텐츠 존재 여부 (디폴트 탭 결정용)

    UserProfileResponse:
      type: object
      required:
        - id
        - name
        - profileImageUrl
        - followerCount
        - followingCount
        - regeneratedCount
        - isPersona
      properties:
        id:
          type: string
        name:
          type: string
        profileImageUrl:
          type: string
        followerCount:
          type: integer
        followingCount:
          type: integer
        regeneratedCount:
          type: integer
        isPersona:
          type: boolean

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 20
          description: 닉네임
        profileImageUrl:
          type: string
          description: 프로필 이미지 URL

    ProfileShareLinkResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: 프로필 딥링크 URL

    ContentListResponse:
      type: object
      required:
        - items
        - nextCursor
        - hasNext
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        nextCursor:
          type: string
          nullable: true
        hasNext:
          type: boolean

    ContentItem:
      type: object
      required:
        - id
        - thumbnail
        - filterTitle
        - filterType
        - status
        - isPublished
        - createdAt
      properties:
        id:
          type: string
        thumbnail:
          type: string
          nullable: true
        filterTitle:
          type: string
        filterType:
          type: string
        status:
          type: string
        isPublished:
          type: boolean
        createdAt:
          type: string
          format: date-time

    GeneratedNicknameResponse:
      type: object
      required:
        - nickname
      properties:
        nickname:
          type: string
          description: "형용사+동물+4자리숫자 (예: 빛나는고양이1234)"
