# Figma-PRD Mapping: ugc-profile-nav-001
#
# 사용법:
# - figma는 항상 배열 형태로 작성합니다.
#     figma:
#       - url: "https://www.figma.com/design/..."
#         note: "설명"
#
# - 해당 AC의 Figma 디자인이 없으면 빈 배열: figma: []
#
# 입력 후 Sprint Lead가 자동으로:
# 1. Figma MCP로 디자인 컨텍스트 추출
# 2. 현재 프로토타입과 diff 분석
# 3. Design Engineer에게 보정 태스크 할당

# ──────────────────────────────────────
# Group 1: Navigation + Profile Core
# Prototype: 네비게이션 + 프로필
# ──────────────────────────────────────

