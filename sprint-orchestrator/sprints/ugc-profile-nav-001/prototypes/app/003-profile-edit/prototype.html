<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>003 Profile Edit Prototype</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens (tokens.css inlined) === */
    :root {
      /* Color - Brand */
      --color-brand-primary: #8752FA;
      --color-brand-primary-dark: #A17BFF;

      /* Color - Background */
      --color-bg-normal: #FFFFFF;
      --color-bg-elevated: #FFFFFF;

      /* Color - Label */
      --color-label-normal: #262626;
      --color-label-alternative: #656565;
      --color-label-assistive: #8a8a8a;
      --color-label-disabled: #C1C4CC;

      /* Color - Line */
      --color-line-normal: #E4E5E9;
      --color-line-alternative: #F0F1F3;

      /* Color - Fill */
      --color-fill-neutral: #f1f1f1;
      --color-fill-brand-primary: #8752FA;

      /* Color - Status */
      --color-status-error: #FF3B30;
      --color-status-success: #30D158;

      /* Typography */
      --font-family-default: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      --font-size-heading1: 24px;
      --font-size-heading2: 20px;
      --font-size-body1: 16px;
      --font-size-body2: 14px;
      --font-size-caption: 12px;
      --font-weight-bold: 700;
      --font-weight-semibold: 600;
      --font-weight-medium: 500;
      --font-weight-regular: 400;

      /* Spacing (4px grid) */
      --spacing-0: 0px;
      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-8: 32px;
      --spacing-10: 40px;
      --spacing-12: 48px;

      /* Radius */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      /* Component Tokens */
      --component-button-primary-fill: #8752FA;
      --component-button-primary-label: #FFFFFF;
      --component-button-disabled-fill: #E4E5E9;
      --component-button-disabled-label: #C1C4CC;
      --component-card-fill: #FFFFFF;
      --component-card-radius: 16px;
      --component-input-fill: #F7F8F9;
      --component-input-radius: 12px;
      --component-input-border-focus: #8752FA;
      --component-input-border-error: #F04452;
      --component-nav-active: #8752FA;
      --component-nav-inactive: #8E9199;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .control-panel__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-panel__label {
      color: #888;
      font-size: 11px;
      min-width: 48px;
    }

    .control-panel select {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }

    .control-panel__states {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .control-panel__state-btn {
      background: #2a2a3e;
      color: #888;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .control-panel__state-btn.active {
      background: var(--color-brand-primary, #8752FA);
      color: #fff;
      border-color: var(--color-brand-primary, #8752FA);
    }

    .control-panel__breadcrumb {
      color: #666;
      font-size: 11px;
      font-family: monospace;
    }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--color-bg-normal);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    /* === Screen === */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* === Transitions === */
    @keyframes slideLeftIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideRightIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideUpIn {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDownOut {
      from { transform: translateY(0); }
      to { transform: translateY(100%); }
    }

    .transition-slide-left { animation: slideLeftIn 0.3s ease-out; }
    .transition-slide-right { animation: slideRightIn 0.3s ease-out; }
    .transition-slide-up { animation: slideUpIn 0.3s ease-out; }
    .transition-fade { animation: fadeIn 0.2s ease-out; }
    .transition-slide-down { animation: slideDownOut 0.25s ease-in; }

    /* === State Visibility === */
    [data-state] {
      display: none;
    }

    [data-state].state-active {
      display: flex;
    }

    /* === Overlay === */
    .overlay-backdrop {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .overlay-backdrop.active {
      display: block;
    }

    .overlay-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 101;
      display: none;
    }

    .overlay-content.active {
      display: block;
    }

    /* === Placeholder === */
    .placeholder-image {
      background: var(--color-fill-neutral);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-assistive);
      font-size: 12px;
      border-radius: var(--radius-md);
    }

    .placeholder-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-normal);
      font-size: 18px;
    }

    /* === Skeleton === */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ========================================
       Screen-specific Styles
       ======================================== */

    /* --- Top Navigation Bar --- */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      height: 56px;
      background: var(--color-bg-normal);
      flex-shrink: 0;
    }

    .nav-bar__back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      font-size: 22px;
      color: var(--color-label-normal);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }

    .nav-bar__back:active {
      background: var(--color-fill-neutral);
    }

    .nav-bar__title {
      font-size: 18px;
      font-weight: var(--font-weight-semibold);
      color: var(--color-label-normal);
    }

    .nav-bar__action {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--color-label-normal);
      cursor: pointer;
    }

    .nav-bar__spacer {
      width: 40px;
    }

    /* --- Profile Edit Screen --- */
    .profile-edit-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 120px;
      gap: 32px;
    }

    /* Avatar Section */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .avatar-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      cursor: pointer;
    }

    .avatar-wrapper:active .avatar-edit-badge {
      transform: scale(0.9);
    }

    .avatar-image {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-full);
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c4c4c4;
      font-size: 36px;
      overflow: hidden;
    }

    .avatar-edit-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 30px;
      height: 30px;
      background: #262626;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-bg-normal);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      transition: transform 0.15s;
    }

    /* Nickname Section */
    .nickname-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nickname-label {
      font-size: var(--font-size-body2);
      font-weight: var(--font-weight-medium);
      color: var(--color-label-normal);
    }

    .nickname-input-wrapper {
      position: relative;
      width: 100%;
    }

    .nickname-input {
      width: 100%;
      padding: 12px 0;
      font-size: var(--font-size-body1);
      font-family: var(--font-family-default);
      color: var(--color-label-normal);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--color-line-normal);
      border-radius: 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .nickname-input:focus {
      border-bottom-color: var(--color-label-normal);
    }

    .nickname-input.error {
      border-bottom-color: var(--color-status-error);
    }

    .nickname-input::placeholder {
      color: var(--color-label-disabled);
    }

    .nickname-error {
      font-size: var(--font-size-caption);
      color: var(--color-status-error);
      margin-top: 8px;
      display: none;
    }

    .nickname-error.visible {
      display: block;
    }

    /* Save Button (sticky bottom) */
    .save-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
      background: var(--color-bg-normal);
    }

    .btn-save {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      font-size: var(--font-size-body1);
      font-weight: var(--font-weight-semibold);
      font-family: var(--font-family-default);
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-save.enabled {
      background: var(--component-button-primary-fill);
      color: var(--component-button-primary-label);
    }

    .btn-save.enabled:active {
      opacity: 0.85;
    }

    .btn-save.disabled {
      background: #f1f1f1;
      color: var(--color-label-disabled);
      cursor: not-allowed;
    }

    .btn-save.saving {
      background: var(--component-button-primary-fill);
      color: var(--component-button-primary-label);
      opacity: 0.7;
      cursor: wait;
    }

    .btn-save .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Image Source Bottom Sheet --- */
    .bottom-sheet {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
      padding: 8px 0;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
    }

    .bottom-sheet__handle {
      width: 36px;
      height: 4px;
      background: var(--color-line-normal);
      border-radius: 2px;
      margin: 8px auto 16px;
    }

    .bottom-sheet__title {
      display: none;
    }

    .bottom-sheet__option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: none;
      border: none;
      width: 100%;
      font-size: var(--font-size-body1);
      font-family: var(--font-family-default);
      color: var(--color-label-normal);
      cursor: pointer;
      transition: background 0.15s;
    }

    .bottom-sheet__option:active {
      background: var(--color-fill-neutral);
    }

    .bottom-sheet__option-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--color-fill-neutral);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--color-label-alternative);
    }

    .bottom-sheet__option-label {
      font-size: var(--font-size-body1);
      font-weight: var(--font-weight-regular);
    }

    .bottom-sheet__option--danger .bottom-sheet__option-label {
      color: #FF3B30;
    }

    .bottom-sheet__option--danger .bottom-sheet__option-icon {
      color: #FF3B30;
    }

    /* --- Share Screen --- */
    .share-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .share-card {
      width: 100%;
      background: var(--color-fill-neutral);
      border-radius: var(--component-card-radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .share-card__avatar {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-full);
      background: var(--color-line-normal);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--color-label-assistive);
    }

    .share-card__name {
      font-size: var(--font-size-heading2);
      font-weight: var(--font-weight-bold);
      color: var(--color-label-normal);
    }

    .share-card__link {
      font-size: var(--font-size-caption);
      color: var(--color-brand-primary);
      word-break: break-all;
      text-align: center;
    }

    .share-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-share {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-size-body1);
      font-weight: var(--font-weight-semibold);
      font-family: var(--font-family-default);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-share--primary {
      background: var(--component-button-primary-fill);
      color: var(--component-button-primary-label);
    }

    .btn-share--primary:active {
      opacity: 0.85;
    }

    .btn-share--secondary {
      background: var(--color-fill-neutral);
      color: var(--color-label-normal);
    }

    .btn-share--secondary:active {
      background: var(--color-line-normal);
    }

    /* --- Mock Share Sheet (OS) --- */
    .share-sheet {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
      padding: 8px 0;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
    }

    .share-sheet__handle {
      width: 36px;
      height: 4px;
      background: var(--color-line-normal);
      border-radius: 2px;
      margin: 8px auto 20px;
    }

    .share-sheet__header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 16px;
      border-bottom: 1px solid var(--color-line-alternative);
    }

    .share-sheet__preview-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: var(--color-brand-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .share-sheet__preview-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .share-sheet__preview-title {
      font-size: var(--font-size-body2);
      font-weight: var(--font-weight-medium);
      color: var(--color-label-normal);
    }

    .share-sheet__preview-url {
      font-size: var(--font-size-caption);
      color: var(--color-label-assistive);
    }

    .share-sheet__apps {
      display: flex;
      gap: 16px;
      padding: 20px;
      overflow-x: auto;
    }

    .share-sheet__app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 60px;
    }

    .share-sheet__app-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
    }

    .share-sheet__app-name {
      font-size: 11px;
      color: var(--color-label-alternative);
      text-align: center;
    }

    .share-sheet__actions {
      display: flex;
      flex-direction: column;
      padding: 0 12px;
      gap: 1px;
    }

    .share-sheet__action-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      background: var(--color-fill-neutral);
      border: none;
      width: 100%;
      font-size: var(--font-size-body2);
      font-family: var(--font-family-default);
      color: var(--color-label-normal);
      cursor: pointer;
    }

    .share-sheet__action-item:first-child {
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }

    .share-sheet__action-item:last-child {
      border-radius: 0 0 var(--radius-md) var(--radius-md);
    }

    .share-sheet__action-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--color-label-alternative);
    }

    /* --- Toast --- */
    .toast {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(33, 34, 40, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-body2);
      font-weight: var(--font-weight-medium);
      white-space: nowrap;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-panel__row">
      <span class="control-panel__label">Screen</span>
      <select id="screen-select" onchange="navigateBySelect(this.value)">
        <option value="screen-profile-edit">1. Profile Edit</option>
        <option value="screen-share">2. Share Profile</option>
      </select>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">State</span>
      <div class="control-panel__states" id="state-toggles">
        <button class="control-panel__state-btn active" data-state="default" onclick="toggleState('default')">Default</button>
        <button class="control-panel__state-btn" data-state="validation-error" onclick="toggleState('validation-error')">Validation Error</button>
        <button class="control-panel__state-btn" data-state="saving" onclick="toggleState('saving')">Saving</button>
      </div>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__breadcrumb" id="breadcrumb">screen-profile-edit</span>
    </div>
  </div>

  <!-- Device Frame -->
  <div class="device-frame" id="device-frame">

    <!-- =============================================
         Screen 1: Profile Edit
         ============================================= -->
    <section class="screen" id="screen-profile-edit">

      <!-- Nav Bar -->
      <div class="nav-bar">
        <button class="nav-bar__back" id="btn-back" aria-label="뒤로가기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="nav-bar__title">프로필 편집</span>
        <div class="nav-bar__spacer"></div>
      </div>

      <!-- Content -->
      <div class="profile-edit-content">

        <!-- Avatar -->
        <div class="avatar-section">
          <div class="avatar-wrapper" id="avatar-tap" aria-label="프로필 이미지 변경">
            <div class="avatar-image">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="currentColor"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" fill="currentColor"/></svg>
            </div>
            <div class="avatar-edit-badge">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="white" stroke-width="2"/></svg>
            </div>
          </div>
        </div>

        <!-- Nickname -->
        <div class="nickname-section">
          <label class="nickname-label">닉네임</label>

          <!-- Default State -->
          <div data-state="default" class="state-active">
            <div class="nickname-input-wrapper">
              <input class="nickname-input" type="text" placeholder="김쨈쨈" value="빛나는고양이1234" maxlength="20" id="nickname-default">
            </div>
          </div>

          <!-- Validation Error State -->
          <div data-state="validation-error">
            <div class="nickname-input-wrapper">
              <input class="nickname-input error" type="text" placeholder="김쨈쨈" value="A" maxlength="20" id="nickname-error">
            </div>
            <span class="nickname-error visible">닉네임은 2자 이상 입력해 주세요</span>
          </div>

          <!-- Saving State -->
          <div data-state="saving">
            <div class="nickname-input-wrapper">
              <input class="nickname-input" type="text" placeholder="김쨈쨈" value="멋진호랑이5678" maxlength="20" disabled style="opacity:0.6" id="nickname-saving">
            </div>
          </div>
        </div>
      </div>

      <!-- Save Button (sticky bottom) -->
      <div class="save-bar">
        <!-- Default: no changes → disabled -->
        <div data-state="default" class="state-active">
          <button class="btn-save disabled" disabled>저장</button>
        </div>
        <!-- Validation Error: has changes but invalid → disabled -->
        <div data-state="validation-error">
          <button class="btn-save disabled" disabled>저장</button>
        </div>
        <!-- Saving: in progress -->
        <div data-state="saving">
          <button class="btn-save saving" disabled><span class="spinner"></span>저장 중...</button>
        </div>
      </div>

      <!-- Overlay: Image Source Bottom Sheet -->
      <div class="overlay-backdrop" onclick="closeOverlay()"></div>
      <div class="overlay-content bottom-sheet" id="image-source-sheet">
        <div class="bottom-sheet__handle"></div>
        <button class="bottom-sheet__option" id="btn-camera-album">
          <span class="bottom-sheet__option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="bottom-sheet__option-label">카메라/앨범</span>
        </button>
        <button class="bottom-sheet__option bottom-sheet__option--danger" id="btn-delete-photo">
          <span class="bottom-sheet__option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="bottom-sheet__option-label">사진 삭제</span>
        </button>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast-edit">저장되었습니다</div>
    </section>

    <!-- =============================================
         Screen 2: Share Profile
         ============================================= -->
    <section class="screen" id="screen-share">

      <!-- Nav Bar -->
      <div class="nav-bar">
        <button class="nav-bar__back" id="btn-share-back" aria-label="뒤로가기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="nav-bar__title">프로필 공유</span>
        <div class="nav-bar__spacer"></div>
      </div>

      <!-- Share Content -->
      <div class="share-content">

        <div class="share-card">
          <div class="share-card__avatar">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="share-card__name">빛나는고양이1234</div>
          <div class="share-card__link">https://zzem.app/u/빛나는고양이1234</div>
        </div>

        <div class="share-actions">
          <button class="btn-share btn-share--primary" id="btn-os-share">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7M16 6l-4-4-4 4M12 2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            공유하기
          </button>
          <button class="btn-share btn-share--secondary" id="btn-copy-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
            링크 복사
          </button>
        </div>
      </div>

      <!-- Overlay: Mock OS Share Sheet -->
      <div class="overlay-backdrop" onclick="closeOverlay()"></div>
      <div class="overlay-content share-sheet" id="os-share-sheet">
        <div class="share-sheet__handle"></div>

        <div class="share-sheet__header">
          <div class="share-sheet__preview-icon">Z</div>
          <div class="share-sheet__preview-info">
            <div class="share-sheet__preview-title">빛나는고양이1234의 프로필</div>
            <div class="share-sheet__preview-url">zzem.app</div>
          </div>
        </div>

        <!-- Mock App Grid -->
        <div class="share-sheet__apps">
          <div class="share-sheet__app">
            <div class="share-sheet__app-icon" style="background:#FEE500;">
              <span style="color:#3C1E1E;font-weight:bold;font-size:16px;">K</span>
            </div>
            <span class="share-sheet__app-name">카카오톡</span>
          </div>
          <div class="share-sheet__app">
            <div class="share-sheet__app-icon" style="background:#07C160;">
              <span style="font-size:18px;">W</span>
            </div>
            <span class="share-sheet__app-name">WeChat</span>
          </div>
          <div class="share-sheet__app">
            <div class="share-sheet__app-icon" style="background:#5B5EA6;">
              <span style="font-size:16px;">M</span>
            </div>
            <span class="share-sheet__app-name">Messages</span>
          </div>
          <div class="share-sheet__app">
            <div class="share-sheet__app-icon" style="background:#4A90D9;">
              <span style="font-size:16px;">T</span>
            </div>
            <span class="share-sheet__app-name">Telegram</span>
          </div>
          <div class="share-sheet__app">
            <div class="share-sheet__app-icon" style="background:#1DA1F2;">
              <span style="font-size:16px;">X</span>
            </div>
            <span class="share-sheet__app-name">X</span>
          </div>
        </div>

        <!-- Mock Action List -->
        <div class="share-sheet__actions">
          <button class="share-sheet__action-item">
            <span class="share-sheet__action-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5"/></svg>
            </span>
            Copy Link
          </button>
          <button class="share-sheet__action-item">
            <span class="share-sheet__action-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="currentColor" stroke-width="1.5"/></svg>
            </span>
            Add to Notes
          </button>
        </div>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast-share">링크가 복사되었습니다</div>
    </section>

  </div>

  <script>
    // === State ===
    let currentScreen = null;
    let currentState = 'default';
    const navHistory = [];

    // === Auto-nickname data ===
    const adjectives = ['빛나는', '용감한', '귀여운', '멋진', '행복한', '신비한', '즐거운', '활발한', '차분한', '영리한'];
    const animals = ['고양이', '호랑이', '강아지', '토끼', '여우', '판다', '코알라', '펭귄', '사자', '돌고래'];

    function generateNickname() {
      const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
      const animal = animals[Math.floor(Math.random() * animals.length)];
      const num = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
      return adj + animal + num;
    }

    // === Navigation ===
    function navigate(screenId, transition = 'slide-left') {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        navHistory.push(currentScreen.id);
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active');
      if (transition !== 'none') {
        target.classList.add('transition-' + transition);
        target.addEventListener('animationend', function handler() {
          target.classList.remove('transition-' + transition);
          target.removeEventListener('animationend', handler);
        });
      }

      currentScreen = target;
      currentState = 'default';
      applyState(screenId, 'default');
      updateControlPanel();
    }

    function goBack() {
      if (navHistory.length === 0) return;
      const prevId = navHistory.pop();
      const target = document.getElementById(prevId);
      if (!target) return;

      if (currentScreen) {
        currentScreen.classList.remove('active');
      }

      target.classList.add('active', 'transition-slide-right');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-slide-right');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      currentState = 'default';
      applyState(prevId, 'default');
      updateControlPanel();
    }

    function navigateBySelect(screenId) {
      navigate(screenId, 'fade');
    }

    // === State Toggle ===
    function applyState(screenId, stateName) {
      const screen = document.getElementById(screenId);
      if (!screen) return;

      screen.querySelectorAll('[data-state]').forEach(el => {
        el.classList.toggle('state-active', el.dataset.state === stateName);
      });

      currentState = stateName;
      updateStateButtons();

      // Update save button for profile-edit states
      if (screenId === 'screen-profile-edit') {
        updateSaveButtonVisibility(stateName);
      }
    }

    function updateSaveButtonVisibility(stateName) {
      // The data-state containers in save-bar handle this via CSS
    }

    function toggleState(stateName) {
      if (!currentScreen) return;
      applyState(currentScreen.id, stateName);
    }

    // === Overlay ===
    function openOverlay(overlayId, transition = 'slide-up') {
      if (!currentScreen) return;
      const backdrop = currentScreen.querySelector('.overlay-backdrop');
      const overlay = document.getElementById(overlayId);
      if (!backdrop || !overlay) return;

      backdrop.classList.add('active');
      overlay.classList.add('active');
      if (transition !== 'none') {
        overlay.classList.add('transition-' + transition);
        overlay.addEventListener('animationend', function handler() {
          overlay.classList.remove('transition-' + transition);
          overlay.removeEventListener('animationend', handler);
        });
      }
    }

    function closeOverlay(transition = 'slide-down') {
      if (!currentScreen) return;
      const backdrop = currentScreen.querySelector('.overlay-backdrop');
      const activeOverlays = currentScreen.querySelectorAll('.overlay-content.active');

      activeOverlays.forEach(el => {
        if (transition !== 'none') {
          el.classList.add('transition-' + transition);
          el.addEventListener('animationend', function handler() {
            el.classList.remove('active', 'transition-' + transition);
            el.removeEventListener('animationend', handler);
          });
        } else {
          el.classList.remove('active');
        }
      });

      if (backdrop) {
        setTimeout(() => backdrop.classList.remove('active'), 200);
      }
    }

    // === Toast ===
    function showToast(toastId) {
      const toast = document.getElementById(toastId);
      if (!toast) return;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    // === Control Panel ===
    function updateControlPanel() {
      if (!currentScreen) return;

      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) {
        const path = [...navHistory, currentScreen.id].join(' \u2192 ');
        breadcrumb.textContent = path;
      }

      updateStateButtons();
    }

    function updateStateButtons() {
      document.querySelectorAll('.control-panel__state-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === currentState);
      });
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      const firstScreen = document.querySelector('.screen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        applyState(firstScreen.id, 'default');
        updateControlPanel();
      }

      // === Event Bindings ===

      // Back button → go back
      document.getElementById('btn-back').addEventListener('click', () => goBack());
      document.getElementById('btn-share-back').addEventListener('click', () => goBack());

      // Avatar tap → open image source bottom sheet
      document.getElementById('avatar-tap').addEventListener('click', () => {
        openOverlay('image-source-sheet', 'slide-up');
      });

      // Camera/Album option → close sheet + show toast (mock)
      document.getElementById('btn-camera-album').addEventListener('click', () => {
        closeOverlay();
        setTimeout(() => showToast('toast-edit'), 400);
      });

      // Delete photo option → close sheet + show toast (mock)
      document.getElementById('btn-delete-photo').addEventListener('click', () => {
        closeOverlay();
        setTimeout(() => showToast('toast-edit'), 400);
      });

      // OS share button → open mock share sheet
      document.getElementById('btn-os-share').addEventListener('click', () => {
        openOverlay('os-share-sheet', 'slide-up');
      });

      // Copy link button → show toast
      document.getElementById('btn-copy-link').addEventListener('click', () => {
        showToast('toast-share');
      });
    });
  </script>

</body>
</html>
