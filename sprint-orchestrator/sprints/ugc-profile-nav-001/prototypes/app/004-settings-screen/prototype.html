<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>004-settings-screen Prototype</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* === Design Tokens === */
    :root {
      /* Color - Brand */
      --color-brand-primary: #8752FA;
      --color-brand-primary-dark: #A17BFF;

      /* Color - Background */
      --color-bg-normal: #FFFFFF;

      /* Color - Label */
      --color-label-normal: #212228;
      --color-label-alternative: #6B6E76;
      --color-label-assistive: #8E9199;

      /* Color - Line */
      --color-line-normal: #E4E5E9;

      /* Color - Fill */
      --color-fill-neutral: #F0F1F3;
      --color-fill-brand-primary: #8752FA;

      /* Color - Status */
      --color-status-danger: #F04452;

      /* Typography */
      --font-family-default: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      --font-size-heading1: 24px;
      --font-size-heading2: 20px;
      --font-size-body1: 16px;
      --font-size-body2: 14px;
      --font-size-caption: 12px;
      --font-weight-bold: 700;
      --font-weight-medium: 500;
      --font-weight-regular: 400;

      /* Spacing (4px grid) */
      --spacing-0: 0px;
      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-8: 32px;
      --spacing-10: 40px;

      /* Radius */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      /* Component Tokens */
      --component-button-primary-fill: #8752FA;
      --component-button-primary-label: #FFFFFF;
      --component-card-fill: #FFFFFF;
      --component-card-radius: 16px;
      --component-input-fill: #F7F8F9;
      --component-input-radius: 12px;
      --component-nav-active: #8752FA;
      --component-nav-inactive: #8E9199;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, 'SF Pro', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* === Control Panel === */
    .control-panel {
      width: 390px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .control-panel__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-panel__label {
      color: #888;
      font-size: 11px;
      min-width: 48px;
    }

    .control-panel select {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }

    .control-panel__states {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .control-panel__state-btn {
      background: #2a2a3e;
      color: #888;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .control-panel__state-btn.active {
      background: var(--color-brand-primary, #8752FA);
      color: #fff;
      border-color: var(--color-brand-primary, #8752FA);
    }

    .control-panel__breadcrumb {
      color: #666;
      font-size: 11px;
      font-family: monospace;
    }

    /* === Device Frame === */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--color-bg-normal, #FFFFFF);
      overflow: hidden;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
    }

    /* === Screen === */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* === Transitions === */
    @keyframes slideLeftIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideRightIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideUpIn {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDownOut {
      from { transform: translateY(0); }
      to { transform: translateY(100%); }
    }

    .transition-slide-left { animation: slideLeftIn 0.3s ease-out; }
    .transition-slide-right { animation: slideRightIn 0.3s ease-out; }
    .transition-slide-up { animation: slideUpIn 0.3s ease-out; }
    .transition-fade { animation: fadeIn 0.2s ease-out; }
    .transition-slide-down { animation: slideDownOut 0.25s ease-in; }

    /* === State Visibility === */
    [data-state] {
      display: none;
    }

    [data-state].state-active {
      display: flex;
    }

    /* === Overlay === */
    .overlay-backdrop {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .overlay-backdrop.active {
      display: block;
    }

    .overlay-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 101;
    }

    /* === Placeholder === */
    .placeholder-image {
      background: var(--color-fill-neutral, #F0F1F3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-assistive, #8E9199);
      font-size: 12px;
      border-radius: var(--radius-md, 12px);
    }

    .placeholder-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-label-normal, #212228);
      font-size: 18px;
    }

    /* === Skeleton === */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s infinite;
      border-radius: var(--radius-sm, 8px);
    }

    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ============================================
       Settings Screen Styles
       ============================================ */

    /* Navigation Bar */
    .nav-bar {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 4px 44px 4px 12px;
      background: #FFFFFF;
      flex-shrink: 0;
      position: relative;
    }

    .nav-bar__back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #262626;
      border-radius: 8px;
      z-index: 1;
    }

    .nav-bar__title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      color: #262626;
      font-family: 'Pretendard', sans-serif;
      pointer-events: none;
    }

    /* Settings Menu List */
    .settings-list {
      flex: 1;
      overflow-y: auto;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .settings-section {
      padding: 0;
    }

    .settings-section__divider {
      height: 12px;
      background: #f7f7f7;
      border: none;
      margin: 0;
    }

    .settings-item {
      display: flex;
      align-items: center;
      padding: 12px 24px 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 0;
    }

    .settings-item--no-chevron {
      padding-right: 16px;
    }

    .settings-item:active {
      background: #f7f7f7;
    }

    .settings-item__label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      color: #262626;
      line-height: 1.5;
      font-family: 'Pretendard', sans-serif;
    }

    .settings-item__value {
      font-size: 16px;
      font-weight: 500;
      color: #8a8a8a;
      font-family: 'Pretendard', sans-serif;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .settings-item__value-version {
      font-size: 14px;
      font-weight: 600;
      color: #8a8a8a;
      font-family: 'Pretendard', sans-serif;
    }

    .settings-item__chevron {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8a8a;
      font-size: 14px;
      flex-shrink: 0;
    }

    .settings-item__google-icon {
      width: 20px;
      height: 20px;
      border-radius: 42.5px;
      flex-shrink: 0;
      border: 0.833px solid #f1f1f1;
    }

    /* Toggle Switch */
    .toggle-switch {
      width: 48px;
      height: 28px;
      background: #a788fd;
      border-radius: 62.5px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .toggle-switch__knob {
      width: 24px;
      height: 24px;
      background: #FFFFFF;
      border-radius: 37.5px;
      position: absolute;
      top: 2px;
      right: 2px;
      transition: transform 0.2s;
    }

    .toggle-switch.off {
      background: #d9d9d9;
    }

    .toggle-switch.off .toggle-switch__knob {
      right: auto;
      left: 2px;
    }

    /* Logout bottom button area */
    .settings-logout-area {
      padding: 16px 16px 32px 16px;
      flex-shrink: 0;
    }

    .settings-logout-btn {
      width: 100%;
      height: 56px;
      background: #f1f1f1;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      color: #656565;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .settings-logout-btn:active {
      opacity: 0.7;
    }

    /* === Logout Dialog === */
    .dialog-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .dialog-overlay.active {
      display: flex;
    }

    .dialog {
      width: 296px;
      background: var(--color-bg-normal);
      border-radius: var(--radius-lg);
      padding: var(--spacing-6) var(--spacing-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .dialog__title {
      font-size: var(--font-size-heading2);
      font-weight: var(--font-weight-bold);
      color: var(--color-label-normal);
      text-align: center;
    }

    .dialog__message {
      font-size: var(--font-size-body2);
      color: var(--color-label-alternative);
      text-align: center;
      line-height: 1.5;
    }

    .dialog__actions {
      display: flex;
      gap: var(--spacing-2);
      width: 100%;
      margin-top: var(--spacing-2);
    }

    .dialog__btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-size-body1);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    .dialog__btn:active {
      opacity: 0.7;
    }

    .dialog__btn--cancel {
      background: var(--color-fill-neutral);
      color: var(--color-label-normal);
    }

    .dialog__btn--confirm {
      background: var(--color-status-danger);
      color: #FFFFFF;
    }

    /* === Coming Soon Screen === */
    .coming-soon {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-4);
      padding: var(--spacing-8);
    }

    .coming-soon__icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: var(--color-fill-neutral);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--color-label-assistive);
    }

    .coming-soon__title {
      font-size: var(--font-size-heading2);
      font-weight: var(--font-weight-bold);
      color: var(--color-label-normal);
    }

    .coming-soon__desc {
      font-size: var(--font-size-body2);
      color: var(--color-label-alternative);
      text-align: center;
      line-height: 1.5;
    }

    /* === SVG Icons === */
    .icon-svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-svg--small {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-panel__row">
      <span class="control-panel__label">Screen</span>
      <select id="screen-select" onchange="navigateBySelect(this.value)">
        <option value="screen-settings">Settings (설정)</option>
        <option value="screen-coming-soon">Coming Soon (준비 중)</option>
      </select>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__label">State</span>
      <div class="control-panel__states" id="state-toggles">
        <button class="control-panel__state-btn active" data-state="default" onclick="toggleState('default')">default</button>
        <button class="control-panel__state-btn" data-state="logout-dialog" onclick="toggleState('logout-dialog')">logout-dialog</button>
      </div>
    </div>
    <div class="control-panel__row">
      <span class="control-panel__breadcrumb" id="breadcrumb">screen-settings</span>
    </div>
  </div>

  <!-- Device Frame -->
  <div class="device-frame" id="device-frame">

    <!-- ================================
         Screen 1: Settings Main
         ================================ -->
    <section class="screen" id="screen-settings">
      <!-- Nav Bar -->
      <div class="nav-bar">
        <button class="nav-bar__back" id="btn-settings-back" aria-label="뒤로가기">
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M14 17l-5-5 5-5"/></svg>
        </button>
        <span class="nav-bar__title">설정</span>
      </div>

      <!-- Menu List -->
      <div class="settings-list">
        <!-- Section 1: Account -->
        <div class="settings-section">
          <!-- 계정 with Google email -->
          <div class="settings-item" id="item-account">
            <span class="settings-item__label">계정</span>
            <div class="settings-item__value">
              <svg class="settings-item__google-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="11" fill="#4285F4"/>
                <path d="M12 11.2v2.4h3.36c-.15.78-.56 1.44-1.19 1.88v1.56h1.92c1.12-1.04 1.77-2.56 1.77-4.37 0-.42-.04-.83-.11-1.22H12v1.75z" fill="#fff"/>
                <path d="M12 17.6c1.6 0 2.94-.53 3.92-1.44l-1.92-1.56c-.53.36-1.21.57-2 .57-1.54 0-2.84-1.04-3.3-2.44H6.72v1.6C7.7 16.24 9.68 17.6 12 17.6z" fill="#fff"/>
                <path d="M8.7 12.73c-.12-.36-.19-.75-.19-1.15s.07-.79.19-1.15V8.83H6.72C6.26 9.73 6 10.78 6 11.88s.26 2.15.72 3.05l1.98-1.6z" fill="#fff"/>
                <path d="M12 7.88c.87 0 1.65.3 2.26.89l1.7-1.7C14.94 6.13 13.6 5.6 12 5.6 9.68 5.6 7.7 6.96 6.72 8.88l1.98 1.6c.46-1.4 1.76-2.44 3.3-2.44z" fill="#fff"/>
              </svg>
              <span>meme@gmail.com</span>
            </div>
          </div>

          <!-- 비밀번호 -->
          <div class="settings-item" id="item-password">
            <span class="settings-item__label">비밀번호</span>
            <div class="settings-item__chevron">
              <svg class="icon-svg--small icon-svg" viewBox="0 0 24 24"><path d="M10 7l5 5-5 5"/></svg>
            </div>
          </div>
        </div>

        <!-- Section Divider -->
        <hr class="settings-section__divider">

        <!-- Section 2: Legal + Notifications (Figma grouping, with PRD items) -->
        <div class="settings-section">
          <!-- 서비스 이용약관 -->
          <div class="settings-item" id="item-terms">
            <span class="settings-item__label">서비스 이용약관</span>
            <div class="settings-item__chevron">
              <svg class="icon-svg--small icon-svg" viewBox="0 0 24 24"><path d="M10 7l5 5-5 5"/></svg>
            </div>
          </div>

          <!-- 개인정보 처리방침 -->
          <div class="settings-item" id="item-privacy">
            <span class="settings-item__label">개인정보 처리방침</span>
            <div class="settings-item__chevron">
              <svg class="icon-svg--small icon-svg" viewBox="0 0 24 24"><path d="M10 7l5 5-5 5"/></svg>
            </div>
          </div>

          <!-- 차단 관리 (PRD required) -->
          <div class="settings-item" id="item-block-management">
            <span class="settings-item__label">차단 관리</span>
            <div class="settings-item__chevron">
              <svg class="icon-svg--small icon-svg" viewBox="0 0 24 24"><path d="M10 7l5 5-5 5"/></svg>
            </div>
          </div>

          <!-- 알림 설정 (PRD: navigation pattern, Figma: toggle visual) -->
          <div class="settings-item settings-item--no-chevron" id="item-notification" style="padding-right: 20px;">
            <span class="settings-item__label">알림 설정</span>
            <div class="toggle-switch" id="toggle-notification">
              <div class="toggle-switch__knob"></div>
            </div>
          </div>
        </div>

        <!-- Section Divider -->
        <hr class="settings-section__divider">

        <!-- Section 3: Account Actions -->
        <div class="settings-section">
          <!-- 탈퇴하기 -->
          <div class="settings-item settings-item--no-chevron" id="item-delete-account">
            <span class="settings-item__label">탈퇴하기</span>
          </div>

          <!-- 앱 버전 -->
          <div class="settings-item settings-item--no-chevron" style="cursor: default;">
            <span class="settings-item__label">앱 버전</span>
            <span class="settings-item__value-version">1.1.1</span>
          </div>
        </div>
      </div>

      <!-- Logout Bottom Button -->
      <div class="settings-logout-area">
        <button class="settings-logout-btn" id="item-logout">로그아웃</button>
      </div>

      <!-- Logout Confirmation Dialog (Overlay) -->
      <div class="dialog-overlay" id="logout-dialog">
        <div class="dialog">
          <span class="dialog__title">로그아웃</span>
          <span class="dialog__message">정말 로그아웃 하시겠어요?</span>
          <div class="dialog__actions">
            <button class="dialog__btn dialog__btn--cancel" id="btn-logout-cancel">취소</button>
            <button class="dialog__btn dialog__btn--confirm" id="btn-logout-confirm">로그아웃</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ================================
         Screen 2: Coming Soon
         ================================ -->
    <section class="screen" id="screen-coming-soon">
      <!-- Nav Bar -->
      <div class="nav-bar">
        <button class="nav-bar__back" id="btn-coming-soon-back" aria-label="뒤로가기">
          <svg class="icon-svg" viewBox="0 0 24 24"><path d="M14 17l-5-5 5-5"/></svg>
        </button>
        <span class="nav-bar__title" id="coming-soon-title">알림 설정</span>
      </div>

      <!-- Coming Soon Content -->
      <div class="coming-soon">
        <div class="coming-soon__icon">
          <svg class="icon-svg" viewBox="0 0 24 24" style="width:36px;height:36px;">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="coming-soon__title">준비 중</span>
        <span class="coming-soon__desc">해당 기능은 현재 준비 중이에요.<br>곧 만나보실 수 있어요!</span>
      </div>
    </section>

  </div>

  <script>
    // === State ===
    let currentScreen = null;
    let currentState = 'default';
    const navHistory = [];

    // === Navigation ===
    function navigate(screenId, transition = 'slide-left') {
      const target = document.getElementById(screenId);
      if (!target || (currentScreen && currentScreen.id === screenId)) return;

      if (currentScreen) {
        navHistory.push(currentScreen.id);
        currentScreen.classList.remove('active');
        currentScreen.className = currentScreen.className.replace(/transition-\S+/g, '');
      }

      target.classList.add('active');
      if (transition !== 'none') {
        target.classList.add('transition-' + transition);
        target.addEventListener('animationend', function handler() {
          target.classList.remove('transition-' + transition);
          target.removeEventListener('animationend', handler);
        });
      }

      currentScreen = target;
      currentState = 'default';
      closeLogoutDialog();
      updateControlPanel();
    }

    function goBack() {
      if (navHistory.length === 0) return;
      const prevId = navHistory.pop();
      const target = document.getElementById(prevId);
      if (!target) return;

      if (currentScreen) {
        currentScreen.classList.remove('active');
      }

      target.classList.add('active', 'transition-slide-right');
      target.addEventListener('animationend', function handler() {
        target.classList.remove('transition-slide-right');
        target.removeEventListener('animationend', handler);
      });

      currentScreen = target;
      currentState = 'default';
      updateControlPanel();
    }

    function navigateBySelect(screenId) {
      navigate(screenId, 'fade');
    }

    // === Logout Dialog ===
    function openLogoutDialog() {
      const dialog = document.getElementById('logout-dialog');
      if (dialog) {
        dialog.classList.add('active');
        currentState = 'logout-dialog';
        updateStateButtons();
      }
    }

    function closeLogoutDialog() {
      const dialog = document.getElementById('logout-dialog');
      if (dialog) {
        dialog.classList.remove('active');
        currentState = 'default';
        updateStateButtons();
      }
    }

    // === State Toggle ===
    function toggleState(stateName) {
      if (!currentScreen) return;

      if (currentScreen.id === 'screen-settings') {
        if (stateName === 'logout-dialog') {
          openLogoutDialog();
        } else {
          closeLogoutDialog();
        }
      }
    }

    // === Control Panel ===
    function updateControlPanel() {
      if (!currentScreen) return;

      const select = document.getElementById('screen-select');
      if (select) select.value = currentScreen.id;

      const breadcrumb = document.getElementById('breadcrumb');
      if (breadcrumb) {
        const path = [...navHistory, currentScreen.id].join(' \u2192 ');
        breadcrumb.textContent = path;
      }

      updateStateButtons();
    }

    function updateStateButtons() {
      document.querySelectorAll('.control-panel__state-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === currentState);
      });
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      const firstScreen = document.querySelector('.screen');
      if (firstScreen) {
        firstScreen.classList.add('active');
        currentScreen = firstScreen;
        updateControlPanel();
      }

      // --- Event Bindings ---

      // Back buttons
      document.getElementById('btn-settings-back').addEventListener('click', () => goBack());
      document.getElementById('btn-coming-soon-back').addEventListener('click', () => goBack());

      // 계정 (placeholder)
      document.getElementById('item-account').addEventListener('click', () => {
        // Would navigate to account screen
      });

      // 비밀번호 -> Coming Soon
      document.getElementById('item-password').addEventListener('click', () => {
        document.getElementById('coming-soon-title').textContent = '\uBE44\uBC00\uBC88\uD638';
        navigate('screen-coming-soon', 'slide-left');
      });

      // 서비스 이용약관 (WebView placeholder)
      document.getElementById('item-terms').addEventListener('click', () => {
        // Would open WebView
      });

      // 개인정보 처리방침 (WebView placeholder)
      document.getElementById('item-privacy').addEventListener('click', () => {
        // Would open WebView
      });

      // 알림 설정 toggle
      document.getElementById('toggle-notification').addEventListener('click', () => {
        const toggle = document.getElementById('toggle-notification');
        toggle.classList.toggle('off');
      });

      // 차단 관리 -> Coming Soon (PRD required, 준비중)
      document.getElementById('item-block-management').addEventListener('click', () => {
        document.getElementById('coming-soon-title').textContent = '\uCC28\uB2E8 \uAD00\uB9AC';
        navigate('screen-coming-soon', 'slide-left');
      });

      // 탈퇴하기 (navigate placeholder)
      document.getElementById('item-delete-account').addEventListener('click', () => {
        // Would navigate to unregister screen (external)
      });

      // 로그아웃 -> show confirmation dialog
      document.getElementById('item-logout').addEventListener('click', () => {
        openLogoutDialog();
      });

      // Logout dialog buttons
      document.getElementById('btn-logout-cancel').addEventListener('click', () => {
        closeLogoutDialog();
      });

      document.getElementById('btn-logout-confirm').addEventListener('click', () => {
        closeLogoutDialog();
        // Would perform logout
      });

      // Close dialog on backdrop click
      document.getElementById('logout-dialog').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          closeLogoutDialog();
        }
      });
    });
  </script>

</body>
</html>
