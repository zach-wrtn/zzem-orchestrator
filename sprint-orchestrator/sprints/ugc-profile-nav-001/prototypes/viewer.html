<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZEM — Sprint Prototype Viewer</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --sidebar-w: 260px;
    --header-h: 52px;
    --bg: #fff;
    --bg-sidebar: #fafafa;
    --border: #e8e8e8;
    --text: #1a1a1a;
    --text-secondary: #888;
    --text-tertiary: #bbb;
    --brand: #8752FA;
    --brand-light: #f3eeff;
    --phone-bg: #f5f5f5;
  }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); background: var(--bg); }

  /* ===== Top Nav ===== */
  .topnav { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; z-index: 100; }
  .topnav-logo { font-size: 18px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
  .topnav-divider { width: 1px; height: 20px; background: var(--border); margin: 0 16px; }
  .topnav-links { display: flex; gap: 4px; }
  .topnav-links a { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: all 0.15s; cursor: pointer; }
  .topnav-links a:hover { color: var(--text); background: #f5f5f5; }
  .topnav-links a.active { color: var(--brand); background: var(--brand-light); }
  .topnav-right { margin-left: auto; font-size: 11px; color: var(--text-tertiary); }

  /* ===== Sidebar ===== */
  .sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; z-index: 90; }

  /* Tree Node */
  .tree-node { user-select: none; }
  .tree-row { display: flex; align-items: center; padding: 5px 12px; cursor: pointer; transition: background 0.12s; border-radius: 4px; margin: 0 8px; font-size: 13px; color: var(--text-secondary); gap: 4px; }
  .tree-row:hover { background: #eee; color: var(--text); }
  .tree-row.active { background: var(--brand-light); color: var(--brand); font-weight: 500; }

  /* Tree toggle arrow */
  .tree-arrow { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; color: var(--text-tertiary); transition: transform 0.15s; }
  .tree-arrow.open { transform: rotate(90deg); }
  .tree-arrow.leaf { visibility: hidden; }

  /* Tree icon */
  .tree-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }

  /* Tree label */
  .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Tree badge */
  .tree-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; margin-left: auto; }
  .tree-badge.group { background: var(--brand-light); color: var(--brand); }
  .tree-badge.state { background: #eee; color: #999; }

  /* Tree children */
  .tree-children { display: none; padding-left: 12px; }
  .tree-children.open { display: block; }

  /* Depth visual guides */
  .tree-children .tree-row { font-size: 12px; }
  .tree-children .tree-children .tree-row { font-size: 11px; padding-top: 4px; padding-bottom: 4px; }

  /* Separator */
  .tree-sep { height: 1px; background: var(--border); margin: 8px 16px; }

  /* ===== Main Content ===== */
  .main { margin-left: var(--sidebar-w); margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }

  /* ===== Overview Page ===== */
  .page { display: none; padding: 40px; }
  .page.active { display: block; }
  .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .page-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px; max-width: 640px; }

  /* Card Grid */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .proto-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04); overflow: hidden; cursor: pointer; transition: all 0.2s; }
  .proto-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 0 0 1px rgba(135,82,250,0.2); transform: translateY(-2px); }
  .proto-card .card-preview { width: 100%; aspect-ratio: 9/16; background: var(--phone-bg); position: relative; overflow: hidden; }
  .proto-card .card-preview iframe { position: absolute; top: 0; left: 0; width: 390px; height: 844px; border: none; transform-origin: 0 0; pointer-events: none; }
  .proto-card .card-info { padding: 14px; }
  .proto-card .card-info h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .proto-card .card-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .proto-card .card-info .card-tags { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .proto-card .card-info .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--brand-light); color: var(--brand); }

  /* ===== Detail Page ===== */
  .detail-page { display: none; height: calc(100vh - var(--header-h)); }
  .detail-page.active { display: flex; flex-direction: column; }
  .detail-body { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--phone-bg); overflow: hidden; }
  .detail-body iframe { border: none; width: 100%; height: 100%; }

  /* ===== UX Flow Page ===== */
  .flow-page { display: none; padding: 40px; background: #fafafa; min-height: calc(100vh - var(--header-h)); }
  .flow-page.active { display: block; }
  .flow-section { margin-bottom: 48px; }
  .flow-section-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .flow-section-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; }
  .flow-row { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding-bottom: 8px; }
  .flow-phone { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .flow-phone-label { font-size: 11px; font-weight: 600; margin-bottom: 4px; text-align: center; }
  .flow-phone-ac { font-size: 9px; color: var(--brand); margin-bottom: 8px; }
  .flow-phone-frame { width: 180px; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06); background: #fff; position: relative; }
  .flow-phone-frame iframe { position: absolute; top: 0; left: 0; width: 390px; height: 844px; border: none; transform-origin: 0 0; pointer-events: none; }
  .flow-phone-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; max-width: 180px; }
  .flow-phone-actions .fa { font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .flow-phone-actions .fa::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }
  .flow-phone-actions .fa.green::before { background: #34C759; }
  .flow-phone-actions .fa.orange::before { background: #FF9500; }
  .flow-phone-actions .fa.red::before { background: #FF3B30; }
  .flow-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 6px; min-width: 50px; align-self: center; margin-top: 40px; }
  .flow-arrow-line { width: 36px; height: 2px; background: var(--border); position: relative; }
  .flow-arrow-line::after { content: ''; position: absolute; right: -1px; top: -4px; border: 5px solid transparent; border-left-color: var(--border); }
  .flow-arrow-label { font-size: 9px; color: var(--text-tertiary); margin-top: 4px; white-space: nowrap; }
  .flow-note { background: #fff; border: 1px solid var(--border); border-left: 3px solid var(--brand); padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-top: 16px; max-width: 800px; }
  .flow-note strong { color: var(--text); }
</style>
</head>
<body>

<nav class="topnav">
  <span class="topnav-logo">ZZEM</span>
  <div class="topnav-divider"></div>
  <div class="topnav-links">
    <a class="active" data-page="overview" onclick="showPage('overview')">Overview</a>
    <a data-page="flow" onclick="showPage('flow')">UX Flow</a>
  </div>
  <span class="topnav-right">ugc-profile-nav-001 · Phase 3: Prototype</span>
</nav>

<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <div class="page active" id="page-overview">
    <h1 class="page-title">Screens</h1>
    <p class="page-desc">AI UGC Platform 1 — 프로필 & 네비게이션. 각 카드를 클릭하면 인터랙티브 프로토타입을 확인할 수 있습니다.</p>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <div class="detail-page" id="page-detail">
    <div class="detail-body">
      <iframe id="detail-iframe"></iframe>
    </div>
  </div>

  <div class="flow-page" id="page-flow">
    <h1 class="page-title">UX Flow</h1>
    <p class="page-desc">화면 간 네비게이션 흐름을 실제 프로토타입 렌더링으로 확인합니다.</p>
    <div id="flowContent"></div>
  </div>
</div>

<script>
// ===== Prototype Data (Single Source of Truth) =====
const PROTOTYPES = [
  {
    id: 'nav-profile',

    src: 'app/001-tab-navigation/prototype.html',

    screens: [

      { id: 'screen-profile', label: 'MY (Profile Tab)', states: ['default', 'empty', 'loading'] },

  {

    src: 'app/003-profile-edit/prototype.html',
    group: 'G2', groupLabel: 'Edit & Settings',
    tags: ['AC 2.3', 'AC 2.4', 'AC 2.6'],
    screens: [
      { id: 'screen-profile-edit', label: '프로필 편집', states: ['default', 'validation-error', 'saving'] },
      { id: 'screen-share', label: '프로필 공유', states: ['default'] },
    ]
  },
  {
    id: 'settings',
    title: '설정',
    desc: '7개 메뉴: 편집, 알림, 차단, 약관, 개인정보, 로그아웃, 탈퇴',
    src: 'app/004-settings-screen/prototype.html',
    group: 'G2', groupLabel: 'Edit & Settings',
    tags: ['AC 2.8'],
    screens: [
      { id: 'screen-settings', label: '설정 메인', states: ['default', 'logout-dialog'] },
      { id: 'screen-coming-soon', label: '준비 중', states: ['default'] },
    ]
  },
  {
    id: 'other-profile',
    title: '타 유저 프로필',
    desc: '게시물 탭만 노출, 더보기 메뉴, 생성 후 프로필 랜딩',
    src: 'app/005-other-user-profile/prototype.html',
    group: 'G3', groupLabel: 'Social',
    tags: ['AC 7.1', 'AC 7.5', 'AC 2.7'],
    screens: [
      { id: 'screen-other-profile', label: '타 유저 프로필 (게시물)', states: ['default'] },
      { id: 'screen-other-profile-empty', label: '타 유저 프로필 (빈 상태)', states: ['default'] },
      { id: 'screen-more-menu', label: '더보기 바텀시트', states: ['default'] },
      { id: 'screen-my-profile-generating', label: 'MY 게시물 (생성 중)', states: ['default'] },
      { id: 'screen-my-profile-private', label: 'MY 비공개 (신규)', states: ['default'] },
    ]
  },
];

// UX Flow data
const FLOWS = [
  {
    title: '1. 앱 진입 — 탭 네비게이션',
    desc: '하단 3탭(홈/탐색/MY)으로 앱의 주요 섹션을 탐색합니다.',
    phones: [
      { label: '홈 (탭 1)', ac: 'AC 2.1 · Default Landing', protoId: 'nav-profile', screenId: 'screen-home', actions: ['콘텐츠 탭 → 세로 스와이프', {t:'프로필 영역 → 타 유저 프로필',c:'green'}] },
      { label: '탐색 (탭 2)', ac: 'AC 2.1', protoId: 'nav-profile', screenId: 'screen-explore', actions: ['홈과 동일 콘텐츠 풀'] },
      { label: 'MY 프로필 (탭 3)', ac: 'AC 2.1, 2.2', protoId: 'nav-profile', screenId: 'screen-profile', actions: ['⚙️ → 설정 화면', {t:'편집 버튼 → 프로필 편집',c:'green'}, {t:'공유 버튼 → OS 공유 시트',c:'green'}, {t:'비회원 → 로그인',c:'red'}] },
    ],
    arrows: ['탭 전환', '탭 전환'],
    note: '<strong>비회원 규칙:</strong> 비회원은 홈(탭1)만 탐색 가능. MY 탭, 알림, 인터랙션 버튼 탭 시 → 로그인 페이지로 리다이렉트.'
  },
  {
    title: '2. 프로필 상세 플로우',
    desc: 'MY 프로필에서 편집, 공유, 설정으로의 네비게이션 흐름.',
    phones: [
      { label: 'MY 프로필', ac: '진입점', protoId: 'nav-profile', screenId: 'screen-profile' },
      { label: '프로필 편집', ac: 'AC 2.4, 2.6', protoId: 'profile-edit', screenId: 'screen-profile-edit', actions: [{t:'이미지 탭 → 카메라/앨범',c:'orange'}, {t:'저장 → 프로필 반영',c:'green'}] },
      { label: '설정', ac: 'AC 2.8', protoId: 'settings', screenId: 'screen-settings', actions: ['프로필 편집', {t:'알림 설정 → 준비 중',c:'red'}, {t:'로그아웃 → 확인 다이얼로그',c:'orange'}] },
    ],
    arrows: ['편집 버튼', '⚙️ 아이콘'],
    note: '<strong>닉네임 자동 생성 (AC 2.6):</strong> 최초 프로필 생성 시 "형용사+동물+4자리숫자" 자동 생성.'
  },
  {
    title: '3. 타 유저 프로필 & 세로 스와이프',
    desc: '피드에서 타 유저 프로필 진입, 콘텐츠 상세 보기 흐름.',
    phones: [
      { label: '홈 피드', ac: '진입점', protoId: 'nav-profile', screenId: 'screen-home', actions: [{t:'프로필 영역 탭',c:'green'}] },
      { label: '타 유저 프로필', ac: 'AC 7.1', protoId: 'other-profile', screenId: 'screen-other-profile', actions: ['게시물 탭만 노출', {t:'⋯ → 프로필 URL 복사',c:'orange'}, {t:'차단/신고 → PRD 3',c:'red'}] },
      { label: '세로 스와이프 피드', ac: 'AC 2.5', placeholder: { icon: '📱', title: '세로 스와이프', desc: '해당 유저/탭의 콘텐츠만 노출' } },
    ],
    arrows: ['유저 탭', '콘텐츠 탭'],
    note: '<strong>진입점:</strong> 세로 스와이프 피드의 좌측 하단 프로필 영역 / 팔로워·팔로잉 리스트 → 타 유저 프로필.'
  },
  {
    title: '4. 생성 후 랜딩 플로우',
    desc: '밈 생성 완료 후 MY 프로필 화면으로의 랜딩 규칙.',
    phones: [
      { label: '필터 기반 생성', ac: 'isPublished = true', placeholder: { icon: '🎨', title: '필터 기반 생성', desc: '공개 콘텐츠로 생성', bg: '#f5f0ff' } },
      { label: 'MY → 게시물(공개) 탭', ac: 'AC 2.7', protoId: 'other-profile', screenId: 'screen-my-profile-generating', actions: [{t:'생성 완료 콘텐츠 노출',c:'green'}, {t:'생성 중 → 스피너',c:'orange'}, {t:'생성 실패 → 재시도',c:'red'}] },
    ],
    arrows: ['게시물 탭'],
    note: '<strong>규칙:</strong> 생성 직후 진입에만 적용. 일반 진입은 AC 2.1 디폴트 탭 규칙 (공개→비공개→게시물 폴백).<br><strong>마이그레이션:</strong> 기존 밈은 isPublished 미존재 = 비공개 탭 자동 분류.'
  },
];

// ===== State =====
let currentView = 'overview'; // overview | detail | flow
let currentProto = null;
let currentScreen = null;
let currentState = null;

// ===== Sidebar Rendering =====
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';

  // Overview & Flow links
  html += `<div class="tree-node">
    <div class="tree-row ${currentView === 'overview' ? 'active' : ''}" onclick="showPage('overview')">
      <span class="tree-arrow leaf">›</span>
      <span class="tree-icon">📋</span>
      <span class="tree-label">Overview</span>
    </div>
  </div>`;
  html += `<div class="tree-node">
    <div class="tree-row ${currentView === 'flow' ? 'active' : ''}" onclick="showPage('flow')">
      <span class="tree-arrow leaf">›</span>
      <span class="tree-icon">🔀</span>
      <span class="tree-label">UX Flow</span>
    </div>
  </div>`;

  html += '<div class="tree-sep"></div>';

  // Group prototypes
  const groups = {};
  PROTOTYPES.forEach(p => {
    if (!groups[p.group]) groups[p.group] = { label: p.groupLabel, items: [] };
    groups[p.group].items.push(p);
  });

  for (const [gid, g] of Object.entries(groups)) {
    const isGroupOpen = g.items.some(p => currentProto?.id === p.id) || currentView === 'overview';

    html += `<div class="tree-node">
      <div class="tree-row" onclick="toggleChildren(this)" style="font-weight:600; font-size:11px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px;">
        <span class="tree-arrow ${isGroupOpen ? 'open' : ''}">›</span>
        <span class="tree-label">${gid} — ${g.label}</span>
      </div>
      <div class="tree-children ${isGroupOpen ? 'open' : ''}">`;

    g.items.forEach(proto => {
      const isProtoActive = currentProto?.id === proto.id;
      const isProtoOpen = isProtoActive;

      html += `<div class="tree-node">
        <div class="tree-row ${isProtoActive && !currentScreen ? 'active' : ''}" onclick="selectProto('${proto.id}')">
          <span class="tree-arrow ${proto.screens.length ? (isProtoOpen ? 'open' : '') : 'leaf'}">›</span>
          <span class="tree-icon">📱</span>
          <span class="tree-label">${proto.title}</span>
          <span class="tree-badge group">${proto.group}</span>
        </div>
        <div class="tree-children ${isProtoOpen ? 'open' : ''}">`;

      proto.screens.forEach(screen => {
        const isScreenActive = currentScreen?.id === screen.id && currentProto?.id === proto.id;
        const isScreenOpen = isScreenActive && screen.states.length > 1;

        html += `<div class="tree-node">
          <div class="tree-row ${isScreenActive ? 'active' : ''}" onclick="selectScreen('${proto.id}', '${screen.id}')">
            <span class="tree-arrow ${screen.states.length > 1 ? (isScreenOpen ? 'open' : '') : 'leaf'}">›</span>
            <span class="tree-label">${screen.label}</span>
          </div>`;

        if (screen.states.length > 1) {
          html += `<div class="tree-children ${isScreenOpen ? 'open' : ''}">`;
          screen.states.forEach(state => {
            const isStateActive = currentState === state && isScreenActive;
            html += `<div class="tree-node">
              <div class="tree-row ${isStateActive ? 'active' : ''}" onclick="selectState('${proto.id}', '${screen.id}', '${state}')">
                <span class="tree-arrow leaf">›</span>
                <span class="tree-label">${state}</span>
                <span class="tree-badge state">state</span>
              </div>
            </div>`;
          });
          html += `</div>`;
        }

        html += `</div>`;
      });

      html += `</div></div>`;
    });

    html += `</div></div>`;
  }

  sb.innerHTML = html;
}

function toggleChildren(row) {
  const arrow = row.querySelector('.tree-arrow');
  const children = row.parentElement.querySelector('.tree-children');
  if (arrow && children) {
    arrow.classList.toggle('open');
    children.classList.toggle('open');
  }
}

// ===== Card Grid Rendering =====
function renderCardGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = PROTOTYPES.map(p => `
    <div class="proto-card" onclick="selectProto('${p.id}')">
      <div class="card-preview">
        <iframe src="${p.src}" loading="lazy"></iframe>
      </div>
      <div class="card-info">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  setTimeout(scaleCardPreviews, 300);
}

// ===== Flow Rendering =====
function renderFlowContent() {
  const container = document.getElementById('flowContent');
  container.innerHTML = FLOWS.map(flow => {
    let phonesHtml = '';
    flow.phones.forEach((phone, i) => {
      if (i > 0 && flow.arrows[i-1]) {
        phonesHtml += `<div class="flow-arrow">
          <div class="flow-arrow-line"></div>
          <div class="flow-arrow-label">${flow.arrows[i-1]}</div>
        </div>`;
      }

      let frameHtml;
      if (phone.placeholder) {
        const bg = phone.placeholder.bg || '#1a1a24';
        const textColor = bg === '#1a1a24' ? '#fff' : 'var(--brand)';
        frameHtml = `<div class="flow-phone-frame" style="height:390px; background:${bg}; display:flex; align-items:center; justify-content:center;">
          <div style="text-align:center; color:#888; font-size:12px; padding:20px;">
            <div style="font-size:48px; margin-bottom:12px;">${phone.placeholder.icon}</div>
            <div style="font-weight:600; color:${textColor}; margin-bottom:4px;">${phone.placeholder.title}</div>
            <div>${phone.placeholder.desc}</div>
          </div>
        </div>`;
      } else {
        const proto = PROTOTYPES.find(p => p.id === phone.protoId);
        frameHtml = `<div class="flow-phone-frame">
          <iframe src="${proto.src}" loading="lazy" data-screen="${phone.screenId}"></iframe>
        </div>`;
      }

      let actionsHtml = '';
      if (phone.actions) {
        actionsHtml = '<div class="flow-phone-actions">' +
          phone.actions.map(a => {
            if (typeof a === 'string') return `<div class="fa">${a}</div>`;
            return `<div class="fa ${a.c}">${a.t}</div>`;
          }).join('') + '</div>';
      }

      phonesHtml += `<div class="flow-phone">
        <div class="flow-phone-label">${phone.label}</div>
        <div class="flow-phone-ac">${phone.ac}</div>
        ${frameHtml}
        ${actionsHtml}
      </div>`;
    });

    return `<div class="flow-section">
      <div class="flow-section-title">${flow.title}</div>
      <div class="flow-section-desc">${flow.desc}</div>
      <div class="flow-row">${phonesHtml}</div>
      <div class="flow-note">${flow.note}</div>
    </div>`;
  }).join('');

  setTimeout(scaleFlowPhones, 500);
  setTimeout(initFlowScreens, 1000);
}

// ===== Navigation =====
function showPage(page) {
  currentView = page;
  currentProto = null;
  currentScreen = null;
  currentState = null;

  document.querySelectorAll('.page, .detail-page, .flow-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

  document.querySelectorAll('.topnav-links a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });

  renderSidebar();
  if (page === 'overview') setTimeout(scaleCardPreviews, 100);
}

function selectProto(protoId) {
  const proto = PROTOTYPES.find(p => p.id === protoId);
  if (!proto) return;

  currentView = 'detail';
  currentProto = proto;
  currentScreen = proto.screens[0] || null;
  currentState = currentScreen?.states[0] || null;

  document.querySelectorAll('.page, .detail-page, .flow-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('detail-iframe').src = proto.src;
  document.querySelectorAll('.topnav-links a').forEach(a => a.classList.remove('active'));

  renderSidebar();
}

function selectScreen(protoId, screenId) {
  const proto = PROTOTYPES.find(p => p.id === protoId);
  if (!proto) return;

  const screen = proto.screens.find(s => s.id === screenId);
  if (!screen) return;

  // If different proto, switch
  if (!currentProto || currentProto.id !== protoId) {
    selectProto(protoId);
  }

  currentScreen = screen;
  currentState = screen.states[0] || null;
  currentView = 'detail';

  // Control iframe
  const iframe = document.getElementById('detail-iframe');
  try {
    const doc = iframe.contentWindow.document;
    const select = doc.getElementById('screen-select');
    if (select) {
      select.value = screenId;
      select.dispatchEvent(new Event('change'));
    }
    // Also call navigateBySelect if it exists
    if (iframe.contentWindow.navigateBySelect) {
      iframe.contentWindow.navigateBySelect(screenId);
    }
  } catch(e) { /* cross-origin */ }

  renderSidebar();
}

function selectState(protoId, screenId, state) {
  // First ensure correct screen
  if (!currentScreen || currentScreen.id !== screenId || !currentProto || currentProto.id !== protoId) {
    selectScreen(protoId, screenId);
    // Wait for screen switch then set state
    setTimeout(() => _applyState(state), 200);
  } else {
    _applyState(state);
  }

  currentState = state;
  renderSidebar();
}

function _applyState(state) {
  const iframe = document.getElementById('detail-iframe');
  try {
    if (iframe.contentWindow.toggleState) {
      iframe.contentWindow.toggleState(state);
    }
  } catch(e) {}
}

// ===== Scaling =====
function scaleCardPreviews() {
  document.querySelectorAll('.card-preview').forEach(c => {
    const iframe = c.querySelector('iframe');
    if (!iframe) return;
    const scale = c.offsetWidth / 390;
    iframe.style.transform = `scale(${scale})`;
  });
}

function scaleFlowPhones() {
  document.querySelectorAll('.flow-phone-frame').forEach(frame => {
    const iframe = frame.querySelector('iframe');
    if (!iframe) return;
    const scale = frame.offsetWidth / 390;
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = '0 0';
    frame.style.height = (844 * scale) + 'px';
  });
}

function initFlowScreens() {
  document.querySelectorAll('.flow-phone-frame iframe[data-screen]').forEach(iframe => {
    iframe.addEventListener('load', () => {
      try {
        const screenId = iframe.dataset.screen;
        if (iframe.contentWindow.navigateBySelect) {
          iframe.contentWindow.navigateBySelect(screenId);
        } else {
          const select = iframe.contentWindow.document.getElementById('screen-select');
          if (select) { select.value = screenId; select.dispatchEvent(new Event('change')); }
        }
      } catch(e) {}
    });
  });
}

// ===== Init =====
renderSidebar();
renderCardGrid();
renderFlowContent();
window.addEventListener('resize', () => { scaleCardPreviews(); scaleFlowPhones(); });
</script>

</body>
</html>
