# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: "프로필 사진 영역 tap 시 변경 옵션을 명확히 제공하여 사용자가 사진 변경 진입점을 한 번에 인지하게 한다."
  target_user: "프로필 편집 중인 ZZEM 사용자 (닉네임/아바타 갱신 의도)"
  success_metric: "AC-1.3 통과 — 라이브러리 선택 / 삭제 / 취소 모두 1 tap 진입 가능"
  user_stories:
    - id: "US-1"
      as_a: "프로필 사진을 바꾸고 싶은 사용자"
      i_want: "사진 영역을 tap 하면 옵션 시트가 떠서 어떤 행동이 가능한지 즉시 본다"
      so_that: "변경 / 삭제 중 무엇을 할지 모호함 없이 결정한다"
  acceptance_criteria:
    - id: "AC-1.3"
      given: "사용자가 프로필편집_메인 화면에 있다"
      when: "프로필 사진 영역을 tap 한다"
      then: "바텀시트가 slide-up 으로 진입하며 backdrop dim + '앨범에서 선택' / '기본 이미지로 변경' / '취소' 옵션 3개를 보여준다"
      ui_impact: "modal archetype: backdrop opacity ≥0.4, drag handle, 옵션 row × 3, divider, 외부 backdrop tap dismiss"
    - id: "AC-1.3a"
      given: "바텀시트가 열려있다"
      when: "'앨범에서 선택' tap"
      then: "app-009 (앨범 picker) 진입"
      ui_impact: "옵션 row 1 의 navigate 액션"
    - id: "AC-1.3b"
      given: "바텀시트가 열려있다"
      when: "'기본 이미지로 변경' tap"
      then: "default avatar 적용 + sheet dismiss + 부모 form '저장' 활성화"
      ui_impact: "옵션 row 2 의 즉시 적용 + close-overlay"
    - id: "AC-1.3c"
      given: "바텀시트가 열려있다"
      when: "'취소' tap 또는 backdrop tap"
      then: "sheet dismiss 하고 부모 화면으로 복귀"
      ui_impact: "modal persona 강제 룰 #2 — 닫기 2-way (cancel + backdrop)"

