# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "부모 화면 (프로필편집_메인) 은 muted/faded 상태로 backdrop 아래 노출. modal persona 권장 룰 #1 (bottom sheet form) 준수"
      applies_to: ["프로필편집_사진_바텀시트_선택"]
    - rule: "Sheet title '프로필 사진' 은 sheet 상단 고정 — modal persona 강제 룰 #4 (사용자 위치 인지)"
      applies_to: ["프로필편집_사진_바텀시트_선택"]
    - rule: "옵션 row 3개는 동일 height (52px) + 24x24 leading icon + divider 1px alternative line"
      applies_to: ["프로필편집_사진_바텀시트_선택"]
    - rule: "'취소' 는 row 가 아닌 별도 버튼 (전체폭 + radius-md + bg surface-button) — iOS Action Sheet 관례 + modal persona 강제 룰 #3 충족 (primary 0 + secondary 0, cancel 은 별도 dismiss)"
      applies_to: ["프로필편집_사진_바텀시트_선택"]
  conditional_rendering:
    - condition: "state == 'open'"
      variant_a: "backdrop visible (opacity 0.4) + sheet translateY(0) + 부모 화면 muted"
      variant_b: "(state == 'dismissing') backdrop fade-out + sheet translateY(100%)"
  constraints:
    - "Backdrop opacity 0.4 이상 필수 (modal persona #1)"
    - "닫기 2-way: 취소 버튼 + backdrop tap (modal persona #2)"
    - "Primary CTA 0 + secondary 0 — 본 시트는 picker 형 (사용자가 옵션 1을 골라 다음 화면으로 가는 분기점). modal persona #3: '결정 단순화' 충족 — 모든 row 가 동등한 시각 weight"
    - "Sheet title '프로필 사진' 표기 (modal persona #4)"
    - "Drag handle (─) 상단 가시 (modal persona 권장 #2)"
    - "Pretendard 외 font 금지 (Pass 6 #4)"
    - "raw hex 금지 — tokens.css 정의된 var(--*) 만 사용 (Pass 6 #1)"
    - "interactive 요소에 unicode emoji 금지 — Lucide-style inline SVG (Pass 6 #2)"
    - "blocking dialog (alert/confirm/prompt) 금지 (Pass 6 #8)"
  priority_order:
    - "BottomSheet (시각 우선 — 사용자 attention 집중)"
    - "Backdrop dim (부모와의 분리)"
    - "Cancel 버튼 (escape route 가시성)"
    - "Parent scaffold (faded 배경)"

