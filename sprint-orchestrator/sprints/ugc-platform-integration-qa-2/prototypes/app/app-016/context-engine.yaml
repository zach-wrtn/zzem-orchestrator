why:
  product_intent: "차단을 해제한 직후 타유저 프로필이 정상 상태로 복원되었음을 즉각 시각·인지로 확인하게 하여 차단 해제 액션의 결과를 1-step에 검증한다."
  target_user: "타유저를 차단했다가 다시 해제한 ZZEM 사용자"
  success_metric: "AC-2.3 + AC-2.5 통과 — 차단됨 indicator 제거 + 콘텐츠 정상 노출 + Toast 1회 표시 후 자동 dismiss"
  user_stories:
    - id: "US-1"
      as_a: "차단을 해제한 사용자"
      i_want: "프로필 화면이 정상 콘텐츠로 즉시 복원된 것을 확인하고 싶다"
      so_that: "해제 액션이 실제로 적용됐음을 별도 새로고침 없이 검증한다"
  acceptance_criteria:
    - id: "AC-2.3"
      given: "차단된 사용자 프로필을 보고 있다 (app-014 차단됨 상태)"
      when: "더보기(app-015) → '차단 해제' tap → 해제 API 성공"
      then: "동일 프로필 화면이 정상 상태로 복원되어 콘텐츠/메타가 보인다"
      ui_impact: "차단됨 indicator/안내 카드 제거 + 콘텐츠 그리드 표시 + 팔로우/메시지 버튼 활성"
    - id: "AC-2.5"
      given: "해제가 성공적으로 적용되었다"
      when: "프로필 복원 직후"
      then: "'{nickname}님 차단을 해제했어요' Toast 가 표시되고 3s 내 auto-dismiss"
      ui_impact: "Toast component (sticky bottom-area, single line, role=status) — 3s timer"

