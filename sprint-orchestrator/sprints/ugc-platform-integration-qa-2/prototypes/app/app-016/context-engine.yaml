# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "HeaderBar(48) → ProfileHero(~320) → ContentTabBar(44, sticky) → ContentGrid(scroll) → BottomNav(64)"
      applies_to: ["OtherProfileScreen-Unblocked"]
    - rule: "Hero 영역 단일 시각 앵커 — 320px 이상, 다른 메타 행 4개 이내 (detail persona 강제 룰 #1·#3)"
      applies_to: ["ProfileHero"]
    - rule: "Primary CTA 1개 (팔로우) + secondary 1-2개 (메시지 + 더보기) — 위계 명확 (detail persona 강제 룰 #4)"
      applies_to: ["ProfileHero CTA cluster"]
    - rule: "back 1-way: 좌상단 ← 만 노출 (detail persona 강제 룰 #2)"
      applies_to: ["HeaderBar"]
    - rule: "Toast 는 default 진입 시 표시 후 3s 자동 dismiss — 별도 닫기 버튼 없음"
      applies_to: ["Toast"]
    - rule: "alert/confirm/prompt 절대 사용 금지 (Pass 6 #8 + verifier hang 방지)"
      applies_to: ["all interactions"]
  conditional_rendering:
    - condition: "state == default (toast-visible)"
      variant_a: "Toast 표시 + 그리드 정상 콘텐츠"
      variant_b: null
    - condition: "state == toast-dismissed"
      variant_a: "Toast 숨김 + 그리드 정상 (영구 상태)"
      variant_b: null
    - condition: "팔로우 button tap → 즉시 '팔로잉' 으로 토글 (시각 변화만 — actual API 별도)"
      variant_a: "label '팔로우' → '팔로잉', fill brand → secondary"
      variant_b: null
  constraints:
    - "BottomNav 항상 sticky-bottom"
    - "차단됨 indicator/안내 카드는 DOM 에 존재하지 않음 (이전 차단 상태와 시각적 차이 명확화)"
    - "Toast bottom: 80px (BottomNav 위로 16px 여백)"
    - "ContentTabBar sticky-top: HeaderBar(48) 아래"
    - "Avatar placeholder: pe-avatar-empty-bg + pe-avatar-border ring (실 이미지 미사용 — gradient-token kind)"
    - "Feed cell 비율 mix: 1:1 / 4:5 — meme-card 패턴 (asset Layer kind=gradient-token)"
  priority_order:
    - "1. Toast (해제 결과 즉시 인지) — 자동 사라짐 전 1순위 시각 신호"
    - "2. Profile Hero (정상 복원 확인)"
    - "3. Content Grid (콘텐츠 노출 = 차단 해제 검증)"
    - "4. Follow CTA (다음 행동 enabling)"
    - "5. ContentTabBar / BottomNav (이동 경로)"

