  --wds-color-neutral-100: #F0F1F3;
  --wds-color-neutral-200: #E4E5E9;
  --wds-color-neutral-300: #D1D3D8;

  --wds-fill-neutral:       var(--wds-color-neutral-100);

  --wds-label-normal:      var(--wds-color-neutral-900);

  --pe-text-secondary:  #656565;
  --pe-text-tertiary:   #8A8A8A;
  --pe-avatar-empty-bg: #F5F3FF;
  --pe-avatar-border:   rgba(136, 136, 136, 0.2);

   */
  --thumb-warm-1: #FFF3E0;
  --thumb-warm-2: #FFCC80;
  --thumb-warm-3: #FB8C00;
  --thumb-cool-1: #E1F5FE;
  --thumb-cool-2: #81D4FA;
  --thumb-cool-3: #0288D1;
  --thumb-pink-1: #FCE4EC;
  --thumb-pink-2: #F48FB1;
  --thumb-pink-3: #C2185B;
  --thumb-green-1: #F1F8E9;
  --thumb-green-2: #AED581;
  --thumb-green-3: #558B2F;
  --thumb-purple-1: #EDE7F6;
  --thumb-purple-2: #B39DDB;
  --thumb-purple-3: #512DA8;
  --thumb-yellow-1: #FFFDE7;
  --thumb-yellow-2: #FFF176;
  --thumb-yellow-3: #F9A825;
  --card-1: linear-gradient(135deg, var(--thumb-warm-1), var(--thumb-warm-2) 60%, var(--thumb-warm-3));
  --card-2: linear-gradient(135deg, var(--thumb-cool-1), var(--thumb-cool-2) 60%, var(--thumb-cool-3));
  --card-3: linear-gradient(135deg, var(--thumb-pink-1), var(--thumb-pink-2) 60%, var(--thumb-pink-3));
  --card-4: linear-gradient(135deg, var(--thumb-green-1), var(--thumb-green-2) 60%, var(--thumb-green-3));
  --card-5: linear-gradient(135deg, var(--thumb-purple-1), var(--thumb-purple-2) 60%, var(--thumb-purple-3));
  --card-6: linear-gradient(135deg, var(--thumb-yellow-1), var(--thumb-yellow-2) 60%, var(--thumb-yellow-3));

  --wds-spacing-0: 0px;
  --wds-spacing-1: 1px;
  --wds-spacing-2: 2px;
  --wds-spacing-4: 4px;
  --wds-spacing-6: 6px;
  --wds-spacing-8: 8px;
  --wds-spacing-10: 10px;
  --wds-spacing-12: 12px;
  --wds-spacing-14: 14px;
  --wds-spacing-16: 16px;
  --wds-spacing-20: 20px;
  --wds-spacing-24: 24px;
  --wds-spacing-32: 32px;
  --wds-spacing-40: 40px;
  --wds-spacing-48: 48px;
  --wds-spacing-64: 64px;
  --wds-spacing-80: 80px;
  --wds-radius-xs:  4px;
  --wds-radius-sm:  8px;
  --wds-radius-md:  12px;
  --wds-radius-lg:  16px;
  --wds-radius-xl:  20px;
  --wds-radius-full: 9999px;
  --wds-font-family-primary: 'Pretendard', -apple-system, 'SF Pro Display', sans-serif;
  --wds-font-weight-regular:  400;
  --wds-font-weight-medium:   500;
  --wds-font-weight-semibold: 600;
  --wds-font-weight-bold:     700;
  --wds-font-size-2xs: 11px;
  --wds-font-size-xs:  12px;
  --wds-font-size-sm:  13px;
  --wds-font-size-md:  14px;
  --wds-font-size-lg:  16px;
  --wds-font-size-xl:  18px;
  --wds-font-size-2xl: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--wds-font-family-primary);
  background: #E7E8EB;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 16px;
  color: var(--wds-label-normal);
}

/* === Control Panel (외부 — Pass 6 audit 제외 영역) === */
.control-panel {
  width: 390px; background: #1a1a2e; color: #e0e0e0;
  border-radius: 12px 12px 0 0; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 8px;
  font-size: 13px; font-family: ui-monospace, monospace;
}
.control-panel__row { display: flex; align-items: center; gap: 8px; }
.control-panel__label { color: #888; font-size: 11px; min-width: 56px; }
.control-panel select {
  background: #2a2a3e; color: #e0e0e0; border: 1px solid #444;
  border-radius: 6px; padding: 4px 8px; font-size: 12px; flex: 1;
  font-family: ui-monospace, monospace;
}
.control-panel__states { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.control-panel__state-btn {
  background: #2a2a3e; color: #bbb; border: 1px solid #444;
  border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
  transition: all 0.15s; font-family: ui-monospace, monospace;
}
.control-panel__state-btn.active {
  background: var(--wds-color-purple-500); color: #fff; border-color: var(--wds-color-purple-500);
}
.control-panel__breadcrumb { color: #888; font-size: 11px; font-family: ui-monospace, monospace; }
.control-panel__hint { color: #999; font-size: 10px; font-style: italic; }

/* === Device Frame === */
.device-frame {
  width: 390px; height: 844px;
  background: var(--wds-background-normal);
  overflow: hidden; position: relative;
  border: 1px solid #ddd;
  border-radius: 0 0 12px 12px;
  display: flex; flex-direction: column;
}
.screen { display: flex; flex-direction: column; height: 100%; }

/* === Status Bar === */
.status-bar {
  height: 44px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px;
  font-size: var(--wds-font-size-md);
  font-weight: var(--wds-font-weight-semibold);
  flex-shrink: 0;
  color: var(--wds-label-normal);
}
.status-bar__icons { display: flex; gap: 6px; align-items: center; }
.status-bar__icons svg { display: block; }

/* === Header Bar === */
.header-bar {
  height: 48px;
  display: grid; grid-template-columns: 48px 1fr 48px;
  align-items: center;
  padding: 0 var(--wds-spacing-8);
  background: var(--wds-background-normal);
  border-bottom: 1px solid var(--wds-line-alternative);
  flex-shrink: 0;
}
.header-bar__title {
  font-size: var(--wds-font-size-lg);
  font-weight: var(--wds-font-weight-semibold);
  text-align: center;
  color: var(--wds-label-normal);
  margin: 0;
}
.icon-btn {
  width: 44px; height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  background: none; border: 0; cursor: pointer;
  color: var(--wds-label-normal);
  padding: 0;
}

/* === Body Scroll === */
.body-scroll {
  flex: 1; overflow-y: auto; position: relative;
  padding-bottom: 64px;
}

/* === Profile Hero (detail persona 강제 룰 #1: ≥320px) === */
.profile-hero {
  display: flex; flex-direction: column; align-items: center;
  padding: var(--wds-spacing-24) var(--wds-spacing-20) var(--wds-spacing-16);
  gap: var(--wds-spacing-16);
  background: var(--wds-background-normal);
  min-height: 320px;
}
.avatar {
  width: 100px; height: 100px;
  border-radius: var(--wds-radius-full);
  background: var(--pe-avatar-empty-bg);
  border: 1px solid var(--pe-avatar-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: var(--wds-color-purple-500);
  font-weight: var(--wds-font-weight-bold);
  flex-shrink: 0;
}
.nickname {
  margin: 0;
  font-size: var(--wds-font-size-xl);
  font-weight: var(--wds-font-weight-bold);
  line-height: 1.35;
  color: var(--wds-label-normal);
}
.bio {
  margin: -8px 0 0;
  font-size: var(--wds-font-size-sm);
  font-weight: var(--wds-font-weight-medium);
  color: var(--wds-label-alternative);
  text-align: center;
  line-height: 1.45;
  max-width: 320px;
}
.count-row {
  list-style: none; padding: 0; margin: 0; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
}
.count-tile {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: var(--wds-spacing-4) 0;
}
.count-value {
  font-size: var(--wds-font-size-xl);
  font-weight: var(--wds-font-weight-semibold);
  color: var(--wds-label-normal);
  line-height: 1.5;
}
.count-label {
  font-size: var(--wds-font-size-xs);
  font-weight: var(--wds-font-weight-medium);
  color: var(--wds-label-alternative);
  line-height: 1.5;
}
.cta-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: var(--wds-spacing-6);
  width: 100%;
  max-width: 335px;
  margin-top: var(--wds-spacing-4);
}
/* === Buttons (detail persona 강제 룰 #4: primary 1 + secondary 0-2) === */
.btn-primary {
  height: 40px;
  border-radius: var(--component-button-radius);
  background: var(--component-button-primary-fill);
  color: var(--component-button-primary-label);
  border: 0;
  font-size: var(--wds-font-size-md);
  font-weight: var(--wds-font-weight-semibold);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.btn-primary[data-followed="true"] {
  background: var(--wds-surface-tertiary);
  color: var(--wds-label-normal);
}
.btn-secondary {
  height: 40px;
  border-radius: var(--component-button-radius);
  background: var(--wds-surface-tertiary);
  color: var(--wds-label-normal);
  border: 0;
  font-size: var(--wds-font-size-md);
  font-weight: var(--wds-font-weight-semibold);
  cursor: pointer;
  font-family: inherit;
}

/* === Content Tab Bar === */
.tab-bar {
  display: flex; justify-content: center; gap: 32px;
  padding: 8px 0 0;
  background: var(--wds-background-normal);
  border-bottom: 1px solid var(--wds-line-alternative);
  position: sticky; top: 0;
  z-index: 2;
  flex-shrink: 0;
}
.tab-item {
  width: 60px; height: 44px;
  border: 0; background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
  position: relative;
  color: var(--wds-label-assistive);
  font-family: inherit;
}
.tab-item svg { width: 24px; height: 24px; display: block; }
.tab-item[aria-selected="true"] { color: var(--wds-label-normal); }
.tab-item[aria-selected="true"]::after {
  content: "";
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 2px;
  background: var(--wds-label-normal);
}
.tab-item[aria-disabled="true"] {
  color: var(--wds-label-disabled);
  cursor: not-allowed;
}

/* === Content Grid === */
.feed-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--wds-line-alternative);
  padding: 1px 0 0;
}
.meme-card {
  position: relative;
  background: var(--wds-surface-secondary);
  border-radius: var(--wds-radius-xs);
  overflow: hidden;
  aspect-ratio: 1 / 1;
  cursor: pointer;
}
.meme-card.ratio-4-5 { aspect-ratio: 4 / 5; }
.meme-card::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 60%);
  pointer-events: none;
  z-index: 1;
}
.meme-card .placeholder-image {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.85);
  font-size: var(--wds-font-size-2xs);
  font-weight: var(--wds-font-weight-semibold);
  letter-spacing: 0.5px;
}
.meme-card.card-1 .placeholder-image { background: var(--card-1); }
.meme-card.card-2 .placeholder-image { background: var(--card-2); }
.meme-card.card-3 .placeholder-image { background: var(--card-3); }
.meme-card.card-4 .placeholder-image { background: var(--card-4); }
.meme-card.card-5 .placeholder-image { background: var(--card-5); }
.meme-card.card-6 .placeholder-image { background: var(--card-6); }
.like-badge {
  position: absolute;
  bottom: var(--wds-spacing-8);
  right: var(--wds-spacing-8);
  display: inline-flex; align-items: center; gap: var(--wds-spacing-4);
  padding: 2px var(--wds-spacing-8);
  border-radius: var(--wds-radius-full);
  background: rgba(0,0,0,0.55);
  color: var(--wds-label-inverse);
  font-size: var(--wds-font-size-xs);
  font-weight: var(--wds-font-weight-semibold);
  line-height: 1.5;
  z-index: 2;
}
.like-badge svg { width: 12px; height: 12px; }

/* === Bottom Nav === */
.bottom-nav {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 64px;
  border-top: 0.5px solid var(--wds-line-alternative);
  background: var(--wds-background-normal);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: var(--wds-spacing-8);
  z-index: 5;
}
.bottom-nav__item {
  background: none; border: 0; cursor: pointer;
  color: var(--wds-label-assistive);
  padding: var(--wds-spacing-8) var(--wds-spacing-12);
  display: inline-flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: var(--wds-font-size-2xs);
  font-weight: var(--wds-font-weight-medium);
  font-family: inherit;
}
.bottom-nav__item svg { width: 22px; height: 22px; display: block; }
.bottom-nav__item.active { color: var(--wds-label-normal); }

/* === Toast (auto-dismiss, no alert/confirm — verifier-safe) === */
.toast {
  position: absolute;
  left: var(--wds-spacing-16);
  right: var(--wds-spacing-16);
  bottom: 80px;
  background: var(--wds-color-neutral-900);
  color: var(--wds-label-inverse);
  padding: var(--wds-spacing-12) var(--wds-spacing-16);
  border-radius: var(--wds-radius-lg);
  font-size: var(--wds-font-size-sm);
  font-weight: var(--wds-font-weight-medium);
  z-index: 50;
  display: flex; align-items: center; gap: var(--wds-spacing-8);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.toast__icon { display: inline-flex; color: var(--wds-color-green-500); }
.toast__icon svg { width: 16px; height: 16px; display: block; }

/* === STATE OVERRIDES === */
.device-frame[data-state="toast-dismissed"] .toast { display: none; }
.device-frame[data-state="followed"] .toast { display: none; }

@media (max-width: 480px) {
  body { padding: 0; align-items: stretch; min-height: 100dvh; }
  .control-panel { display: none; }
  .device-frame {
    width: 100dvw; height: 100dvh;
    border: none; border-radius: 0;
  }
}
</style>
</head>

<script>
  // === Refs ===
  const frame = document.getElementById('device-frame');
  const breadcrumb = document.getElementById('breadcrumb');
  const stateButtons = document.querySelectorAll('.control-panel__state-btn');
  const toast = document.getElementById('toast');
  const followBtn = document.getElementById('btn-follow');

  let toastTimer = null;

  // === Toast helpers (no alert/confirm/prompt — Pass 6 #8 / verifier-safe) ===
  function showToast(msg, durationMs = 3000) {
    if (msg) document.getElementById('toast-text').textContent = msg;
    if (toastTimer) {
      clearTimeout(toastTimer);
      toastTimer = null;
    }
    toast.classList.add('show');
    if (durationMs > 0) {
      toastTimer = setTimeout(() => {
        hideToast();
        if (frame.dataset.state === 'default') setState('toast-dismissed', { silent: true });
      }, durationMs);
    }
  }
  function hideToast() {
    toast.classList.remove('show');
    if (toastTimer) {
      clearTimeout(toastTimer);
      toastTimer = null;
    }
  }

  // === State management ===
  function setState(state, opts = {}) {
    frame.setAttribute('data-state', state);
    stateButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    breadcrumb.textContent = 'other-profile-unblocked · ' + state;
    console.log('[state]', state);

    // Per-state side effects
    if (state === 'default') {
      // Reset follow + show toast 3s
      followBtn.dataset.followed = 'false';
      followBtn.textContent = '팔로우';
      followBtn.setAttribute('aria-label', '팔로우');
      showToast('memer_kim님 차단 해제했어요', 3000);
    } else if (state === 'toast-dismissed') {
      hideToast();
      followBtn.dataset.followed = 'false';
      followBtn.textContent = '팔로우';
      followBtn.setAttribute('aria-label', '팔로우');
    } else if (state === 'followed') {
      hideToast();
      followBtn.dataset.followed = 'true';
      followBtn.textContent = '팔로잉';
      followBtn.setAttribute('aria-label', '팔로잉');
    }
  }

  stateButtons.forEach(btn => {
    btn.addEventListener('click', () => setState(btn.dataset.state));
  });

  // === Header interactions ===
  document.getElementById('btn-back').addEventListener('click', () => {
    console.log('[nav] back');
    showToast('← 이전 화면으로 돌아갑니다', 1400);
  });

  document.getElementById('btn-more').addEventListener('click', () => {
    console.log('[nav] open more menu (app-012)');
    showToast('더보기 메뉴 (app-012) 진입', 1400);
  });

  // === CTA interactions ===
  followBtn.addEventListener('click', () => {
    const isFollowed = followBtn.dataset.followed === 'true';
    if (isFollowed) {
      // Unfollow
      followBtn.dataset.followed = 'false';
      followBtn.textContent = '팔로우';
      followBtn.setAttribute('aria-label', '팔로우');
      showToast('팔로우를 취소했어요', 1400);
    } else {
      // Follow
      followBtn.dataset.followed = 'true';
      followBtn.textContent = '팔로잉';
      followBtn.setAttribute('aria-label', '팔로잉');
      showToast('memer_kim님을 팔로우했어요', 1400);
    }
  });

  document.getElementById('btn-message').addEventListener('click', () => {
    console.log('[nav] open DM (mock)');
    showToast('메시지 화면 진입 (mock)', 1400);
  });

  // === Tab interactions ===
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.getAttribute('aria-disabled') === 'true') {
        showToast('비공개 탭은 본인만 볼 수 있어요', 1600);
        return;
      }
      document.querySelectorAll('.tab-item').forEach(t => t.setAttribute('aria-selected', 'false'));
      tab.setAttribute('aria-selected', 'true');
      console.log('[tab]', tab.dataset.tab);
    });
  });

  // === Card interactions ===
  document.querySelectorAll('.meme-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = card.dataset.cardIdx;
      console.log('[nav] open content', idx);
      showToast('콘텐츠 ' + (Number(idx) + 1) + ' 진입 (mock)', 1400);
    });
  });

  // === Bottom nav ===
  document.querySelectorAll('.bottom-nav__item').forEach(item => {
    item.addEventListener('click', () => {
      const nav = item.dataset.nav;
      console.log('[nav]', nav);
      showToast(nav + ' 탭 이동', 1200);
    });
  });

  // === Init: default state with toast visible (AC-2.5) ===
  setState('default');
</script>
