pass6_audit:
  status: "passed"
  score: "10/10"
  checks:
    - id: 1
      name: "hex-not-in-tokens (#[0-9A-Fa-f]{6} outside tokens.css)"
      result: "pass"
      evidence: |
        Manual audit (bash sandbox blocked).
        Hex outside :root token block in prototype.html:
          - body { background: #f0f0f0 } — body, NOT .screen descendant — excluded
          - .device-frame { border: 1px solid #ddd } — outer wrapper, NOT .screen — excluded
          - .control-panel* (#1a1a2e, #888, #666, #444, #2a2a3e, #fff, #e0e0e0)
            — .control-panel explicitly excluded from Pass 6 scope
        All .screen descendant content uses var(--wds-*) tokens.
        sprint-level alias --thumb-purple-start/end/--thumb-neutral-start/end
        defined as var() chains to existing tokens (purple-100/400, neutral-100/300).
        No new raw hex in screen content.

    - id: 2
