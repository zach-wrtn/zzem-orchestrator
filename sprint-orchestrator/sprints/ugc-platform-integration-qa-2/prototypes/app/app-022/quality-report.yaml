    proposed_change: |
      .claude/teammates/design-engineer-archetypes/form.md 강제 룰 약화:
        - #2 'Submit disabled until valid'
          → 'Submit disabled until valid (또는 즉시 저장 패턴 명시 시 면제)'
        - #4 'Primary action 1개만'
          → 'Primary action 0~1개 (즉시 저장 패턴 시 0)'
    rationale: "settings list with toggles 는 form 의 공통 sub-pattern 이며 industry standard. 강제 룰 4개 모두 유지하면 본 화면이 영구 STOP 상태로 남는다."
    impact: "form archetype 에 분류된 다른 즉시 저장 화면 (예: 설정 detail, switch list) 에 동일 적용 가능"

