form_persona:
  archetype: "form"
  forced_rules:
    - id: 1
      rule: "모든 input 에 inline validation 정의"
      result: "met (의미 확장)"
      evidence: |
        Switch 는 binary boolean 이라 사용자 입력 단계의 invalid 부재.
        대신 states.error 블록이 '저장 결과의 invalid' 로 의미 확장 +
        screen-spec.yaml states.error 에 RowError visible 정의 +
        prototype.html 에 .row-error span 구현.
    - id: 2
      rule: "Submit 버튼 disabled until valid"
      result: "archetype_recommendation_skipped"
      reason: |
        ⚠ DOGFOOD: PRD AC-3.4 가 'submit 버튼 부재 — 토글 즉시 저장' 명시.
        본 화면에는 명시적 Submit/Save primary CTA 가 부재 → 룰 #2 적용 불가.
        Settings list with toggles 는 industry standard 즉시 저장 패턴
        (iOS/Android 시스템 설정과 동일).
    - id: 3
      rule: "Error message 가 해당 입력 직하 (alert 박스 금지)"
      result: "met"
      evidence: |
        RowError span 이 ToggleRow 직후 형제로 배치, padding 으로 row 직하 시각 위치 보장.
        보조 SaveErrorToast 는 화면 하단 (스크롤 후 발견성 보완).
        alert/confirm/prompt 0건 (Pass 6 #8 통과).
    - id: 4
      rule: "Primary action 1개만 (Submit / Save 등)"
      result: "archetype_recommendation_skipped"
      reason: |
        ⚠ DOGFOOD: primary action 자체가 부재 (즉시 저장 패턴).
        Switch 는 input 이지 CTA 가 아니므로 'primary action 1개' 불가.
        룰 #4 가 가정하는 'submit 시점 누적 검증' 모델과 부정합.

  recommendation_skipped:
    - rule_id: 2
      rule: "Submit disabled until valid"
      reason: "즉시 저장 패턴 — submit 버튼 부재, PRD AC-3.4 의도"
    - rule_id: 4
      rule: "Primary action 1개만"
      reason: "primary CTA 자체 부재 (즉시 저장 패턴)"

  recommended_rules:
    - id: 1
      rule: "Validation 시점은 focus-out (blur)"
      result: "n/a"
      evidence: "binary switch — focus 개념 불필요"
    - id: 2
      rule: "Submit 후 loading state — spinner + 버튼 비활성"
      result: "modified"
      evidence: |
        Submit 부재 → 'tap 후 row saving state' 로 변형 적용.
        switch[data-saving=true] opacity 0.85 + 옆 4px pulsing dot.
        디바운스 효과로 중복 tap 방지 (form 권장 룰 #2 의도 보존).
    - id: 3
      rule: "긴 form 은 섹션/step 분할 (8개 미만)"
      result: "met"
      evidence: "토글 4개 — 8개 미만, 섹션 분할 불필요"

