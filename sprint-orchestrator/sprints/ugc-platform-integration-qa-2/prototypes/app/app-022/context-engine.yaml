# ─────────────────────────────
# Archetype Persona Conflict Note (form #2)
# ─────────────────────────────
archetype_conflict:
  archetype: "form"
  conflicting_rules:
    - id: 2
      rule: "Submit 버튼 disabled until valid"
      conflict_with: "PRD AC-3.4 — '토글 변경 즉시 저장 (별도 저장 버튼 없음)'"
      decision: "archetype_recommendation_skipped (option a)"
      rationale: |
        본 화면은 즉시 저장(optimistic save) 패턴이며 명시적 Submit 버튼이 부재한다.
        form persona 강제 룰 #2 가 가정하는 'submit 시점에 누적 검증' 모델과 정면 충돌.
        - PRD AC-3.4 가 'submit 버튼 부재' 를 명시 → 사용자 의도 우선
        - settings list with toggles 는 industry standard 즉시 저장 패턴
        Sprint Lead 후속: form persona md 강제 룰 #2 를
        '1 primary action OR 즉시 저장 패턴 명시' 로 약화 검토 필요.
    - id: 4
      rule: "Primary action 1개만 (Submit / Save 등)"
      conflict_with: "primary action 자체가 부재"
      decision: "archetype_recommendation_skipped (option a)"
      rationale: |
        Primary CTA 가 부재한 형태이므로 룰 #4 가 가정하는 '1개' 도 만족 불가.
        Switch 는 input 이지 CTA 가 아님. Sprint Lead 후속: 강제 룰 #4 도
        'primary action 0~1개 (즉시 저장 패턴 시 0)' 로 약화 검토.
  satisfied_rules:
    - id: 1
      rule: "Inline validation 정의됨"
      satisfied_by: |
        토글은 binary boolean — 사용자 입력 단계의 'invalid' 상태 자체가 부재.
        대신 '저장 결과의 inline 에러' 로 의미 확장: states.error 에 정의 + 룰 #3 충족.
    - id: 3
      rule: "Error message 가 해당 입력 직하 (alert 박스 금지)"
      satisfied_by: |
        실패 시 row 직하 inline 영역(.row-error)에 에러 메시지 노출 +
        SaveErrorToast 는 보조 (모바일 UX 권장 — 사용자 시선 row 부근)
