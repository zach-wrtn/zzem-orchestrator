# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    사용자가 ZZEM 알림 카테고리(푸시 / 좋아요 / 소식 / 팔로우)별 수신 여부를
    개별 토글로 즉시 제어할 수 있게 한다. 별도 저장 단계 없이 토글 자체가
    저장 트리거가 되어 인지 부담을 최소화한다.
  target_user: "ZZEM 알림을 받아본 모든 사용자(과수신/저수신 양극단 모두)"
  success_metric: "알림 설정 화면 진입 후 푸시 alarm opt-out 비율 변화 (PRD § Group 003)"
  user_stories:
    - id: "US-3.3"
      as_a: "알림이 너무 많거나 적다고 느끼는 사용자"
      i_want: "카테고리별로 알림을 끄거나 켜고 싶다"
      so_that: "내가 원하는 알림만 수신할 수 있다"
    - id: "US-3.4"
      as_a: "알림 설정을 자주 조정하는 사용자"
      i_want: "토글 한 번에 즉시 저장되길 원한다"
      so_that: "추가 액션(저장 버튼) 없이 빠르게 끝낸다"
  acceptance_criteria:
    - id: "AC-3.3"
      given: "사용자가 알림 설정 진입"
      when: "화면 렌더"
      then: "4 카테고리(푸시/좋아요/소식/팔로우) 개별 토글 row 표시"
      ui_impact: "ToggleRow × 4 표시 (title + description + Switch)"
    - id: "AC-3.4"
      given: "사용자가 토글 tap"
      when: "Switch state 변경"
      then: "즉시 PATCH /v2/me/notification-settings 호출 + 시각 즉시 반영(optimistic)"
      ui_impact: |
        Switch UI optimistic toggle (즉시 ON↔OFF), saving 인디케이터(짧은 ms 단위 spinner)
        은 silent 저장 패턴 적용 — 별도 저장 버튼/Submit primary CTA 부재.
        실패 시 toggle rollback + inline 에러 toast.
        ⚠ form persona 강제 룰 #2 (Submit disabled until valid) 와 직접 충돌 →
        archetype_recommendation_skipped 처리. 본 화면은 toggle = save trigger.

