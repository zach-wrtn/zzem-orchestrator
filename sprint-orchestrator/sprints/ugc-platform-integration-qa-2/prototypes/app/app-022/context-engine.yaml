    - name: "Optimistic UI with rollback"
      description: "tap → 즉시 UI 반영 → 실패 시 rollback + toast"

# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "AppHeaderBack(고정 56px) → 4 ToggleRow (각 ~72px) (수직, gap 0, divider 1px)"
      applies_to: ["NotificationSettingsScreen"]
    - rule: "각 ToggleRow 내부: 좌측 텍스트(title 위 / desc 아래 — 2-line) + 우측 Switch (52x32)"
      applies_to: ["ToggleRow"]
    - rule: "토글 즉시 저장 — Switch tap 직후 saving 상태 (optimistic)→ success silent / error rollback+toast"
      applies_to: ["ToggleRow"]
    - rule: "별도 'Save / 저장' primary CTA 부재 (PRD AC-3.4) — form 강제 룰 #2/#4 충돌"
      applies_to: ["NotificationSettingsScreen"]
  conditional_rendering:
    - condition: "row.savingState == idle"
      variant_a: "Switch 평상시 (knob 좌/우 위치)"
      variant_b: null
    - condition: "row.savingState == saving"
      variant_a: "Switch knob 옆 8px spinner — silent indicator"
      variant_b: null
    - condition: "row.savingState == error"
      variant_a: "Switch rollback (이전 값) + row 직하 inline 에러 메시지 ('저장 실패. 다시 시도해주세요.')"
      variant_b: null
  constraints:
    - "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (Pass 6 #8)"
    - "Switch icon 은 네이티브가 아니므로 div 기반 + CSS transition 으로 구현 (Lucide SVG 의 의미상 'check' 아이콘 옵션도 가능하나 표준 toggle UI 채택)"
    - "기본 디자인 텍스트는 Pretendard, 사이즈는 wds 토큰만 사용"
    - "control-panel 은 device frame 외부 — Pass 6 검사 제외 영역"
  priority_order:
    - "1. ToggleRow × 4 (핵심 인터랙션)"
    - "2. AppHeaderBack (이전 화면 복귀)"
    - "3. SaveErrorToast (실패 피드백)"

