# Screen Spec: 프로필편집_사진_앨범선택 (app-009)
# Machine-readable. DE Step B output. (산문 금지 — YAML/표/트리만)

## Meta
meta:
  screen_name: "프로필편집_사진_앨범선택"
  screen_archetype: "form"   # 입력=사진 1장 선택; submit "선택" + cancel — form persona
  task_id: "app-009"
  sprint_id: "ugc-platform-integration-qa-2"
  app: "ZZEM"
  platform: "iOS / Android (React Native)"
  language: "ko"
  frame: "390x844"
  theme: "light"
  figma_frame: "37160:80126"
  figma_file: "7hozJ6Pvs09q98BxvChj08"
  parent_screen: "app-005 (프로필편집_사진_바텀시트_선택)"
  next_screen: "app-008 (프로필편집_사진_크롭)"
  archetype_classification:
    chosen: "form"
    rationale: "사용자가 사진 라이브러리에서 1장을 선택하여 다음 단계(크롭)로 제출. inline validation(0건 invalid → submit disabled), 단일 primary submit('선택'), secondary 취소(close). 시각적으로는 grid 이지만 entry archetype 은 입력+제출 패턴."
    alternatives_considered:
      - "feed (rejected — 콘텐츠 소비가 아닌 입력 선택)"
      - "modal (rejected — 전체 화면 picker, 부분 화면 아님)"
  resolution_intent: "in-app picker (시스템 picker 가 아님 — Figma frame 이 in-app 그리드 + 하단 CTA 패턴 시사). intent.md gate Q1 에서 Sprint Lead 확인 권장"

## Component Tree
component_tree: |
  Screen [frame: 390x844]
  ├── StatusBar [system] (div) #status-bar — 9:41 + 시스템 indicator
  ├── Header [container] (header) #header
  │   ├── HeaderClose [icon-button] (button) #header-close — × close (좌측, app-005 시트로 복귀)
  │   ├── HeaderTitle [text] (h1) #header-title — "최근 항목"
  │   └── HeaderAlbumChevron [icon] (svg) #header-chevron — ⌄ (앨범 전환 시사)
  ├── PhotoGrid [list] (section) #photo-grid — 3-col, 12 thumbnails (placeholder)
  │   └── PhotoCell [button × 12] (button) #cell-{n}
  │       ├── PhotoThumb [div] — 그라디언트 토큰 fill (illustration kind, 썸네일 placeholder)
  │       └── SelectIndicator [icon] (svg) #select-{n} — 우상단 ○ / ✓ (선택 시)
  ├── BottomBar [container] (footer) #bottom-bar — sticky bottom safe-area
  │   ├── SelectionCounter [text] (span) #selection-count — "0장 선택" / "1장 선택"
  │   ├── CancelButton [button-secondary] (button) #cancel-btn — "취소" ghost text
  │   └── SubmitButton [button-primary] (button) #submit-btn — "선택" disabled until ≥1
  └── ErrorMessage [text] (div) #error-msg — inline 직상위 (선택 0건 + submit 시도 시) "사진을 1장 선택해 주세요"

## Component Details
components:
  - name: "StatusBar"
    id: "status-bar"
    tag: "div"
    type: "container"
    position: "top"
    size: "390x44"
    tokens:
      fill: "var(--wds-background-normal)"
      text: "var(--wds-label-normal)"
    behavior:
      purpose: "iOS 표준 시스템 영역 — 시간/배터리/신호"
      feedback: "visual"
    a11y:
      role: "presentation"

  - name: "Header"
    id: "header"
    tag: "header"
    type: "container"
    position: "below status-bar (sticky)"
    size: "390x52"
    tokens:
      fill: "var(--wds-background-normal)"
      border-bottom: "1px solid var(--wds-line-alternative)"
      spacing: "padding 0 16px"
    behavior:
      purpose: "사용자 위치 인지 + close (form persona — back path)"
    layout:
      direction: "horizontal"
      alignment: "space-between"
      sizing: "fill"

  - name: "HeaderClose"
    id: "header-close"
    tag: "button"
    type: "icon-button"
    position: "left"
    size: "40x40"
    tokens:
      fill: "transparent"
      icon-color: "var(--pe-text-primary)"
    behavior:
      purpose: "close picker → app-005 시트 복귀 (변경 없이)"
      user_action: "tap → close-overlay / navigate-back"
      feedback: "navigation"
    a11y:
      role: "button"
      label: "닫기"

  - name: "HeaderTitle"
    id: "header-title"
    tag: "h1"
    type: "text"
    position: "center"
    size: "auto"
    tokens:
      text: "var(--wds-label-normal)"
      font-size: "var(--wds-font-size-lg)"
      font-weight: "var(--wds-font-weight-semibold)"
    behavior:
      purpose: "현재 앨범명 (default '최근 항목') — form persona 위치 인지"
    a11y:
      role: "heading"
      label: "최근 항목"
    constraints:
      max_lines: 1
      truncation: "ellipsis"

  - name: "HeaderAlbumChevron"
    id: "header-chevron"
    tag: "svg"
    type: "icon"
    position: "right of title"
    size: "16x16"
    tokens:
      icon-color: "var(--pe-text-secondary)"
    behavior:
      purpose: "앨범 전환 가능성 시사 (out-of-scope — disabled visual hint)"
      user_action: "(none in this proto)"
      feedback: "visual"
    a11y:
      role: "presentation"

  - name: "PhotoGrid"
    id: "photo-grid"
    tag: "section"
    type: "list"
    position: "below header, fills viewport"
    size: "390 x (viewport - header - bottom-bar)"
    tokens:
      fill: "var(--wds-background-normal)"
      gap: "var(--wds-spacing-2)  # 2px hairline gap (iOS Photos 표준)"
      spacing: "padding 2px"
    layout:
      direction: "vertical"
      sizing: "fill"
      grid: "3 columns × N rows, 1:1 cells"
    a11y:
      role: "list"
      label: "사진 12장"

  - name: "PhotoCell"
    id: "cell-{n}"
    tag: "button"
    type: "button"
    position: "grid cell"
    size: "128x128 (calc((390 - 8)/3))"
    tokens:
      fill: "(see PhotoThumb gradient-token below)"
      radius: "var(--wds-radius-none)"
    behavior:
      purpose: "사진 1장 선택 토글 (form persona — single-select input)"
      user_action: "tap → toggle selection (single-select: 다른 셀 자동 해제)"
      feedback: "visual (선택 시 SelectIndicator filled + 셀 inset border + opacity 0.85)"
    states:
      default: "썸네일 fill, indicator empty circle"
      selected: "indicator filled (var(--wds-fill-brand-primary)) + check svg, 셀 inset 3px purple border, opacity 0.85"
      disabled: null
    a11y:
      role: "checkbox"
      label: "사진 {n}"
      hint: "탭하여 선택"

  - name: "PhotoThumb"
    id: "thumb-{n}"
    tag: "div"
    type: "image"
    position: "fills cell"
    size: "100% × 100%"
    tokens:
      # gradient-token kind — 토큰화된 그라디언트 (Pass 6 #6 면제)
      fill: "linear-gradient via curated thumb tokens (see assets section)"
    a11y:
      role: "img"
      label: ""
    note: "kind: gradient-token — assets.feed_thumbnails.needs_real_content: false"

  - name: "SelectIndicator"
    id: "select-{n}"
    tag: "div"
    type: "icon"
    position: "absolute top-right of cell, inset 8px"
    size: "24x24"
    tokens:
      fill_default: "rgba(255,255,255,0.6) ring 2px white"
      fill_selected: "var(--wds-fill-brand-primary)"
      icon-color_selected: "var(--wds-label-inverse)"
      radius: "var(--wds-radius-full)"
    behavior:
      purpose: "선택 상태 시각 신호 (form persona inline state)"
    states:
      default: "empty circle ring"
      selected: "filled purple + check svg"
    a11y:
      role: "presentation"

  - name: "BottomBar"
    id: "bottom-bar"
    tag: "footer"
    type: "container"
    position: "sticky bottom"
    size: "390 x 96 (incl safe-area)"
    tokens:
      fill: "var(--wds-background-normal)"
      border-top: "1px solid var(--wds-line-alternative)"
      spacing: "padding 12px 16px 32px"
    behavior:
      purpose: "submit + cancel (form persona — single primary action area)"
    layout:
      direction: "horizontal"
      alignment: "space-between"
      sizing: "fill"

  - name: "SelectionCounter"
    id: "selection-count"
    tag: "span"
    type: "text"
    position: "left of bottom-bar (above buttons row)"
    size: "auto"
    tokens:
      text_zero: "var(--wds-label-assistive)"
      text_selected: "var(--wds-label-brand)"
      font-size: "var(--wds-font-size-sm)"
      font-weight: "var(--wds-font-weight-medium)"
    behavior:
      purpose: "선택 카운트 inline 피드백 (form persona — submit precondition 가시화)"
    states:
      zero: "'0장 선택' label-assistive"
      one: "'1장 선택' label-brand"
    a11y:
      role: "status"
      label: "선택된 사진 수"

  - name: "CancelButton"
    id: "cancel-btn"
    tag: "button"
    type: "button-secondary"
    position: "bottom-bar left"
    size: "auto x 48"
    tokens:
      fill: "transparent"
      text: "var(--wds-label-alternative)"
      font-size: "var(--wds-font-size-lg)"
      font-weight: "var(--wds-font-weight-medium)"
      spacing: "padding 12px 16px"
    behavior:
      purpose: "form persona #4 — secondary, 동급 강조 금지 (ghost text 처리)"
      user_action: "tap → navigate-back to app-005"
      feedback: "navigation"
    a11y:
      role: "button"
      label: "취소"

  - name: "SubmitButton"
    id: "submit-btn"
    tag: "button"
    type: "button-primary"
    position: "bottom-bar right"
    size: "auto x 48 (min-width 88)"
    tokens:
      fill_disabled: "var(--pe-save-disabled)"
      label_disabled: "var(--pe-save-disabled-label)"
      fill_enabled: "var(--wds-fill-brand-primary)"
      label_enabled: "var(--wds-label-inverse)"
      radius: "var(--wds-radius-md)"
      font-size: "var(--wds-font-size-lg)"
      font-weight: "var(--wds-font-weight-semibold)"
      spacing: "padding 12px 24px"
    behavior:
      purpose: "form persona #2 — primary submit. 1+ 선택 까지 disabled (form persona #2 강제)"
      user_action: "tap → navigate to app-008 (크롭)"
      feedback: "navigation"
    states:
      disabled: "fill pe-save-disabled, label pe-save-disabled-label, cursor not-allowed (form persona #2)"
      enabled: "fill brand-primary, label inverse, cursor pointer"
      pressed: "fill brand-strong"
      loading: null
    a11y:
      role: "button"
      label: "선택"
      hint: "사진을 1장 이상 선택하면 활성화됩니다"

  - name: "ErrorMessage"
    id: "error-msg"
    tag: "div"
    type: "text"
    position: "absolute, just above bottom-bar (form persona #3 — input 직하/직상)"
    size: "full-width minus padding"
    tokens:
      text: "var(--wds-label-error)"
      font-size: "var(--wds-font-size-sm)"
      fill: "var(--wds-fill-status-error-weak)"
      radius: "var(--wds-radius-sm)"
      spacing: "padding 8px 12px; margin 0 16px 8px"
    behavior:
      purpose: "form persona #1 + #3 — inline validation, 선택 0건에 submit attempt 시 표시"
    states:
      hidden: "display none (default)"
      shown: "display block, slide-in"
    a11y:
      role: "alert"
      label: "사진을 1장 선택해 주세요"

## Layout Spec
layout_spec:
  type: stack
  viewport: 390x844
  z_layers:
    - z: 0
      id: status-bar
      anchor: top
      height: 44
    - z: 0
      id: header
      anchor: top (after status-bar)
      height: 52
    - z: 0
      id: photo-grid
      sizing: fill (between header and bottom-bar)
      grid:
        columns: 3
        gap: 2px
        cell_aspect: "1:1"
    - z: 5
      id: error-msg
      anchor: above bottom-bar
      visibility: state-driven (default hidden)
    - z: 10
      id: bottom-bar
      anchor: bottom
      height: 96 (incl safe-area)

## States
states:
  default:
    description: "초기 — 0장 선택, submit disabled"
    active: true
    visible_components: [status-bar, header, photo-grid, bottom-bar, selection-count, cancel-btn, submit-btn]
    hidden_components: [error-msg]
    submit_state: disabled
  selected:
    description: "1장 선택 완료 — submit enabled"
    visible_components: [status-bar, header, photo-grid, bottom-bar, selection-count, cancel-btn, submit-btn]
    hidden_components: [error-msg]
    submit_state: enabled
    counter_text: "1장 선택"
  invalid_attempt:
    description: "form persona #1 — 0장에서 submit attempt → inline error 표시 (이론적 — 실제 UI 는 disabled 로 차단)"
    visible_components: [status-bar, header, photo-grid, bottom-bar, error-msg]
    submit_state: disabled
    error_text: "사진을 1장 선택해 주세요"
  loading:
    description: "사진 라이브러리 fetch 중 — skeleton grid 표시"
    visible_components: [status-bar, header, photo-grid, bottom-bar]
    hidden_components: [error-msg]
    skeleton: true
    submit_state: disabled
  empty:
    description: "사진 0장 (앨범 비어있음) — empty illustration"
    visible_components: [status-bar, header, bottom-bar]
    hidden_components: [photo-grid, error-msg]
    empty_text: "표시할 사진이 없어요"
    submit_state: disabled

## Validation Rules (form persona #1)
validation_rules:
  - field: "selection-count"
    rule: "≥ 1 photo selected"
    error_message: "사진을 1장 선택해 주세요"
    error_target: "#error-msg (above bottom-bar, inline; form persona #3)"
    submit_disabled_until_valid: true   # form persona #2

submit_state_transitions:
  submit_disabled:
    when: "selectedCount == 0"
    visual: "fill var(--pe-save-disabled), label var(--pe-save-disabled-label), pointer-events none"
  submit_enabled:
    when: "selectedCount >= 1"
    visual: "fill var(--wds-fill-brand-primary), label var(--wds-label-inverse), cursor pointer"

## Interactions
interactions:
  - trigger: tap
    target: "#header-close"
    action: navigate-back
    destination: "app-005 (프로필편집_사진_바텀시트_선택)"
    transition: slide-down
    note: "변경 없이 시트 복귀"

  - trigger: tap
    target: "#cell-{n}"
    action: toggle-state
    state_key: "selected[{n}]"
    side_effect: "single-select — 다른 셀 자동 해제, selectionCounter 업데이트, submit-btn enable/disable 토글"
    feedback: "visual (indicator filled + inset border)"

  - trigger: tap
    target: "#cancel-btn"
    action: navigate-back
    destination: "app-005"
    transition: slide-down

  - trigger: tap
    target: "#submit-btn"
    condition: "selectedCount >= 1"
    action: navigate
    destination: "app-008 (프로필편집_사진_크롭)"
    transition: slide-left
    side_effect: "선택된 사진 id 를 next screen 에 전달"

## Visual Rules
rules:
  - condition: "selectedCount == 0"
    effect: "submit-btn disabled (fill pe-save-disabled, label pe-save-disabled-label) + counter '0장 선택' label-assistive"
  - condition: "selectedCount == 1"
    effect: "submit-btn enabled (fill brand-primary) + counter '1장 선택' label-brand + 선택된 셀 inset 3px purple border + indicator filled check"
  - condition: "loading state"
    effect: "photo-grid 영역에 skeleton cell 12개 (shimmer) 표시"
  - condition: "empty state"
    effect: "photo-grid 비고 안내 일러스트 + '표시할 사진이 없어요' 카피 표시"

## Labels (ko)
labels:
  header:
    title: "최근 항목"
    close_a11y: "닫기"
  bottom_bar:
    counter_zero: "0장 선택"
    counter_one: "1장 선택"
    cancel: "취소"
    submit: "선택"
  error:
    no_selection: "사진을 1장 선택해 주세요"
  empty:
    text: "표시할 사진이 없어요"
  loading:
    a11y: "사진 불러오는 중"

