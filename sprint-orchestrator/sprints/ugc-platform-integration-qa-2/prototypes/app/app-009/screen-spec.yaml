## Form Persona Compliance (form.md 강제 룰 4/4)
form_persona:
  rule_1_inline_validation:
    target: "모든 input 에 inline validation"
    actual: "states.invalid_attempt 에 error_message 정의 + #error-msg DOM (label-error red, label '사진을 1장 선택해 주세요'). field=selection-count → ≥1 rule"
    pass: true

  rule_2_submit_disabled:
    target: "Submit 버튼 disabled + enabled 둘 다 정의"
    actual: "submit_state_transitions.submit_disabled (selectedCount==0) + submit_enabled (>=1) 모두 정의. visual token 차이 명시 (pe-save-disabled vs wds-fill-brand-primary)"
    pass: true

  rule_3_error_inline:
    target: "Error message 가 input 직하 (위 alert 박스 금지)"
    actual: "#error-msg 위치: 'just above bottom-bar' (선택 영역 직하 — bottom-bar 가 submit 위치). 모바일 picker 패턴: input(grid) → error → submit 순서. 위쪽 alert 박스 금지"
    pass: true

  rule_4_single_primary:
    target: "Primary action 1개"
    actual: "submit-btn (button-primary) 1개 + cancel-btn (button-secondary, ghost text — label-alternative). 동급 강조 없음. header-close 는 icon-button (별도 카테고리)"
    pass: true

form_persona_recommended:
  rec_1_validation_on_blur:
    actual: "tap-based interaction (focus-out 개념 N/A in grid picker). selectionCount 변화 시 즉시 submit 상태 토글 (디바운싱 없이 — 사용자 행동 직후 피드백)"
    accepted: true
    note: "blur 개념 적용 불가 — picker form 특성"
  rec_2_submit_loading:
    actual: "loading state (응답 대기) 미정의 — navigate to app-008 은 in-app transition (서버 호출 없음)"
    accepted: false
    log: "archetype_recommendation_skipped"
    rationale: "submit 후 즉시 in-app navigation — async loading 불필요. app-008 진입 후 크롭 화면이 자체 loading 처리"
  rec_3_section_split:
    actual: "단일 grid (8개 미만 input 불가능 — N장 사진은 grid 자체가 단일 input field)"
    accepted: true

## Quality Score
quality_score:
  extraction_accuracy:
    total_components: 11
    with_token_map: 11
    with_html_mapping: 11
    score: "22/22 = 1.00"
  fabrication_risk:
    inferred_fields:
