      actual: |
        button-primary: submit-btn (#submit-btn) — 1개.
        button-secondary: cancel-btn (ghost text, label-alternative — 동급 강조 없음).
        icon-button: header-close (별도 카테고리, 상단 닫기).
        동급 시각 weight 의 primary 충돌 없음.

  recommended_rules:
