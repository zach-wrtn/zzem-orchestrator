# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: "차단 해제 confirm 통과 직후 차단 관리 리스트로 복귀하는 결과 화면. 해제된 사용자가 리스트에서 사라지고 Toast 가 표시되어 사용자가 해제 액션의 결과를 1-step 에 검증한다."
  target_user: "차단 관리 리스트에서 1명 이상의 사용자를 막 해제한 ZZEM 사용자"
  success_metric: "AC-2.5 통과 — row 제거 + Toast 표시 후 3s auto-dismiss + 0건 도달 시 empty + back 복귀"
  user_stories:
    - id: "US-1"
      as_a: "차단을 해제한 사용자"
      i_want: "해제된 사용자가 리스트에서 즉시 사라지고 toast 로 결과를 확인하고 싶다"
      so_that: "별도 새로고침 없이 해제 액션이 실제로 적용됐음을 검증한다"
    - id: "US-2"
      as_a: "마지막 1명을 해제한 사용자"
      i_want: "리스트가 0건이 되면 빈 상태 placeholder 가 명확히 노출되고 설정으로 복귀할 경로가 보이고 싶다"
      so_that: "dead-end 가 되지 않는다"
  acceptance_criteria:
    - id: "AC-2.5-row-removed"
      given: "차단 사용자 N명 리스트에서 1명을 해제했다"
      when: "app-018 confirm 시트 통과 직후"
      then: "해제된 row 가 리스트에서 제거되어 N-1 개만 노출"
      ui_impact: "BlockedList 갱신 (animation 선택), count-summary N-1 반영"
    - id: "AC-2.5-toast"
      given: "해제 API 성공"
      when: "본 화면 진입 직후"
      then: "'{nickname}님 차단을 해제했어요' Toast 가 표시되고 3s 내 auto-dismiss"
      ui_impact: "Toast component (sticky bottom, single line, role=status) — 3s timer"
    - id: "AC-2.5-empty"
      given: "해제 후 차단 사용자가 0건이 되었다"
      when: "리스트 갱신 직후"
      then: "EmptyView placeholder 노출 ('차단한 사용자가 없어요' + 설정 복귀 CTA)"
      ui_impact: "BlockedList 숨김 + EmptyView 표시"
    - id: "AC-2.5-back"
      given: "본 화면 표시 중"
      when: "back button tap"
      then: "설정 화면으로 복귀"
      ui_impact: "navigation slide-right"

