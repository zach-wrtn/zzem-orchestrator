# ─────────────────────────────
# Layer 3: HOW (Composition Rules)
# ─────────────────────────────
how:
  composition_rules:
    - "list-row 패턴 (compact 72px) 유지 — 카드 grid 금지 (exemplar drift 방지)"
    - "Toast 진입 시점 auto-show + 3000ms setTimeout dismiss (alert/confirm 절대 미사용)"
    - "skeleton 6행으로 default state 의 6 rows 와 시각 일관성"
    - "empty state 는 Lucide shield-check (32px) + 단일 primary CTA (설정 복귀)"
    - "count summary 에 delta 표시 ('방금 1명 해제됨') — 변화 시각화, label-brand 토큰"
    - "전체 색상은 var(--wds-*) 또는 var(--component-*) 토큰만 (raw hex 금지, control-panel 제외)"
    - "Lucide-style inline SVG (PR #31 패턴) — back chevron, refresh-ccw, shield-check, check"

  state_machine:
    initial: "default"
    states:
      default:
        on_enter: "showToast(unblocked-message, 3000ms)"
        visible: ["count-summary", "blocked-list (6 rows)", "end-indicator"]
      loading:
        on_enter: "skeleton 6 rows shimmer"
        visible: ["blocked-skeleton"]
      empty:
        on_enter: "showToast(unblocked-message, 3000ms)"
        visible: ["empty-view"]
        scenario: "마지막 1명 해제로 0건 도달"
      error:
        on_enter: "showToast(error-message, 3000ms)"
        visible: ["empty-view (재사용)"]

