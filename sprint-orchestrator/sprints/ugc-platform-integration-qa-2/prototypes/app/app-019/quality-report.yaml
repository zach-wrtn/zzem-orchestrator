# ─────────────────────────────
# Pass 6 Anti-Slop Audit (10 checks — #10 = exemplar drift)
# ─────────────────────────────
pass_6_audit:
  status: "passed"
  score: "10 / 10"
  checks:
    - id: 1
      name: "raw hex outside tokens.css"
      status: "passed"
      detail: |
        proto unique hex (.screen 후손 영역): 0건 — 전부 var(--wds-*) 또는 var(--component-*) 토큰.
        .control-panel 셀렉터 내부 hex (#1a1a2e #2a2a3e #e0e0e0 #444 #666 #888 #999) 는
        design-engineer.md C.2.1 검사 범위 규칙에 의해 audit 제외 영역.
        green check icon 색은 var(--wds-color-green-500) 토큰 사용.

    - id: 2
      name: "unicode emoji on interactive elements"
      status: "passed"
      detail: |
        모든 button 아이콘은 inline Lucide SVG (back chevron / refresh-ccw / shield-check / check).
        Toast 의 success check 도 Lucide inline SVG (line 605). 이모지 0건.

    - id: 3
      name: "border-left Material slop on cards"
      status: "passed"
      detail: ".card 클래스 미사용 (list-row + toast). border-left 0건."

    - id: 4
      name: "font-family outside Pretendard within .screen"
      status: "passed"
      detail: |
        .screen 후손 font-family: 두 곳 (line 368, 472) 모두 `inherit` → Pretendard 상속.
        ui-monospace/JetBrains Mono 는 .control-panel 셀렉터 (line 174, 186, 192-193) 만 — audit 제외.

    - id: 5
      name: "purple gradient on full background"
      status: "passed"
      detail: |
        skeleton shimmer: linear-gradient(90deg, --neutral-100, --neutral-200, --neutral-100) — 토큰 only.
        empty-view__icon: 단색 fill (--brand-weak) + color (--brand-primary). 그라디언트 미사용.
        body/screen 배경: var(--wds-background-normal). 보라 그라디언트 0건.

    - id: 6
      name: "placeholder-image on main content slot"
      status: "passed"
      detail: |
        .placeholder-image 클래스 미사용. avatar = 이니셜 텍스트 fallback (1글자, neutral fill).
        주 콘텐츠 = 닉네임 + 차단일 + CTA + Toast 메시지. avatar 는 보조 정보.
        intent.md placeholders[0].needs_real_content = false (Sprint Lead 사전 합의 불요 — 표준 패턴).

    - id: 7
      name: "interactions count = bound elements count"
      status: "passed"
      detail: |
        spec interactions: 6건 (back, refresh, swipe-down, unblock×6, empty-action, auto-mount toast).
        DOM bindings 검수:
          - back-button onclick → onAction('go-back')
          - refresh-button onclick → triggerRefresh()
          - body-scroll touchstart/move/end → triggerRefresh on swipe-down
          - 6 unblock-btn onclick → onAction('unblock', uid, nick)
          - empty-action onclick → onAction('go-back')
          - auto-mount: setState('default') → showToast(unblock msg, 3000ms) — line 700
        본 화면 interactive bindings: 1+1+1+6+1+1 = 11. control-panel 4 state-toggle 별도 (out of scope).
        매칭 OK.

    - id: 8
      name: "alert/confirm/prompt in onclick"
      status: "passed"
      detail: "grep -E 'alert\\(|confirm\\(|prompt\\(' → 0건. showToast() + console.log() 만 사용 (verifier 안전)."

    - id: 9
      name: "feed archetype persona 강제 룰 (4/4)"
      status: "passed"
      detail: |
        #1 loading + skeleton 6 행: states.loading + #blocked-skeleton (6 SkeletonRow).
        #2 empty 상태: states.empty + #empty-view ("차단한 사용자가 없어요" + CTA + Lucide shield-check).
        #3 첫 viewport 6+ items: 6 BlockedUserRow × 72px = 432px (헤더56 + count약44 + status44 = 144 사용,
            본문 가용 ~700px 내 6행 fit).
        #4 새로고침: AppHeader RefreshButton (명시) + body-scroll pull-to-refresh (보조) — 2개.

    - id: 10
      name: "exemplar drift (vs v2-dogfood-free-tab-app-001-freetabscreen)"
      status: "passed"
      drift_warning: false
      detail: |
        본 화면은 list-row 구조 (수직 1열, 72px 행, divider) + Toast 오버레이.
        Exemplar 는 2열 grid 카드 (4:5 aspect, gradient thumb, NEW badge).
        시각 비교: 핵심 레이아웃 일치도 < 30% (카드 grid CSS 일체 미재사용).
        패턴 차원 (header + body-scroll + skeleton + empty + refresh + toast 골격) 은 feed archetype 표준.
        → drift_warning: false. 80% 임계 미달.

