# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "HeaderBar(48) → ProfileHero(~320) → ContentTabBar(44, sticky) → ContentGrid(scroll) → BottomNav(64)"
      applies_to: ["MyProfileScreen-PhotoChanged"]
    - rule: "Hero 영역 단일 시각 앵커 — 320px 이상, 메타 행 4개 이내 (detail persona 강제 룰 #1·#3)"
      applies_to: ["ProfileHero"]
    - rule: "Primary CTA 1개 (편집) + secondary 1-2개 (공유 + 헤더 우측 settings/bell ghost icon) — 위계 명확 (detail persona 강제 룰 #4)"
      applies_to: ["ProfileHero CTA cluster + HeaderBar"]
    - rule: "back 1-way: 좌상단 ← 만 노출 (detail persona 강제 룰 #2)"
      applies_to: ["HeaderBar"]
    - rule: "Toast 는 default 진입 시 표시 후 3s 자동 dismiss — 별도 닫기 버튼 없음"
      applies_to: ["Toast"]
    - rule: "alert/confirm/prompt 절대 사용 금지 (Pass 6 #8 + verifier hang 방지)"
      applies_to: ["all interactions"]
  conditional_rendering:
    - condition: "state == default (toast-visible)"
      variant_a: "Toast '프로필 사진을 변경했어요' 표시 + 새 avatar + 그리드 정상"
      variant_b: null
    - condition: "state == toast-dismissed"
      variant_a: "Toast 숨김 + 새 avatar + 그리드 정상 (영구 상태)"
      variant_b: null
    - condition: "탭 전환 (Free ↔ Recommend)"
      variant_a: "Free active (default) — 본인 콘텐츠"
      variant_b: "Recommend active — 추천 콘텐츠 placeholder"
  constraints:
    - "BottomNav 항상 sticky-bottom, MY active"
    - "Toast bottom: 80px (BottomNav 위로 16px 여백)"
    - "ContentTabBar sticky-top: HeaderBar(48) 아래 (스크롤 시 hero 위로 스택)"
    - "Avatar: 새로 변경된 이미지 표현 — gradient-token kind (실 사진 미존재, 변경 표현용 신규 색)"
    - "Feed cell 비율 mix: 1:1 / 4:5 — meme-card 패턴 (asset Layer kind=gradient-token)"
  priority_order:
    - "1. Toast (사진 변경 결과 즉시 인지) — 자동 사라짐 전 1순위 시각 신호"
    - "2. New Avatar (변경된 이미지가 hero 에 표시되었음을 확인)"
    - "3. Profile Hero 전체 (정상 갱신 확인)"
    - "4. Content Tabs / Grid (기존 데이터 유지 — 사진 변경 외 다른 영향 없음 검증)"
    - "5. Edit / Share CTA (다음 행동 enabling)"

