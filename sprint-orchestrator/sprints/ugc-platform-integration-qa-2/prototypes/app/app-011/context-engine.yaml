# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: "닉네임 변경 직후 MY 프로필 화면이 새 닉네임으로 즉시 갱신되었음을 1-step 으로 검증하게 한다 (Toast + hero 라벨 동시 변경)."
  target_user: "프로필 편집에서 닉네임을 저장한 ZZEM 사용자"
  success_metric: "AC-1.5 통과 — 새 닉네임 hero 즉시 반영 + Toast 1회 표시 후 3s 자동 dismiss + 통계/avatar 기존 데이터 유지"
  user_stories:
    - id: "US-1"
      as_a: "닉네임을 변경한 사용자"
      i_want: "MY 프로필이 새 닉네임으로 즉시 갱신된 것을 확인하고 싶다"
      so_that: "변경 액션이 실제로 적용됐음을 별도 새로고침 없이 검증한다"
  acceptance_criteria:
    - id: "AC-1.5a"
      given: "프로필편집 화면에서 새 닉네임을 입력하고 저장했다"
      when: "PATCH /v2/me/profile 성공 직후 MY 프로필 화면으로 복귀"
      then: "hero 영역의 닉네임이 새 값으로 즉시 반영된다"
      ui_impact: "Header title + Hero nickname 새 값으로 갱신 (avatar / 통계 / 콘텐츠 보존)"
    - id: "AC-1.5b"
      given: "닉네임 변경이 성공적으로 적용되었다"
      when: "MY 프로필 진입 직후"
      then: "'닉네임을 변경했어요' Toast 가 표시되고 3s 내 auto-dismiss"
      ui_impact: "Toast component (top-area, single line, role=status) — 3s timer"
    - id: "AC-1.5c"
      given: "변경 직후 MY 프로필"
      when: "기본 진입 상태"
      then: "avatar / 팔로워·팔로잉·재생성받 통계 / 콘텐츠 그리드가 변경 전과 동일하게 유지된다"
      ui_impact: "Avatar src 보존 + count-row 값 보존 + content grid 보존 (변경된 것은 닉네임 한 개)"

