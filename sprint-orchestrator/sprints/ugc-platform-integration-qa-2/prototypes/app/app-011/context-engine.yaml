# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "HeaderBar(48) → ProfileHero(~320) → ContentTabBar(44, sticky) → ContentGrid(scroll) → BottomNav(64)"
      applies_to: ["MyProfileNicknameUpdated"]
    - rule: "Hero 영역 단일 시각 앵커 — 320px 이상, 메타 행 4개 이내 (3-tile count) (detail persona 강제 룰 #1·#3)"
      applies_to: ["ProfileHero"]
    - rule: "MY 프로필 root 는 back 없음 — 좌상단 비움, 우상단 settings (1-way 진입은 BottomNav.MY 탭으로 보장)"
      applies_to: ["HeaderBar"]
      note: "detail persona 강제 룰 #2 — 본 화면은 root MY 탭이므로 back 자체가 없는 정상 패턴. dismiss 경로는 BottomNav 다른 탭 이동"
    - rule: "Primary CTA 0개 + secondary 2개 (편집/공유) — 변경완료 후 행동 priority 낮음 (확인 화면 성격)"
      applies_to: ["ProfileHero CTA cluster"]
      persona_note: "detail persona 강제 룰 #4 — primary 1 + secondary 0-2. 본 화면은 결과 확인 컨텍스트 → primary 0 (Toast 가 primary 신호 역할). 룰 만족 (secondary ≤ 2)"
    - rule: "Toast 는 default 진입 시 표시 후 3s 자동 dismiss — 별도 닫기 버튼 없음. 위치 top (Figma 시사)"
      applies_to: ["Toast"]
    - rule: "alert/confirm/prompt 절대 사용 금지 (Pass 6 #8 + verifier hang 방지)"
      applies_to: ["all interactions"]
  conditional_rendering:
    - condition: "state == default (toast-visible)"
      variant_a: "Toast '닉네임을 변경했어요' 표시 + hero 새 닉네임 표시"
      variant_b: null
    - condition: "state == toast-dismissed"
      variant_a: "Toast 숨김 + hero 새 닉네임 영구 표시 (정상 상태)"
      variant_b: null
    - condition: "탭 전환 (공개 / 비공개 / 좋아요)"
      variant_a: "active tab underline + grid 콘텐츠 (placeholder)"
      variant_b: null
  constraints:
    - "BottomNav 항상 sticky-bottom"
    - "Toast top position: status-bar(44) + header(48) 사이 또는 header 아래 12-16px"
    - "ContentTabBar sticky-top: HeaderBar(48) 아래"
    - "Avatar src 보존: 변경된 것은 닉네임만 (AC-1.5c)"
    - "통계 row 값 보존: 0/0/0 (Figma 시사 — 신규 사용자 기본값으로 노출)"
    - "Feed cell 비율 mix: 1:1 / 4:5 — meme-card 패턴 (asset Layer kind=gradient-token)"
    - "닉네임 'maezzi' 또는 한글 닉네임 mock — Figma 'a이디' 자리에 새 값 표시"
  priority_order:
    - "1. Toast (변경 결과 즉시 인지) — 자동 사라짐 전 1순위 시각 신호"
    - "2. Hero Nickname (새 값 확인 — AC-1.5 핵심)"
    - "3. Avatar / Count Row (보존 검증 — AC-1.5c)"
    - "4. Content Grid (콘텐츠 보존)"
    - "5. ContentTabBar / BottomNav (이동 경로)"

