# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "StatusBar(44px) → HeaderBar(48px) → Profile(124px) → Input(72px) → spacer → SaveButton(sticky bottom 100px) — app-001 동일 골격"
      applies_to: ["프로필편집_사진_저장가능"]
    - rule: "Avatar 가운데 정렬 (100x100, frame x=121.5 in 375 frame)"
      applies_to: ["프로필편집_사진_저장가능"]
    - rule: "Avatar 슬롯 = 새 사진 (real-image kind). placeholder gradient fill 허용 (per asset layer 승인) — Pass 6 #6 면제"
      applies_to: ["프로필편집_사진_저장가능"]
    - rule: "닉네임 input value = 원본 prefill 그대로 (변경 흔적 표시 금지 — AC-1.3.c)"
      applies_to: ["프로필편집_사진_저장가능"]
    - rule: "SaveButton init = enabled (default state) — app-001 과 다른 핵심 차이"
      applies_to: ["프로필편집_사진_저장가능"]
    - rule: "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (Pass 6 #8 — verifier 호환)"
      applies_to: ["프로필편집_사진_저장가능"]
  conditional_rendering:
    - condition: "init (사진 변경 완료 직후)"
      variant_a: "SaveButton enabled (#262626/#FFFFFF), Avatar=새 사진, Nickname=원본"
      variant_b: null
    - condition: "BackButton tap (photo dirty 유지)"
      variant_a: "open-overlay → app-007 (사진 confirm modal)"
      variant_b: null
    - condition: "SaveButton tap"
      variant_a: "loading state (spinner) → POST presigned → PUT upload → PATCH → app-010"
      variant_b: null
    - condition: "presigned/upload 실패 (4xx/5xx/network)"
      variant_a: "UploadError 인라인 (avatar 직하) + SaveButton 재활성 — 재시도 가능"
      variant_b: null
    - condition: "닉네임 input focus (사용자가 추가로 닉네임도 만지면)"
      variant_a: "CharCounter visible — 단 본 화면 default 상태에서는 focus 없음"
      variant_b: null
  constraints:
    - "form persona 강제 룰 #1: inline validation 정의 — 사진 슬롯의 경우 size/format 실패 → UploadError"
    - "form persona 강제 룰 #2: SaveButton submit_disabled / submit_enabled 둘 다 정의 (loading 도)"
    - "form persona 강제 룰 #3: 모든 error message inline (avatar 직하 — alert 박스 금지)"
    - "form persona 강제 룰 #4: primary action 1개만 (저장)"
    - "Lucide-style inline SVG 만 사용 (이모지 인터랙티브 금지 — Pass 6 #2)"
    - "Tokens-only color (Pass 6 #1) — 모든 hex tokens.css 등재"
    - "Pretendard 외 font-family 금지 (Pass 6 #4)"
    - "브랜드 보라 그라디언트 배경 금지 (Pass 6 #5) — 본 화면 보라 미사용"
    - "Avatar = real-image kind. placeholder gradient fill 허용 (asset layer needs_real_content: false)"
    - "default state init 활성 — app-001 과 핵심 차이"
  priority_order:
    - "1. SaveButton 활성 상태 (즉시 인지 — 화면 존재 이유)"
    - "2. Avatar 새 사진 미리보기 (변경 결과 확인)"
    - "3. NicknameInput 원본 값 유지 (의도 외 변경 없음 확인)"
    - "4. BackButton (변경 미저장 보호 진입 — app-007)"
    - "5. UploadError (실패 시 회복 경로)"

# ─────────────────────────────
# Layer 4: ASSETS (v1)
# ─────────────────────────────
# 본 화면의 핵심 변경: avatar 슬롯이 "새 사진" 으로 채워진 상태.
# Sprint Lead 기존 승인 (app-001 §Asset Layer): avatar = 사용자 업로드 (placeholder 허용).
# 본 화면도 동일 정책 — placeholder gradient fill 로 시각화.
assets:
  avatars:
    kind: real-image
    source: "user-uploaded (runtime); prototype = placeholder gradient fill (옅은 분홍/베이지 톤 simulating photo)"
    count: 1
    license: "user-provided"
    needs_real_content: false   # PRD §Asset Layer 명시 승인 (app-001 baseline 동일 카메라 그룹)
    note: |
      Pass 6 #6 면제. 본 화면은 "사진 변경 완료 직후" 상태이므로 새 photo 가
      avatar 영역에 표시되어야 함. runtime 에서는 사용자 업로드 사진 <img> 로
      교체. prototype 에서는 토큰화된 graident fill (--pe-avatar-photo-fill)
      로 새 사진 placeholder 시각화 — kind=real-image 이지만 needs_real_content
      false (Sprint Lead 카메라 그룹 정책 승인). app-001 의 빈 avatar (lucide
      user 아이콘) 와 시각적으로 명확히 구분되는 fill 처리.
  feed_thumbnails:
    kind: real-image
    source: null
    needs_real_content: false
    note: "이 화면 슬롯 없음"
  meme_images:
    kind: real-image
    source: null
    needs_real_content: false
    note: "이 화면 슬롯 없음"
  icons:
    kind: illustration
    source: "lucide inline SVG (chevron-left, camera)"
    fallback: "text-placeholder"
    needs_real_content: false
  hero_banners:
    kind: real-image
    source: null
    needs_real_content: false
    note: "이 화면 슬롯 없음"
