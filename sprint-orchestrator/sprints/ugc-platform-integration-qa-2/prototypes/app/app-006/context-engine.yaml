# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    프로필 사진을 새로 선택한 직후 (라이브러리 / 크롭 완료 / 기본 이미지 변경) "저장 가능"
    상태로 즉시 진입한다. 닉네임은 변경되지 않은 채 그대로 유지되고, 사진만 변경되어
    isDirty=true 가 된 케이스. 사용자는 "사진 변경이 정확히 인지되었고 저장 한 번이면 적용된다"
    는 신호를 받아야 한다 (Group 001 카메라 funnel 의 핵심 confirmation 단계).
  target_user: "ZZEM 일반 유저 (사진 변경 진행 중)"
  success_metric: "사진 변경 → 저장 활성 인지 → 저장 tap 비율 (Group 001 funnel · AC-1.5)"
  user_stories:
    - id: "US-1"
      as_a: "ZZEM 유저"
      i_want: "사진을 새로 선택한 즉시 '저장' 버튼이 활성화된 모습"
      so_that: "선택이 정상적으로 적용되었음을 시각적으로 확신"
    - id: "US-2"
      as_a: "ZZEM 유저"
      i_want: "닉네임은 그대로 둔 채 사진만 저장"
      so_that: "원하지 않는 추가 변경 없이 정확히 한 가지만 갱신"
  acceptance_criteria:
    - id: "AC-1.3.a"
      given: "app-005 (사진 시트) 또는 app-008 (크롭) 에서 사진 선택 완료"
      when: "프로필편집 메인으로 복귀"
      then: "Avatar 영역에 새 사진 미리보기 (원형 마스크)"
      ui_impact: "Avatar = 새 이미지 fill (placeholder allowed per asset layer)"
    - id: "AC-1.3.b"
      given: "사진만 변경 + 닉네임 미변경"
      when: "화면 진입 직후"
      then: "SaveButton 활성 색상 (#262626 / #FFFFFF)"
      ui_impact: "SaveButton state=enabled — 즉시 활성"
    - id: "AC-1.3.c"
      given: "닉네임 input 그대로 (원본 prefill)"
      when: "사진만 변경된 상태"
      then: "닉네임 인풋은 변경 표시 없음 (원본 value 유지)"
      ui_impact: "NicknameInput value = 원본; CharCounter hidden (focus 전)"
    - id: "AC-1.3.d"
      given: "SaveButton 활성 상태"
      when: "저장 tap"
      then: "presigned URL 발급 → 업로드 → PATCH → 결과 화면 (app-010)"
      ui_impact: "SaveButton state=loading (spinner) → navigate app-010"
    - id: "AC-1.3.e"
      given: "사진 변경된 상태"
      when: "BackButton tap"
      then: "나가기 confirm modal (app-007) 오픈"
      ui_impact: "BackButton tap (with photo dirty) → open-overlay → app-007"
    - id: "AC-1.3.f"
      given: "presigned URL 발급 실패 또는 업로드 실패"
      when: "저장 시도 중 오류"
      then: "inline error 표시 + SaveButton 다시 활성"
      ui_impact: "UploadError 인라인 (input/avatar 직하) — form persona 룰 #3"

