# Screen Spec — 프로필편집_사진_저장가능 (app-006)
# Machine-readable form spec. DE Step B output.
# Source: docs/prds/ugc-platform-integration-qa-2.md (Group 001 AC-1.3.*)
#       + Figma 7hozJ6Pvs09q98BxvChj08 / 37160:80066
#       + docs/designs/patterns/profile-edit.mdx
#       + docs/designs/components/button.mdx
#       + Reference: app-001 (form baseline) + app-002 task (활성 패턴)

meta:
  screen_name: "프로필편집_사진_저장가능"
  screen_archetype: "form"     # B.1.1 결정 — form persona 강제 룰 4개 모두 적용
  task_id: "app-006"
  sprint_id: "ugc-platform-integration-qa-2"
  app: "ZZEM"
  platform: "iOS / Android (React Native)"
  language: "ko"
  frame: "390x844"
  theme: "light"
  figma_node: "37160:80066"
  parent_screen: "app-005 (사진 시트) → returns here on photo selection"
  next_screens:
    save: "app-010 (MY_프로필_사진변경완료)"
    back_dirty: "app-007 (사진 confirm modal)"

# ─────────────────────────────
# Component Tree
# ─────────────────────────────
component_tree: |
  Screen [frame: 390x844] #screen-profile-edit-photo-active
  ├── StatusBar [system] (div) #status-bar
  ├── HeaderBar [container] (header) #header-bar
  │   ├── BackButton [icon-button] (button) #back-button — 뒤로가기 (chevron-left) → app-007 (dirty)
  │   ├── HeaderTitle [text] (h1) #header-title — "프로필 편집"
  │   └── HeaderSpacer [layout] (div) #header-spacer — symmetry
  ├── Contents [scroll-container] (main) #contents
  │   ├── Profile [container] (section) #profile
  │   │   └── ProfileImg [composed] (button) #profile-img-trigger — tap → app-005 (재선택)
  │   │       ├── Avatar [avatar] (div) #avatar — kind=real-image (새 사진 placeholder fill)
  │   │       └── CameraBadge [icon-badge] (span) #camera-badge — lucide camera
  │   ├── UploadError [text] (p) #upload-error — inline below avatar (error state only)
  │   └── Input [container] (section) #input
  │       ├── NicknameLabel [text] (label) #nickname-label — "닉네임"
  │       ├── NicknameField [input-wrapper] (div) #nickname-field
  │       │   ├── NicknameInput [text-input] (input) #nickname-input — 원본 prefill
  │       │   └── CharCounter [text] (span) #char-counter — hidden (focus 전)
  │       └── NicknameError [text] (p) #nickname-error — hidden (닉네임 미변경)
  └── BottomAction [container] (div) #bottom-action — sticky bottom
      └── SaveButton [button-primary] (button) #save-button — "저장" (init=ENABLED, app-001 와 차이)

# ─────────────────────────────
# Component Details (Component-as-Data)
# ─────────────────────────────
components:
  - name: "StatusBar"
    id: "status-bar"
    tag: "div"
    type: "container"
    position: "top"
    size: "full-width x 44px"
    tokens:
      fill: "transparent"
      text: "wds.label.normal → #212228"
    notes: "iPhone status bar mock — 9:41 + signal/battery icons"

  - name: "HeaderBar"
    id: "header-bar"
    tag: "header"
    type: "container"
    position: "sticky-top"
    size: "full-width x 48px"
    tokens:
      fill: "wds.background.normal → #FFFFFF"
      border: "none"
      spacing: "0 16 0 16"
    layout: { direction: horizontal, alignment: space-between, sizing: fill }
    a11y: { role: heading, label: "프로필 편집 헤더" }

  - name: "BackButton"
    id: "back-button"
    tag: "button"
    type: "icon-button"
    position: "left"
    size: "44x44"
    tokens:
      fill: "transparent"
      text: "pe.text-primary → #262626"
    behavior:
      purpose: "이전 화면 복귀; 사진 dirty 상태이므로 항상 confirm modal (app-007) 분기"
      user_action: "tap"
      feedback: "overlay (open-overlay → app-007)"
    states:
      default: "회색 chevron-left 24px"
      disabled: null
      loading: null
      error: null
    a11y: { role: button, label: "뒤로 가기" }

  - name: "HeaderTitle"
    id: "header-title"
    tag: "h1"
    type: "text"
    position: "center"
    size: "wrap-content"
    tokens:
      text: "pe.text-primary → #262626"
    constraints: { max_lines: 1, truncation: ellipsis }
    a11y: { role: heading, label: "프로필 편집" }

  - name: "ProfileImg"
    id: "profile-img-trigger"
    tag: "button"
    type: "composed"
    position: "center"
    size: "100x100"
    tokens:
      fill: "transparent"
      radius: "full (9999px)"
    behavior:
      purpose: "프로필 사진 재선택 진입 (다시 시트 열기)"
      user_action: "tap"
      feedback: "navigation (open-overlay → app-005)"
    states:
      default: "새 사진 미리보기 + 카메라 배지"
      disabled: null
      loading: null
      error: "border-color → wds.label.error (업로드 실패 시)"
    layout: { direction: vertical, alignment: center, sizing: fixed }
    a11y: { role: button, label: "프로필 사진 변경" }

  - name: "Avatar"
    id: "avatar"
    tag: "div"
    type: "avatar"
    position: "center"
    size: "100x100"
    tokens:
      fill: "pe.avatar.photo.fill → linear-gradient (placeholder simulating new photo); runtime <img> 교체"
      border: "1px solid pe.avatar.border (rgba(136,136,136,0.2))"
      radius: "full (9999px)"
    constraints: { min_height: "100px" }
    notes: |
      kind=real-image. 사진 변경 완료 직후 — 새 photo 가 fill. prototype 에서는
      placeholder gradient (옅은 분홍/베이지) 로 시각화. assets.avatars
      needs_real_content: false (Sprint Lead 카메라 그룹 정책 승인 — app-001 baseline 동일).

  - name: "CameraBadge"
    id: "camera-badge"
    tag: "span"
    type: "icon-badge"
    position: "absolute (bottom-right of Avatar)"
    size: "24x24"
    tokens:
      fill: "pe.camera.badge.fill → #E2E2E2"
      border: "4px solid pe.camera.badge.border (#FFFFFF)"
      radius: "full (9999px)"
      text: "pe.text-primary → #262626"
    a11y: { role: img, label: "사진 변경 가능 표시" }

  - name: "UploadError"
    id: "upload-error"
    tag: "p"
    type: "text"
    position: "below avatar (centered)"
    size: "full-width"
    tokens:
      text: "wds.label.error → #FF3B30"
      spacing: "8 16 0 16"
    states:
      default: "hidden"
      error: "visible — '사진 업로드에 실패했어요. 다시 시도해주세요'"
    a11y: { role: alert, label: "사진 업로드 에러 메시지" }
    notes: "form persona 강제 룰 #3 — input(아바타) 직하 inline (alert 박스 금지)"

  - name: "NicknameLabel"
    id: "nickname-label"
    tag: "label"
    type: "text"
    position: "above input"
    size: "full-width x 20px"
    tokens:
      text: "pe.text-primary → #262626"
      spacing: "0 0 0 4"
    a11y: { role: text, label: "닉네임 라벨" }

  - name: "NicknameInput"
    id: "nickname-input"
    tag: "input"
    type: "text-input"
    position: "below NicknameLabel"
    size: "full-width x 44px"
    tokens:
      fill: "pe.input.fill → #F7F7F7"
      border: "1px solid pe.input.border (#F1F1F1)"
      radius: "lg (16px)"
      text: "pe.text-primary → #262626"
      spacing: "12 16 12 16"
    behavior:
      purpose: "닉네임 prefill (원본 그대로 — 본 화면 변경 없음 — AC-1.3.c)"
      user_action: "focus + type (선택적; 사용자가 닉네임도 추가 변경 가능)"
      feedback: "visual (focus 시 CharCounter visible)"
    states:
      default: "원본 닉네임 value prefill, char counter hidden, 변경 표시 없음"
      disabled: null
      loading: null
      error: "닉네임 추가 변경 시 length>20 → border-color error"
    constraints:
      max_lines: 1
      truncation: none
      content_policy: "최대 20자 (app-001 spec 동일)"
    a11y: { role: text, label: "닉네임 입력 (현재 원본 유지)", hint: "최대 20자" }

  - name: "CharCounter"
    id: "char-counter"
    tag: "span"
    type: "text"
    position: "absolute (right inside NicknameField)"
    size: "wrap-content"
    tokens:
      text: "pe.text-tertiary → #8A8A8A"
    states:
      default: "hidden (focus 전)"
      focused: "visible 'n/20' (사용자가 input focus 시)"
      error: "color → wds.label.error (n>20)"
    a11y: { role: text, label: "글자수 카운터" }

  - name: "NicknameError"
    id: "nickname-error"
    tag: "p"
    type: "text"
    position: "below NicknameField"
    size: "full-width"
    tokens:
      text: "wds.label.error → #FF3B30"
      spacing: "6 4 0 4"
    states:
      default: "hidden"
      error: "visible — '20자 이내로 입력해주세요' (사용자가 닉네임 추가 변경 시만 트리거)"
    a11y: { role: text, label: "닉네임 에러 메시지" }
    notes: "form persona 강제 룰 #3 — input 직하 inline. 본 화면 default 상태에선 hidden."

  - name: "SaveButton"
    id: "save-button"
    tag: "button"
    type: "button-primary"
    position: "sticky-bottom"
    size: "full-width x 56px"
    tokens:
      fill: "pe.save.active (#262626) — init=enabled (AC-1.3.b 핵심)"
      text: "pe.save.active-label (#FFFFFF)"
      radius: "lg (16px)"
      spacing: "0 16 0 16 (outer 12 16 32 16)"
    behavior:
      purpose: "사진 변경 저장 (form persona 강제 룰 #4 — primary action 1개)"
      user_action: "tap"
      feedback: "navigation (loading → app-010 사진변경완료)"
    states:
      submit_disabled: "(이 화면 default 아님) — 닉네임 추가 변경 시 length>20 만 disabled, 또는 loading 진행 중 disabled"
      submit_enabled:  "default — bg #262626, label #FFFFFF (사진 변경됨 = isDirty)"
      loading: "spinner inline, 텍스트 숨김, aria-busy=true (button.mdx)"
      error: null   # error 는 UploadError 가 처리; SaveButton 자체는 다시 enabled 로 복귀
    a11y: { role: button, label: "변경 사항 저장" }
    notes: |
      form persona 강제 룰 #2 충족 — submit_enabled (default) + submit_disabled (validation/loading 시) 정의.
      app-001 과 핵심 차이: init state = enabled (사진 변경이 이미 발생했으므로).

# ─────────────────────────────
# Layout Spec
# ─────────────────────────────
layout_spec:
  type: flex-column
  viewport: 390x844
  regions:
    - id: status-bar
      height: fixed(44px)
    - id: header-bar
      sticky: top
      height: fixed(48px)
      padding: "0 4px"
    - id: contents
      scroll: vertical
      flex: 1
      padding: "0"
      children:
        - id: profile
          type: flex-column
          padding: "12 16 12 16"
          align: center
        - id: upload-error
          type: block
          padding: "0 16 0 16"
          align: center
          visibility: "error state only"
        - id: input
          type: flex-column
          padding: "0 16 0 16"
          gap: "8px"
    - id: bottom-action
      sticky: bottom
      height: fixed(100px)
      padding: "12 16 32 16"

# ─────────────────────────────
# States
# ─────────────────────────────
states:
  default:
    description: "init — 사진 변경됨 (Avatar=새 사진), Nickname=원본 prefill, isDirty=true, SaveButton ENABLED, error hidden"
    active: true
    visible_components: [status-bar, header-bar, profile, input, save-button]
    hidden_components: [upload-error, nickname-error, char-counter]
    submit_enabled: true
    labels:
      save_button: "저장"

  focused:
    description: "사용자가 닉네임 input 도 추가 focus — CharCounter visible (선택적 분기)"
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter]
    hidden_components: [upload-error, nickname-error]
    submit_enabled: true   # 사진 변경됨 = 여전히 dirty
    labels:
      char_counter: "원본/20"

  error:
    description: "사진 업로드 실패 (presigned 발급 실패 또는 PUT 실패) — UploadError 인라인, SaveButton 재활성"
    visible_components: [status-bar, header-bar, profile, upload-error, input, save-button]
    submit_enabled: true   # 재시도 가능
    validation_rules:
      - field: "avatar"
        rule: "presigned URL 발급 OK + PUT 200 + PATCH 200"
        on_fail: "show #upload-error '사진 업로드에 실패했어요. 다시 시도해주세요'; SaveButton enabled (재시도)"
    labels:
      upload_error: "사진 업로드에 실패했어요. 다시 시도해주세요"

  loading:
    description: "저장 진행 중 — POST presigned → PUT upload → PATCH /v2/me/profile. spinner 노출, 버튼 비활성 (중복 제출 방지 권장 룰 #2)"
    visible_components: [status-bar, header-bar, profile, input, save-button]
    submit_disabled: true
    labels:
      save_button: "저장 중…"

# ─────────────────────────────
# Interactions
# ─────────────────────────────
interactions:
  - trigger: tap
    target: "#back-button"
    action: open-overlay
    destination: "app-007 (사진 confirm modal — 변경 폐기 확인)"
    transition: slide-up
    note: "AC-1.3.e — photo dirty 이므로 항상 confirm 분기"

  - trigger: tap
    target: "#profile-img-trigger"
    action: open-overlay
    destination: "app-005 (이미지 소스 바텀시트 — 재선택)"
    transition: slide-up
    note: "AC-1.3.a — 다시 사진 변경 가능"

  - trigger: focus
    target: "#nickname-input"
    action: toggle-state
    state_key: "focused"
    note: "사용자가 닉네임도 추가로 만지면 CharCounter visible"

  - trigger: input
    target: "#nickname-input"
    action: toggle-state
    state_key: "(닉네임 추가 변경 시 dirty/error 분기 — app-001 동일 로직)"
    note: "본 화면 default 시나리오는 닉네임 미터치"

  - trigger: tap
    target: "#save-button"
    action: submit
    destination: "loading → app-010 (MY_프로필_사진변경완료) [성공] | error state [실패]"
    transition: slide-left
    note: "AC-1.3.d — POST presigned + PUT + PATCH 시퀀스 mock"

# ─────────────────────────────
# Visual Rules
# ─────────────────────────────
rules:
  - condition: "Avatar 슬롯에 새 사진 (init)"
    effect: "원형 마스크로 새 사진 미리보기 (placeholder gradient fill in prototype)"
    example: "사용자가 app-005/008 에서 사진 선택 후 복귀"

  - condition: "isDirty == true (사진 변경됨, 닉네임 미변경)"
    effect: "SaveButton enabled (#262626 / #FFFFFF) — init 진입 즉시 활성"
    example: "AC-1.3.b — 사진 변경만으로도 활성"

  - condition: "NicknameInput value == 원본"
    effect: "변경 표시 없음 (CharCounter hidden in default; focus 시만 visible)"
    example: "AC-1.3.c — 닉네임 unchanged 시각화"

  - condition: "BackButton tap"
    effect: "open-overlay → app-007 (confirm modal) — 사진 변경 폐기 보호"
    example: "AC-1.3.e — photo dirty → 무조건 confirm"

  - condition: "presigned/upload 실패"
    effect: "UploadError 인라인 (avatar 직하) + SaveButton 재활성 (재시도)"
    example: "AC-1.3.f — 회복 경로"

  - condition: "loading 중 (저장 처리 중)"
    effect: "SaveButton spinner + disabled (중복 제출 방지)"
    example: "form persona 권장 룰 #2 — 표준 form UX"

# ─────────────────────────────
# Labels (ko)
# ─────────────────────────────
labels:
  header:
    title: "프로필 편집"
    back_aria: "뒤로 가기"
  body:
    nickname_label: "닉네임"
    nickname_placeholder: "닉네임을 입력해주세요"
    char_counter_template: "{n}/20"
  buttons:
    save: "저장"
    save_loading: "저장 중…"
  errors:
    upload_failed: "사진 업로드에 실패했어요. 다시 시도해주세요"
    nickname_too_long: "20자 이내로 입력해주세요"

# ─────────────────────────────
# Token Map
# ─────────────────────────────
token_map:
  background: "wds.background.normal → #FFFFFF"
  text_primary: "pe.text-primary → #262626"
  text_secondary: "pe.text-secondary → #656565"
  text_tertiary: "pe.text-tertiary → #8A8A8A"
  divider: "wds.line.normal → #E4E5E9"
  input_fill: "pe.input.fill → #F7F7F7"
  input_border: "pe.input.border → #F1F1F1"
  input_radius: "wds.radius.lg → 16px"
  input_text: "pe.text-primary → #262626"
  save_active_fill: "pe.save.active → #262626"
  save_active_label: "pe.save.active-label → #FFFFFF"
  save_disabled_fill: "pe.save.disabled → #F1F1F1"
  save_disabled_label: "pe.save.disabled-label → #8A8A8A"
  save_radius: "wds.radius.lg → 16px"
  avatar_photo_fill: "pe.avatar.photo.fill → linear-gradient (placeholder simulating uploaded photo) — additive token in prototype style block (mapped to existing primitives only)"
  avatar_border: "pe.avatar.border → rgba(136,136,136,0.2)"
  camera_badge_fill: "pe.camera.badge.fill → #E2E2E2"
  camera_badge_border: "pe.camera.badge.border → #FFFFFF"
  error_text: "wds.label.error → #FF3B30"
  error_tint: "wds.color.red.100 → #FFE5E3"

# ─────────────────────────────
# Quality Score
# ─────────────────────────────
quality_score:
  extraction_accuracy:
    total_components: 11
    with_token_map: 11
    with_html_mapping: 11
    score: "22 / 22 = 1.0"
  fabrication_risk:
    inferred_fields:
      - "UploadError text '사진 업로드에 실패했어요. 다시 시도해주세요' — task 'inline validation 사진 size/format' 도출 (low)"
      - "Avatar placeholder gradient fill (uploaded photo simulation) — asset layer 정책으로 placeholder 허용 (low)"
      - "loading state — form persona 권장 룰 #2 (관례 표준; low)"
      - "닉네임 추가 변경 분기 — app-001 동일 로직 재사용 (low)"
    risk_level: "low"
    note: |
      모든 컴포넌트는 app-001 baseline + Figma frame 37160:80066 + task 명시 기준.
      유일하게 추가된 의미적 요소는 UploadError (task 'inline validation 사진 size/format'
      및 backend dep 명시 presigned URL 실패 케이스 도출).
  schema_completeness:
    required_sections: ["meta", "component_tree", "layout_spec", "states", "interactions", "labels", "token_map"]
    present_sections:  ["meta", "component_tree", "components", "layout_spec", "states", "interactions", "rules", "labels", "token_map", "quality_score", "form_persona_check"]
    score: "11 / 7 = 1.0 (all required + 4 enrichment sections)"
  context_coverage:
    why_linked: "6 / 6 = 1.0 (모든 AC-1.3.* 가 components/interactions 에 연결됨)"
    what_resolved: "11 / 11 = 1.0 (모든 component 가 token + pattern 으로 해소됨)"

# ─────────────────────────────
# Form Persona Compliance (cross-check)
# ─────────────────────────────
form_persona_check:
  forced_rules:
    - id: 1
      rule: "inline validation 정의 — error.{field-id} 또는 validation_rules"
      result: "met"
      evidence: "states.error.validation_rules (avatar 슬롯) + #upload-error inline component (사진 size/format/upload 실패)"
    - id: 2
      rule: "Submit 버튼 disabled 상태 정의 — submit_disabled + submit_enabled 둘 다"
      result: "met"
      evidence: |
        states.default.submit_enabled: true (init 활성)
        states.loading.submit_disabled: true (중복 제출 방지)
        components.SaveButton.states.submit_enabled / submit_disabled / loading 모두 명시
    - id: 3
