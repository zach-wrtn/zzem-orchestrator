# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    프로필편집_메인 (app-001) 에서 닉네임만 변경되어 우측 "저장" 버튼이
    활성화된 상태를 시각적으로 명확히 전달한다. 사진은 변경되지 않은 init
    상태 — 닉네임 단일 변경 발생 시 form 의 dirty/enabled UI 분기를 dogfood.
  target_user: "ZZEM 일반 유저 (본인 프로필 보유, 닉네임 갱신 의도)"
  success_metric: "닉네임 변경 입력 → 저장 버튼 활성 → 저장 tap 완료율 (Group 001 funnel — 닉네임-only 분기)"
  user_stories:
    - id: "US-1"
      as_a: "ZZEM 유저"
      i_want: "닉네임을 변경했을 때 저장 가능 상태가 즉시 보이기"
      so_that: "변경분이 인식되었음을 확신 후 저장 tap"
    - id: "US-2"
      as_a: "ZZEM 유저"
      i_want: "1자/21자 같은 invalid 입력 시 저장 비활성 + 어떤 규칙 위반인지 인지"
      so_that: "잘못된 입력으로 서버 호출 실패하지 않음"
  acceptance_criteria:
    - id: "AC-2.a"
      given: "프로필편집_메인 진입 후 닉네임만 변경된 상태"
      when: "유저가 인풋에 변경된 닉네임 입력"
      then: "변경된 닉네임이 인풋에 표시되며 카운터 'n/20' 갱신"
      ui_impact: "NicknameInput value=changed; CharCounter visible 'n/20'"
    - id: "AC-2.b"
      given: "닉네임이 변경되어 valid (2~20자) 인 상태"
      when: "유저가 저장 버튼 영역 인지"
      then: "저장 버튼이 활성 색상 (component.button.primary.fill — dogfood 케이스에선 #262626)"
      ui_impact: "SaveButton state=enabled (bg --pe-save-active, label --pe-save-active-label)"
    - id: "AC-2.c"
      given: "활성 상태에서 닉네임을 1자 또는 21자로 변경"
      when: "유저가 invalid 길이 입력"
      then: "저장 버튼 비활성 + 인라인 validation 메시지 노출"
      ui_impact: "SaveButton state=disabled; #nickname-error visible (form persona 룰 #1·#3)"
    - id: "AC-2.d"
      given: "저장 활성 상태"
      when: "유저가 저장 tap"
      then: "loading state 표시 후 결과 화면(app-011)으로 전환"
      ui_impact: "SaveButton.loading (spinner) → navigate app-011"
    - id: "AC-2.e"
      given: "닉네임이 변경된 dirty 상태"
      when: "유저가 좌측 back tap"
      then: "나가기 confirm modal (app-003) 오픈"
      ui_impact: "BackButton tap (with dirty) → open-overlay → app-003"

# ─────────────────────────────
# Layer 2: WHAT (Design System)
# ─────────────────────────────
what:
  tokens_needed:
    colors:
      - "wds.color.neutral.0"     # bg #FFFFFF
      - "wds.color.neutral.900"   # label primary fallback
      - "pe.input.fill"           # #F7F7F7 input bg
      - "pe.input.border"         # #F1F1F1 input border
      - "pe.save.active"          # #262626 (form 룰 #2 — enabled)
      - "pe.save.active-label"    # #FFFFFF
      - "pe.save.disabled"        # #F1F1F1 (1자/21자 invalid 분기 시 복귀)
      - "pe.save.disabled-label"  # #8A8A8A
      - "pe.camera.badge.fill"    # #E2E2E2
      - "pe.camera.badge.border"  # #FFFFFF
      - "pe.text-primary"         # #262626 헤더 타이틀
      - "pe.text-tertiary"        # #8A8A8A char counter / placeholder
      - "pe.avatar.empty.bg"      # #F5F3FF
      - "pe.avatar.border"        # rgba(136,136,136,0.2)
      - "wds.label.error"         # #FF3B30 inline validation
      - "wds.color.red.100"       # #FFE5E3 error field bg tint
    typography:
      - "wds.font.size.xs"        # 12px char counter, error
      - "wds.font.size.md"        # 14px input label
      - "wds.font.size.lg"        # 16px input value, save button
      - "wds.font.size.xl"        # 18px header title
      - "wds.font.weight.medium"  # 500
      - "wds.font.weight.semibold"# 600
    spacing:
      - "wds.spacing.4"   # 4px label padding-x
      - "wds.spacing.8"   # 8px input gap
      - "wds.spacing.12"  # 12px input padding-y / bottom-action top
      - "wds.spacing.16"  # 16px page padding
      - "wds.spacing.20"  # 20px tit→input
      - "wds.spacing.32"  # 32px bottom-action bottom safe
    radius:
      - "wds.radius.lg"   # 16px input + save
      - "wds.radius.full" # 9999 avatar + camera badge

  components_needed:
    - name: "StatusBar"
      category: "navigation"
    - name: "HeaderBar"
      category: "navigation"
      pattern_ref: "docs/designs/patterns/profile-edit.mdx"
      note: "← back + 중앙 '프로필 편집' SemiBold 18px (app-001 동일)"
    - name: "ProfileImg"
      category: "input"
      pattern_ref: "docs/designs/patterns/profile-edit.mdx"
      note: "100px avatar + 우하단 카메라 배지 — 이 화면은 '변경 없음' 상태"
    - name: "NicknameLabel"
      category: "content"
    - name: "NicknameInput"
      category: "input"
      pattern_ref: "docs/designs/patterns/profile-edit.mdx"
      note: "변경된 닉네임 prefill (활성 dirty value)"
    - name: "CharCounter"
      category: "content"
      note: "'n/20' (변경된 길이) — 본 화면은 항상 visible (active state)"
    - name: "NicknameError"
      category: "feedback"
      note: "1자 / 21자 분기 시에만 visible — form 룰 #3 inline 직하"
    - name: "SaveButton"
      category: "control"
      pattern_ref: "docs/designs/components/button.mdx"
      note: "h-56 sticky bottom; 본 화면 default = enabled (bg #262626)"

  patterns_needed:
    - name: "form: 1 primary action sticky bottom (enabled)"
      description: "form persona 강제 룰 #4 — 본 화면 active state = enabled"
    - name: "input filled rounded box with prefilled dirty value"
      description: "닉네임 인풋 변경된 값 표시 + char counter visible"
    - name: "char counter visible (active form)"
      description: "변경 발생 후 'n/20' 항상 노출"
    - name: "inline validation error below input"
      description: "1자 미만 / 21자 초과 시 표시 — form persona 강제 룰 #3"
    - name: "enabled-by-default save button (this branch)"
      description: "form persona 강제 룰 #2 — submit_enabled 가 active state"

# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "StatusBar(44px) → HeaderBar(48px) → Profile(124px) → Input(72px+error) → spacer → SaveButton(sticky bottom 100px) — app-001 layout 보존"
      applies_to: ["프로필편집_닉네임_저장가능"]
    - rule: "본 화면 init state = 'dirty' (변경 발생 후 진입) — SaveButton enabled, CharCounter visible 가 default"
      applies_to: ["프로필편집_닉네임_저장가능"]
    - rule: "사진은 변경 없음 — Avatar lucide user + #F5F3FF 유지 (app-001 토큰 동일)"
      applies_to: ["프로필편집_닉네임_저장가능"]
    - rule: "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (verifier 호환 + Pass 6 #8)"
      applies_to: ["프로필편집_닉네임_저장가능"]
  conditional_rendering:
    - condition: "닉네임 length in [2, 20] (valid)"
      variant_a: "SaveButton enabled (bg #262626, label #FFFFFF), CharCounter neutral color"
      variant_b: null
    - condition: "닉네임 length < 2 (1자 또는 0자)"
      variant_a: "SaveButton disabled 복귀 + #nickname-error '2자 이상 입력해주세요'"
      variant_b: null
    - condition: "닉네임 length > 20"
      variant_a: "SaveButton disabled 복귀 + #nickname-error '20자 이내로 입력해주세요' + CharCounter color error"
      variant_b: null
    - condition: "SaveButton tap (enabled)"
      variant_a: "loading state (spinner) → navigate app-011 결과 화면"
      variant_b: null
    - condition: "BackButton tap (dirty 상태이므로 항상)"
      variant_a: "open-overlay → confirm modal (app-003)"
      variant_b: null
  constraints:
    - "form persona 강제 룰 #1: NicknameInput 에 inline validation (1자 미만 / 21자 초과)"
    - "form persona 강제 룰 #2: submit_enabled / submit_disabled 둘 다 정의 — 본 화면 default=enabled, invalid 시 disabled 복귀"
    - "form persona 강제 룰 #3: error message 는 input 직하 inline (alert 박스 금지)"
    - "form persona 강제 룰 #4: primary action 1개 (저장)"
    - "Lucide-style inline SVG 만 사용 (Pass 6 #2)"
    - "Tokens-only color (Pass 6 #1) — pe-* / wds-* 변수만"
    - "Pretendard 외 font-family 금지 (Pass 6 #4)"
    - "브랜드 보라 그라디언트 배경 금지 (Pass 6 #5) — 이 화면 보라 미사용"
    - "Avatar 영역 placeholder 허용 (assets.avatars.needs_real_content: false — app-001 동일 정책)"
    - "control-panel 영역 보존 (audit scope 외)"
  priority_order:
    - "1. SaveButton 활성 색상 (저장 가능 상태 즉시 인지) — 본 화면의 핵심"
    - "2. NicknameInput dirty value + CharCounter (변경 인지)"
    - "3. NicknameError (validation 분기 시 즉각 피드백)"
    - "4. ProfileImg (변경 없음 — 시각 위계 낮음)"
    - "5. HeaderBar back (변경 미저장 보호 진입 → app-003)"

