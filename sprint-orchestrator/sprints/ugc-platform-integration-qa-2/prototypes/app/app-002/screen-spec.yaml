# Screen Spec — 프로필편집_닉네임_저장가능
# Machine-readable form spec. DE Step B output.
# Source: docs/prds/ugc-platform-integration-qa-2.md (Group 001 AC-2.*)
#       + Figma 7hozJ6Pvs09q98BxvChj08 / 37160:79954 (frame metadata)
#       + docs/designs/patterns/profile-edit.mdx (re-used from app-001)
#       + docs/designs/components/button.mdx (button enabled state)
#       + sibling app-001/screen-spec.yaml (component tree alignment)

meta:
  screen_name: "프로필편집_닉네임_저장가능"
  screen_archetype: "form"   # B.1.1 결정 — form persona 강제 룰 4개 모두 적용 (active branch)
  task_id: "app-002"
  sprint_id: "ugc-platform-integration-qa-2"
  app: "ZZEM"
  platform: "iOS / Android (React Native)"
  language: "ko"
  frame: "390x844"
  theme: "light"
  figma_node: "37160:79954"

# ─────────────────────────────
# Component Tree
# ─────────────────────────────
component_tree: |
  Screen [frame: 390x844] #screen-profile-edit-saveable
  ├── StatusBar [system] (div) #status-bar
  ├── HeaderBar [container] (header) #header-bar
  │   ├── BackButton [icon-button] (button) #back-button — 뒤로가기 (chevron-left)
  │   ├── HeaderTitle [text] (h1) #header-title — "프로필 편집"
  │   └── HeaderSpacer [layout] (div) #header-spacer — symmetry
  ├── Contents [scroll-container] (main) #contents
  │   ├── Profile [container] (section) #profile
  │   │   └── ProfileImg [composed] (button) #profile-img-trigger — tap → app-005 (변경 없음)
  │   │       ├── Avatar [avatar] (div) #avatar
  │   │       │   └── AvatarUserIcon [icon] (svg) #avatar-icon — lucide user
  │   │       └── CameraBadge [icon-badge] (span) #camera-badge — lucide camera
  │   └── Input [container] (section) #input
  │       ├── NicknameLabel [text] (label) #nickname-label — "닉네임"
  │       ├── NicknameField [input-wrapper] (div) #nickname-field
  │       │   ├── NicknameInput [text-input] (input) #nickname-input — dirty value prefill
  │       │   └── CharCounter [text] (span) #char-counter — "n/20" (active)
  │       └── NicknameError [text] (p) #nickname-error — inline (1자/21자 분기)
  └── BottomAction [container] (div) #bottom-action — sticky bottom
      └── SaveButton [button-primary] (button) #save-button — "저장" (default=enabled)

# ─────────────────────────────
# Component Details (Component-as-Data)
# ─────────────────────────────
components:
  - name: "StatusBar"
    id: "status-bar"
    tag: "div"
    type: "container"
    position: "top"
    size: "full-width x 44px"
    tokens:
      fill: "transparent"
      text: "wds.label.normal → #212228"
    notes: "iPhone status bar mock — 9:41 + signal/battery icons"

  - name: "HeaderBar"
    id: "header-bar"
    tag: "header"
    type: "container"
    position: "sticky-top"
    size: "full-width x 48px"
    tokens:
      fill: "wds.background.normal → #FFFFFF"
      border: "none"
      spacing: "0 16 0 16"
    layout: { direction: horizontal, alignment: space-between, sizing: fill }
    a11y: { role: heading, label: "프로필 편집 헤더" }

  - name: "BackButton"
    id: "back-button"
    tag: "button"
    type: "icon-button"
    position: "left"
    size: "44x44"
    tokens:
      fill: "transparent"
      text: "pe.text-primary → #262626"
    behavior:
      purpose: "이전 화면 복귀; isDirty=true 항상 → confirm modal (app-003)"
      user_action: "tap"
      feedback: "overlay (always — dirty branch)"
    states:
      default: "회색 chevron-left 24px"
      disabled: null
      loading: null
      error: null
    a11y: { role: button, label: "뒤로 가기" }

  - name: "HeaderTitle"
    id: "header-title"
    tag: "h1"
    type: "text"
    position: "center"
    size: "wrap-content"
    tokens:
      text: "pe.text-primary → #262626"
    constraints: { max_lines: 1, truncation: ellipsis }
    a11y: { role: heading, label: "프로필 편집" }

  - name: "ProfileImg"
    id: "profile-img-trigger"
    tag: "button"
    type: "composed"
    position: "center"
    size: "100x100"
    tokens:
      fill: "transparent"
      radius: "full (9999px)"
    behavior:
      purpose: "사진 변경 진입 (본 화면은 사진 미변경 — 진입 가능 유지)"
      user_action: "tap"
      feedback: "navigation (open-overlay → app-005)"
    states:
      default: "현재 avatar + 카메라 배지 노출 (app-001 와 동일 시각)"
      disabled: null
      loading: null
      error: null
    layout: { direction: vertical, alignment: center, sizing: fixed }
    a11y: { role: button, label: "프로필 사진 변경" }

  - name: "Avatar"
    id: "avatar"
    tag: "div"
    type: "avatar"
    position: "center"
    size: "100x100"
    tokens:
      fill: "pe.avatar.empty.bg → #F5F3FF"
      border: "1px solid pe.avatar.border (rgba(136,136,136,0.2))"
      radius: "full (9999px)"
    constraints: { min_height: "100px" }
    notes: "사진 변경 없음 — app-001 init avatar 동일 (lucide user 가운데)"

  - name: "CameraBadge"
    id: "camera-badge"
    tag: "span"
    type: "icon-badge"
    position: "absolute (bottom-right of Avatar)"
    size: "24x24"
    tokens:
      fill: "pe.camera.badge.fill → #E2E2E2"
      border: "4px solid pe.camera.badge.border (#FFFFFF)"
      radius: "full (9999px)"
      text: "pe.text-primary → #262626"
    a11y: { role: img, label: "사진 변경 가능 표시" }

  - name: "NicknameLabel"
    id: "nickname-label"
    tag: "label"
    type: "text"
    position: "above input"
    size: "full-width x 20px"
    tokens:
      text: "pe.text-primary → #262626"
      spacing: "0 0 0 4"
    a11y: { role: text, label: "닉네임 라벨" }

  - name: "NicknameInput"
    id: "nickname-input"
    tag: "input"
    type: "text-input"
    position: "below NicknameLabel"
    size: "full-width x 44px"
    tokens:
      fill: "pe.input.fill → #F7F7F7"
      border: "1px solid pe.input.border (#F1F1F1)"
      radius: "lg (16px)"
      text: "pe.text-primary → #262626"
      spacing: "12 16 12 16"
    behavior:
      purpose: "변경된 닉네임 표시 + 추가 편집 가능 (active dirty value)"
      user_action: "focus + type"
      feedback: "visual (CharCounter 갱신, SaveButton 활성/비활성 분기)"
    states:
      default: "변경된 닉네임 prefill (예: '까망콩 V2'), 보더 neutral"
      disabled: null
      loading: null
      error: "border-color → wds.label.error (#FF3B30); bg → wds.color.red.100; NicknameError 표시"
    constraints: { max_lines: 1, truncation: none, content_policy: "2자 이상 20자 이내 (Acceptance Criteria 추론)" }
    a11y: { role: text, label: "닉네임 입력", hint: "2자 이상 20자 이내" }

  - name: "CharCounter"
    id: "char-counter"
    tag: "span"
    type: "text"
    position: "absolute (right inside NicknameField)"
    size: "wrap-content"
    tokens:
      text: "pe.text-tertiary → #8A8A8A"
    states:
      default: "visible 'n/20' (n=현재 길이, 본 화면은 active)"
      error: "color → wds.label.error 'n/20' (n>20)"
    a11y: { role: text, label: "글자수 카운터" }

  - name: "NicknameError"
    id: "nickname-error"
    tag: "p"
    type: "text"
    position: "below NicknameField"
    size: "full-width"
    tokens:
      text: "wds.label.error → #FF3B30"
      spacing: "6 4 0 4"
    states:
      default: "hidden (valid 상태)"
      error_too_long: "visible — '20자 이내로 입력해주세요'"
      error_too_short: "visible — '2자 이상 입력해주세요'"
    a11y: { role: text, label: "닉네임 에러 메시지" }
    notes: "form persona 강제 룰 #3 — input 직하 inline (alert 박스 금지)"

  - name: "SaveButton"
    id: "save-button"
    tag: "button"
    type: "button-primary"
    position: "sticky-bottom"
    size: "full-width x 56px"
    tokens:
      fill: "pe.save.active (#262626) [default — enabled] / pe.save.disabled (#F1F1F1) [invalid 분기 복귀]"
      text: "pe.save.active-label (#FFFFFF) [enabled] / pe.save.disabled-label (#8A8A8A) [disabled]"
      radius: "lg (16px)"
      spacing: "0 16 0 16 (outer 12 16 32 16)"
    behavior:
      purpose: "변경 저장 (form persona 강제 룰 #4 — primary action 1개) — 본 화면은 active 진입"
      user_action: "tap"
      feedback: "navigation → app-011 (loading 거쳐)"
    states:
      submit_enabled: "default 상태 — bg #262626, label #FFFFFF (component.button.primary.fill 의 dogfood 케이스)"
      submit_disabled: "invalid 분기 복귀 — bg #F1F1F1, label #8A8A8A, pointer-events none"
      loading: "spinner inline, 텍스트 숨김, aria-busy=true"
      error: null
    a11y: { role: button, label: "변경 사항 저장" }
    notes: "form persona 강제 룰 #2 — submit_enabled / submit_disabled 둘 다 정의됨"

# ─────────────────────────────
# Layout Spec
# ─────────────────────────────
layout_spec:
  type: flex-column
  viewport: 390x844
  regions:
    - id: status-bar
      height: fixed(44px)
    - id: header-bar
      sticky: top
      height: fixed(48px)
      padding: "0 4px"
    - id: contents
      scroll: vertical
      flex: 1
      padding: "0"
      children:
        - id: profile
          type: flex-column
          padding: "12 16 12 16"
          align: center
        - id: input
          type: flex-column
          padding: "0 16 0 16"
          gap: "8px"
    - id: bottom-action
      sticky: bottom
      height: fixed(100px)
      padding: "12 16 32 16"

# ─────────────────────────────
# States
# ─────────────────────────────
states:
  default:
    description: "active dirty (nickname-only) — 변경된 닉네임 표시, CharCounter visible, SaveButton enabled"
    active: true
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter]
    hidden_components: [nickname-error]
    submit_enabled: true
    labels:
      save_button: "저장"
      char_counter: "8/20"   # 예시 — '까망콩 V2' = 8자

  focused:
    description: "닉네임 input focus — 키보드 활성, valid 길이 유지"
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter]
    hidden_components: [nickname-error]
    submit_enabled: true
    labels:
      char_counter: "8/20"

  error_too_long:
    description: "닉네임 21자 이상 입력 — 저장 비활성 복귀 + inline error"
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter, nickname-error]
    submit_disabled: true
    validation_rules:
      - field: "nickname-input"
        rule: "length <= 20"
        on_fail: "show #nickname-error '20자 이내로 입력해주세요' + border-color error + bg red.100"
    labels:
      nickname_error: "20자 이내로 입력해주세요"
      char_counter: "21/20"

  error_too_short:
    description: "닉네임 1자 이하 입력 — 저장 비활성 복귀 + inline error"
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter, nickname-error]
    submit_disabled: true
    validation_rules:
      - field: "nickname-input"
        rule: "length >= 2"
        on_fail: "show #nickname-error '2자 이상 입력해주세요' + border-color error + bg red.100"
    labels:
      nickname_error: "2자 이상 입력해주세요"
      char_counter: "1/20"

  loading:
    description: "저장 요청 중 — SaveButton spinner, button disabled (form 권장 룰 #2 중복 제출 방지)"
    visible_components: [status-bar, header-bar, profile, input, save-button, char-counter]
    submit_disabled: true
    labels:
      save_button: "저장 중…"

# ─────────────────────────────
# Interactions
# ─────────────────────────────
interactions:
  - trigger: tap
    target: "#back-button"
    action: open-overlay
    destination: "app-003 (나가기 confirm modal)"
    transition: slide-up
    note: "AC-2.e — dirty 상태 항상 confirm 으로"

  - trigger: tap
    target: "#profile-img-trigger"
    action: open-overlay
    destination: "app-005 (이미지 소스 바텀시트)"
    transition: slide-up
    note: "사진 변경은 가능 — 본 화면 분기 외"

  - trigger: focus
    target: "#nickname-input"
    action: toggle-state
    state_key: "focused"
    note: "키보드 활성 (app-004) + CharCounter 유지"

  - trigger: input
    target: "#nickname-input"
    action: validate-and-toggle
    state_key: "default | error_too_long | error_too_short"
    note: "AC-2.a/c — 길이 변화 감지 후 SaveButton 활성/비활성 분기"

  - trigger: tap
    target: "#save-button"
    action: submit
    destination: "app-011 (저장 결과 화면)"
    transition: slide-left
    note: "AC-2.d — submit_enabled 시에만; loading state 거쳐 결과 화면"

# ─────────────────────────────
# Visual Rules
# ─────────────────────────────
rules:
  - condition: "닉네임 length in [2, 20] (default)"
    effect: "SaveButton enabled (bg #262626, label #FFFFFF), error hidden, CharCounter neutral"
    example: "'까망콩 V2' (8자) — 본 화면 default state"

  - condition: "닉네임 length > 20"
    effect: "SaveButton disabled 복귀 + NicknameError '20자 이내로 입력해주세요' + border error"
    example: "'아주 긴 닉네임을 입력했을 때 표시되는 사례' (21자+)"

  - condition: "닉네임 length < 2"
    effect: "SaveButton disabled 복귀 + NicknameError '2자 이상 입력해주세요'"
    example: "'까' (1자)"

  - condition: "SaveButton tap (enabled)"
    effect: "loading state 진입 → spinner → app-011 navigate"
    example: "유효한 변경 후 저장 tap"

  - condition: "BackButton tap (dirty 항상)"
    effect: "open-overlay → app-003 confirm modal"
    example: "변경 미저장 보호 (AC-2.e)"

# ─────────────────────────────
# Labels (ko)
# ─────────────────────────────
labels:
  header:
    title: "프로필 편집"
    back_aria: "뒤로 가기"
  body:
    nickname_label: "닉네임"
    nickname_placeholder: "닉네임을 입력해주세요"
    char_counter_template: "{n}/20"
  buttons:
    save: "저장"
    save_loading: "저장 중…"
  errors:
    nickname_too_long: "20자 이내로 입력해주세요"
    nickname_too_short: "2자 이상 입력해주세요"

# ─────────────────────────────
# Token Map
# ─────────────────────────────
token_map:
  background: "wds.background.normal → #FFFFFF"
  text_primary: "pe.text-primary → #262626"
  text_secondary: "pe.text-secondary → #656565"
  text_tertiary: "pe.text-tertiary → #8A8A8A"
  divider: "wds.line.normal → #E4E5E9"
  input_fill: "pe.input.fill → #F7F7F7"
  input_border: "pe.input.border → #F1F1F1"
  input_radius: "wds.radius.lg → 16px"
  input_text: "pe.text-primary → #262626"
  save_active_fill: "pe.save.active → #262626"
  save_active_label: "pe.save.active-label → #FFFFFF"
  save_disabled_fill: "pe.save.disabled → #F1F1F1"
  save_disabled_label: "pe.save.disabled-label → #8A8A8A"
  save_radius: "wds.radius.lg → 16px"
  avatar_empty_bg: "pe.avatar.empty.bg → #F5F3FF"
  avatar_border: "pe.avatar.border → rgba(136,136,136,0.2)"
  camera_badge_fill: "pe.camera.badge.fill → #E2E2E2"
  camera_badge_border: "pe.camera.badge.border → #FFFFFF"
  error_text: "wds.label.error → #FF3B30"
  error_field_bg: "wds.color.red.100 → #FFE5E3"

# ─────────────────────────────
# Quality Score
# ─────────────────────────────
quality_score:
  extraction_accuracy:
    total_components: 11
    with_token_map: 11
    with_html_mapping: 11
    score: "22 / 22 = 1.0"
  fabrication_risk:
    inferred_fields:
      - "Nickname min length = 2 — task 'validation pass(2-20자)' 명시에서 직접 도출 (none)"
      - "Nickname max length = 20 — task 'validation pass(2-20자)' 명시에서 직접 도출 (none)"
      - "Error text '2자 이상 입력해주세요' — 룰 도출 (low)"
      - "Error text '20자 이내로 입력해주세요' — app-001 spec 재사용 (low)"
      - "loading state — form persona 권장 룰 #2 (관례 표준; low)"
      - "default state = active dirty (변경된 닉네임 prefill) — task 'context: 변경되어 활성 상태' 직접 도출 (none)"
    risk_level: "low"
    note: "PRD/task 에 명시된 항목만 사용; 표준 form 패턴 + app-001 sibling spec 재사용. 신규 추론 없음."
  schema_completeness:
    required_sections: ["meta", "component_tree", "layout_spec", "states", "interactions", "labels", "token_map"]
    present_sections:  ["meta", "component_tree", "components", "layout_spec", "states", "interactions", "rules", "labels", "token_map", "quality_score", "form_persona_check"]
    score: "11 / 7 = 1.0 (all required + 4 enrichment sections)"
  context_coverage:
    why_linked: "5 / 5 = 1.0 (모든 AC-2.* 가 components/interactions 에 연결됨)"
    what_resolved: "11 / 11 = 1.0 (모든 component 가 token + pattern 으로 해소됨)"

# ─────────────────────────────
# Form Persona Compliance (cross-check)
# ─────────────────────────────
form_persona_check:
  forced_rules:
    - id: 1
      rule: "inline validation 정의 — error.{field-id} 또는 validation_rules"
      result: "met"
      evidence: "states.error_too_long.validation_rules + states.error_too_short.validation_rules + #nickname-error inline component"
    - id: 2
      rule: "Submit 버튼 disabled 상태 정의 — submit_disabled + submit_enabled 둘 다"
      result: "met"
      evidence: "states.default.submit_enabled (active branch) + states.error_too_long.submit_disabled + states.error_too_short.submit_disabled + components.SaveButton.states (둘 다 명시) — 보존: 변경 발생 후 활성 상태 dogfood"
    - id: 3
      rule: "Error message inline 직하 (alert 박스 금지)"
      result: "met"
      evidence: "#nickname-error position 'below NicknameField' + tag <p>; alert/confirm/prompt 미사용"
    - id: 4
      rule: "Primary action 1개만 (Submit/Save)"
      result: "met"
      evidence: "SaveButton 하나만 type=button-primary; HeaderBar back 은 icon-button (보조), CameraBadge 는 button 내부 trigger"
  recommended_rules:
    - id: 1
      rule: "Validation 시점 focus-out (blur)"
      result: "skipped"
      rationale: "char counter 즉시 피드백 UX 가 모바일에서 더 자연스러움 (app-001 와 일관). archetype_recommendation_skipped 로깅됨."
    - id: 2
      rule: "Submit 후 loading state"
      result: "met"
      evidence: "states.loading + SaveButton.states.loading"
    - id: 3
      rule: "긴 form 섹션 분할 (8개 미만)"
      result: "n/a"
      evidence: "본 화면 입력 슬롯 1개 (닉네임만 active) — 분할 불필요"
