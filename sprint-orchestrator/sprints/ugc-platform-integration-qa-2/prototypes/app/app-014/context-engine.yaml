# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "HeaderBar(48) → ProfileHero(~320, dim variant) → BlockedNotice(card) → BottomNav(64). ContentTabBar/ContentGrid 미렌더 (DOM 부재)"
      applies_to: ["OtherProfileScreen-Blocked"]
    - rule: "Hero 영역 단일 시각 앵커 — 320px 이상, 표시 가능한 메타 4개 이내(아바타·닉네임·badge·notice 헤드라인) (detail persona 강제 룰 #1·#3)"
      applies_to: ["ProfileHero"]
    - rule: "Primary CTA 0개 (차단 상태이므로 actionable 없음) — secondary는 헤더 ⋮ 만 노출. detail persona 강제 룰 #4 의 'primary 1' 은 본 차단 상태에서 면제 (변형 경우 — quality_report 에 명기)"
      applies_to: ["ProfileHero CTA cluster (omitted)"]
    - rule: "back 1-way: 좌상단 ← 만 노출 (detail persona 강제 룰 #2)"
      applies_to: ["HeaderBar"]
    - rule: "BlockedNotice 는 placeholder/skeleton 이 아닌 의도된 empty-state — Pass 6 #6 면제 (kind: illustration)"
      applies_to: ["BlockedNotice"]
    - rule: "alert/confirm/prompt 절대 사용 금지 (Pass 6 #8 + verifier hang 방지)"
      applies_to: ["all interactions"]
  conditional_rendering:
    - condition: "state == default (blocked)"
      variant_a: "Hero(dim) + BlockedBadge + BlockedNotice + BottomNav (콘텐츠 그리드 미렌더)"
      variant_b: null
    - condition: "사용자가 ⋮ tap → app-015 진입"
      variant_a: "현 화면 유지 + 차단됨 더보기 sheet 오버레이 (mock toast)"
      variant_b: null
  constraints:
    - "BottomNav 항상 sticky-bottom"
    - "ContentTabBar 미노출 (콘텐츠가 없으므로 탭도 무의미)"
    - "CountRow 미노출 (PRD: 카운트 숨김 가능)"
    - "Follow / Message CTA 미렌더 (차단 상태)"
    - "Avatar 는 약간 dim (opacity 0.55) 처리 — 차단 상태 시각 표현"
    - "BlockedNotice 카드: surface-secondary 배경, lock icon 40px, 헤드라인 + sub-copy 2줄"
    - "BlockedBadge: surface-tertiary fill, label-alternative 색, ban icon 14px + '차단됨'"
  priority_order:
    - "1. BlockedBadge (차단 상태 즉시 인지)"
    - "2. BlockedNotice (콘텐츠 미노출 사유 설명)"
    - "3. MoreButton (차단 해제 경로)"
    - "4. ProfileHero avatar+nickname (대상 식별)"
    - "5. BottomNav (이동 경로)"

