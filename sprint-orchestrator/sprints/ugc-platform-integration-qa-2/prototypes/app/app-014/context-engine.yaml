# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: "차단된 사용자의 프로필 진입 시 콘텐츠 노출을 차단하고 차단 상태를 명확히 시각화하여 의도적 재차단 경험을 보호한다."
  target_user: "타유저를 차단한 후 우연히 그 프로필에 진입한 ZZEM 사용자"
  success_metric: "AC-2.2 통과 — 콘텐츠 그리드 미노출 + '차단됨' 상태 indicator 가시 + 차단 해제 진입점(더보기 → app-015) 제공"
  user_stories:
    - id: "US-1"
      as_a: "사용자를 차단한 ZZEM 사용자"
      i_want: "차단된 사용자의 프로필에 진입했을 때 그 사용자의 콘텐츠를 다시 보지 않도록 보호받고 싶다"
      so_that: "차단 액션이 실제 시각적으로 적용되고, 의도치 않은 콘텐츠 노출을 방지한다"
  acceptance_criteria:
    - id: "AC-2.2-a"
      given: "타유저를 차단한 상태에서"
      when: "해당 타유저 프로필에 재진입한다"
      then: "콘텐츠 영역이 모두 숨겨지고 '차단됨' 상태 indicator + 안내 메시지가 표시된다"
      ui_impact: "ContentGrid 제거 + Hero 영역의 차단됨 badge + BlockedNotice card (lock/ban icon + '차단된 사용자의 콘텐츠는 표시되지 않아요')"
    - id: "AC-2.2-b"
      given: "차단된 프로필 화면을 보고 있다"
      when: "헤더 우상단 더보기(•••) tap"
      then: "차단됨 더보기 sheet (app-015) 가 진입되어 '차단 해제' 옵션이 노출된다"
      ui_impact: "MoreButton → app-015 navigation 진입점"
    - id: "AC-2.2-c"
      given: "차단된 프로필 화면이 default state 다"
      when: "back tap 또는 통계 row 등 인터랙션을 시도"
      then: "콘텐츠가 노출되지 않고 안전하게 이전 화면으로 복귀하거나 카운트는 비활성/숨김 처리된다"
      ui_impact: "BackButton 정상 동작 + CountRow 숨김(또는 dim 처리) + Follow/Message CTA 미노출"

