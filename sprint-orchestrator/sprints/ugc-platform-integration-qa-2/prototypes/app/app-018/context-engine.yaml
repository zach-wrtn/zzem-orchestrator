# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: "차단된 사용자를 해제할 때 실수 해제를 방지하고, 해제의 결과 (콘텐츠/활동 재노출) 를 명확히 안내한다."
  target_user: "차단관리 리스트 (app-017) 에서 특정 사용자 해제를 시도한 ZZEM 사용자"
  success_metric: "AC-2.4 차단관리 리스트 일괄 해제 가능 + AC-2.5 차단/해제 시 confirm 1 step"
  user_stories:
    - id: "US-1"
      as_a: "차단 목록을 정리하려는 사용자"
      i_want: "특정 사용자의 해제 결과를 한눈에 확인한 뒤 결정한다"
      so_that: "실수로 해제하거나, 다시 콘텐츠/알림이 노출되는 것을 모르는 일이 없다"
  acceptance_criteria:
    - id: "AC-2.4"
      given: "사용자가 차단관리 리스트 (app-017) 에 있다"
      when: "한 사용자의 '해제' 버튼을 tap"
      then: "confirm bottom sheet 가 slide-up + backdrop dim. '@아이디님 차단을 해제하시겠어요?' + 안내 row + Primary '차단 해제하기' + Secondary '취소'"
      ui_impact: "modal archetype: backdrop ≥0.4, drag handle, profile image, title with handle, 2 info rows, 2 buttons"
    - id: "AC-2.5"
      given: "confirm sheet 가 열려있다"
      when: "'차단 해제하기' tap"
      then: "loading → DELETE /v2/users/{userId}/block → app-019 (해제완료) 진입"
      ui_impact: "loading state — primary 버튼 spinner + 모든 close trigger 비활성"
    - id: "AC-2.5b"
      given: "confirm sheet 가 열려있다"
      when: "'취소' / X / backdrop tap"
      then: "sheet dismiss + 차단관리 리스트 유지"
      ui_impact: "modal persona 강제 룰 #2 — 닫기 2-way (X + backdrop) + 취소 ghost"

