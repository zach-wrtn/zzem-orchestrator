# ─────────────────────────────
# Layer 3: HOW (Orchestration Rules)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "BottomSheet 는 viewport 하단 anchor + transform translateY 100% → 0% 로 slide-up"
      applies_to: ["UnblockConfirmSheet"]
    - rule: "Backdrop opacity 0.50 ≥ 0.4 (modal 강제 룰 #1)"
      applies_to: ["UnblockConfirmSheet"]
    - rule: "Close trigger 3개 이상: X 버튼 + 취소 버튼 + backdrop tap (+ ESC). 강제 룰 #2 충족"
      applies_to: ["UnblockConfirmSheet"]
    - rule: "Primary 1 + Secondary 1 (강제 룰 #3) — primary 는 brand color (해제는 destructive 아님)"
      applies_to: ["UnblockConfirmSheet"]
    - rule: "Title h1 (강제 룰 #4) — 닉네임 + 액션 명시 ('@아이디님 차단을 해제하시겠어요?')"
      applies_to: ["UnblockConfirmSheet"]
    - rule: "Info row 2개 (sibling app-013 의 3개에서 알림 row 제외 — 사용자 호불호 보호)"
      applies_to: ["UnblockConfirmSheet"]
  conditional_rendering:
    - condition: "loading state"
      variant_a: "primary 버튼: spinner + '해제 중…' 라벨"
      variant_b: "기본: '차단 해제하기' 라벨"
    - condition: "loading state"
      variant_a: "close trigger (backdrop, close-btn, cancel-btn): pointer-events none + opacity 0.4"
      variant_b: "기본: 모두 활성"
  constraints:
    - "BottomSheet max-height 85% viewport (hug content 우선, ~480px)"
    - "Primary 색상은 brand 만 사용 — destructive 사용 금지 (해제 = 회복)"
    - "Info row 는 1-2개 (사용자 prompt 제약 — 안내 간소화)"
    - "Profile image 100x100 — 닉네임 첫 글자 fallback"
  priority_order:
    - "Primary CTA (차단 해제하기) — 가장 큰 시각 무게 + brand fill"
    - "Title — 결정 컨텍스트 명확화"
    - "Info rows — 결과 안내 (배경 surface-secondary 로 secondary 위계)"
    - "Cancel + Close — 탈출 경로 (필수, 시각 약화)"

