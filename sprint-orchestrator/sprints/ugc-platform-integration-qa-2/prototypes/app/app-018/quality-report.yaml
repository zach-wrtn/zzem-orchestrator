# ─────────────────────────────
# Modal Archetype Persona (강제 룰 4/4)
# ─────────────────────────────
modal_persona:
  status: "passed"
  rules:
    - id: 1
      name: "Backdrop opacity ≥ 0.4"
      status: "pass"
      detail: |
        --wds-background-dimmed: rgba(0, 0, 0, 0.50). 0.50 ≥ 0.4. 부모 차단관리
        리스트 (parent-surface) 명확히 dim 처리 + 시트 콘텐츠 가독성 확보.
    - id: 2
      name: "닫기 2-way 보장 (X + 외부 backdrop tap)"
      status: "pass"
      detail: |
        Close trigger 3개:
        (a) #close-btn (X 버튼) — 우상단 absolute, lucide x SVG
        (a) #cancel-btn (취소 버튼) — secondary ghost
        (b) #backdrop tap — 외부 영역 click 핸들러
        + bonus: ESC keydown
        screen-spec interactions 에 close-overlay 트리거 4개 명시.
        강제 룰 #2 충족 (2개 이상).
    - id: 3
      name: "Primary CTA 1개 + secondary 0-1개"
      status: "pass"
      detail: |
        Primary: #unblock-btn '차단 해제하기' (brand purple #8752FA) — 1개.
        Secondary: #cancel-btn '취소' (ghost outline) — 1개.
        총 1+1 정확히 충족. Primary 색상은 사용자 prompt 지침 ("destructive 보다
        neutral/brand") 에 따라 brand 채택. Sibling app-013 의 destructive 빨강과
        의도적 대비 — 해제 = 회복 액션.
    - id: 4
      name: "Title / 명확한 콘텍스트"
      status: "pass"
      detail: |
        sheet-title h1: "@zzem_user_123님 차단을 해제하시겠어요?" — handle + 액션 명시.
        modal 만 떠있을 때도 사용자가 '누구의 / 무엇을 / 왜' 즉시 인지 가능.
        + ProfileImage 100x100 으로 시각 식별 보강.

  recommended_rules:
    - id: 1
      name: "Bottom sheet 형태 (모바일 표준)"
      status: "applied"
      detail: "화면 하단 anchor + slide-up transition (transform 0.28s cubic-bezier)."
    - id: 2
      name: "Drag handle 가시"
      status: "applied"
      detail: "36x4 pill, neutral-300 색, 시트 상단 center."
    - id: 3
      name: "첫 input/option 자동 focus"
      status: "skipped"
      reason: |
        confirm modal 에는 input 필드가 없음 (CTA 만). primary 를 autofocus 하면
        사용자가 ENTER 로 의도치 않게 해제 실행할 위험 — destructive 만큼 심각하진
        않으나 race condition 방지 위해 skip. archetype_recommendation_skipped 로 로깅.

