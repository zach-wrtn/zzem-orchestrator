      name: "hex-not-in-tokens (.screen 후손)"
      status: "pass"
      detail: |
        prototype.html 의 hex 25개 추출. tokens.css 정의 외 4개 (#1a1a2e, #2a2a3e,
        #e0e0e0, #f0f0f0) 는 모두 .control-panel / body / device-frame border —
        .screen 외부. .screen 후손 hex 는 모두 토큰 정의됨 (purple/neutral/red 시리즈).
        그 외 미정의 short hex (#888 #bbb #666 #999 #444 #fff #ddd) 도 모두 control-panel.
    - id: 2
      name: "emoji on interactive elements"
      status: "pass"
      detail: |
        모든 button (close, cancel, unblock, parent-back, parent-refresh,
        parent-list__action × 4) 는 lucide inline SVG 또는 한국어 텍스트만.
        info row icons (unlock, eye) 도 lucide. 이모지 0건.
    - id: 3
      name: "card border-left slop"
      status: "pass"
      detail: "border-left 사용 0건. info-rows 는 surface fill + radius. parent-list 는 border-bottom 만 (구분선 — 의도된 사용)."
    - id: 4
      name: "font-family Pretendard 외 (.screen 후손)"
      status: "pass"
      detail: |
        font-family 선언: Pretendard (var --wds-font-family-primary, body),
        ui-monospace (.control-panel 만), inherit (.screen 내 button + parent-cta).
        .screen 후손에 Pretendard 외 명시 0건.
    - id: 5
      name: "브랜드 보라 그라디언트 전면 사용"
      status: "pass"
      detail: |
        linear-gradient 사용 0건. unblock primary 는 단색 brand fill
        (--component-button-primary-fill → #8752FA). info-icon 도 단색 brand-weak fill.
    - id: 6
      name: "placeholder-image 주 콘텐츠 점유"
      status: "pass"
      detail: |
        ProfileImage 100x100 + parent-list__avatar 48x48 × 4 — 모두
        context-engine.yaml assets.avatars.kind: gradient-token (needs_real_content: false).
        단색 fill + 닉네임 initial 로 표시. Pass 6 #6 면제 (의도된 fallback).
    - id: 7
      name: "DOM 이벤트 바인딩 ↔ Spec interactions 정합"
      status: "pass"
      detail: |
        Spec interactions: 5개 (backdrop tap, close-btn tap, cancel-btn tap,
        unblock-btn tap, api-success navigate).
        prototype.html bindings: backdrop click + close-btn click + cancel-btn click +
        unblock-btn click + ESC keydown + state buttons (control-panel) + sheet click stop.
        Spec 의 5개 user-facing interaction 모두 바인딩됨. api-success 는 setTimeout
        으로 시뮬레이션. ESC 는 강제 룰 #2 close 보조 channel.
    - id: 8
      name: "alert/confirm/prompt 사용"
      status: "pass"
      detail: "0건. 모든 피드백은 toast + setState. closeSheet/confirmUnblock 모두 named handler."
    - id: 9
