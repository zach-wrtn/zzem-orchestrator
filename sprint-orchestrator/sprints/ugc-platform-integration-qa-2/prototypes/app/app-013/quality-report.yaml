pass_6_anti_slop:
  status: "passed"
  checks:
    - id: 1
      name: "hex-not-in-tokens (.screen 후손)"
      status: "pass"
      detail: |
        prototype.html 의 hex 25개 추출. tokens.css 에 미정의된 4개 (#1a1a2e, #2a2a3e,
        #e0e0e0, #f0f0f0) 는 모두 .control-panel 또는 body/device-frame border 등
        .screen 외부 영역. 검사 범위 (.screen 후손) 내 모든 hex 는 토큰 정의됨.
        외부 미정의 hex: #888 #bbb #666 #999 #444 #fff #ddd 도 모두 .control-panel 내부.
    - id: 2
      name: "emoji on interactive elements"
      status: "pass"
      detail: |
        모든 button (close, cancel, block, parent-back, parent-more, parent-cta) 은
        lucide inline SVG 또는 한국어 텍스트만 사용. 안내 row 의 ban / eye-off /
        bell-off 도 lucide SVG. 이모지 0건.
    - id: 3
      name: "card border-left slop"
      status: "pass"
      detail: "border-left 사용 없음. info-rows 는 surface fill + radius 로 강조."
    - id: 4
      name: "font-family Pretendard 외 (.screen 후손)"
      status: "pass"
      detail: |
        font-family 선언 9건 — 'Pretendard' (var --wds-font-family-primary),
        ui-monospace (.control-panel 만), inherit (.screen 내 button). .screen 후손에
        Pretendard 외 명시 0건.
    - id: 5
      name: "브랜드 보라 그라디언트 전면 사용"
      status: "pass"
      detail: |
        보라색 gradient 사용 0건. parent-cta 만 단색 brand fill (--wds-fill-brand-primary).
        modal 자체는 destructive 빨강 + 중성 surface 조합.
    - id: 6
      name: "placeholder-image 주 콘텐츠 점유"
      status: "pass"
      detail: |
        ProfileImage 100x100 — context-engine.yaml assets.avatars.kind: gradient-token
        선언 (needs_real_content: false). 단색 fill + 닉네임 initial 'Z' 로 표시.
        Pass 6 #6 면제 (의도된 fallback).
    - id: 7
      name: "DOM 이벤트 바인딩 ↔ Spec interactions 정합"
      status: "pass"
      detail: |
        Spec interactions: 5개 (backdrop tap, close-btn tap, cancel-btn tap,
        block-btn tap, api-success navigate).
        prototype.html bindings: backdrop click + close-btn click + cancel-btn click +
        block-btn click + ESC keydown + state buttons (control-panel) + screen click stop.
        Spec 의 5개 user-facing interaction 모두 바인딩됨. api-success 는 setTimeout
        으로 시뮬레이션. ESC 는 강제 룰 #2 (close 2-way) 의 보조 channel — 추가 1건.
    - id: 8
      name: "alert/confirm/prompt 사용"
      status: "pass"
      detail: "grep 결과 0건. 모든 피드백은 toast + setState 로 구현."
    - id: 9
      name: "modal archetype persona 강제 룰 4/4"
      status: "pass"
      detail: "modal_persona 섹션 참조 — 4/4 모두 통과."
    - id: 10
