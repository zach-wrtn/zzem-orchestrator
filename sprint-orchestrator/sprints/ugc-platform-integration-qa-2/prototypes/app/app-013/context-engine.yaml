# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    타유저 차단 결정 직전, 차단 적용 후 발생하는 변화 (콘텐츠 숨김 / 알림 차단 /
    해제 가능) 를 명확히 안내하여 의도하지 않은 차단을 방지하고
    confirm 한 사용자만 차단 액션을 적용한다.
  target_user: "ZZEM 사용자 — 타 유저 프로필에서 더보기 → 차단 진입한 유저"
  success_metric: "차단 confirm modal 표시 후 '차단하기' tap 비율 + 취소 비율 (의도 정합성)"
  user_stories:
    - id: "US-2.1"
      as_a: "ZZEM 사용자"
      i_want: "차단 시 어떤 변화가 일어나는지 명확히 알고 싶다"
      so_that: "실수로 차단했을 때 결과를 미리 인지하고 후회하지 않는다"
    - id: "US-2.2"
      as_a: "ZZEM 사용자"
      i_want: "차단 confirm 화면에서 쉽게 닫고 빠져나갈 수 있어야 한다"
      so_that: "결정 부담 없이 진입했다가 돌아갈 수 있다"
  acceptance_criteria:
    - id: "AC-2.1"
      given: "타유저 프로필 → 더보기 → '차단' tap"
      when: "차단확인 바텀시트 노출"
      then: "닉네임 + 프로필 이미지 + 안내 row × 3 + '차단하기' primary + '취소' secondary 표시"
      ui_impact: "Bottom sheet 컴포넌트 트리: ProfileImage, Title, InfoRow×3, ButtonPair"
    - id: "AC-2.1.a"
      given: "차단확인 바텀시트 표시"
      when: "사용자가 backdrop tap 또는 X tap 또는 '취소' tap"
      then: "modal dismiss + 부모 화면 복귀"
      ui_impact: "2-way close (X + backdrop) + 취소 버튼 = 총 3개 close trigger"
    - id: "AC-2.1.b"
      given: "차단확인 바텀시트 표시"
      when: "사용자가 '차단하기' tap"
      then: "loading state → POST /v2/users/{userId}/block → 차단됨 프로필 (app-014) 이동"
      ui_impact: "primary 버튼 → spinner 노출, 다른 인터랙션 비활성"
    - id: "AC-2.5"
      given: "차단/해제 액션 진행"
      when: "성공"
      then: "1 step 으로 결과 확인 (toast 또는 후속 화면)"
      ui_impact: "loading spinner 후 즉시 다음 화면 — 별도 success modal 없음"

