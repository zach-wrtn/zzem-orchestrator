# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "Backdrop (full screen) → BottomSheet (bottom-anchored, slide-up)"
      applies_to: ["BlockConfirmSheet"]
    - rule: "BottomSheet 내부: DragHandle → CloseButton(우상단 absolute) → ProfileImage(center) → Title → InfoRow stack → ButtonPair"
      applies_to: ["BlockConfirmSheet"]
    - rule: "ButtonPair: 좌측 '취소' ghost + 우측 '차단하기' destructive — 2-button row, 동일 폭 (1:1)"
      applies_to: ["BlockConfirmSheet"]
    - rule: "InfoRow 3개 모두 동일 height, 동일 icon container 크기 (40x40, radius full, fill weak red)"
      applies_to: ["BlockConfirmSheet"]
    - rule: "ProfileImage 100x100 circle, center horizontally, 시트 상단 padding 32px"
      applies_to: ["BlockConfirmSheet"]
  conditional_rendering:
    - condition: "state == 'open' (default)"
      variant_a: "Backdrop visible + Sheet slid-up + 모든 인터랙션 활성"
      variant_b: null
    - condition: "state == 'loading' (차단 진행 중)"
      variant_a: "차단하기 버튼 → spinner + label '차단 중…' + 모든 close trigger 비활성 (X / backdrop / 취소)"
      variant_b: null
    - condition: "state == 'dismissed'"
      variant_a: "Backdrop fade-out + Sheet slide-down + 부모 화면 복귀 (시각상 시트 사라짐)"
      variant_b: null
  constraints:
    - "Backdrop opacity 0.50 (modal archetype 강제 룰 #1: ≥0.4)"
    - "Close trigger 2개 이상: (a) X 버튼 + 명시적 '취소' 버튼 + (b) backdrop tap (modal archetype 강제 룰 #2)"
    - "Primary CTA 1개 ('차단하기' destructive 빨간색) + Secondary 1개 ('취소' ghost). 정확히 1+1 (modal archetype 강제 룰 #3)"
    - "Title 명확: '&아이디&님을 차단하시겠어요?' — modal 만 떠도 사용자 위치 인지 가능 (modal archetype 강제 룰 #4)"
    - "안내 row 3개 모두 lucide-style inline SVG (ban / view-off / bell-off) — Pass 6 #2 emoji 금지"
    - "차단하기 버튼은 destructive 토큰 사용 (component.button.destructive.fill = #FF3B30)"
    - "alert/confirm/prompt 절대 사용 금지 (verifier 호환 — Pass 6 #8)"
    - "control-panel 영역 외 모든 텍스트 Pretendard (Pass 6 #4)"
  priority_order:
    - "1. Title (왜 이 modal 이 떴는가 — 닉네임 명시)"
    - "2. ProfileImage (어떤 사용자를 차단하는가 — 시각 식별)"
    - "3. InfoRow × 3 (차단의 결과 — 의사결정 근거)"
    - "4. Primary CTA '차단하기' (destructive)"
    - "5. Secondary '취소' / X / Backdrop (close)"

