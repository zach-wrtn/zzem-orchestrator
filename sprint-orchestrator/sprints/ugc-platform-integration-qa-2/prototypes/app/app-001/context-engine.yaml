# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "StatusBar(58px) → HeaderBar(48px) → Profile(124px) → Input(72px) → spacer → SaveButton(sticky bottom 100px)"
      applies_to: ["프로필편집_메인"]
    - rule: "ProfileImg 가운데 정렬 (frame 좌표 x=121.5, w=100 in 375 frame)"
      applies_to: ["프로필편집_메인"]
    - rule: "Input 좌우 padding 16px, 'tit' (label) padding-left 4px (Figma 좌표)"
      applies_to: ["프로필편집_메인"]
    - rule: "SaveButton 상단 padding 12px, 좌우 16px, 하단 32px (Figma 좌표 y=712~812)"
      applies_to: ["프로필편집_메인"]
    - rule: "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (verifier 호환 + Pass 6 #8)"
      applies_to: ["프로필편집_메인"]
  conditional_rendering:
    - condition: "isDirty == false (init)"
      variant_a: "SaveButton state=disabled (bg #F1F1F1, label #8A8A8A)"
      variant_b: null
    - condition: "isDirty == true (닉네임 or 사진 변경)"
      variant_a: "SaveButton state=enabled (bg #262626, label #FFFFFF)"
      variant_b: null
    - condition: "NicknameInput focus"
      variant_a: "CharCounter visible '0/20' (또는 현재 길이)"
      variant_b: "CharCounter hidden"
    - condition: "닉네임 length > 20"
      variant_a: "ErrorText 인라인 표시 (input 직하) + SaveButton disabled 유지 (form persona 룰 #1)"
      variant_b: null
    - condition: "BackButton tap with isDirty=true"
      variant_a: "open-overlay → confirm modal (app-003 / app-007)"
      variant_b: "navigate-back (직접 이전 화면)"
  constraints:
    - "form persona 강제 룰 #1: 모든 input 에 inline validation 정의 (error.nickname state)"
    - "form persona 강제 룰 #2: SaveButton disabled / enabled 상태 둘 다 정의됨"
    - "form persona 강제 룰 #3: error message 는 input 직하 inline (alert 박스 금지)"
    - "form persona 강제 룰 #4: primary action 1개만 (저장)"
    - "Lucide-style inline SVG 만 사용 (이모지 인터랙티브 금지 — Pass 6 #2)"
    - "Tokens-only color — 모든 hex 는 tokens.css 등재 (Pass 6 #1)"
    - "Pretendard 외 font-family 금지 (Pass 6 #4)"
    - "브랜드 보라 그라디언트 배경 금지 (Pass 6 #5) — 이 화면은 보라 미사용"
    - "Avatar 영역 placeholder-image 허용 (assets.avatars.needs_real_content: false — 진입 init)"
  priority_order:
    - "1. SaveButton 상태 (저장 가능 여부 즉시 인지)"
    - "2. NicknameInput (가장 빈도 높은 변경 슬롯)"
    - "3. ProfileImg (탭 → 시트 분기 트리거)"
    - "4. HeaderBar back (변경 미저장 보호 진입)"
    - "5. CharCounter (입력 진행 인지)"

