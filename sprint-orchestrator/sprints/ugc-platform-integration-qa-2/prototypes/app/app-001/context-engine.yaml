# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    유저가 본인의 프로필 닉네임과 사진을 한 화면에서 편집할 수 있도록 한다.
    MY 프로필 → "프로필 편집" 진입 → 닉네임 + 사진 두 편집 슬롯을
    동시 노출하여 변경분 발생 시에만 저장 활성. 변경 미저장 보호 (back confirm)는
    같은 그룹의 modal (app-003 / app-007) 에서 처리.
  target_user: "ZZEM 일반 유저 (본인 프로필 보유)"
  success_metric: "프로필 편집 진입 → 변경(닉네임 or 사진) → 저장 완료율 (Group 001 funnel)"
  user_stories:
    - id: "US-1"
      as_a: "ZZEM 유저"
      i_want: "닉네임과 프로필 사진을 한 화면에서 편집"
      so_that: "정체성 표현을 빠르게 갱신"
    - id: "US-2"
      as_a: "ZZEM 유저"
      i_want: "변경 사항이 없을 때 실수로 저장 누르지 않게 비활성화 됨"
      so_that: "의미 없는 서버 호출 방지 + 명확한 상태 인지"
  acceptance_criteria:
    - id: "AC-1.1.a"
      given: "유저가 MY 프로필에서 '프로필 편집' 탭"
      when: "프로필편집_메인 진입"
      then: "현재 프로필 사진 + 닉네임 prefill 상태로 렌더"
      ui_impact: "ProfileImg 영역 = 현재 avatar; NicknameInput value = 현재 닉네임"
    - id: "AC-1.1.b"
      given: "프로필편집_메인 진입 상태"
      when: "사진 영역 tap"
      then: "이미지 소스 바텀시트 (app-005) 오픈"
      ui_impact: "PhotoTrigger tap → open-overlay → app-005"
    - id: "AC-1.1.c"
      given: "프로필편집_메인 진입 상태"
      when: "닉네임 인풋 focus"
      then: "키보드 활성 (app-004) + 글자 카운터 표시"
      ui_impact: "NicknameInput focus → app-004; CharCounter visible"
    - id: "AC-1.1.d"
      given: "변경 없음 상태 (init)"
      when: "유저 화면 진입"
      then: "우측 '저장' 버튼 비활성"
      ui_impact: "SaveButton state=disabled (bg #F1F1F1, label #8A8A8A)"
    - id: "AC-1.1.e"
      given: "닉네임 또는 사진 변경 발생"
      when: "유저 변경 입력"
      then: "'저장' 버튼 활성"
      ui_impact: "SaveButton state=enabled (bg #262626, label #FFFFFF) — 분기는 app-002 / app-006"
    - id: "AC-1.1.f"
      given: "변경분이 있는 상태"
      when: "좌측 back tap"
      then: "나가기 confirm modal (app-003 / app-007) 오픈"
      ui_impact: "BackButton tap (with dirty) → open-overlay → confirm modal"

