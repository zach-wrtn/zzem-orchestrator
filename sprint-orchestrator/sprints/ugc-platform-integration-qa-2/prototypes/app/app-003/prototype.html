    pointer-events: none;

    opacity: 0;
    transition: opacity 0.24s ease-out;
    cursor: pointer;
    pointer-events: none;

    transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.08);
    pointer-events: auto;
    width: 100%;
    max-height: 85%;

  /* States: dismissing */
  .modal-overlay[data-state="dismissing"] { pointer-events: none; }
  .modal-overlay[data-state="dismissing"] .backdrop { opacity: 0; pointer-events: none; }

    text-align: center;
    font-weight: var(--wds-font-weight-medium);
  }
  .toast.show { display: block; }

  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; min-height: 100dvh; }

    .device-frame {

</style>

      </div>
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modal-overlay" data-state="open" role="dialog" aria-modal="true" aria-labelledby="sheet-title" aria-describedby="sheet-desc">

      <div class="backdrop" id="backdrop" data-action="close" role="presentation" aria-label="나가기확인 바텀시트 외부 영역. 탭하면 닫혀요."></div>

      <div class="bottom-sheet" id="exit-confirm-sheet">
        <div class="drag-handle" aria-hidden="true"></div>

        <h2 class="sheet-title" id="sheet-title">변경 사항이 저장되지 않습니다</h2>
        <p class="sheet-desc" id="sheet-desc">정말 나가시겠어요?</p>

        <div class="button-pair" id="button-pair">
          <button class="btn btn--keep" id="keep-btn" type="button" data-action="close" aria-label="계속 편집">
            계속 편집
          </button>
          <button class="btn btn--exit" id="exit-btn" type="button" data-action="confirm-exit" aria-label="나가기">
            나가기
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </section>
</div>

<script>
  // === State management ===
  const overlay = document.getElementById('modal-overlay');
  const breadcrumb = document.getElementById('breadcrumb');
  const stateButtons = document.querySelectorAll('.control-panel__state-btn');
  const toast = document.getElementById('toast');

  function setState(state) {
    overlay.setAttribute('data-state', state);
    stateButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    breadcrumb.textContent = 'exit-confirm · ' + state;
    console.log('[state]', state);
  }

  stateButtons.forEach(btn => {
    btn.addEventListener('click', () => setState(btn.dataset.state));
  });

  // === Toast helper ===
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // === Action handlers (no alert/confirm/prompt — verifier safe, Pass 6 #8) ===
  function closeSheet(source) {
    setState('dismissing');
    showToast('편집을 계속해요 (' + source + ')');
    // Demo: 1.4초 후 다시 open 상태로 복원 (verifier flow 지속)
    setTimeout(() => setState('open'), 1400);
  }

  function confirmExit() {
    if (overlay.getAttribute('data-state') !== 'open') return;
    setState('dismissing');
    showToast('변경 폐기 + 이전 화면으로 이동');
    // Reset for demo
    setTimeout(() => setState('open'), 1800);
  }

  // === Event bindings (Screen Spec interactions) ===
  document.getElementById('backdrop').addEventListener('click', () => closeSheet('backdrop'));
  document.getElementById('keep-btn').addEventListener('click', () => closeSheet('keep-button'));
  document.getElementById('exit-btn').addEventListener('click', () => confirmExit());

  // Stop propagation on sheet itself so backdrop click only triggers from outside
  document.getElementById('exit-confirm-sheet').addEventListener('click', (e) => e.stopPropagation());

  // ESC key — additional close (a11y nicety, modal 강제 룰 #2 보조 channel)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSheet('escape-key');
  });

  // === Init ===
  setState('open');
</script>

</body>
</html>
