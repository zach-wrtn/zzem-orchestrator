        #e0e0e0, #f0f0f0) 는 모두 .control-panel 또는 body bg 영역 — .screen 외부.
        검사 범위 (.screen 후손) 내 모든 hex 는 tokens.css 정의됨.
        Body/control-panel 내부 미정의 raw 색상: #444 #888 #bbb #666 #999 #fff #ddd
        (모두 .control-panel scope).
    - id: 2
      name: "emoji on interactive elements"
      status: "pass"
      detail: |
        모든 button (keep, exit) + parent surface 의 비활성 back/save 는 한국어 텍스트
        또는 lucide inline SVG 만 사용. status bar / camera badge / parent avatar 도 lucide SVG.
        이모지 0건.
    - id: 3
      name: "card border-left slop"
      status: "pass"
      detail: "border-left 사용 없음. button-pair 는 gap + 동일 폭 1:1 flex."
    - id: 4
      name: "font-family Pretendard 외 (.screen 후손)"
      status: "pass"
      detail: |
        font-family 선언 9건:
        - 'Pretendard' (var --wds-font-family-primary) — body
        - ui-monospace ×4 — .control-panel scope (audit 제외 영역)
        - inherit ×3 — .screen 내부 button (parent-header__back, parent-save-btn (span),
          .btn) — Pretendard 로 resolve
        .screen 후손에 Pretendard 외 명시 0건.
    - id: 5
      name: "브랜드 보라 그라디언트 전면 사용"
      status: "pass"
      detail: |
        gradient 사용 0건. parent-avatar 만 단색 fill (--pe-avatar-empty-bg #F5F3FF).
