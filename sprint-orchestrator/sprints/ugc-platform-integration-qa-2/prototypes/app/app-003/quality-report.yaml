# ─────────────────────────────
# Modal Archetype Persona (강제 룰 4/4)
# ─────────────────────────────
modal_persona:
  status: "passed"
  rules:
    - id: 1
      name: "Backdrop opacity ≥ 0.4"
      status: "pass"
      detail: |
        --wds-background-dimmed: rgba(0, 0, 0, 0.50). 0.50 ≥ 0.4. ParentSurface (편집 form
        dirty 캡처) 명확히 dim 처리 + 시트 콘텐츠 가독성 확보.
    - id: 2
      name: "닫기 2-way 보장 (X + 외부 backdrop tap)"
      status: "pass"
      detail: |
        Close trigger 3개:
        (a) #keep-btn '계속 편집' 명시적 cancel (secondary ghost) — strong "edit-continue" intent
        (b) #backdrop tap — 외부 영역 click 핸들러
        + bonus: ESC keydown
        Figma frame 에 X 버튼 없음 — '계속 편집' 이 1차 cancel channel. 강제 룰 #2 충족
        (X 또는 명시적 cancel + backdrop tap 양자 택일 + 둘 다).
        screen-spec.yaml interactions 에 close-overlay 트리거 3개 (backdrop, keep-btn, esc) 명시.
    - id: 3
      name: "Primary CTA 1개 + secondary 0-1개"
      status: "pass"
      detail: |
        Primary: #exit-btn '나가기' (destructive 빨강 #FF3B30) — 1개
        Secondary: #keep-btn '계속 편집' (ghost outline) — 1개
        총 1+1 정확히 충족. 결정 단순화 (편집 지속 vs 변경 폐기).
    - id: 4
      name: "Title / 명확한 콘텍스트"
      status: "pass"
      detail: |
        sheet-title h2: "변경 사항이 저장되지 않습니다"
        sheet-desc p:   "정말 나가시겠어요?"
        modal 만 떠있을 때도 사용자가 '무엇이 일어났는가' (변경 미저장) + '무엇을 결정하는가'
        (계속 / 나가기) 즉시 인지 가능. ParentSurface (dimmed) 노출로 "어떤 작업 도중인지"
        시각 컨텍스트 보강.

  recommended_rules:
    - id: 1
      name: "Bottom sheet 형태 (모바일 표준)"
      status: "applied"
      detail: "화면 하단 anchor + slide-up transition (transform 0.28s cubic-bezier)."
    - id: 2
      name: "Drag handle 가시"
      status: "applied"
      detail: "40x4 pill (Figma frame 일치), neutral-300 색, 시트 상단 center."
    - id: 3
      name: "첫 input/option 자동 focus"
      status: "skipped"
      reason: |
        confirm modal 에는 input 필드가 없음 (CTA 만). destructive primary ('나가기') 를
        autofocus 하면 사용자가 ENTER 로 의도치 않게 변경 폐기 실행할 위험 — 권장 룰 거절.
        대신 secondary ('계속 편집') 가 좌측 (default tab order) 로 안전한 default 제공.
        archetype_recommendation_skipped 로 로깅.

