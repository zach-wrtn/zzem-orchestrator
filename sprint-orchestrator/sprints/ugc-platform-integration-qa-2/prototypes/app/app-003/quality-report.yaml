    - id: 7
      name: "DOM 이벤트 바인딩 ↔ Spec interactions 정합"
      status: "pass"
      detail: |
        Spec interactions: 4개 (backdrop tap, keep-btn tap, exit-btn tap, ESC keydown).
        prototype.html bindings: backdrop click + keep-btn click + exit-btn click + ESC keydown
        + sheet click stopPropagation + state buttons (control-panel).
        Spec 4개 user-facing interaction 모두 바인딩됨. ESC 는 강제 룰 #2 보조 channel.
