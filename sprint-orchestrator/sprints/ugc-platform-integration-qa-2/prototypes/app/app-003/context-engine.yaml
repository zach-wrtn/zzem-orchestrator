# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    프로필편집 화면에서 닉네임을 변경한 dirty 상태로 좌상단 back tap 시,
    저장되지 않은 변경분이 폐기되기 직전 사용자에게 의도 확인을 요구한다.
    의도치 않은 변경 손실(특히 키 큰 닉네임 입력 직후 실수로 back 탭)을 방지한다.
  target_user: "ZZEM 사용자 — 프로필편집 진입 후 닉네임 입력 도중 의도치 않게 또는 의도적으로 back 탭한 사용자"
  success_metric: "back tap 후 '계속 편집' 비율 (실수 방지 효과) + '나가기' 비율 (정상 종료 의도)"
  user_stories:
    - id: "US-1.4"
      as_a: "ZZEM 사용자"
      i_want: "닉네임 변경 도중 실수로 뒤로가기를 눌렀을 때 변경분이 즉시 사라지지 않기를"
      so_that: "다시 입력하는 마찰 없이 작업을 이어가거나, 명시적으로 폐기를 결정할 수 있다"
  acceptance_criteria:
    - id: "AC-1.4"
      given: "프로필편집 화면 — 닉네임 dirty 상태"
      when: "사용자가 좌상단 back tap"
      then: "Bottom sheet confirm 노출: 타이틀 + 설명 + '나가기' destructive primary + '계속 편집' secondary"
      ui_impact: "Bottom sheet 컴포넌트 트리: BottomSheet > DragHandle + Title + Description + ButtonPair"
    - id: "AC-1.4.a"
      given: "나가기확인 바텀시트 노출"
      when: "사용자가 backdrop tap 또는 '계속 편집' tap"
      then: "Sheet dismiss + 편집 form 상태 보존 (입력값 유지)"
      ui_impact: "2-way close: backdrop + secondary 버튼. 편집 form 변경분은 유지."
    - id: "AC-1.4.b"
      given: "나가기확인 바텀시트 노출"
      when: "사용자가 '나가기' tap"
      then: "Sheet dismiss + 편집 form pop (이전 화면 — MY 프로필) + 변경분 폐기"
      ui_impact: "destructive primary 버튼 → 부모 화면 navigation back + dirty state 폐기"

