# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "ParentSurface (NicknameEditForm dirty) → Backdrop (full screen) → BottomSheet (bottom-anchored, slide-up)"
      applies_to: ["ExitConfirmSheet"]
    - rule: "BottomSheet 내부 vertical stack: DragHandle(center) → Title(20px gap) → ButtonPair(1:1)"
      applies_to: ["ExitConfirmSheet"]
    - rule: "ButtonPair: 좌측 '계속 편집' ghost + 우측 '나가기' destructive — 동일 폭 1:1, gap 8px"
      applies_to: ["ExitConfirmSheet"]
    - rule: "Sheet content padding: 12 (top, drag) + 20 28 24 (text + button area). Figma frame 351x170 wrap-content."
      applies_to: ["ExitConfirmSheet"]
  conditional_rendering:
    - condition: "state == 'open' (default)"
      variant_a: "Backdrop visible + Sheet slid-up + 모든 인터랙션 활성"
      variant_b: null
    - condition: "state == 'dismissing'"
      variant_a: "Backdrop fade-out + Sheet slide-down + parent surface 인터랙션 복원"
      variant_b: null
  constraints:
    - "Backdrop opacity 0.50 (modal archetype 강제 룰 #1: ≥0.4)"
    - "Close trigger 2개 이상: '계속 편집' 버튼 (강제 룰 #2 (a) cancel channel) + backdrop tap (강제 룰 #2 (b))"
    - "Primary CTA 1개 ('나가기' destructive 빨간색) + Secondary 1개 ('계속 편집' ghost). 정확히 1+1 (modal archetype 강제 룰 #3)"
    - "Title 명확: '변경 사항이 저장되지 않습니다' — modal 만 떠도 사용자가 무엇을 결정하는지 즉시 인지 (강제 룰 #4)"
    - "Figma 원문은 단일 텍스트 '수정사항이 있습니다. 그래도 나가시겠습니까?' — task spec 의 두 줄 패턴 (title + sub) 채택, 정확 카피는 Sprint Lead 게이트"
    - "본 modal 은 Figma 에 X 버튼 없음 — close 2-way 는 (a) '계속 편집' 명시 cancel + (b) backdrop tap 으로 충족"
    - "ParentSurface 는 시각 컨텍스트만 — 인터랙션 비활성 (aria-hidden + pointer-events: none)"
    - "alert/confirm/prompt 절대 사용 금지 (verifier 호환 — Pass 6 #8)"
    - "control-panel 영역 외 모든 텍스트 Pretendard (Pass 6 #4)"
    - "icons: lucide inline SVG (back arrow, status bar icons) — Pass 6 #2 emoji 금지"
  priority_order:
    - "1. Title (왜 이 modal 이 떴는가 — 변경 손실 경고)"
    - "2. ButtonPair (결정 — 계속 편집 vs 나가기)"
    - "3. Backdrop (외부 영역 dim + tap close)"
    - "4. ParentSurface (시각 컨텍스트 — 무엇을 편집 중이었는가)"

