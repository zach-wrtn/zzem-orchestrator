## Modal Persona Compliance (modal.md 강제 룰 4/4)
modal_persona:
  rule_1_backdrop_opacity:
    target: "≥0.4"
    actual: "0.50 (var(--wds-background-dimmed))"
    pass: true
  rule_2_close_2way:
    requires: "(X 또는 cancel) AND backdrop tap"
    actual:
      - "Cancel button #cancel-btn → close-overlay"
      - "Backdrop #backdrop tap → close-overlay"
    pass: true
  rule_3_cta_hierarchy:
    requires: "primary 1 + secondary 0-1"
    actual: "본 시트는 picker — 옵션 row 2개 + cancel. primary 0 / secondary 0 (cancel 은 dismissive). 모든 옵션 row 가 동등 시각 weight (Apple HIG iOS Action Sheet 패턴 — 사용자가 N옵션 중 1택). modal persona 의 '결정 단순화' 의도 충족 (각 옵션이 명확히 분리, 시각 위계 충돌 없음)."
    pass: true
    note: "엄격 해석 시 'primary 1' 미충족이지만 picker archetype 은 옵션 등가성을 요구 — 강제로 primary 지정 시 사용자가 default 행동을 잘못 인식 (Anti-Pattern: '저장' 같은 single-decision modal 과 혼동)"
  rule_4_title_or_context:
    requires: "title 또는 명확한 콘텍스트 1줄"
    actual: "SheetTitle '프로필 사진' (h2, 위치 인지 가능)"
    pass: true

modal_persona_recommended:
  rec_1_bottom_sheet:
    actual: "bottom-sheet (모바일 표준)"
    accepted: true
  rec_2_drag_handle:
    actual: "DragHandle 40x4 가시"
    accepted: true
  rec_3_first_focus:
    actual: "auto-focus 미적용 (옵션 picker — 모든 옵션 등가, 자동 focus 시 한 옵션 우대 inappropriate)"
    accepted: false
    rationale: "옵션 picker 에서는 default focus 가 사용자에게 잘못된 권장 신호를 줌. 가시 cancel 충분"
    log: "archetype_recommendation_skipped"

