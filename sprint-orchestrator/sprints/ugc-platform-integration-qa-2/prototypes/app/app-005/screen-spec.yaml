## Layout Spec
layout_spec:
  type: stack
  viewport: 390x844
  z_layers:
    - z: 0
      id: parent-scaffold
      sizing: full
      muted: true   # 시각적으로 흐리지 않음 (backdrop 이 다이밍 담당), but pointer-events disabled
    - z: 10
      id: backdrop
      sizing: full
      bg: "rgba(0,0,0,0.50)"
    - z: 20
      id: photo-action-sheet
      anchor: bottom
      width: full
      height: auto
      transform: "translateY(0)"
      transition: "transform 0.25s ease-out"

## States
states:
  default:
    description: "open — 시트가 안착된 기본 상태"
    active: true
    visible_components: [parent-scaffold, backdrop, photo-action-sheet]
    hidden_components: []
  open:
    description: "default 와 동일 — 명시적 alias"
    visible_components: [parent-scaffold, backdrop, photo-action-sheet]
    hidden_components: []
  dismissing:
    description: "닫히는 중 — backdrop fade-out + sheet translateY(100%)"
    visible_components: [parent-scaffold]
    hidden_components: []
    note: "backdrop opacity → 0, sheet transform → translateY(100%)"
  parent-only:
    description: "디버그용 — modal 닫힌 후 부모 화면만 (control-panel preview)"
    visible_components: [parent-scaffold]
    hidden_components: [backdrop, photo-action-sheet]

## Interactions
interactions:
  - trigger: tap
    target: "#opt-library"
    action: navigate
    destination: "app-009 (프로필편집_사진_앨범선택)"
    transition: slide-left
  - trigger: tap
    target: "#opt-default"
    action: close-overlay
    side_effect: "default avatar applied to parent + toast '기본 이미지로 변경됐어요'"
    transition: slide-down
  - trigger: tap
    target: "#cancel-btn"
    action: close-overlay
    transition: slide-down
  - trigger: tap
    target: "#backdrop"
    action: close-overlay
    transition: slide-down
    note: "modal persona 강제 룰 #2 — backdrop 외부 tap dismiss"

## Visual Rules
rules:
  - condition: "기본 이미지로 변경 후"
    effect: "부모 form 의 ParentSaveCTA 가 활성 상태로 전환 (#262626 fill)"
    example: "사용자가 옵션 row 2 tap → sheet dismiss → 부모 '저장' 버튼 enabled"
  - condition: "취소 또는 backdrop tap"
    effect: "부모 화면 그대로 복귀 — 변경 없음"
  - condition: "부모 ParentScaffold pointer-events"
    effect: "modal open 동안 비활성 (backdrop 이 모든 tap 흡수)"

