# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    설정 메인 메뉴는 ZZEM 의 모든 사용자 설정 화면(계정 / 알림 / 차단 관리 / 개인정보
    / 도움말 / 로그아웃)의 단일 entry point. 사용자가 한 번 진입한 후 원하는 설정
    카테고리로 빠르게 분기할 수 있도록 한다. 본 화면은 nav glue — 상태나 입력 없이
    오직 routing 책임만 진다.
  target_user: "ZZEM 사용자 (모든 contexts) — 설정 변경/확인 의도"
  success_metric: "설정 진입 후 차단 관리 / 알림 설정 1-tap reach 율 (PRD § Group 004 nav glue)"
  user_stories:
    - id: "US-4.1"
      as_a: "차단 관리를 원하는 사용자"
      i_want: "설정에서 차단 관리 entry 를 한 번에 찾을 수 있다"
      so_that: "여러 화면을 거치지 않고 차단을 관리한다"
    - id: "US-4.2"
      as_a: "알림 수신 설정을 변경하려는 사용자"
      i_want: "설정에서 알림 설정 entry 를 한 번에 찾을 수 있다"
      so_that: "푸시 / 좋아요 / 소식 등 카테고리별 토글을 빠르게 조정한다"
    - id: "US-4.3"
      as_a: "기타 설정 (계정 / 도움말 / 로그아웃) 을 원하는 사용자"
      i_want: "동일 화면에서 모든 설정 카테고리를 일관된 형태로 본다"
      so_that: "탐색 비용을 최소화한다"
  acceptance_criteria:
    - id: "AC-4.1"
      given: "사용자가 설정 메인 진입"
      when: "화면 렌더"
      then: "메뉴 row 모두 표시 (Figma 카피 그대로 — 계정 / 알림 / 차단 / 개인정보 / 도움말 / 로그아웃)"
      ui_impact: "MenuRow × N 표시 (icon + label + 우측 chevron)"
    - id: "AC-4.2"
      given: "사용자가 '차단 관리' row tap"
      when: "tap"
      then: "app-017 (BlockedAccountsScreen) 으로 진입"
      ui_impact: "MenuRow#block tap → navigation, slide-left transition"
    - id: "AC-4.3"
      given: "사용자가 '알림 설정' row tap"
      when: "tap"
      then: "app-022 (NotificationSettingsScreen) 으로 진입"
      ui_impact: "MenuRow#notification tap → navigation, slide-left transition"
    - id: "AC-4.4"
      given: "각 row"
      when: "정적 렌더"
      then: "chevron / divider / 아이콘이 시각적으로 일관"
      ui_impact: "모든 MenuRow 가 동일 height (~56px) / 동일 chevron 위치 / 1px divider"

# ─────────────────────────────
# Layer 2: WHAT (Design System)
# ─────────────────────────────
what:
  tokens_needed:
    colors:
      - "wds.color.purple.500"     # brand accent (옵션 — icon tint 일관 시 사용)
      - "wds.color.neutral.0"      # bg
      - "wds.color.neutral.50"     # surface secondary (section gap bg)
      - "wds.color.neutral.100"    # divider weak
      - "wds.color.neutral.200"    # divider normal
      - "wds.color.neutral.500"    # icon stroke (assistive)
      - "wds.color.neutral.600"    # label alternative
      - "wds.color.neutral.900"    # label normal
      - "wds.color.red.500"        # destructive (로그아웃)
    typography:
      - "wds.font.size.md"
      - "wds.font.size.lg"  # row label
      - "wds.font.size.xl"  # header title
      - "wds.font.weight.regular"
      - "wds.font.weight.medium"
      - "wds.font.weight.semibold"
    spacing:
      - "wds.spacing.8"
      - "wds.spacing.12"
      - "wds.spacing.16"
      - "wds.spacing.20"
      - "wds.spacing.24"
    radius:
      - "wds.radius.sm"
      - "wds.radius.md"

  components_needed:
    - name: "AppHeaderBack"
      category: "navigation"
      pattern_ref: "back chevron + center title (settings)"
    - name: "MenuRow"
      category: "navigation"
      note: "icon + label + 우측 chevron — settings list nav 표준 (next-screen entry)"
    - name: "SectionDivider"
      category: "layout"
    - name: "SectionGap"
      category: "layout"
      note: "그룹 사이 surface_secondary 8px gap — 시각적 카테고리 분리"

  patterns_needed:
    - name: "Settings list with nav rows"
      description: "icon + label + chevron 의 row 반복. tap 즉시 nav (별 submit 없음, 별 toggle 없음)."
    - name: "Destructive row at bottom"
      description: "로그아웃 등 destructive action 은 list 최하단에 분리, label color = error"

# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "AppHeaderBack(고정 56px) → MenuRow × N (수직, gap 0, divider 1px) → SectionGap → 로그아웃 row 단독"
      applies_to: ["SettingsMainScreen"]
    - rule: "각 MenuRow 내부: 좌측 icon (24x24) + label (Pretendard 16/600) + 우측 chevron-right (20x20)"
      applies_to: ["MenuRow"]
    - rule: "row tap → 즉시 navigation (nav glue) — 어떤 input/toggle 도 없음"
      applies_to: ["MenuRow"]
    - rule: "별도 'Save / Submit / Primary CTA' 부재 (nav-list 패턴) — form 강제 룰 #1/#2/#3/#4 모두 충돌"
      applies_to: ["SettingsMainScreen"]
  conditional_rendering:
    - condition: "row.kind == 'normal'"
      variant_a: "label color = label-normal, icon stroke = label-alternative"
      variant_b: null
    - condition: "row.kind == 'destructive'"
      variant_a: "label color = label-error, icon stroke = label-error, chevron 생략"
      variant_b: null
  constraints:
    - "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (Pass 6 #8)"
    - "icon 은 lucide-style inline SVG (PR #31 패턴) — emoji 금지 (Pass 6 #2)"
    - "기본 디자인 텍스트는 Pretendard, 사이즈는 wds 토큰만 사용"
    - "control-panel 은 device frame 외부 — Pass 6 검사 제외 영역"
    - "보라 gradient 사용 금지 — solid token only (Pass 6 #5)"
  priority_order:
    - "1. MenuRow#notification + MenuRow#block (nav glue 검증 핵심 — AC-4.2 / AC-4.3)"
    - "2. AppHeaderBack (이전 화면 복귀)"
    - "3. 기타 MenuRow (계정 / 개인정보 / 도움말 / 로그아웃)"

