# ─────────────────────────────
# Archetype Persona Conflict Note (form #1/#2/#3/#4 — 전 강제 룰 misfit)
# ─────────────────────────────
archetype_conflict:
  archetype: "form"
  archetype_misfit: true
  conflicting_rules:
    - id: 1
      rule: "모든 input 에 inline validation 정의"
      conflict_with: "본 화면에 input 자체가 부재 (nav-list)"
      decision: "archetype_recommendation_skipped (n/a)"
      rationale: "MenuRow 는 navigation trigger — input 이 아니므로 validation 개념 부적용."
    - id: 2
      rule: "Submit 버튼 disabled until valid"
      conflict_with: "Submit 자체가 부재 (각 row 가 즉시 nav)"
      decision: "archetype_recommendation_skipped"
      rationale: |
        본 화면은 nav glue — 'submit' 행위가 부재.
        각 row tap 이 자체로 navigation trigger.
        app-022 (toggle 즉시 저장) 와 동일 misfit 의 superset.
    - id: 3
      rule: "Error message 가 해당 입력 직하 (alert 박스 금지)"
      conflict_with: "input 자체 부재 → validation error 부재"
      decision: "archetype_recommendation_skipped (n/a)"
      rationale: "nav-list 는 error state 가 부재 (navigation 자체는 무조건 성공으로 가정)."
    - id: 4
      rule: "Primary action 1개만 (Submit / Save / 다음 등)"
      conflict_with: "각 MenuRow 가 동등 nav target — '1개 primary' 개념 부적용"
      decision: "archetype_recommendation_skipped"
      rationale: |
        Settings main 은 routing 화면 — 각 row 가 평등한 navigation entry.
        '1 primary action' 모델을 강제하면 어떤 row 에도 강조를 줄 수 없거나
        임의로 1개만 강조해야 하는 부자연스러운 결과 발생.
        로그아웃은 destructive 라 시각적 분리하지만 그것이 'primary' 는 아님.
  satisfied_rules: []

  sprint_lead_followup:
    needs_review: true
    proposed_change: |
      .claude/teammates/design-engineer-archetypes/ 에 nav_list (또는 settings_list)
      신규 archetype 추가 검토:
        - 강제 룰 후보:
          #1 모든 row 가 동일 height + chevron-right 일관
          #2 row tap 직후 navigation 또는 즉시 저장 (별도 submit 부재)
          #3 destructive row 는 list 최하단에 분리 + error color label
          #4 list grouping (section-gap) 으로 카테고리 시각 구분
        - 권장 룰 후보:
          #1 row 좌측 icon 일관 (lucide-style)
          #2 8개 미만 일 시 단일 list, 이상 시 section header 도입
    rationale: |
      app-022 (toggle 즉시 저장) 와 본 task (nav glue) 가 form 분류 하에 있으나
      모두 'submit 부재 + 각 row 가 trigger' 라는 공통 패턴.
      별도 archetype 으로 분리하면 dogfood 강제 룰 거절 사유를 매번 작성할 필요 없음.
    impact: |
      현재 form 으로 분류된 settings 류 화면 (app-017, app-022, app-023, 향후 app-024+)
      에 일관 적용 가능. PR 1개로 6→7 archetype 확장.
