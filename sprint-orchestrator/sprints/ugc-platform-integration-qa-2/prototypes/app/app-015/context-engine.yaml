how:
  composition_rules:
    - rule: "Action row 는 full-bleed (좌우 padding 20, 위아래 padding 16, height 56) — app-012 동일"
      applies_to: ["BlockedMoreActionsSheet"]
    - rule: "차단 해제 row (Unblock) 는 neutral label (semantic.label.normal #212228) — AC-2.3 '위험 강조 X' 명시. 차단 해제는 destructive 가 아닌 안전 액션"
      applies_to: ["BlockedMoreActionsSheet"]
    - rule: "신고 row (Report) 는 destructive label (semantic.label.error #FF3B30) — app-012 패턴 mirror"
      applies_to: ["BlockedMoreActionsSheet"]
    - rule: "Row 간 1px divider with margin 0 20 (full-bleed 면 여백)"
      applies_to: ["BlockedMoreActionsSheet"]
    - rule: "loading state — 시트 자체는 가시 유지, 차단 해제 row 만 spinner + label '차단 해제 중…' + 모든 close 비활성 (race condition 방지)"
      applies_to: ["BlockedMoreActionsSheet"]
  conditional_rendering:
    - condition: "row tap == unblock"
      variant_a: "DELETE /v2/users/{userId}/block 호출 → loading row spinner → success 시 sheet dismiss + 토스트 '차단을 해제했어요' + (실 구현) app-016 navigate"
      variant_b: null
    - condition: "row tap == report"
      variant_a: "OOS 토스트 '신고 기능은 곧 제공돼요' + dismiss (app-012 동일)"
      variant_b: null
    - condition: "backdrop tap or ESC"
      variant_a: "sheet slide-down + backdrop fade-out (해제 없이)"
      variant_b: null
  constraints:
    - "Backdrop opacity ≥ 0.4 (modal 강제 룰 #1) — 0.50 사용 (app-012/app-013 일관)"
    - "Close 2-way: backdrop tap + ESC key (Cancel row 없는 picker — 모바일 표준)"
    - "Picker exception: primary/secondary 분류 회피 (app-005/app-012 동일)"
    - "Title 생략 (action sheet picker — 헤더 더보기 ••• 컨텍스트 활용)"
    - "차단 해제 row 위험 강조 금지 (AC-2.3) — neutral color 사용"
    - "loading 중 backdrop tap / ESC 무력화 (race condition 방지)"
    - "Pretendard 외 font 금지 (Pass 6 #4)"
    - "raw hex 금지 — tokens.css 정의된 var(--*) 만 사용 (Pass 6 #1)"
    - "interactive 요소에 unicode emoji 금지 — Lucide-style inline SVG (Pass 6 #2)"
    - "blocking dialog (alert/confirm/prompt) 금지 (Pass 6 #8)"
  priority_order:
    - "차단 해제 (AC-2.3 핵심 — 본 시트의 raison d'être)"
    - "신고 (스프린트 OOS — 시각 노출만, app-012 mirror)"
    - "Backdrop (escape route 가시성)"

