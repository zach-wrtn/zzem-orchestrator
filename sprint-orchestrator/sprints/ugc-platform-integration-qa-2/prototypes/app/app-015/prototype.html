  .control-panel select {

  .device-frame {
    width: 390px;

  .parent-surface {
    position: absolute;
    inset: 0;
    background: var(--wds-background-normal);
    display: flex;

  .parent-status-bar {

  /* === Modal Overlay === */
  .modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    pointer-events: none;
  }

  .backdrop {
    position: absolute;
    inset: 0;
    background: var(--wds-background-dimmed);
    opacity: 0;
    transition: opacity 0.24s ease-out;
    cursor: pointer;
    pointer-events: none;
  }

  .bottom-sheet {
    position: relative;
    background: var(--component-bottom-sheet-fill);
    border-top-left-radius: var(--component-bottom-sheet-radius);
    border-top-right-radius: var(--component-bottom-sheet-radius);
    padding: var(--wds-spacing-12) 0 var(--wds-spacing-24) 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    transform: translateY(110%);
    transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.08);
    pointer-events: auto;
    width: 100%;
    max-height: 60%;
  }

  /* States: open (default) */
  .modal-overlay[data-state="open"] { pointer-events: auto; }
  .modal-overlay[data-state="open"] .backdrop { opacity: 1; pointer-events: auto; }
  .modal-overlay[data-state="open"] .bottom-sheet { transform: translateY(0); }

  /* States: loading */
  .modal-overlay[data-state="loading"] { pointer-events: auto; }
  .modal-overlay[data-state="loading"] .backdrop { opacity: 1; pointer-events: none; cursor: default; }
  .modal-overlay[data-state="loading"] .bottom-sheet { transform: translateY(0); }

  /* States: unblocked (transient — sheet stays open w/ toast) */
  .modal-overlay[data-state="unblocked"] { pointer-events: auto; }
  .modal-overlay[data-state="unblocked"] .backdrop { opacity: 1; pointer-events: auto; }
  .modal-overlay[data-state="unblocked"] .bottom-sheet { transform: translateY(0); }

  /* States: report-oos (transient — sheet stays open w/ toast) */
  .modal-overlay[data-state="report-oos"] { pointer-events: auto; }
  .modal-overlay[data-state="report-oos"] .backdrop { opacity: 1; pointer-events: auto; }
  .modal-overlay[data-state="report-oos"] .bottom-sheet { transform: translateY(0); }

  /* States: dismissed */
  .modal-overlay[data-state="dismissed"] { pointer-events: none; }
  .modal-overlay[data-state="dismissed"] .backdrop { opacity: 0; pointer-events: none; }
  .modal-overlay[data-state="dismissed"] .bottom-sheet { transform: translateY(110%); }

  /* === Sheet inner === */
  .drag-handle {
    width: 36px;
    height: 4px;
    border-radius: var(--wds-radius-full);
    background: var(--component-bottom-sheet-handle);
    margin: 0 auto var(--wds-spacing-4) auto;
    flex-shrink: 0;

  .action-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    padding-top: var(--wds-spacing-8);
  }

  .action-row {
    display: flex;
    align-items: center;
    gap: var(--wds-spacing-12);
    padding: var(--wds-spacing-16) var(--wds-spacing-20);
    height: 56px;
    cursor: pointer;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background-color 0.12s ease, opacity 0.15s ease;
  }
  .action-row:hover, .action-row:focus-visible { background: var(--wds-surface-secondary); outline: none; }
  .action-row:active { background: var(--wds-surface-tertiary); }
  .action-row[disabled] { cursor: not-allowed; opacity: 0.4; }

  .action-row__icon {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .action-row__label {
    font-size: var(--wds-font-size-lg);
    font-weight: var(--wds-font-weight-medium);
    line-height: 1.4;
    letter-spacing: -0.2px;
  }

  /* Unblock = neutral (AC-2.3 — 위험 강조 X) */
  .action-row--neutral .action-row__icon,
  .action-row--neutral .action-row__label {
    color: var(--wds-label-normal);
  }
  /* Report = destructive (sibling app-012 mirror) */
  .action-row--destructive .action-row__icon,
  .action-row--destructive .action-row__label {
    color: var(--wds-label-error);
  }

  /* Loading row spinner — replace icon */
  .action-row__spinner {
    width: 22px;
    height: 22px;
    display: none;
    border: 2px solid var(--wds-line-normal);
    border-top-color: var(--wds-label-normal);
    border-radius: var(--wds-radius-full);
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .action-row[data-loading="true"] .action-row__icon { display: none; }
  .action-row[data-loading="true"] .action-row__spinner { display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .row-divider {
    border: none;
    height: 1px;
    background: var(--wds-line-alternative);
    margin: 0 var(--wds-spacing-20);
  }

  /* === Toast === */
  .toast {
    position: absolute;
    left: var(--wds-spacing-16);
    right: var(--wds-spacing-16);
    bottom: 96px;
    background: var(--wds-color-neutral-900);
    color: var(--wds-label-inverse);
    padding: var(--wds-spacing-12) var(--wds-spacing-16);
    border-radius: var(--wds-radius-md);
    font-size: var(--wds-font-size-sm);
    font-weight: var(--wds-font-weight-medium);
    text-align: center;
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; min-height: 100dvh; }
    .control-panel { display: none; }
    .device-frame {
      width: 100dvw;
      height: 100dvh;
      border: none;
      border-radius: 0;
    }
  }
</style>

          <div class="parent-avatar"></div>
        </div>
        <div class="parent-nickname-row">
          <span class="parent-nickname">ZZEM유저123</span>
          <span class="parent-blocked-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg>
            차단됨
          </span>
        </div>
        <div class="parent-stats">
          <div class="parent-stat"><span class="parent-stat__num">—</span><span class="parent-stat__label">팔로워</span></div>
          <div class="parent-stat"><span class="parent-stat__num">—</span><span class="parent-stat__label">팔로잉</span></div>
          <div class="parent-stat"><span class="parent-stat__num">—</span><span class="parent-stat__label">재생성된</span></div>
        </div>
        <button class="parent-cta" type="button">차단됨</button>
        <div class="parent-empty">
          <span class="parent-empty__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </span>
          <span class="parent-empty__msg">차단된 사용자의 콘텐츠는<br/>표시되지 않아요</span>
        </div>
      </div>
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modal-overlay" data-state="open" role="dialog" aria-modal="true" aria-label="더보기 메뉴 (차단된 사용자)">

      <div class="backdrop" id="backdrop" data-action="close" role="presentation" aria-label="더보기 메뉴 외부 영역. 탭하면 닫힙니다."></div>

      <div class="bottom-sheet" id="blocked-more-actions-sheet">
        <div class="drag-handle" aria-hidden="true"></div>

        <ul class="action-list" id="action-list">
          <li>
            <button class="action-row action-row--neutral" id="action-unblock" type="button" data-action="unblock" aria-label="차단 해제">
              <span class="action-row__icon" aria-hidden="true">
                <!-- Lucide unlock -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
              </span>
              <span class="action-row__spinner" aria-hidden="true"></span>
              <span class="action-row__label" id="action-unblock-label">차단 해제</span>
            </button>
          </li>
          <li><hr class="row-divider" aria-hidden="true"></li>
          <li>
            <button class="action-row action-row--destructive" id="action-report" type="button" data-action="report" aria-label="신고하기">
              <span class="action-row__icon" aria-hidden="true">
                <!-- Lucide flag -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
              </span>
              <span class="action-row__label">신고하기</span>
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </section>
</div>

<script>
  // === State management ===
  const overlay = document.getElementById('modal-overlay');
  const breadcrumb = document.getElementById('breadcrumb');
  const stateButtons = document.querySelectorAll('.control-panel__state-btn');
  const toast = document.getElementById('toast');
  const unblockBtn = document.getElementById('action-unblock');
  const unblockLabel = document.getElementById('action-unblock-label');
  const reportBtn = document.getElementById('action-report');
  let toastTimer = null;
  let restoreTimer = null;

  function setState(state) {
    overlay.setAttribute('data-state', state);
    stateButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    breadcrumb.textContent = 'blocked-more-actions · ' + state;
    applyRowStates(state);
    console.log('[state]', state);
  }

  function applyRowStates(state) {
    if (state === 'loading') {
      unblockBtn.setAttribute('data-loading', 'true');
      unblockBtn.setAttribute('disabled', 'true');
      unblockLabel.textContent = '차단 해제 중…';
      reportBtn.setAttribute('disabled', 'true');
    } else {
      unblockBtn.removeAttribute('data-loading');
      unblockBtn.removeAttribute('disabled');
      unblockLabel.textContent = '차단 해제';
      reportBtn.removeAttribute('disabled');
    }
  }

  stateButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      if (restoreTimer) { clearTimeout(restoreTimer); restoreTimer = null; }
      setState(btn.dataset.state);
    });
  });

  // === Toast helper (no alert/confirm/prompt — verifier safe, Pass 6 #8) ===
  function showToast(msg, duration = 1800) {
    toast.textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
  }

  // === Action handlers ===
  function closeSheet(source) {
    if (overlay.getAttribute('data-state') === 'loading') return; // race 방지
    setState('dismissed');
    console.log('[close]', source);
    // Demo: 1.4s 후 다시 open 으로 복원 (verifier flow 지속)
    restoreTimer = setTimeout(() => setState('open'), 1400);
  }

  function handleUnblock() {
    if (overlay.getAttribute('data-state') !== 'open') return;
    setState('loading');
    // Mock DELETE /v2/users/{userId}/block — 1.0s
    restoreTimer = setTimeout(() => {
      setState('unblocked');
      showToast('차단을 해제했어요');
      restoreTimer = setTimeout(() => {
        setState('dismissed');
        // 실 구현은 app-016 navigate. 데모는 1.4s 후 open 복원.
        restoreTimer = setTimeout(() => setState('open'), 1400);
      }, 900);
    }, 1000);
  }

  function handleReport() {
    if (overlay.getAttribute('data-state') !== 'open') return;
    setState('report-oos');
    showToast('신고 기능은 곧 제공돼요');
    restoreTimer = setTimeout(() => {
      setState('dismissed');
      restoreTimer = setTimeout(() => setState('open'), 1400);
    }, 900);
  }

  // === Event bindings (Screen Spec interactions) ===
  document.getElementById('backdrop').addEventListener('click', () => closeSheet('backdrop'));
  document.getElementById('action-unblock').addEventListener('click', () => handleUnblock());
  document.getElementById('action-report').addEventListener('click', () => handleReport());

  // Stop propagation on sheet — backdrop click only fires from outside
  document.getElementById('blocked-more-actions-sheet').addEventListener('click', (e) => e.stopPropagation());

  // ESC key — additional close (a11y nicety + close 2-way redundancy)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSheet('escape-key');
  });

  // === Init ===
  setState('open');
</script>

</body>
</html>
