    border-radius: var(--wds-radius-md);

  /* ============================================

  .device-frame[data-state="default"] .backdrop,
  .device-frame[data-state="open"] .backdrop {
    opacity: 1;
    pointer-events: auto;
  }
  .device-frame[data-state="default"] .confirm-sheet,
  .device-frame[data-state="open"] .confirm-sheet {
    transform: translateY(0);
  }

  .device-frame[data-state="dismissing"] .backdrop {
    opacity: 0;
    pointer-events: none;
  }
  .device-frame[data-state="dismissing"] .confirm-sheet {
    transform: translateY(100%);
  }

  .device-frame[data-state="parent-only"] .backdrop {
    opacity: 0;
    pointer-events: none;
  }
  .device-frame[data-state="parent-only"] .confirm-sheet {
    transform: translateY(100%);

  .device-frame[data-state="parent-only"] .parent-scaffold {

  /* === Toast === */
  .toast {

  @media (max-width: 480px) {

    .device-frame {
      width: 100dvw;
      height: 100dvh;
      border: none;
      border-radius: 0;
    }

      </div>

      <div class="sheet-body">
        <p id="sheet-description" class="sheet-description">변경한 프로필 사진이 저장되지 않아요. 정말 나가시겠어요?</p>
      </div>

      <div class="sheet-actions">
        <!-- secondary ghost (cancel-equivalent — modal persona #2 명시 close) -->
        <button class="btn-secondary-ghost" id="continue-edit-btn" type="button" aria-label="계속 편집">계속 편집</button>
        <!-- primary destructive — 변경 폐기 -->
        <button class="btn-primary-destructive" id="exit-btn" type="button" aria-label="나가기">나가기</button>
      </div>
    </div>

    <!-- ========== TOAST ========== -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </section>
</div>

<script>
  // === State management ===
  const frame = document.getElementById('device-frame');
  const breadcrumb = document.getElementById('breadcrumb');
  const stateButtons = document.querySelectorAll('.control-panel__state-btn');
  const toast = document.getElementById('toast');

  function setState(state) {
    frame.setAttribute('data-state', state);
    stateButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    breadcrumb.textContent = 'exit-confirm-sheet · ' + state;
    console.log('[state]', state);
  }

  stateButtons.forEach(btn => {
    btn.addEventListener('click', () => setState(btn.dataset.state));
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // === Interactions (modal persona #2 — close 2-way) ===
  function dismissSheet(reason, opts = {}) {
    console.log('[dismiss]', reason);
    setState('dismissing');
    setTimeout(() => {
      if (opts.message) {
        showToast(opts.message);
      }
      // Re-open after toast for repeated demo (verifier-friendly cycle)
      setTimeout(() => setState('default'), 1400);
    }, 320);
  }

  // ExitButton — 변경 폐기 + parent-pop simulation (toast)
  document.getElementById('exit-btn').addEventListener('click', () => {
    console.log('[navigate]', 'pop → previous screen, discard photo change');
    dismissSheet('exit-confirm', { message: '편집 화면을 나갔어요 (사진 변경 폐기)' });
  });

  // ContinueEditButton — sheet 만 dismiss, 사진 dirty 보존
  document.getElementById('continue-edit-btn').addEventListener('click', () => {
    console.log('[close-overlay]', 'continue-edit (preserve dirty)');
    dismissSheet('continue-edit', { message: '계속 편집' });
  });

  // Backdrop tap (modal persona #2 — outer dismiss = continue-edit semantics)
  document.getElementById('backdrop').addEventListener('click', () => {
    console.log('[close-overlay]', 'backdrop-tap (preserve dirty)');
    dismissSheet('backdrop-tap');
  });
  // Keyboard accessible backdrop (Enter/Space)
  document.getElementById('backdrop').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      dismissSheet('backdrop-keyboard');
    }
  });

  // === Init ===
  setState('default');
</script>

</body>
</html>
