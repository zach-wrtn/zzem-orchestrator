      - "wds.radius.full (9999) — handle, avatar"
      - "20px (component-bottom-sheet-radius — top only)"
  components_needed:
    - name: "Backdrop"
      category: "feedback"
    - name: "BottomSheet"
      category: "feedback"
    - name: "DragHandle"
      category: "feedback"
    - name: "SheetTitle"
      category: "content"
    - name: "SheetDescription"
      category: "content"
    - name: "PrimaryDestructiveButton"
      category: "input"
    - name: "SecondaryGhostButton"
      category: "input"
  patterns_needed:
    - name: "Confirm Modal"
      description: "Backdrop + bottom sheet + title + description + 2 actions (1 primary destructive + 1 secondary ghost). iOS HIG / Material Design dialog 표준."
    - name: "Parent Scaffold Mirror"
      description: "Modal 떠있는 동안 부모 화면을 backdrop 아래 그대로 노출 — 컨텍스트 보존. app-005 와 동일 기법."

# ─────────────────────────────
# Layer 3: HOW (Orchestration Rules)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "Modal 은 부분 화면 — 부모 ParentScaffold 를 z=0, backdrop z=10, sheet z=20 으로 stacking"
      applies_to: ["프로필편집_사진_바텀시트_나가기확인"]
    - rule: "ParentScaffold 는 pointer-events:none — modal open 동안 부모 인터랙션 차단"
      applies_to: ["프로필편집_사진_바텀시트_나가기확인"]
    - rule: "ParentSaveCTA 는 active(#262626) 색 유지 — 사진 dirty 컨텍스트 신호 (modal 발동 이유)"
      applies_to: ["프로필편집_사진_바텀시트_나가기확인"]
    - rule: "Sheet 내부는 vertical flow — DragHandle → Title → Description → Actions(row)"
      applies_to: ["ConfirmSheet"]
  conditional_rendering:
    - condition: "data-state == 'default' or 'open'"
      variant_a: "backdrop opacity 1, sheet translateY(0)"
      variant_b: "(default 진입 시 시각 안정 — 진입 애니메이션은 verify 단계 데모용)"
    - condition: "data-state == 'dismissing'"
      variant_a: "backdrop opacity 0 (transition 0.25s), sheet translateY(100%) (transition 0.28s)"
      variant_b: "이후 자동 default 로 복귀 (verifier-friendly cycle)"
    - condition: "data-state == 'parent-only'"
      variant_a: "backdrop opacity 0, sheet hidden, parent pointer-events 활성 (계속 편집 결과 시뮬레이션)"
      variant_b: null
  constraints:
    - "Backdrop opacity ≥ 0.4 (modal persona #1) — 본 화면 0.50"
    - "Close 2-way 보장 (modal persona #2) — ContinueEditButton + Backdrop tap (+ 보너스 keydown)"
    - "Primary 1 + Secondary 0-1 (modal persona #3) — Exit primary + Continue secondary 정확히 1+1"
    - "Title 명확 (modal persona #4) — '변경사항이 저장되지 않아요' h2 xl bold"
    - "Pass 6 #5 brand-purple-500 gradient 금지 — 본 화면 미사용"
    - "Pass 6 #8 alert/confirm/prompt 금지 — setState + setTimeout 사용"
  priority_order:
    - "ConfirmSheet (modal 본체) — Title → Description → Actions"
    - "Backdrop (시각 분리 + dismiss surface)"
    - "ParentScaffold (컨텍스트 미러 — 사진 dirty 시각화)"

