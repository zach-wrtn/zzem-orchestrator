# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    프로필 편집 中 사진을 변경한 사용자가 좌측 back 으로 화면을 떠날 때
    "변경분이 저장되지 않음" 을 명시적으로 알리고 두 가지 결정을 제시한다:
    (a) 변경 폐기하고 나가기, (b) sheet 만 닫고 편집 계속.
    의도치 않은 사진 변경 손실을 방지한다 (AC-1.4 사진 컨텍스트).
  target_user: "ZZEM 일반 유저 — 프로필 사진 변경 중 의도/실수로 back tap"
  success_metric:
    - "사진 변경 → modal 노출 → '계속 편집' 비율 (잘못된 back 차단)"
    - "사진 변경 → modal 노출 → '나가기' 비율 (의도된 폐기)"
    - "modal 노출 후 30초 내 결정 도달율"
  user_stories:
    - id: "US-1"
      as_a: "ZZEM 유저"
      i_want: "사진을 잘못 바꾸고 뒤로 가려할 때 경고를 보고 싶다"
      so_that: "실수로 변경분이 사라지지 않게"
    - id: "US-2"
      as_a: "ZZEM 유저"
      i_want: "정말 나가고 싶을 땐 한 탭으로 바로 나가고 싶다"
      so_that: "의도된 폐기에는 마찰을 최소화"
  acceptance_criteria:
    - id: "AC-007.a"
      given: "프로필편집_메인에서 사진을 변경한 dirty 상태"
      when: "유저가 좌측 back 탭"
      then: "backdrop dim + bottom sheet slide-up — 나가기 confirm modal 노출"
      ui_impact: "Backdrop opacity 0.5 + ConfirmSheet translateY(0); ParentScaffold 사진 dirty 상태 미러"
    - id: "AC-007.b"
      given: "modal 오픈 상태"
      when: "유저가 ' 나가기' tap"
      then: "편집 화면 dismiss (parent pop) + 사진 변경분 폐기"
      ui_impact: "ExitButton tap → close-overlay + parent screen pop, isDirty reset"
    - id: "AC-007.c"
      given: "modal 오픈 상태"
      when: "유저가 '계속 편집' tap"
      then: "bottom sheet 만 dismiss, 편집 상태 (사진 dirty) 보존"
      ui_impact: "ContinueEditButton tap → close-overlay (parent 유지)"
    - id: "AC-007.d"
      given: "modal 오픈 상태"
      when: "유저가 backdrop 영역 tap"
      then: "bottom sheet dismiss (계속 편집 과 동일 의미)"
      ui_impact: "Backdrop tap → close-overlay (parent 유지). modal persona #2 충족"

