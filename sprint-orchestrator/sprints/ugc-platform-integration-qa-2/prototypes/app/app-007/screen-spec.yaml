## Modal Persona Compliance (cross-check)
modal_persona_check:
  forced_rules:
    - id: 1
      rule: "Backdrop opacity ≥0.4"
      result: "met"
      evidence: "var(--wds-background-dimmed) = rgba(0,0,0,0.50) — 0.50 ≥ 0.40"
    - id: 2
      rule: "Close 2-way (X/cancel + backdrop tap)"
      result: "met"
      evidence:
        - "ContinueEditButton (cancel-equivalent) → close-overlay"
        - "Backdrop tap → close-overlay"
        - "(bonus) Backdrop keydown Enter/Space → close-overlay (a11y)"
    - id: 3
      rule: "Primary CTA 1 + secondary 0-1"
      result: "met"
      evidence: "ExitButton = primary 1 (destructive intent) / ContinueEditButton = secondary 1 (ghost). 정확히 1+1 — 결정 단순화 충족"
    - id: 4
      rule: "Title or clear context"
      result: "met"
      evidence: "SheetTitle h2 '변경사항이 저장되지 않아요' (xl bold, label-normal) — modal 만 떠있어도 사용자가 무엇을 결정하는지 즉시 인지"
  recommended_rules:
    - id: 1
      rule: "Bottom sheet form (mobile standard)"
      result: "accepted"
      evidence: "bottom-sheet (anchor: bottom, slide-up transform)"
    - id: 2
      rule: "Drag handle visible"
      result: "accepted"
      evidence: "DragHandle 40x4 rounded-full, var(--component-bottom-sheet-handle) #D1D3D8"
    - id: 3
      rule: "First input/option auto-focus"
      result: "skipped"
      log: "archetype_recommendation_skipped"
      rationale: "destructive confirm 에서 default focus 는 사용자 실수로 enter 입력 시 의도치 않은 폐기 위험 — Apple HIG 도 destructive 에 대해 default focus 권장하지 않음"
