# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "키보드는 화면 하단 fixed (~290px). Save 버튼은 키보드 상단에 직접 붙어 sticky 노출 (z-index 키보드보다 +1)"
      applies_to: ["프로필편집_닉네임_키보드"]
    - rule: "Avatar 영역은 키보드 활성 상태에서도 노출 유지하되 contents 영역이 짧아지므로 vertical padding 축소 가능"
      applies_to: ["프로필편집_닉네임_키보드"]
    - rule: "Caret 은 input value 직후 1px 검정 막대 + blink 1s. .is-error 시 caret 색은 그대로 유지 (정보 단순화)"
      applies_to: ["프로필편집_닉네임_키보드"]
    - rule: "Suggestion bar 는 카운터와 별개 — 카운터는 input 우측 absolute, suggestion bar 는 키보드 최상단 row"
      applies_to: ["프로필편집_닉네임_키보드"]
    - rule: "키보드는 inline SVG/CSS 만으로 그린다 — 외부 이미지 / 시스템 캡처 절대 금지 (Pass 6 #6 회피)"
      applies_to: ["프로필편집_닉네임_키보드"]
  conditional_rendering:
    - condition: "state == 'focused' (init focus, 변경 전)"
      variant_a: "input border highlight + caret blink + counter visible + suggestion bar visible + Save disabled"
      variant_b: "(state == 'typing-dirty') 변경 발생 → Save enabled, 카운터 숫자 갱신"
    - condition: "state == 'error' (length > 20)"
      variant_a: "input border error + counter is-error + nickname-error visible + Save disabled"
      variant_b: "(state == 'loading') Save enabled + spinner + 사용자 input lock"
  constraints:
    - "키보드 mock 의 모든 색은 tokens.css 의 --kbd-* 별칭만 사용 — raw hex 직접 사용 금지 (Pass 6 #1)"
    - "키보드 키들은 button 이 아닌 div span 으로 그린다 — interactive 가 아닌 시각 mock (Pass 6 #7 interaction count 정합성)"
    - "Save sticky 위 키보드 z-index = 90; Save z-index = 100"
    - "Pretendard 외 font 금지 (Pass 6 #4)"
    - "blocking dialog (alert/confirm/prompt) 금지 (Pass 6 #8)"
    - "interactive 요소에 unicode emoji 금지 — Lucide-style inline SVG (Pass 6 #2)"
    - "form persona 강제 룰 4/4 충족 — submit_disabled/enabled 둘 다, inline error, 1 primary"
  priority_order:
    - "Input + Caret + CharCounter (사용자 attention 1순위)"
    - "Save 버튼 (CTA — 키보드 위 sticky)"
    - "Keyboard mock (시각 컨텍스트 — '키보드 활성' 상태 전달)"
    - "Header + Avatar (보조)"

