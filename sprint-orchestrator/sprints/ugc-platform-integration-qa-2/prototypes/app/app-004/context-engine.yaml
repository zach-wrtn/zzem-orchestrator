# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    닉네임 input 에 focus 가 들어간 직후의 키보드 활성 상태를 정확히 시각화한다.
    사용자가 키보드 위에서 input + 카운터 + (가능하면) 저장 버튼의 시인성을 확보할 수 있는지
    검증한다 — 키보드가 화면의 절반 가까이를 점유하는 상태에서 layout 안정성이 핵심.
  target_user: "프로필 편집 중 닉네임을 변경하려는 ZZEM 사용자 (input tap 직후)"
  success_metric: "AC-1.2 통과 — 닉네임 입력 키보드 활성 상태에서 input/카운터 가시성 + sticky 저장 버튼 위계 검증"
  user_stories:
    - id: "US-1"
      as_a: "닉네임을 바꾸려고 input 을 탭한 사용자"
      i_want: "키보드가 올라온 상태에서도 내가 입력하는 글자와 글자수를 한눈에 본다"
      so_that: "키보드 가림 없이 안전하게 입력하고 저장 위치를 인지한다"
  acceptance_criteria:
    - id: "AC-1.2"
      given: "프로필편집_메인 (app-001) 에서 닉네임 input 을 tap"
      when: "키보드가 slide-up 으로 활성화된다"
      then: "input focus 시각 (caret + border) + 카운터 'n/20' 표시 + 저장 버튼이 키보드 위 sticky 또는 헤더 우측에 잔존한다"
      ui_impact: |
        form archetype: input focus state (caret+border highlight) + 키보드 placeholder
        시각 mock (~290px iOS-style 그레이 + suggestion bar) + 카운터 visible + Save sticky
        키보드 직상.
    - id: "AC-1.2a"
      given: "키보드가 활성된 상태"
      when: "글자를 입력한다"
      then: "카운터 'n/20' 이 실시간 갱신 + 저장 버튼이 enabled 로 토글"
      ui_impact: "input event → counter text 갱신 + saveBtn class toggle"
    - id: "AC-1.2b"
      given: "키보드가 활성된 상태"
      when: "키보드 외부 (콘텐츠 영역) 를 tap 한다"
      then: "키보드 dismiss + input focus 유지 또는 해제 (PRD 기본: dismiss)"
      ui_impact: "outside tap → setState('default-with-content') — caret hidden + suggestion bar hidden"
    - id: "AC-1.2c"
      given: "키보드 위 저장 버튼을 tap"
      when: "validation 통과"
      then: "loading state → 결과 화면 navigate"
      ui_impact: "form persona 권장 룰 #2 — submit 후 loading + 중복 제출 방지"

