form_persona_check:
  forced_rules:
    - id: 1
      rule: "inline validation 정의 — error.{field-id} 또는 validation_rules"
      result: "met"
      evidence: "states.error.validation_rules + #nickname-error inline component"
    - id: 2
      rule: "Submit 버튼 disabled / enabled 둘 다 정의"
      result: "met"
      evidence: "states.focused.submit_disabled + states.typing-dirty.submit_enabled + components.SaveButton.states 둘 다 명시"
    - id: 3
      rule: "Error message inline 직하 (alert 박스 금지)"
      result: "met"
      evidence: "#nickname-error <p> 가 #nickname-field 직하 block; alert/confirm/prompt 미사용"
    - id: 4
      rule: "Primary action 1개만 (Submit/Save)"
      result: "met"
      evidence: "type=button-primary 인 컴포넌트 SaveButton 1개. BackButton 은 icon-button. 키보드 키들은 button 이 아닌 div (시각 mock)."
  recommended_rules:
    - id: 1
      rule: "Validation 시점 focus-out (blur)"
      result: "skipped"
      rationale: "app-001 동일 — char counter 즉시 피드백 UX 가 모바일에서 더 자연스러움. archetype_recommendation_skipped 로깅."
    - id: 2
      rule: "Submit 후 loading state"
      result: "met"
      evidence: "states.loading + SaveButton.states.loading + onSave() spinner"
    - id: 3
      rule: "긴 form 섹션 분할 (8개 미만)"
      result: "n/a"
      evidence: "본 화면 입력 슬롯 1개 (닉네임) — 분할 불필요"
