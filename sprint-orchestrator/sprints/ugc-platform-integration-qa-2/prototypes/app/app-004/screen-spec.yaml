      - "Caret blink animation — task 'caret' 명시 + 시각 보강 (low)"
      - "Sticky-above-keyboard layout — task AC '저장 버튼이 키보드 위에 sticky' 직접 명시 (none)"
    risk_level: "low"
    note: "PRD/task 직접 명시 + app-001 baseline 토큰 100% 재사용. 키보드 mock 만 표준 패턴 추론."
