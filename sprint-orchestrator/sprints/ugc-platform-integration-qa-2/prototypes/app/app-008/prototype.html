<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>app-008 · 프로필편집_사진_크롭 (form)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  /* === tokens.css inline (sprint-level — ugc-platform-integration-qa-2) === */
  :root {
    /* PRIMITIVE - Purple */
    --wds-color-purple-50:  #F5F0FF;
    --wds-color-purple-100: #EBE1FF;
    --wds-color-purple-400: #A17BFF;
    --wds-color-purple-500: #8752FA;
    --wds-color-purple-600: #7040E0;
    --wds-color-purple-700: #5A30C0;

    /* PRIMITIVE - Neutral */
    --wds-color-neutral-0:    #FFFFFF;
    --wds-color-neutral-50:   #F7F8F9;
    --wds-color-neutral-100:  #F0F1F3;
    --wds-color-neutral-200:  #E4E5E9;
    --wds-color-neutral-300:  #D1D3D8;
    --wds-color-neutral-400:  #B5B8BF;
    --wds-color-neutral-500:  #8E9199;
    --wds-color-neutral-600:  #6B6E76;
    --wds-color-neutral-700:  #46474C;
    --wds-color-neutral-900:  #212228;
    --wds-color-neutral-1000: #000000;

    /* PRIMITIVE - Status */
    --wds-color-red-100: #FFE5E3;
    --wds-color-red-500: #FF3B30;
    --wds-color-red-600: #E0241A;
    --wds-color-green-500: #34C759;
    --wds-color-yellow-500: #FFCC00;

    /* SEMANTIC */
    --wds-background-normal:    var(--wds-color-neutral-0);
    --wds-background-elevated:  var(--wds-color-neutral-0);
    --wds-background-dimmed:    rgba(0, 0, 0, 0.50);  /* dim scrim — task: semantic.dim.scrim */

    --wds-surface-primary:   var(--wds-color-neutral-0);
    --wds-surface-secondary: var(--wds-color-neutral-50);
    --wds-surface-tertiary:  var(--wds-color-neutral-100);

    --wds-fill-brand-primary: var(--wds-color-purple-500);
    --wds-fill-brand-weak:    var(--wds-color-purple-50);
    --wds-fill-brand-strong:  var(--wds-color-purple-600);
    --wds-fill-neutral:       var(--wds-color-neutral-100);
    --wds-fill-status-error:  var(--wds-color-red-500);

    --wds-label-normal:      var(--wds-color-neutral-900);
    --wds-label-alternative: var(--wds-color-neutral-600);
    --wds-label-assistive:   var(--wds-color-neutral-500);
    --wds-label-disabled:    var(--wds-color-neutral-300);
    --wds-label-inverse:     var(--wds-color-neutral-0);
    --wds-label-brand:       var(--wds-color-purple-500);
    --wds-label-error:       var(--wds-color-red-500);

    --wds-line-normal:      var(--wds-color-neutral-200);
    --wds-line-alternative: var(--wds-color-neutral-100);

    /* COMPONENT - Button */
    --component-button-primary-fill:        var(--wds-fill-brand-primary);
    --component-button-primary-label:       var(--wds-label-inverse);
    --component-button-radius:              12px;

    /* PROFILE EDIT (Group 001) aliases */
    --pe-input-fill: #F7F7F7;
    --pe-input-border: #F1F1F1;
    --pe-save-disabled: #F1F1F1;
    --pe-save-disabled-label: #8A8A8A;
    --pe-save-active: #262626;
    --pe-save-active-label: #FFFFFF;
    --pe-camera-badge-fill: #E2E2E2;
    --pe-camera-badge-border: #FFFFFF;
    --pe-text-primary: #262626;
    --pe-text-secondary: #656565;
    --pe-text-tertiary: #8A8A8A;
    --pe-avatar-empty-bg: #F5F3FF;

    /* SPACING */
    --wds-spacing-2:  2px;
    --wds-spacing-4:  4px;
    --wds-spacing-6:  6px;
    --wds-spacing-8:  8px;
    --wds-spacing-10: 10px;
    --wds-spacing-12: 12px;
    --wds-spacing-14: 14px;
    --wds-spacing-16: 16px;
    --wds-spacing-20: 20px;
    --wds-spacing-24: 24px;
    --wds-spacing-28: 28px;
    --wds-spacing-32: 32px;
    --wds-spacing-40: 40px;

    /* RADIUS */
    --wds-radius-xs:   4px;
    --wds-radius-sm:   8px;
    --wds-radius-md:   12px;
    --wds-radius-lg:   16px;
    --wds-radius-xl:   20px;
    --wds-radius-2xl:  24px;
    --wds-radius-full: 9999px;

    /* TYPOGRAPHY */
    --wds-font-family-primary: 'Pretendard', -apple-system, 'SF Pro Display', sans-serif;
    --wds-font-weight-regular:  400;
    --wds-font-weight-medium:   500;
    --wds-font-weight-semibold: 600;
    --wds-font-weight-bold:     700;
    --wds-font-size-2xs: 11px;
    --wds-font-size-xs:  12px;
    --wds-font-size-sm:  13px;
    --wds-font-size-md:  14px;
    --wds-font-size-lg:  16px;
    --wds-font-size-xl:  18px;
    --wds-font-size-2xl: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--wds-font-family-primary);
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    color: var(--wds-label-normal);
  }

  /* === Control Panel (Pass 6 audit 제외 영역) === */
  .control-panel {
    width: 390px;
    background: #1a1a2e;
    color: #e0e0e0;
    border-radius: 12px 12px 0 0;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
    font-family: ui-monospace, monospace;
  }
  .control-panel__row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .control-panel__label { color: #888; font-size: 11px; min-width: 56px; }
  .control-panel select {
    background: #2a2a3e; color: #e0e0e0; border: 1px solid #444;
    border-radius: 6px; padding: 4px 8px; font-size: 12px; flex: 1;
    font-family: ui-monospace, monospace;
  }
  .control-panel__states { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .control-panel__state-btn {
    background: #2a2a3e; color: #bbb; border: 1px solid #444;
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
    font-family: ui-monospace, monospace;
  }
  .control-panel__state-btn.active {
    background: #8752FA; color: #fff; border-color: #8752FA;
  }
  .control-panel__breadcrumb { color: #666; font-size: 11px; font-family: ui-monospace, monospace; }
  .control-panel__hint { color: #999; font-size: 10px; font-style: italic; }

  /* === Device Frame === */
  .device-frame {
    width: 390px;
    height: 844px;
    background: var(--wds-background-normal);
    overflow: hidden;
    position: relative;
    border: 1px solid #ddd;
    border-radius: 0 0 12px 12px;
    isolation: isolate;
  }
  .screen { display: block; height: 100%; position: relative; }

  /* === Status Bar === */
  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 var(--wds-spacing-24);
    font-size: var(--wds-font-size-md);
    font-weight: var(--wds-font-weight-semibold);
    color: var(--wds-label-normal);
    background: var(--wds-background-normal);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }
  .status-bar__icons { display: flex; gap: 6px; align-items: center; color: var(--wds-label-normal); }

  /* === Header Bar === */
  .header-bar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--wds-spacing-12);
    background: var(--wds-background-normal);
    border-bottom: 1px solid var(--wds-line-alternative);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }
  .header-bar__icon-btn {
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--pe-text-primary);
    cursor: pointer;
    border-radius: var(--wds-radius-sm);
    transition: background 0.15s;
  }
  .header-bar__icon-btn:hover { background: var(--wds-surface-secondary); }
  .header-bar__icon-btn:active { background: var(--wds-surface-tertiary); }
  .header-bar__title {
    font-size: var(--wds-font-size-lg);
    font-weight: var(--wds-font-weight-semibold);
    color: var(--pe-text-primary);
    letter-spacing: -0.2px;
  }
  .header-bar__spacer { width: 40px; }

  /* === Crop Canvas === */
  .crop-canvas {
    position: relative;
    width: 100%;
    height: 618px;
    background: var(--wds-color-neutral-1000);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .crop-canvas:active { cursor: grabbing; }

  /* gradient placeholder for sample image (Q6 — needs Sprint Lead approval) */
  .crop-image {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 38%, rgba(255,255,255,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 70%, rgba(0,0,0,0.50) 0%, transparent 60%),
      linear-gradient(180deg, var(--wds-color-neutral-700) 0%, var(--wds-color-neutral-900) 100%);
    transform-origin: center center;
    transform: translate(0, 0) scale(1);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0.16, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.55);
    font-size: var(--wds-font-size-xs);
    font-weight: var(--wds-font-weight-medium);
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  .crop-image::before {
    /* portrait silhouette hint via inline svg-data-uri removed — keep simple gradient + label */
    content: '사진 자리 (Sample placeholder)';
    background: rgba(0,0,0,0.35);
    padding: 6px 12px;
    border-radius: var(--wds-radius-full);
    backdrop-filter: blur(2px);
  }
  .device-frame[data-state="zoomed"] .crop-image {
    transform: translate(-8%, -4%) scale(1.4);
  }
  .device-frame[data-state="dragging"] .crop-image {
    transform: translate(8%, 6%) scale(1.15);
  }
  .device-frame[data-state="loading"] .crop-image { display: none; }
  .device-frame[data-state="submitting"] .crop-image {
    transform: translate(0, 0) scale(1.05);
    filter: brightness(0.85);
  }

  /* === Crop Mask (4-strip scrim approach for square hole) === */
  .crop-mask {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  /* Square hole = canvas width × canvas width, vertically centered.
     Canvas: 390 × 618 → mask square = 390 × 390, vertical inset = (618-390)/2 = 114 */
  .scrim-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 114px;
    background: var(--wds-background-dimmed);
  }
  .scrim-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 114px;
    background: var(--wds-background-dimmed);
  }
  /* Left/right strips occupy the middle 390px (full width) so they're not needed for square at full-bleed.
     Kept as 0-width safeguards; if Q3 → margin variant, expand these. */
  .scrim-left, .scrim-right {
    position: absolute;
    top: 114px;
    bottom: 114px;
    width: 0px;
    background: var(--wds-background-dimmed);
  }
  .scrim-left { left: 0; }
  .scrim-right { right: 0; }

  .mask-frame {
    position: absolute;
    top: 114px;
    left: 0;
    width: 100%;
    height: 390px;
    border-top: 1px solid var(--wds-color-neutral-0);
    border-bottom: 1px solid var(--wds-color-neutral-0);
    pointer-events: none;
  }
  .mask-corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 2px solid var(--wds-color-neutral-0);
  }
  .mask-corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .mask-corner.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
  .mask-corner.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
  .mask-corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .mask-grid {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    opacity: 1;
    transition: opacity 0.2s ease-out;
  }
  .device-frame[data-state="zoomed"] .mask-grid,
  .device-frame[data-state="dragging"] .mask-grid {
    opacity: 0;
  }

  .crop-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--wds-label-inverse);
    font-size: var(--wds-font-size-sm);
    font-weight: var(--wds-font-weight-medium);
    letter-spacing: -0.1px;
    background: rgba(0,0,0,0.45);
    padding: 6px 14px;
    border-radius: var(--wds-radius-full);
    pointer-events: none;
    transition: opacity 0.2s ease-out;
  }
  .device-frame[data-state="zoomed"] .crop-hint,
  .device-frame[data-state="dragging"] .crop-hint,
  .device-frame[data-state="submitting"] .crop-hint {
    opacity: 0;
  }

  .canvas-loader {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--wds-label-inverse);
    font-size: var(--wds-font-size-sm);
    gap: 12px;
    flex-direction: column;
  }
  .device-frame[data-state="loading"] .canvas-loader { display: flex; }
  .canvas-loader__spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.20);
    border-top-color: var(--wds-color-neutral-0);
    border-radius: var(--wds-radius-full);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Bottom CTA === */
  .bottom-cta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--wds-background-normal);
    padding: var(--wds-spacing-12) var(--wds-spacing-16) calc(var(--wds-spacing-32) + 0px);
    z-index: 5;
  }
  .done-btn {
    width: 100%;
    height: 56px;
    background: var(--pe-save-active);
    color: var(--pe-save-active-label);
    border: none;
    border-radius: var(--wds-radius-md);
    font-family: inherit;
    font-size: var(--wds-font-size-lg);
    font-weight: var(--wds-font-weight-semibold);
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.1px;
  }
  .done-btn:hover { background: var(--wds-color-neutral-700); }
  .done-btn:active { background: var(--wds-color-neutral-900); }
  .done-btn:disabled,
  .device-frame[data-state="loading"] .done-btn {
    background: var(--pe-save-disabled);
    color: var(--pe-save-disabled-label);
    cursor: not-allowed;
  }
  .device-frame[data-state="submitting"] .done-btn {
    cursor: wait;
    opacity: 0.92;
  }
  .done-btn__spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.30);
    border-top-color: var(--pe-save-active-label);
    border-radius: var(--wds-radius-full);
    animation: spin 0.9s linear infinite;
  }
  .device-frame[data-state="submitting"] .done-btn__spinner { display: inline-block; }
  .done-btn__label-default { display: inline; }
  .done-btn__label-submitting { display: none; }
  .device-frame[data-state="submitting"] .done-btn__label-default { display: none; }
  .device-frame[data-state="submitting"] .done-btn__label-submitting { display: inline; }

  /* === Toast === */
  .toast {
    display: none;
    position: absolute;
    bottom: 110px;
    left: 16px;
    right: 16px;
    background: var(--wds-color-neutral-900);
    color: var(--wds-label-inverse);
    padding: var(--wds-spacing-12) var(--wds-spacing-16);
    border-radius: var(--wds-radius-md);
    font-size: var(--wds-font-size-sm);
    z-index: 50;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  .toast.show { display: block; }

  @media (max-width: 480px) {
    body { padding: 0; align-items: stretch; min-height: 100dvh; }
    .control-panel { display: none; }
    .device-frame {
      width: 100dvw;
      height: 100dvh;
      border: none;
      border-radius: 0;
    }
  }
</style>
</head>
<body>

<!-- Control Panel (verifier-friendly — Pass 6 audit 제외 영역) -->
<div class="control-panel">
  <div class="control-panel__row">
    <span class="control-panel__label">Screen</span>
    <select id="screen-select">
      <option value="crop-screen">프로필편집_사진_크롭</option>
    </select>
  </div>
  <div class="control-panel__row">
    <span class="control-panel__label">State</span>
    <div class="control-panel__states" id="state-toggles">
      <button class="control-panel__state-btn active" data-state="default" data-state-toggle>default</button>
      <button class="control-panel__state-btn" data-state="zoomed" data-state-toggle>zoomed</button>
      <button class="control-panel__state-btn" data-state="dragging" data-state-toggle>dragging</button>
      <button class="control-panel__state-btn" data-state="loading" data-state-toggle>loading</button>
      <button class="control-panel__state-btn" data-state="submitting" data-state-toggle>submitting</button>
    </div>
  </div>
  <div class="control-panel__row">
    <span class="control-panel__breadcrumb" id="breadcrumb">crop-screen · default</span>
  </div>
  <div class="control-panel__row">
    <span class="control-panel__hint">v2 dogfood — form archetype persona (4/4) + intent.md gate (medium fab risk)</span>
  </div>
</div>

<!-- Device Frame -->
<div class="device-frame" id="device-frame" data-state="default">
  <section class="screen" id="crop-screen" aria-label="프로필 사진 크기 설정 화면">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span class="status-bar__icons">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none" aria-hidden="true">
          <path d="M1 6.5a6.5 6.5 0 0 1 13 0v3.75a.75.75 0 0 1-.75.75H1.75A.75.75 0 0 1 1 10.25z" fill="currentColor"/>
        </svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none" aria-hidden="true">
          <rect x="0.5" y="0.5" width="13" height="9" rx="1.5" stroke="currentColor"/>
          <rect x="14.25" y="3.5" width="1.25" height="3" rx="0.5" fill="currentColor"/>
          <rect x="2" y="2" width="10" height="6" rx="0.5" fill="currentColor"/>
        </svg>
      </span>
    </div>

    <!-- Header Bar -->
    <header class="header-bar" id="header-bar">
      <button class="header-bar__icon-btn" id="back-btn" type="button" aria-label="뒤로">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <h1 class="header-bar__title" id="header-title">크기 설정</h1>
      <span class="header-bar__spacer" aria-hidden="true"></span>
    </header>

    <!-- Crop Canvas -->
    <section class="crop-canvas" id="crop-canvas" aria-label="크롭 캔버스. 드래그 또는 핀치 제스처로 사진 위치와 크기를 조절하세요" role="img">

      <!-- Sample image (gradient placeholder — Q6 / Sprint Lead approval pending) -->
      <div class="crop-image" id="crop-image" aria-hidden="true"></div>

      <!-- 4-strip dim scrim (square hole at center, full canvas width) -->
      <div class="crop-mask" aria-hidden="true">
        <div class="scrim-top"></div>
        <div class="scrim-bottom"></div>
        <div class="scrim-left"></div>
        <div class="scrim-right"></div>

        <!-- Square mask outline + corner markers + rule-of-thirds grid -->
        <div class="mask-frame">
          <span class="mask-corner tl" aria-hidden="true"></span>
          <span class="mask-corner tr" aria-hidden="true"></span>
          <span class="mask-corner bl" aria-hidden="true"></span>
          <span class="mask-corner br" aria-hidden="true"></span>

          <svg class="mask-grid" viewBox="0 0 390 390" preserveAspectRatio="none" aria-hidden="true">
            <line x1="130" y1="0" x2="130" y2="390" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.40"/>
            <line x1="260" y1="0" x2="260" y2="390" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.40"/>
            <line x1="0" y1="130" x2="390" y2="130" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.40"/>
            <line x1="0" y1="260" x2="390" y2="260" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.40"/>
          </svg>
        </div>
      </div>

      <!-- Inline guidance (form persona #1 inline-validation 등가) -->
      <p class="crop-hint" id="crop-hint">드래그해서 위치를 조절하세요</p>

      <!-- Loading overlay -->
      <div class="canvas-loader" aria-hidden="true">
        <div class="canvas-loader__spinner"></div>
        <span>사진을 불러오는 중...</span>
      </div>
    </section>

    <!-- Bottom CTA -->
    <footer class="bottom-cta" id="bottom-cta">
      <button class="done-btn" id="done-btn" type="button" aria-label="완료">
        <span class="done-btn__spinner" aria-hidden="true"></span>
        <span class="done-btn__label-default">완료</span>
        <span class="done-btn__label-submitting">저장 중...</span>
      </button>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </section>
</div>

<script>
  // === State management ===
  const frame = document.getElementById('device-frame');
  const breadcrumb = document.getElementById('breadcrumb');
  const stateButtons = document.querySelectorAll('.control-panel__state-btn');
  const toast = document.getElementById('toast');
  const doneBtn = document.getElementById('done-btn');

  function setState(state) {
    frame.setAttribute('data-state', state);
    stateButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    breadcrumb.textContent = 'crop-screen · ' + state;
    // form persona — submit disabled when not ready
    doneBtn.disabled = (state === 'loading');
    console.log('[state]', state);
  }

  stateButtons.forEach(btn => {
    btn.addEventListener('click', () => setState(btn.dataset.state));
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // === Interactions ===

  // Back button — navigate (prototype: console.log + visual hint)
  document.getElementById('back-btn').addEventListener('click', () => {
    console.log('[navigate] go-back → app-009 (앨범선택) or app-005 (시트)');
    showToast('이전 화면으로 돌아갑니다');
  });

  // Done button — submit-crop (form persona 권장 #2: loading after submit)
  doneBtn.addEventListener('click', () => {
    if (doneBtn.disabled) return;
    console.log('[submit-crop] navigate → app-006 (편집화면)');
    setState('submitting');
    setTimeout(() => {
      showToast('사진이 적용됐어요');
      setTimeout(() => setState('default'), 1500);
    }, 900);
  });

  // Canvas drag simulation — drag = press + move (visual demo only; real RN uses PanGestureHandler)
  const canvas = document.getElementById('crop-canvas');
  let dragTimer = null;
  canvas.addEventListener('pointerdown', () => {
    if (frame.getAttribute('data-state') === 'loading' ||
        frame.getAttribute('data-state') === 'submitting') return;
    setState('dragging');
    clearTimeout(dragTimer);
    dragTimer = setTimeout(() => setState('default'), 1400);
  });

  // Double-tap on canvas → toggle zoomed (핀치 zoom 시뮬레이션)
  let lastTap = 0;
  canvas.addEventListener('click', (e) => {
    const now = Date.now();
    if (now - lastTap < 320) {
      const isZoomed = frame.getAttribute('data-state') === 'zoomed';
      setState(isZoomed ? 'default' : 'zoomed');
    }
    lastTap = now;
  });

  // === Init ===
  setState('default');
  console.log('[ready] app-008 crop screen — form archetype, fabrication_risk: medium');
</script>

</body>
</html>
