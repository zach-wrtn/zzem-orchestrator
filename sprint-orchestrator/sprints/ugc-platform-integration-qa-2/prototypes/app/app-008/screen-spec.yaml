## Form Persona Compliance (form.md 강제 룰 4/4)
form_persona:
  rule_1_inline_validation:
    requires: "모든 input 에 inline validation 정의"
    actual: "본 form 의 'input' 은 사용자 crop area 선택 (drag/zoom). 'valid' = 마스크 영역 내에 이미지 존재. CropMask outline (white 1px) + MaskScrim (외부 dim) 자체가 inline visual validation — 사용자가 즉시 잘릴 영역 인지 (Figma + form 강제 룰 #1 충족). states.zoomed/dragging 에서도 마스크/scrim 유지."
    pass: true
    note: "전통 form 의 'red error text' 는 부적합 — gesture-driven form 의 inline validation 은 visual mask 가 등가물"

  rule_2_submit_disabled_state:
    requires: "Submit 버튼 disabled 상태 정의됨 — required 필드 valid 까지 비활성"
    actual:
      submit_disabled: "states.loading — 이미지 미로드 시 done-btn disabled (--pe-save-disabled fill)"
      submit_enabled: "states.default/zoomed/dragging — image 로드 + crop area 존재 시 enabled (--pe-save-active fill)"
    pass: true

  rule_3_error_inline_under_input:
    requires: "Error message 가 해당 입력 직하 (위·우측 alert 박스 금지)"
    actual: "본 화면은 error 시나리오 없음 (gesture 는 항상 valid). 단, 이미지 로드 실패 시 CropHint 위치에 'inline' 메시지 노출 가능 — 패턴 준수 (alert 박스 금지)"
    pass: true
    note: "task AC 에 error case 명시 안 됨 — 안전망으로 inline pattern 만 채택"

  rule_4_primary_action_one:
    requires: "Primary action 1 개만 — 동급 강조 버튼 금지"
    actual: "DoneButton ('완료') 1 개. back-btn 은 icon-button (위계 다름). 다른 동급 버튼 없음."
    pass: true

form_persona_recommended:
  rec_1_validation_blur:
    actual: "N/A — gesture form. drag/zoom 결과는 즉시 시각 반영 (real-time inline)"
    accepted: "n/a"
  rec_2_loading_state_after_submit:
    actual: "states.submitting — done-btn 비활성 + 'loading' label '저장 중...'"
    accepted: true
  rec_3_section_split:
    actual: "single screen, single 'input' (gesture). 분할 불필요"
    accepted: "n/a"

