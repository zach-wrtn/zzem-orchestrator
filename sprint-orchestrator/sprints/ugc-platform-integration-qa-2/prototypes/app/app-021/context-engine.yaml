# ─────────────────────────────
# Layer 3: HOW (Orchestration)
# ─────────────────────────────
how:
  composition_rules:
    - rule: "Header (back + 알림 + 설정) → NotificationsOffNotice (조건부) → EmptyStateView (수직 중앙)"
      applies_to: ["NotificationsEmptyScreen"]
    - rule: "EmptyStateView 는 body 의 사용 가능 영역 정중앙 (header + notice 제외)"
      applies_to: ["NotificationsEmptyScreen"]
    - rule: "NotificationsOffNotice 는 body 최상단, sticky 아님"
      applies_to: ["NotificationsEmptyScreen"]
    - rule: "Primary CTA 는 EmptyStateView 내부 (bottom-action sticky 아님) — empty_state persona 시각 앵커-CTA 인접 원칙"
      applies_to: ["NotificationsEmptyScreen"]
  conditional_rendering:
    - condition: "OS 알림 권한 denied"
      variant_a: "NotificationsOffNotice 표시"
      variant_b: "NotificationsOffNotice 숨김 (granted 상태)"
    - condition: "items.length == 0 (이 화면 자체)"
      variant_a: "EmptyStateView 표시"
      variant_b: "(다른 화면 — app-020 알림센터_기본 으로 분기)"
  constraints:
    - "Bell-off icon container 는 96px (component-empty-icon-size 토큰), brand-weak fill + brand color stroke"
    - "Headline + body 합쳐 3 문장 이내 (empty_state persona 강제 룰 #2)"
    - "부정 어조 금지: '없어요/실패/못함' 키워드 위주 문장 회피 (persona 강제 룰 #4)"
    - "Primary CTA 1개만 (강제 룰 #3) — secondary text-link 는 옵션"
    - "어떤 인터랙티브 요소도 alert/confirm/prompt 사용 금지 (Pass 6 #8)"
    - "tokens-only — raw hex 금지 (Pass 6 #1)"
    - "Lucide-style inline SVG (bell-off / sparkles / search) 사용 (Pass 6 #2)"
  priority_order:
    - "1. EmptyStateView (메인 안내 — 화면의 정체성)"
    - "2. Header (현재 위치 + 설정 진입점)"
    - "3. NotificationsOffNotice (조건부 — 시스템 권한 환기)"
    - "4. BottomNav (전역 이동)"

