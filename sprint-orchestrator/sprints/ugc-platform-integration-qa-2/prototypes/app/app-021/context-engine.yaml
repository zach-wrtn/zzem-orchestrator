# ─────────────────────────────
# Layer 1: WHY (Business Intent)
# ─────────────────────────────
why:
  product_intent: |
    알림 0건 상태에서 사용자에게 "버그가 아닌 정상 상태"임을 시각적으로 안내하고,
    다음 행동 (홈 탐색 또는 시스템 알림 활성화) 으로 부드럽게 유도하여
    빈 화면 좌절을 최소화한다.
  target_user: "ZZEM 신규/저활동 사용자 — 팔로우 0명이거나 활동 미참여 시 가장 빈번 노출"
  success_metric: "AC-3.2 통과 — empty 화면에서 CTA tap 비율 (홈 복귀 또는 알림 활성화)"
  user_stories:
    - id: "US-3.2"
      as_a: "알림센터를 처음 또는 다시 열어본 사용자"
      i_want: "알림이 비어있을 때 막막하지 않게 다음 행동을 안내받고 싶다"
      so_that: "앱이 정지되거나 빈 상태에서 이탈하지 않는다"
    - id: "US-3.2a"
      as_a: "휴대폰 시스템 알림이 꺼져 있는 사용자"
      i_want: "알림 미수신의 진짜 원인이 OS 설정임을 알고 한 번에 켜고 싶다"
      so_that: "앱 측 버그로 오해하지 않는다"
  acceptance_criteria:
    - id: "AC-3.2"
      given: "알림 items.length == 0"
      when: "알림센터 진입"
      then: "empty_state 화면 + 재진입 유도 CTA"
      ui_impact: |
        empty_state archetype: 시각 앵커 (illustration/icon 80px+) 중앙, headline 1, body 1-2,
        primary CTA 1개 (다음 행동 명확). 부정 어조 금지.
    - id: "AC-3.2-system-alert"
      given: "OS 알림 권한 == denied"
      when: "알림센터 진입"
      then: "상단 인라인 안내 (notifications_off icon + '알림 켜기' 버튼)"
      ui_impact: |
        Figma 명시: Body 최상단 inline notice 블록 (surface-secondary fill, 좌측 icon + 라벨 + 우측 brand-color text 버튼).
        시스템 설정으로 deeplink. empty_state CTA 와는 독립적 진입점.

