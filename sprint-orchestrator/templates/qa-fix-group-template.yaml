# QA-Fix Group
# Stage 2 output — bundles related in-scope tickets into one fix unit.
# Path: sprints/<sprint-id>/qa-fix/groups/group-<N>.yaml

group_id: "group-<N>"
created_at: "YYYY-MM-DDTHH:MM:SS+09:00"

# Why these tickets are grouped together. Choose one primary axis; secondary optional.
grouping_basis:
  primary: "shared_module"  # shared_module | shared_endpoint | shared_root_cause
  secondary: null           # optional — same enum as primary; leave null if not applicable
  rationale: |
    <one paragraph explaining why these tickets share a fix unit>

tickets:
  - key: "ZZEM-123"
    priority: "P0"
    summary: "<one-line>"
  - key: "ZZEM-145"
    priority: "P1"
    summary: "<one-line>"

# Files / modules expected to change (informational — confirmed in Contract).
expected_scope:
  app:
    - "<path glob>"
  backend:
    - "<path glob>"

# Maestro feasibility check.
# Stage 2 leaves this as "<set in Stage 5>" placeholder. Stage 5 fills with actual values
# when collecting evidence per ticket. Used to surface regression-test gaps in Retro.
regression_test_feasibility:
  app: "<set in Stage 5>"      # feasible | infeasible | n/a
  backend: "<set in Stage 5>"  # feasible | infeasible | n/a
  notes: "<set in Stage 5; e.g. 'covered by existing flow X'>"
